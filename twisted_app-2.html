<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWISTED — Steampunk Companion</title>
<meta name="description" content="The complete companion app for Twisted Steampunk Skirmish by Demented Games">
<meta name="theme-color" content="#1A1A28">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TWISTED">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231A1A28'/><text x='256' y='320' font-size='300' text-anchor='middle' fill='%23C9A84C'>⚙</text><text x='256' y='430' font-size='72' text-anchor='middle' fill='%238B6914' font-family='serif' font-weight='bold'>TWISTED</text></svg>">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;TWISTED Steampunk Companion&quot;,&quot;short_name&quot;:&quot;TWISTED&quot;,&quot;description&quot;:&quot;Complete companion for Twisted Steampunk Skirmish&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%231A1A28&quot;,&quot;theme_color&quot;:&quot;%231A1A28&quot;,&quot;orientation&quot;:&quot;any&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231A1A28'/><text x='256' y='340' font-size='320' text-anchor='middle' fill='%23C9A84C'>⚙</text></svg>&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;,&quot;purpose&quot;:&quot;any maskable&quot;}]}">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --brass:#C9A84C;--brass-light:#E8C97A;--brass-dark:#8B6914;
  --copper:#B87333;--iron:#3A3A4A;--iron-dark:#1A1A28;
  --rust:#8B3A2A;--rust-light:#C0503A;
  --steam:#D4C5A9;--parchment:#F2E8D0;--parchment-dark:#D4C5A9;
  --green:#3DB88C;--blue:#4A9ECC;--red:#CC4A4A;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--iron-dark);color:var(--steam);font-family:'IM Fell English',serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(184,115,51,.06) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* HEADER */
header{background:linear-gradient(180deg,rgba(26,18,8,.98),rgba(26,26,40,.95));border-bottom:1px solid var(--brass-dark);padding:0 1.5rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.5);}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;padding:.6rem 0;flex-wrap:wrap;}
.logo-twisted{font-family:'Cinzel Decorative',serif;font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--brass-light),var(--brass),var(--copper));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.12em;filter:drop-shadow(0 0 8px rgba(201,168,76,.4));white-space:nowrap;}
.logo-sub{font-family:'Josefin Sans',sans-serif;font-size:.52rem;letter-spacing:.3em;color:var(--brass-dark);text-transform:uppercase;display:block;margin-top:2px;}
nav{display:flex;gap:.3rem;flex-wrap:wrap;flex:1;}
.nav-btn{background:transparent;border:1px solid transparent;color:var(--parchment-dark);font-family:'Josefin Sans',sans-serif;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;padding:.45rem 0;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap;flex:1;min-width:60px;text-align:center;}
.nav-btn:hover{color:var(--brass-light);border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06);}
.nav-btn.active{color:var(--brass-light);border-color:var(--brass-dark);background:rgba(201,168,76,.1);}

/* MAIN */
main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:2rem 1.5rem;}
.panel{display:none;animation:fadeIn .35s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SECTION HEADER */
.section-header{text-align:center;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(201,168,76,.2);position:relative;}
.section-header::after{content:'⚙';position:absolute;bottom:-.65rem;left:50%;transform:translateX(-50%);background:var(--iron-dark);padding:0 .5rem;color:var(--brass-dark);font-size:1.1rem;}
.section-title{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--brass-light),var(--brass));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;margin-bottom:.4rem;}
.section-subtitle{font-family:'Josefin Sans',sans-serif;font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:var(--brass-dark);}

/* CARDS */
.card{background:linear-gradient(135deg,rgba(42,38,30,.9),rgba(30,28,40,.9));border:1px solid rgba(201,168,76,.2);border-radius:6px;padding:1.25rem;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--brass-dark),transparent);}
.card-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);letter-spacing:.08em;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;}

/* WELCOME */
.welcome-emblem{font-size:4.5rem;display:block;margin-bottom:.75rem;filter:drop-shadow(0 0 18px rgba(201,168,76,.5));animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 18px rgba(201,168,76,.5))}50%{filter:drop-shadow(0 0 32px rgba(201,168,76,.8))}}
.welcome-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2.2rem,5vw,4.5rem);font-weight:900;background:linear-gradient(135deg,#E8C97A 0%,#C9A84C 40%,#B87333 70%,#C9A84C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;line-height:1.1;filter:drop-shadow(0 0 15px rgba(201,168,76,.3));}
.welcome-tagline{font-family:'Josefin Sans',sans-serif;font-size:.85rem;letter-spacing:.4em;text-transform:uppercase;color:var(--brass-dark);margin:.75rem 0 2rem;}
.welcome-divider{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--brass-dark),transparent);margin:0 auto 2rem;}
.welcome-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.9rem;max-width:900px;margin:0 auto 2.5rem;}
.welcome-card{background:linear-gradient(135deg,rgba(42,38,30,.8),rgba(30,28,40,.8));border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:1.25rem .9rem;cursor:pointer;transition:all .3s;text-align:center;}
.welcome-card:hover{border-color:var(--brass);transform:translateY(-3px);box-shadow:0 8px 28px rgba(201,168,76,.14);}
.wc-icon{font-size:2.2rem;margin-bottom:.6rem;display:block;}
.wc-title{font-family:'Cinzel',serif;font-size:.82rem;color:var(--brass-light);letter-spacing:.06em;margin-bottom:.3rem;}
.wc-desc{font-family:'Josefin Sans',sans-serif;font-size:.67rem;color:var(--parchment-dark);opacity:.8;}

/* RULES */
.rules-layout{display:grid;grid-template-columns:220px 1fr;gap:1.75rem;align-items:start;}
.rules-nav{background:rgba(26,26,40,.8);border:1px solid rgba(201,168,76,.15);border-radius:6px;padding:.9rem;position:sticky;top:76px;}
.rules-nav-title{font-family:'Josefin Sans',sans-serif;font-size:.7rem;color:var(--brass-dark);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid rgba(201,168,76,.15);}
.rules-nav-item{display:flex;align-items:center;gap:.4rem;width:100%;background:transparent;border:none;text-align:left;padding:.42rem .65rem;cursor:pointer;border-radius:4px;font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.04em;color:var(--parchment-dark);transition:all .2s;margin-bottom:.05rem;}
.rules-nav-item:hover{background:rgba(201,168,76,.08);color:var(--brass-light);}
.rules-nav-item.active{background:rgba(201,168,76,.12);color:var(--brass-light);border-left:2px solid var(--brass);}
.rules-page{display:none;}
.rules-page.active{display:block;animation:fadeIn .25s ease;}
.rule-block{background:linear-gradient(135deg,rgba(42,38,30,.7),rgba(30,28,40,.7));border:1px solid rgba(201,168,76,.15);border-radius:6px;padding:1.1rem 1.35rem;margin-bottom:.9rem;}
.rule-block h3{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);margin-bottom:.65rem;}
.rule-block p,.rule-block li{font-size:.87rem;line-height:1.75;color:var(--steam);margin-bottom:.35rem;}
.rule-block ul{padding-left:1.1rem;}
.highlight-box{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.28);border-radius:4px;padding:.65rem .9rem;margin:.65rem 0;font-size:.83rem;color:var(--parchment);}
.highlight-box strong{color:var(--brass-light);}
.example-box{background:rgba(61,184,140,.06);border-left:3px solid var(--green);padding:.65rem .9rem;margin:.65rem 0;font-size:.83rem;border-radius:0 4px 4px 0;font-style:italic;color:var(--parchment-dark);}
.notice{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:.65rem .9rem;font-family:'Josefin Sans',sans-serif;font-size:.77rem;color:var(--parchment-dark);margin:.75rem 0;}
.notice.warning{background:rgba(204,74,74,.06);border-color:rgba(204,74,74,.25);}
.notice.tip{background:rgba(61,184,140,.06);border-color:rgba(61,184,140,.25);}
.stat-pill{display:inline-block;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.28);color:var(--brass-light);font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.08em;padding:.18rem .45rem;border-radius:3px;margin:.1rem;}
.turn-sequence{display:flex;gap:0;margin:1.25rem 0;}
.turn-step{flex:1;text-align:center;padding:.9rem .6rem;background:rgba(30,28,40,.8);border:1px solid rgba(201,168,76,.18);position:relative;}
.turn-step:first-child{border-radius:6px 0 0 6px;}
.turn-step:last-child{border-radius:0 6px 6px 0;}
.turn-step::after{content:'▶';position:absolute;right:-.55rem;top:50%;transform:translateY(-50%);color:var(--brass-dark);font-size:.65rem;z-index:1;}
.turn-step:last-child::after{display:none;}
.ts-num{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--brass-dark);display:block;}
.ts-name{font-family:'Cinzel',serif;font-size:.72rem;color:var(--brass-light);display:block;margin:.2rem 0;}
.ts-desc{font-family:'Josefin Sans',sans-serif;font-size:.62rem;color:var(--parchment-dark);opacity:.8;}

/* CHARACTERS */
.faction-tabs{display:flex;gap:.4rem;margin-bottom:1.75rem;flex-wrap:wrap;}
.faction-tab{background:rgba(26,26,40,.8);border:1px solid rgba(201,168,76,.18);color:var(--parchment-dark);font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:.42rem .9rem;border-radius:4px;cursor:pointer;transition:all .2s;}
.faction-tab:hover{border-color:rgba(201,168,76,.4);color:var(--brass-light);}
.faction-tab.active{background:rgba(201,168,76,.12);border-color:var(--brass);color:var(--brass-light);}
.faction-panel{display:none;}
.faction-panel.active{display:block;animation:fadeIn .3s ease;}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.1rem;}
.char-card{background:linear-gradient(135deg,rgba(26,18,8,.9),rgba(30,28,40,.9));border:1px solid rgba(201,168,76,.18);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .3s;}
.char-card:hover{border-color:var(--brass);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.4),0 0 18px rgba(201,168,76,.1);}
.char-header{padding:.9rem 1.1rem;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(201,168,76,.1);background:linear-gradient(135deg,rgba(42,32,10,.5),transparent);}
.char-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);}
.char-role{font-family:'Josefin Sans',sans-serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--brass-dark);margin-top:.15rem;}
.char-pts{font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--brass);}
.char-pts-lbl{font-family:'Josefin Sans',sans-serif;font-size:.52rem;color:var(--brass-dark);text-align:right;}
.char-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:rgba(201,168,76,.08);border-bottom:1px solid rgba(201,168,76,.1);}
.stat-cell{background:rgba(26,22,15,.8);padding:.38rem .2rem;text-align:center;}
.stat-lbl{font-family:'Josefin Sans',sans-serif;font-size:.5rem;letter-spacing:.04em;color:var(--brass-dark);display:block;text-transform:uppercase;}
.stat-val{font-family:'Cinzel',serif;font-size:.85rem;color:var(--steam);display:block;margin-top:.08rem;}
.char-abilities{padding:.65rem 1.1rem;display:flex;flex-wrap:wrap;gap:.25rem;}
.ability-tag{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);color:var(--parchment-dark);font-family:'Josefin Sans',sans-serif;font-size:.6rem;letter-spacing:.04em;padding:.12rem .4rem;border-radius:3px;}
.ability-tag.alc{background:rgba(74,158,204,.1);border-color:rgba(74,158,204,.28);color:var(--blue);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,8,15,.85);z-index:1000;backdrop-filter:blur(4px);justify-content:center;align-items:center;padding:1rem;}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
.modal{background:linear-gradient(135deg,rgba(26,18,8,.98),rgba(20,20,35,.98));border:1px solid rgba(201,168,76,.4);border-radius:12px;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 70px rgba(0,0,0,.7),0 0 35px rgba(201,168,76,.08);}
.modal-head{padding:1.35rem 1.75rem;border-bottom:1px solid rgba(201,168,76,.18);background:linear-gradient(135deg,rgba(42,32,10,.5),transparent);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;backdrop-filter:blur(10px);}
.modal-title{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--brass-light);}
.modal-close{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--brass-dark);width:1.9rem;height:1.9rem;border-radius:50%;cursor:pointer;font-size:.95rem;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{border-color:var(--brass);color:var(--brass-light);}
.modal-body{padding:1.35rem 1.75rem;}
.modal-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.65rem;margin-bottom:1.25rem;}
.ms{background:rgba(42,38,30,.6);border:1px solid rgba(201,168,76,.14);border-radius:5px;padding:.65rem .4rem;text-align:center;}
.ms-lbl{font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.08em;color:var(--brass-dark);text-transform:uppercase;display:block;}
.ms-val{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--steam);display:block;margin-top:.2rem;}
.modal-section{margin-bottom:1.1rem;}
.modal-section-title{font-family:'Cinzel',serif;font-size:.82rem;color:var(--brass);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.45rem;padding-bottom:.28rem;border-bottom:1px solid rgba(201,168,76,.13);}
.weapon-entry{background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.1);border-radius:4px;padding:.55rem .7rem;margin-bottom:.35rem;}
.weapon-name{color:var(--brass-light);font-family:'Cinzel',serif;font-size:.83rem;}
.weapon-stats{color:var(--parchment-dark);font-family:'Josefin Sans',sans-serif;font-size:.7rem;margin-top:.15rem;}
.ability-entry{background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.1);border-radius:4px;padding:.55rem .7rem;margin-bottom:.35rem;cursor:pointer;transition:border-color .2s;}
.ability-entry:hover{border-color:rgba(201,168,76,.28);}
.ability-ename{color:var(--brass-light);font-family:'Cinzel',serif;font-size:.83rem;}
.ability-edesc{color:var(--parchment-dark);font-family:'IM Fell English',serif;font-size:.78rem;margin-top:.28rem;line-height:1.55;font-style:italic;display:none;}
.ability-entry.expanded .ability-edesc{display:block;}

/* ALCHEMANCY */
.schools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.75rem;}
.school-card{border-radius:8px;padding:1.1rem;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent;}
.sc-fire{background:linear-gradient(135deg,rgba(200,80,30,.14),rgba(120,40,10,.18));border-color:rgba(200,80,30,.28);}
.sc-earth{background:linear-gradient(135deg,rgba(80,150,60,.14),rgba(40,100,20,.18));border-color:rgba(80,150,60,.28);}
.sc-air{background:linear-gradient(135deg,rgba(74,158,204,.14),rgba(30,100,160,.18));border-color:rgba(74,158,204,.28);}
.sc-water{background:linear-gradient(135deg,rgba(80,130,200,.14),rgba(30,60,150,.18));border-color:rgba(80,130,200,.28);}
.sc-fire:hover,.sc-fire.active{border-color:rgba(200,100,50,.7);box-shadow:0 0 18px rgba(200,80,30,.2);}
.sc-earth:hover,.sc-earth.active{border-color:rgba(100,180,80,.7);box-shadow:0 0 18px rgba(80,150,60,.2);}
.sc-air:hover,.sc-air.active{border-color:rgba(100,180,220,.7);box-shadow:0 0 18px rgba(74,158,204,.2);}
.sc-water:hover,.sc-water.active{border-color:rgba(80,130,220,.7);box-shadow:0 0 18px rgba(80,130,200,.2);}
.sc-icon{font-size:2.2rem;display:block;margin-bottom:.4rem;}
.sc-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);letter-spacing:.08em;}
.sc-theme{font-family:'Josefin Sans',sans-serif;font-size:.62rem;color:var(--parchment-dark);letter-spacing:.08em;margin-top:.15rem;}
.invoc-list{display:none;}
.invoc-list.active{display:block;animation:fadeIn .3s ease;}
.invoc-card{background:linear-gradient(135deg,rgba(26,18,8,.9),rgba(30,28,40,.9));border:1px solid rgba(201,168,76,.13);border-radius:6px;padding:.9rem 1.1rem;margin-bottom:.65rem;display:grid;grid-template-columns:1fr auto;gap:.9rem;cursor:pointer;transition:border-color .2s;}
.invoc-card:hover{border-color:rgba(201,168,76,.32);}
.invoc-name{font-family:'Cinzel',serif;font-size:.92rem;color:var(--brass-light);}
.invoc-desc{font-size:.78rem;color:var(--parchment-dark);font-style:italic;max-height:0;overflow:hidden;transition:max-height .3s;}
.invoc-card.expanded .invoc-desc{max-height:200px;padding-top:.35rem;}
.invoc-badges{display:flex;gap:.35rem;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.ib{font-family:'Josefin Sans',sans-serif;font-size:.6rem;letter-spacing:.04em;padding:.13rem .38rem;border-radius:3px;white-space:nowrap;}
.ib-power{background:rgba(200,80,30,.14);border:1px solid rgba(200,80,30,.28);color:#E08060;}
.ib-action{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.22);color:var(--brass-light);}
.ib-range{background:rgba(74,158,204,.1);border:1px solid rgba(74,158,204,.22);color:var(--blue);}
.ib-diff{background:rgba(204,74,74,.1);border:1px solid rgba(204,74,74,.22);color:var(--red);}
.ib-elem{background:rgba(61,184,140,.1);border:1px solid rgba(61,184,140,.22);color:var(--green);}

/* ESSENCE TRACKER */
.ess-tracker{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.18);border-radius:8px;padding:1.1rem;margin-bottom:1.75rem;}
.ess-row{display:flex;align-items:center;gap:.9rem;margin-bottom:.65rem;}
.ess-lbl{font-family:'Josefin Sans',sans-serif;font-size:.76rem;letter-spacing:.08em;width:75px;display:flex;align-items:center;gap:.35rem;}
.ess-pips{display:flex;gap:.3rem;flex:1;}
.pip{width:26px;height:26px;border-radius:50%;border:2px solid;cursor:pointer;transition:all .2s;}
.pip-fire{border-color:rgba(200,80,30,.45);}
.pip-fire.full{background:rgba(200,80,30,.65);box-shadow:0 0 7px rgba(200,80,30,.4);}
.pip-earth{border-color:rgba(80,150,60,.45);}
.pip-earth.full{background:rgba(80,150,60,.65);box-shadow:0 0 7px rgba(80,150,60,.4);}
.pip-air{border-color:rgba(74,158,204,.45);}

reg('rules',function(){
  if(document.getElementById('panel-rules').innerHTML.trim())return;
  document.getElementById('panel-rules').innerHTML=`
<div class="section-header"><h2 class="section-title">Rules & Tutorial</h2><p class="section-subtitle">Complete game mechanics reference</p></div>
<div class="rules-layout">
<aside class="rules-nav">
  <div class="rules-nav-title">Contents</div>
  ${[
    ['basics','🎯 Core Basics'],['turn','🔄 Turn Sequence'],['favour','⭐ Favour & Eye'],
    ['movement','👣 Movement'],['ranged','🏹 Ranged Combat'],['closecombat','⚔️ Close Combat'],
    ['alcsystem','🔮 Alchemancy'],['states','💀 Conditions'],['terrain','🏛 Terrain'],
    ['grenades','💣 Templates'],['company','🏗 Company Building'],
  ].map(([k,l],i)=>`<button class="rules-nav-item${i===0?' active':''}" onclick="showRule('${k}',this)">${l}</button>`).join('')}
</aside>
<div class="rules-content">

<div class="rules-page active" id="rp-basics">
  <div class="rule-block"><h3>🎲 The D20 System</h3>
    <p>Twisted uses opposed D20 rolls — both players roll and add their relevant characteristic. Highest wins. Ties go to whoever holds <strong style="color:var(--brass-light)">Favour of The Engine</strong>.</p>
    <div class="highlight-box"><strong>Natural 1</strong> = always fails. &nbsp; <strong>Natural 20</strong> = always succeeds (Critical Hit in combat).</div>
    <p>Pre-measuring is always allowed at any time before committing to an action.</p>
  </div>
  <div class="rule-block"><h3>📊 Characteristics</h3>
    <p>Every character has these stats on their card:</p>
    <div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem">
      ${['SPD Speed','STR Strength','FIN Finesse','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM Armour','ALC Alchemancy','LIFE'].map(s=>`<span class="stat-pill">${s}</span>`).join('')}
    </div>
  </div>
  <div class="rule-block"><h3>⚡ Actions</h3>
    <p>Each character gets <strong style="color:var(--brass-light)">2 Actions</strong> per Activation. Actions include: Move, Ranged Attack, Close Combat, Alchemancy, or Special abilities costing an Action.</p>
    <div class="notice tip">Some abilities grant free Actions or change action costs. Check each character's card carefully.</div>
  </div>
  <div class="rule-block"><h3>🩸 Wounded & Out of Action</h3>
    <p>When Life drops into the <strong style="color:var(--rust-light)">red boxes</strong> on the card: all characteristics −2 (except Life and Armour). At 0 Life the character is <strong style="color:var(--rust-light)">Out of Action</strong> and removed.</p>
  </div>
</div>

<div class="rules-page" id="rp-turn">
  <div class="turn-sequence">
    ${[['I','Sorting','Arrange activation cards'],['II','Eye of Engine','Draw 1 card (2 with Favour)'],['III','Activation','Alternate — each character takes 2 Actions'],['IV','Maintenance','Recover Essences, clear effects']].map(([n,t,d])=>`<div class="turn-step"><span class="ts-num">${n}</span><span class="ts-name">${t}</span><div class="ts-desc">${d}</div></div>`).join('')}
  </div>
  <div class="rule-block"><h3>I. Sorting Phase</h3><p>Arrange your Activation Deck in any order you choose. Abilities like <em>Organised</em> can further influence this.</p></div>
  <div class="rule-block"><h3>II. Eye of The Engine Draw</h3><p>Draw one Eye card from the shared deck. With Favour, draw two and keep your choice. Eye cards are played at specific times (Pre-Activation, During, Maintenance, or Special). Persistent cards remain until triggered.</p>
    <div class="highlight-box"><strong>Eyecon Symbols</strong> only matter when Tempting Fate — red Eyecon = lose Favour.</div>
  </div>
  <div class="rule-block"><h3>III. Activation Phase</h3><p>Players alternate activating one character each. Each character takes up to 2 Actions. Once all characters have activated, move to Maintenance.</p></div>
  <div class="rule-block"><h3>IV. Maintenance Phase</h3><p>Recover Essences (half free, or all for 2 Actions during Activation). Resolve Bleed, Regenerate, Venom. Clear Stun and temporary conditions.</p></div>
</div>

<div class="rules-page" id="rp-favour">
  <div class="rule-block"><h3>⭐ Favour of The Engine</h3>
    <p>One company holds Favour at any time. It provides:</p>
    <ul>
      <li><strong style="color:var(--brass-light)">Tie-breaker:</strong> Win all tied opposed rolls</li>
      <li><strong style="color:var(--brass-light)">Re-roll:</strong> Once per turn. Lose Favour if the re-roll also fails.</li>
      <li><strong style="color:var(--brass-light)">Extra Eye card:</strong> Draw 2, keep 1</li>
    </ul>
    <div class="notice warning"><strong>Losing Favour:</strong> Failed re-roll, or drawing a red Eyecon while Tempting Fate.</div>
  </div>
  <div class="rule-block"><h3>🎴 Tempting Fate</h3><p>Any character may draw an Eye card during any action for a possible bonus. If it shows a red Eyecon and you hold Favour, you lose it immediately. Can be used even while under a Persistent Eye card.</p></div>
</div>

<div class="rules-page" id="rp-movement">
  <div class="rule-block"><h3>👣 Movement</h3><p>Move up to <strong style="color:var(--brass-light)">Speed</strong> inches per Move Action. Characters have a 180° front arc — attacks from outside it gain bonuses.</p></div>
  <div class="rule-block"><h3>🏃 Running</h3><p>Use both Actions on movement. Grants <strong style="color:var(--brass-light)">+1 Defence vs Ranged</strong>.</p></div>
  <div class="rule-block"><h3>🧗 Climbing</h3><p>Half Speed. Difficulty 12 Finesse or Strength check or no movement.</p></div>
  <div class="rule-block"><h3>🦘 Jumping</h3>
    <ul><li>Up to 1": Diff 6</li><li>1"–2": Diff 9</li><li>2"–4": Diff 12</li><li>4"–6": Diff 15</li></ul>
  </div>
  <div class="rule-block"><h3>⚠️ Threatened Area</h3><p>1" around any character. Moving through: Opposed Finesse or the threatening character makes a free CC attack.</p></div>
  <div class="rule-block"><h3>🏚 Difficult Terrain</h3><p>Costs 2" per 1" traveled. Running through: Difficulty 12 Finesse or go Prone.</p></div>
  <div class="rule-block"><h3>🏠 Buildings</h3><p>Break in: Difficulty 14 Finesse; fail = D4 damage. Doors auto-lock after use.</p></div>
</div>

<div class="rules-page" id="rp-ranged">
  <div class="rule-block"><h3>🎯 Range Bands</h3>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.5rem">
      ${[['Short','±0','var(--green)'],['Medium','−2','var(--brass-light)'],['Long','−4','var(--copper)'],['Extreme','−6','var(--red)']].map(([r,m,c])=>`<div style="text-align:center;background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:.5rem"><div style="font-family:'Cinzel',serif;color:${c};font-size:.78rem">${r}</div><div style="font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:${c}">${m}</div></div>`).join('')}
    </div>
  </div>
  <div class="rule-block"><h3>🎯 Cover & LOS</h3><p>180° front arc required. Cover (terrain or character between attacker and target) = <strong style="color:var(--brass-light)">+2 Ranged Defence</strong>.</p></div>
  <div class="rule-block"><h3>💥 Damage</h3><p>Weapon dice + modifiers − Armour = Life lost. Minimum 0.</p><div class="example-box">D8+3 rolls 9. Target Armour 4. Damage = 9−4 = 5 Life lost.</div></div>
  <div class="rule-block"><h3>⚔ Firing Into CC</h3><ul><li><strong style="color:var(--brass-light)">Err on Caution:</strong> −4 to attack; only your target can be hit</li><li><strong style="color:var(--brass-light)">Blaze Away:</strong> Random target from all characters in melee</li></ul></div>
</div>

<div class="rules-page" id="rp-closecombat">
  <div class="rule-block"><h3>⚔️ Initiating</h3><p>Spend a Move Action to enter base-to-base contact. CC is resolved immediately. 3+ characters in continuous contact = a Melee.</p></div>
  <div class="rule-block"><h3>🎲 Modifiers</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      ${[['Charging','+1 Attack, +1 Damage, −1 Defence'],['Jump Attack','+2 Attack, +1 Damage, −1 Defence'],['Outnumbered','+1 per extra attacker'],['Flanked / Rear','+1 attacker (rear: first round only)']].map(([n,d])=>`<div class="highlight-box"><strong>${n}:</strong><br>${d}</div>`).join('')}
    </div>
  </div>
  <div class="rule-block"><h3>🚪 Disengaging</h3><p>Finesse check vs Difficulty 10 + opponent's CC Attack. Fail = free CC attack against you.</p></div>
  <div class="rule-block"><h3>💥 Critical Hits (Natural 20)</h3><ul><li>Auto-hit</li><li>Target's Armour halved for this attack</li><li>Difficulty 10 + damage Finesse check or Stunned</li></ul><div class="notice">Razor Sharp weapon property: Critical on 19 OR 20.</div></div>
</div>

<div class="rules-page" id="rp-alcsystem">
  <div class="rule-block"><h3>🔮 Four Schools</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem">
      <div style="background:rgba(200,80,30,.08);border:1px solid rgba(200,80,30,.22);border-radius:4px;padding:.65rem"><span style="color:#E08060">🔥 Fire</span> — Destruction & Enhancement</div>
      <div style="background:rgba(80,150,60,.08);border:1px solid rgba(80,150,60,.22);border-radius:4px;padding:.65rem"><span style="color:#70C060">🌿 Earth</span> — Life, Death & Summoning</div>
      <div style="background:rgba(74,158,204,.08);border:1px solid rgba(74,158,204,.22);border-radius:4px;padding:.65rem"><span style="color:var(--blue)">💨 Air</span> — Protection & Movement</div>
      <div style="background:rgba(80,130,200,.08);border:1px solid rgba(80,130,200,.22);border-radius:4px;padding:.65rem"><span style="color:#7090D0">💧 Water</span> — Healing & Weakening</div>
    </div>
  </div>
  <div class="rule-block"><h3>💎 Essences & Recovery</h3><ul><li><strong style="color:var(--brass-light)">1 Action:</strong> Recover half (round down, min 1)</li><li><strong style="color:var(--brass-light)">2 Actions:</strong> Recover all</li></ul></div>
  <div class="rule-block"><h3>✨ Calling Invocations</h3><p>Spend Actions and Essences listed, roll D20 + Alchemancy vs Difficulty.</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.65rem">
      <div class="highlight-box" style="text-align:center"><strong>Focussed</strong><br>2 Actions → +4 roll</div>
      <div class="highlight-box" style="text-align:center;background:rgba(61,184,140,.06);border-color:rgba(61,184,140,.28)"><strong>Perfect (20)</strong><br>Half Essences, max dice</div>
      <div class="highlight-box" style="text-align:center;background:rgba(204,74,74,.06);border-color:rgba(204,74,74,.28)"><strong>Backfire (1)</strong><br>All Essences lost, draw Eye card</div>
    </div>
  </div>
</div>

<div class="rules-page" id="rp-states">
  <div class="rule-block"><h3>💀 Status Conditions</h3>
    ${[
      ['Wounded (red boxes)','All characteristics −2 except Life & Armour','var(--rust-light)'],
      ['Out of Action','Life = 0; removed from table','var(--rust-light)'],
      ['Stunned','Miss next Activation entirely; clears in Maintenance','#E8C060'],
      ['Prone','−2 CC Attack/Defence; can\'t shoot; stand free at Activation start','#D0A050'],
      ['Bleed','Lose D4 Life each Maintenance; Diff 12 Finesse to clear','var(--rust-light)'],
      ['Entangled','Can\'t move; −2 CC; break free with Strength check','#A070D0'],
      ['Pinned','Can\'t move or turn; Diff 12 Str to break (take D4 damage)','var(--blue)'],
    ].map(([n,d,c])=>`<div class="highlight-box" style="margin-bottom:.4rem"><strong style="color:${c}">${n}:</strong> ${d}</div>`).join('')}
  </div>
</div>

<div class="rules-page" id="rp-terrain">
  <div class="rule-block"><h3>🏛 Terrain Types</h3><ul><li><strong style="color:var(--brass-light)">Open Ground:</strong> No effect</li><li><strong style="color:var(--brass-light)">Difficult Terrain:</strong> 2" per 1" traveled</li><li><strong style="color:var(--brass-light)">Impassable:</strong> Cannot traverse</li><li><strong style="color:var(--brass-light)">Cover:</strong> +2 Ranged Defence</li></ul></div>
  <div class="rule-block"><h3>🏠 Buildings</h3><ul><li>Break in: Diff 14 Finesse; fail = D4 damage</li><li>Doors auto-lock after use</li><li>Interior counts as cover from outside</li></ul></div>
  <div class="rule-block"><h3>✨ Fascinating Features (Optional)</h3><p>Roll D6 for number of features (1–3), D20 for type. Includes: Guy's Gunpowder (explosive!), Errant Essences (free pickup), Sewer Slime, Sinkholes, Leaking Gas Lamps, and more.</p></div>
</div>

<div class="rules-page" id="rp-grenades">
  <div class="rule-block"><h3>💣 Grenades</h3><p>Target a point in range. Ranged Attack vs Difficulty 8. Miss = scatter: D8 direction, D6" distance.</p></div>
  <div class="rule-block"><h3>💥 Blast Templates</h3><ul><li><strong>Small Blast:</strong> 2" radius</li><li><strong>Large Blast:</strong> 4" radius</li></ul><p style="margin-top:.5rem">Fully covered: full damage (Diff 15 Finesse to dodge). Partially covered: Diff 15 Finesse; pass = no damage + move 1" clear.</p></div>
  <div class="rule-block"><h3>🔺 Cone Templates</h3><p>Two sizes: 6" and 9". Originate from attacker's base. Same Finesse checks as Blast.</p></div>
</div>

<div class="rules-page" id="rp-company">
  <div class="rule-block"><h3>🏗 Company Building</h3><p>Standard game: <strong style="color:var(--brass-light)">200 points</strong>. Must include at least 1 Leader. 6–10 characters total. Leftover points spent on Equipment from Dr Disraeli's Delights.</p></div>
  <div class="rule-block"><h3>🤝 Guild Allies</h3><ul>
    <li><strong style="color:var(--brass-light)">Anarchists</strong> — ally with Dickensians (not if company has Horace De Havilland)</li>
    <li><strong style="color:var(--brass-light)">Pragmatists</strong> — ally with Servants of the Engine</li>
    <li><strong style="color:var(--brass-light)">Ethicists</strong> — ally with any faction (not if company has Avatar of Set)</li>
  </ul></div>
  <div class="rule-block"><h3>🎲 Shifting Loyalties (Optional)</h3><p>At trigger events, roll D20. Low result: roll D6 for Guild ally — 1=Double Cross (joins enemy!), 2=leaves, 3=skip Activation, 4–6=carry on.</p></div>
</div>

</div><!-- rules-content -->
</div><!-- rules-layout -->`;
});

// ── CHARACTERS BUILDER ────────────────────────────────────
reg('characters',function(){
  if(document.getElementById('panel-characters').innerHTML.trim())return;
  const factions=[
    {key:'dickensians',label:'🔴 Dickensians'},
    {key:'servants',label:'🔵 Servants'},
    {key:'scions',label:'🏺 Scions'},
    {key:'guild',label:'🕵️ Guild'},
  ];
  const tabs=factions.map((f,i)=>`<button class="faction-tab${i===0?' active':''}" onclick="showFaction('${f.key}',this)">${f.label}</button>`).join('');
  const panels=factions.map((f,i)=>`<div class="faction-panel${i===0?' active':''}" id="fp-${f.key}"><div class="char-grid">${CHARS[f.key].map(charCard).join('')}</div></div>`).join('');
  document.getElementById('panel-characters').innerHTML=`
<div class="section-header"><h2 class="section-title">Character Rosters</h2><p class="section-subtitle">All factions across three books</p></div>
<div class="faction-tabs">${tabs}</div>${panels}`;
});

function showFaction(k,btn){
  document.querySelectorAll('.faction-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.faction-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('fp-'+k).classList.add('active');
  btn.classList.add('active');
}

function charCard(c){
  const sk=Object.keys(c.stats).slice(0,5);
  const img=CHAR_IMGS[c.name];
  return`<div class="char-card" onclick='openChar(${JSON.stringify(c.name)})'>
    ${img?`<div style="width:100%;height:160px;overflow:hidden;position:relative;background:#111">
      <img src="${img}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;object-position:top;filter:sepia(20%) contrast(1.05);transition:transform .4s" onmouseover="this.style.transform='scale(1.06)'" onmouseout="this.style.transform='scale(1)'">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(10,8,15,.9))"></div>
      <div style="position:absolute;bottom:.65rem;left:.9rem;right:.9rem">
        <div class="char-name">${c.name}</div>
        <div class="char-role">${c.role}</div>
      </div>
      <div style="position:absolute;top:.55rem;right:.7rem;text-align:right">
        <div class="char-pts">${c.pts}</div><div class="char-pts-lbl">pts</div>
      </div>
    </div>`:`<div class="char-header">
      <div><div class="char-name">${c.name}</div><div class="char-role">${c.role}</div></div>
      <div><div class="char-pts">${c.pts}</div><div class="char-pts-lbl">pts</div></div>
    </div>`}
    <div class="char-stats">
      ${sk.map(k=>`<div class="stat-cell"><span class="stat-lbl">${k}</span><span class="stat-val">${c.stats[k]}</span></div>`).join('')}
    </div>
    <div class="char-abilities">
      ${c.abilities.map(a=>`<span class="ability-tag">${a}</span>`).join('')}
      ${(c.schools||[]).map(s=>`<span class="ability-tag alc">⚗ ${s}</span>`).join('')}
    </div>
  </div>`;
}

reg('abilities',function(){
  if(document.getElementById('panel-abilities').innerHTML.trim())return;
  const types=['All',...new Set(ABILITIES.map(a=>a.t))];
  const entries=ABILITIES.map(a=>`<div class="glo-entry" data-name="${a.n.toLowerCase()}" data-type="${a.t}" onclick="this.classList.toggle('expanded')">
    <div class="glo-head"><span class="glo-name">${a.n}</span><span class="glo-type">${a.t}</span></div>
    <div class="glo-desc">${a.d}</div>
  </div>`).join('');
  document.getElementById('panel-abilities').innerHTML=`
<div class="section-header"><h2 class="section-title">Abilities Glossary</h2><p class="section-subtitle">Every special ability — click any entry to expand</p></div>
<input class="glo-search" placeholder="Search abilities…" oninput="filterAbil(this.value)">
<div class="filter-pills">${types.map((t,i)=>`<button class="filter-pill${i===0?' active':''}" onclick="filterType('${t}',this)">${t}</button>`).join('')}</div>
<div id="glo-list">${entries}</div>`;
});
function filterAbil(v){const lv=v.toLowerCase();document.querySelectorAll('.glo-entry').forEach(e=>e.classList.toggle('hidden',!e.dataset.name.includes(lv)));}
function filterType(t,btn){
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.glo-entry').forEach(e=>e.classList.toggle('hidden',t!=='All'&&e.dataset.type!==t));
}

function openChar(name){
  const c=Object.values(CHARS).flat().find(x=>x.name===name);
  if(!c)return;
  const statKeys=['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM','ALC','LIFE'];
  const stats=statKeys.filter(k=>c.stats[k]!==undefined);
  const img=CHAR_IMGS[c.name];
  document.getElementById('m-name').textContent=c.name;
  document.getElementById('m-sub').textContent=`${c.role} · ${c.pts} pts`;
  document.getElementById('m-body').innerHTML=`
    ${img?`<div style="width:100%;height:220px;overflow:hidden;border-radius:6px;margin-bottom:1.1rem;position:relative">
      <img src="${img}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;object-position:top;filter:sepia(15%) contrast(1.05)">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(10,8,15,.7))"></div>
    </div>`:''}
    <div class="modal-stats">
      ${stats.map(k=>`<div class="ms"><span class="ms-lbl">${k}</span><span class="ms-val">${c.stats[k]}</span></div>`).join('')}
    </div>
    ${(()=>{
      const life=parseInt(c.stats['LIFE'])||0;
      if(!life)return '';
      const woundedAt=Math.ceil(life/2);
      return `<div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;font-family:'Josefin Sans',sans-serif;font-size:.67rem;color:var(--brass-dark);margin-bottom:.25rem">
          <span>LIFE</span><span>${life} · Wounded below ${woundedAt}</span>
        </div>
        <div class="life-bar"><div class="life-fill" style="width:100%"></div></div>
        <div class="life-bar" style="margin-top:2px"><div class="life-fill wounded" style="width:${(woundedAt/life*100).toFixed(0)}%"></div></div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.58rem;color:var(--brass-dark);margin-top:.15rem">▲ Full · ▲ Wounded threshold (−2 all stats)</div>
      </div>`;
    })()}
    ${c.lore?`<div class="highlight-box" style="margin-bottom:1rem;font-style:italic">${c.lore}</div>`:''}
    ${c.schools?`<div class="modal-section"><div class="modal-section-title">⚗ Schools</div><div>${c.schools.map(s=>`<span class="stat-pill">${s}</span>`).join('')}</div></div>`:''}
    ${c.weapons?`<div class="modal-section"><div class="modal-section-title">⚔ Weapons</div><div class="weapon-entry"><div class="weapon-stats">${c.weapons}</div></div></div>`:''}
    <div class="modal-section"><div class="modal-section-title">⚡ Abilities</div>
      ${c.abilities.map(a=>`<div class="ability-entry" onclick="this.classList.toggle('expanded')">
        <div class="ability-ename">${a}</div>
        <div class="ability-edesc">${abilityDesc(a)}</div>
      </div>`).join('')}
    </div>`;
  document.getElementById('char-modal').classList.add('open');
}

function rollD(sides){
  const r=Math.floor(Math.random()*sides)+1;
  const el=document.getElementById('dn');
  el.classList.remove('rolling');void el.offsetWidth;el.classList.add('rolling');
  el.textContent=r;
  const sp=document.getElementById('dspec');
  if(sides===20&&r===20)sp.innerHTML='<div class="spec-result spec-crit">✨ Critical Hit — Natural 20!</div>';
  else if(sides===20&&r===1)sp.innerHTML='<div class="spec-result spec-fumble">💀 Fumble — Natural 1!</div>';
  else sp.innerHTML=`<div style="font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--brass-dark);margin-top:.35rem">D${sides}</div>`;
  return r;
}

window._oppVals={a:null,b:null};
function rollOpp(side){
  const mod=parseInt(document.getElementById('m'+side).value)||0;
  const raw=Math.floor(Math.random()*20)+1;
  const total=raw+mod;
  window._oppVals[side]={raw,mod,total};
  document.getElementById('o'+side).textContent=total;
  updateOppResult();
}
function rollBoth(){rollOpp('a');rollOpp('b');}
function updateOppResult(){
  const {a,b}=window._oppVals;
  if(!a||!b)return;
  let msg='',col='';
  if(a.total>b.total){msg=`Attacker wins! (${a.total} vs ${b.total})`;col='var(--green)';}
  else if(b.total>a.total){msg=`Defender wins! (${b.total} vs ${a.total})`;col='var(--red)';}
  else{msg=`Tie! (${a.total} each) — Favour holder wins`;col='var(--brass-light)';}
  document.getElementById('opp-res').innerHTML=`<span style="color:${col}">${msg}</span>`;
}

function rollDmg(){
  const dice=document.getElementById('dd').value;
  const mod=parseInt(document.getElementById('dm').value)||0;
  const arm=parseInt(document.getElementById('da').value)||0;
  const crit=document.getElementById('dc').checked;
  const burn=document.getElementById('db').checked;
  const sides=parseInt(dice.replace('D',''));
  const raw=Math.floor(Math.random()*sides)+1;
  const total=raw+mod;
  let effArm=burn?0:crit?Math.floor(arm/2):arm;
  const dmg=Math.max(0,total-effArm);
  document.getElementById('dmg-res').textContent=dmg+' damage';
  let det=`D${sides} rolled ${raw} + ${mod} modifier = ${total}`;
  if(burn)det+=' · Armour ignored (Burning)';
  else if(crit)det+=` · Critical: Armour halved (${arm}→${effArm})`;
  else det+=` − ${arm} Armour`;
  document.getElementById('dmg-det').textContent=det;
}

function toggleSearch(){
  const o=document.getElementById('search-overlay');
  const visible=o.style.display!=='none';
  o.style.display=visible?'none':'block';
  if(!visible){
    const inp=document.getElementById('global-search');
    inp.value='';document.getElementById('search-results').innerHTML='';
    setTimeout(()=>inp.focus(),50);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('search-overlay').style.display='none';if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();toggleSearch();}});

function globalSearch(q){
  const res=document.getElementById('search-results');
  if(q.length<2){res.innerHTML='<p style="font-family:\'Josefin Sans\',sans-serif;font-size:.8rem;color:var(--brass-dark);text-align:center;padding:1.5rem">Type at least 2 characters to search…</p>';return;}
  const lq=q.toLowerCase();
  const hits=[];

  // Search characters
  Object.values(CHARS).flat().forEach(c=>{
    const score=matchScore(lq,[c.name,c.role,c.lore||'',...c.abilities,...(c.schools||[])]);
    if(score>0)hits.push({type:'Character',icon:'🎭',title:c.name,sub:`${c.role} · ${c.pts}pts`,action:`openChar(${JSON.stringify(c.name)});toggleSearch()`,score,preview:c.lore||c.abilities.join(', ')});
  });

  // Search abilities
  ABILITIES.forEach(a=>{
    const score=matchScore(lq,[a.n,a.d,a.t]);
    if(score>0)hits.push({type:'Ability',icon:'⚡',title:a.n,sub:a.t,action:`navTo('abilities');toggleSearch();setTimeout(()=>{const el=document.getElementById('glo-list');const entry=[...el.querySelectorAll('.glo-entry')].find(e=>e.querySelector('.glo-name').textContent==='${a.n.replace(/'/g,"\\'")}');if(entry){entry.scrollIntoView({behavior:'smooth',block:'center'});entry.classList.add('expanded');}},400)`,score,preview:a.d});
  });

  // Search invocations
  Object.entries(INVOC).forEach(([school,invocs])=>{
    invocs.forEach(v=>{
      const score=matchScore(lq,[v.n,v.d,school]);
      if(score>0)hits.push({type:'Invocation',icon:'🔮',title:v.n,sub:`${school.charAt(0).toUpperCase()+school.slice(1)} School · Power ${v.pw}`,action:`navTo('alchemancy');toggleSearch();setTimeout(()=>showSchool('${school}',document.querySelector('.sc-${school}')),300)`,score,preview:v.d});
    });
  });

  // Search rules (by keyword)
  const ruleMap=[
    {keys:['move','speed','climb','jump','run'],page:'movement',label:'Movement Rules'},
    {keys:['ranged','shoot','range','cover','damage','armour'],page:'ranged',label:'Ranged Combat'},
    {keys:['close combat','cc','charge','melee','critical'],page:'closecombat',label:'Close Combat'},
    {keys:['alchemancy','invocation','essence','school','fire','earth','air','water'],page:'alcsystem',label:'Alchemancy System'},
    {keys:['favour','eye','engine','tempt','re-roll'],page:'favour',label:'Favour & Eye of the Engine'},
    {keys:['turn','activation','phase','sequence','maintenance'],page:'turn',label:'Turn Sequence'},
    {keys:['wound','stun','prone','bleed','entangled','pinned','condition'],page:'states',label:'Conditions & States'},
    {keys:['terrain','building','cover','difficult'],page:'terrain',label:'Terrain'},
    {keys:['grenade','blast','template','cone'],page:'grenades',label:'Templates & Grenades'},
    {keys:['company','build','points','guild','ally'],page:'company',label:'Company Building'},
  ];
  ruleMap.forEach(r=>{
    if(r.keys.some(k=>lq.includes(k)||k.includes(lq)))
      hits.push({type:'Rules',icon:'📜',title:r.label,sub:'Rules Reference',action:`navTo('rules');toggleSearch();setTimeout(()=>{const btn=document.querySelector('.rules-nav-item[onclick*="${r.page}"]');if(btn){showRule('${r.page}',btn);}},300)`,score:1,preview:'Click to open this rules section'});
  });

  // Search spirits
  SPIRITS.forEach(s=>{
    const score=matchScore(lq,[s.n,s.title,s.bonus,s.abil,s.quirk]);
    if(score>0)hits.push({type:'Spirit',icon:'🏺',title:s.n,sub:s.title,action:`navTo('canopic');toggleSearch();setTimeout(()=>showSpiritDetail('${s.n}'),400)`,score,preview:s.bonus+' · '+s.abil});
  });

  hits.sort((a,b)=>b.score-a.score);

  if(hits.length===0){
    res.innerHTML=`<div style="text-align:center;padding:2.5rem;font-family:'IM Fell English',serif;font-style:italic;color:var(--brass-dark)">No results found for "<strong style="color:var(--brass)">${q}</strong>"</div>`;
    return;
  }

  res.innerHTML=`<div style="font-family:'Josefin Sans',sans-serif;font-size:.67rem;color:var(--brass-dark);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.75rem">${hits.length} result${hits.length!==1?'s':''} for "${q}"</div>`+
  hits.slice(0,12).map(h=>`<div onclick="${h.action}" style="background:linear-gradient(135deg,rgba(42,38,30,.9),rgba(30,28,40,.9));border:1px solid rgba(201,168,76,.15);border-radius:6px;padding:.9rem 1.1rem;margin-bottom:.45rem;cursor:pointer;transition:all .2s;display:grid;grid-template-columns:auto 1fr;gap:.75rem;align-items:start"
  onmouseover="this.style.borderColor='rgba(201,168,76,.45)';this.style.transform='translateX(3px)'" onmouseout="this.style.borderColor='rgba(201,168,76,.15)';this.style.transform='translateX(0)'">
    <span style="font-size:1.6rem;line-height:1">${h.icon}</span>
    <div>
      <div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.18rem">
        <span style="font-family:'Cinzel',serif;font-size:.92rem;color:var(--brass-light)">${h.title}</span>
        <span style="font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dark);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);padding:.08rem .35rem;border-radius:3px">${h.type}</span>
      </div>
      <div style="font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--parchment-dark);margin-bottom:.22rem">${h.sub}</div>
      <div style="font-family:'IM Fell English',serif;font-size:.75rem;color:var(--steam);opacity:.7;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.preview.substring(0,100)}${h.preview.length>100?'…':''}</div>
    </div>
  </div>`).join('');
}

function matchScore(q,fields){
  let score=0;
  fields.forEach((f,i)=>{
    if(!f)return;
    const fl=f.toLowerCase();
    if(fl===q)score+=10;
    else if(fl.startsWith(q))score+=6;
    else if(fl.includes(q))score+=3;
    if(i===0)score*=1.5; // name matches worth more
  });
  return score;
}

// ── SERVICE WORKER (PWA offline support) ─────────────────
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='twisted-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  }).catch(()=>caches.match('/')))
));`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── PWA INSTALL PROMPT ────────────────────────────────────
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='flex';
  const wb=document.getElementById('welcome-install');
  if(wb)wb.style.display='block';
});
window.addEventListener('appinstalled',()=>{
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='none';
  _deferredPrompt=null;
});
function pwaInstall(){
  if(_deferredPrompt){_deferredPrompt.prompt();_deferredPrompt.userChoice.then(()=>{_deferredPrompt=null;});}
  else{alert('To install:\n📱 iPhone/iPad: Tap Share → "Add to Home Screen"\n🤖 Android: Tap menu → "Add to Home Screen"\n💻 Chrome: Look for install icon in address bar');}
}

function navTo(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelector(`.nav-btn[data-panel="${id}"]`).classList.add('active');
  builders[id]&&builders[id]();
}

    ${[['I','Sorting Phase','Arrange your Activation Deck in the order you wish your Characters to Activate'],['II','Eye of The Engine','Draw 1 Eye of The Engine card (2 if you hold Favour, keep 1)'],['III','Activation Phase','Players alternate activating Characters — each takes 2 Actions'],['IV','Maintenance Phase','Recover Essences, resolve Bleed/Venom, clear Stun and temporary effects']].map(([n,t,d])=>`<div class="turn-step"><span class="ts-num">${n}</span><span class="ts-name">${t}</span><div class="ts-desc">${d}</div></div>`).join('')}
  </div>
  <div class="rule-block"><h3>I. Sorting Phase</h3>
    <p>Arrange your Activation Deck in any order you choose. This is the order in which your Characters will Activate during the turn. Abilities like <em>Organised</em> (Agatha) can further influence this order.</p>
  </div>
  <div class="rule-block"><h3>II. Eye of The Engine Draw</h3>
    <p>Draw one Eye of The Engine card from the shared deck. If you hold Favour of The Engine you may draw a second card and choose which to keep for the turn.</p>
    <p>Eye cards are played at specific times as noted on the card: Pre-Activation, During Activation, Maintenance, or Any. Some cards are Persistent and remain in play until used or cancelled.</p>
    <div class="highlight-box"><strong>Eyecon Symbols</strong> on the cards only matter when Tempting Fate. A red Eyecon means you lose Favour of The Engine. A green Eyecon means you keep Favour but the Tempt Fate effect still occurs.</div>
  </div>
  <div class="rule-block"><h3>III. Activation Phase</h3>
    <p>Characters Activate in an alternating manner during the Activation Phase. The player who holds Priority turns the top card of his or her Activation Deck face up and the Character as shown begins his or her two Actions.</p>
    <p>Activation of Characters switches between Companies on a Character by Character basis. Once the player who holds Priority has completed the two Actions for his or her first Character then the first Character of the opposing Company is Activated.</p>
    <p>Character Activations continue in this manner until all Characters on the table have been Activated for the turn.</p>
    <p>Using an Eye of The Engine card or Tempting Fate is not considered an action and does not use up one of a Character's two actions. If the Eye of The Engine card affects another action the action is used up as normal.</p>
  </div>
  <div class="rule-block"><h3>IV. Maintenance Phase</h3>
    <p>During the Maintenance Phase the following events occur in order:</p>
    <p>1. Recover Essences (Alchemancers only). 2. Resolve ongoing effects: Bleed (lose 2 Life), Venom (Diff 10 Finesse or D4 damage), Regenerate (recover D4 Life). 3. Clear Stunned condition. 4. Clear temporary characteristic bonuses/penalties from Invocations and abilities. 5. Remove Charge tokens. 6. Shuffle the Eye of The Engine deck.</p>
  </div>
</div>

<div class="rules-page" id="rp-favour">
  <div class="rule-block"><h3>⭐ Favour of The Engine</h3>
    <p>The Engine always has a plan. It is constantly considering all the possible futures it can perceive and acting in a way that it feels will best achieve its ends. This is represented in part by the Favour of The Engine rules and The Eye of The Engine cards.</p>
    <p>At the start of the game, the Favour of The Engine is determined by each player rolling a D20 and subtracting the number of Characters in their Company from the roll. The player with the higher result begins the game with Favour. The player who rolled lower is given Priority for the first turn.</p>
    <p>Favour provides three benefits:</p>
    <p><strong style="color:var(--brass-light)">The Engine's Intervention:</strong> Any tied results in Opposed Rolls are resolved as a win for the Character from the Company that holds the Favour of The Engine.</p>
    <p><strong style="color:var(--brass-light)">The Engine's Blessing:</strong> Once per turn a Character from the Company who holds the Favour of The Engine may re-roll any one dice at any time, even after you have seen the results of the first roll. You may not re-roll a dice once any subsequent dice has been rolled. The results of this new roll must be taken and may not be re-rolled by any means.</p>
    <p><strong style="color:var(--brass-light)">The Engine's Aid:</strong> When drawing Eye of The Engine cards the Company who holds the Favour of The Engine may draw a second card and choose which card to keep for the turn.</p>
    <div class="notice warning"><strong>Losing Favour:</strong> If you use the Engine's Blessing to re-roll and the second roll is worse than the first or still fails, you immediately lose the Favour of The Engine. Also lost when you Tempt Fate and draw a card with a red Eyecon.</div>
  </div>
  <div class="rule-block"><h3>🎴 Tempting Fate</h3>
    <p>The Eye of The Engine cards are also used when Tempting Fate. On each card is printed a green or red Engine Eyecon.</p>
    <p>If you Tempt Fate and the card drawn has a red Eyecon on it you immediately lose Favour with The Engine and the results of the Tempt Fate draw come into play. If the Card has a green Eyecon the results of the card still come into play but you retain the Favour of The Engine.</p>
    <p>These icons are only used when Tempting Fate. They do not apply when playing Eye of The Engine cards drawn at the start of the turn.</p>
    <div class="highlight-box"><strong>The Eye is Elsewhere:</strong> If your opponent plays <em>The Eye is Elsewhere</em> Eye of The Engine Card, which cancels out an Eye of The Engine Card you have played, then the Favour of The Engine changes hands immediately.</div>
  </div>
</div>

<div class="rules-page" id="rp-movement">
  <div class="rule-block"><h3>👣 Movement Basics</h3>
    <p>All movement in Twisted is measured in Inches. A model with a Speed value of 4 may move 4" in a single Move Action.</p>
    <p>The Miniatures in Twisted have a line of sight that is 180 degrees from the front of the Miniature. During a Move Action a model may change its facing freely. At any other time you must take a Move Action to turn around.</p>
  </div>
  <div class="rule-block"><h3>🏃 Running</h3>
    <p>You may use two move actions one after the other in order to move more quickly. Any Character who does this is considered to be running. You may not run and engage in Close Combat — you must Charge instead.</p>
    <p>Characters who are running can claim a +1 on their Defence checks against Ranged Attacks.</p>
    <p>A Character is considered to have stopped running immediately when he or she spends an Action on anything other than movement or engages in Close Combat.</p>
  </div>
  <div class="rule-block"><h3>⚔ Charging</h3>
    <p>A model may make a double move and enter Close Combat only as a Charge move. This movement must be in a straight line and must bring you into contact with an opponent.</p>
    <p>A successful charge means you are at +1 to hit and +1 to damage but suffer a -1 to your Close Combat Defence until the next Maintenance Phase.</p>
  </div>
  <div class="rule-block"><h3>🧗 Climbing</h3>
    <p>Characters may climb walls or other terrain elements. Climbing is considered a Move Action. A Character climbs at half the rate at which they move. You may not end your move halfway up a wall or terrain element.</p>
    <p>Simply measure the height and make a Finesse or Strength check versus a Difficulty of 12. If you make the check you succeed and the Character is placed atop the surface climbed. If you fail the check by up to 5 you simply make no progress. If you fail by more than 5 you fall.</p>
  </div>
  <div class="rule-block"><h3>🦘 Jumping</h3>
    <p>A Character may attempt to jump gaps, drop off walkways, leap nimbly from building to building or dive down to attack a foe. Measure the distance to be jumped and compare it to the table below:</p>
    <ul><li>Up to 2": Diff 6</li><li>Up to 3": Diff 10</li><li>Up to 4": Diff 12</li><li>Up to 6": Diff 15</li></ul>
    <p>You may not jump any further than 6". Jumping into Close Combat is considered to have Charged but you gain an additional +1 to your Attack roll.</p>
  </div>
  <div class="rule-block"><h3>⚠️ Threatened Areas</h3>
    <p>Characters in Twisted may try to move past Characters from the opposing Company providing there is sufficient room for their base to pass by without touching the base of their foe.</p>
    <p>If you wish to move past an opponent and your base comes within an inch of their base then you must make an Opposed Finesse roll or suffer an immediate Close Combat attack from them. This 1" area is known as a Threatened Area.</p>
    <p>If the Opposed Finesse roll is won by the moving Character or no damage is caused by the attack he or she passes by freely and continues with the move as normal. The player of the Character being moved past may elect to allow the opponent to pass by without the attack occurring.</p>
  </div>
  <div class="rule-block"><h3>🏚 Difficult Terrain</h3><p>Movement through Difficult Terrain costs 2" for every 1" traveled. Characters who are Running through Difficult Terrain must make a Difficulty 12 Finesse check or go Prone.</p></div>
  <div class="rule-block"><h3>🏠 Buildings</h3>
    <p>In most cases buildings are impassable and must be moved around or climbed. If a building has doors modelled on more than one side you may attempt to break into the building and move through it.</p>
    <p>To open most doors in Twisted is a Difficulty 15 check using either Strength or Finesse. It is an Action to attempt this. Once the door is open you may attempt to move through the building. You must have sufficient movement available to clear the entire building in one Activation. You may not end your Activation partway through a building.</p>
  </div>
</div>

<div class="rules-page" id="rp-ranged">
  <div class="rule-block"><h3>🎯 Range Bands</h3>
    <p>To determine the range of the attack simply measure the distance between you and your target, from base edge to base edge. You may measure the range before deciding whether or not to take the shot. Once you have the range compare this to the range bands of the weapon as printed on the Character's Play Card.</p>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.5rem">
      ${[['Short','±0','var(--green)'],['Medium','−2','var(--brass-light)'],['Long','−4','var(--copper)'],['Extreme','−6','var(--red)']].map(([r,m,c])=>`<div style="text-align:center;background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:.5rem"><div style="font-family:'Cinzel',serif;color:${c};font-size:.78rem">${r}</div><div style="font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:${c}">${m}</div></div>`).join('')}
    </div>
    <p style="margin-top:.5rem">Some weapons have a value printed as "–" in the Extreme Range band. This means they are ineffective at ranges any further than Long Range. No weapon is effective beyond its extreme range.</p>
  </div>
  <div class="rule-block"><h3>👁 Line of Sight & Cover</h3>
    <p>To shoot at an opponent you need to be able to see them. You may fire at any target that you can see within the 180 degree front arc of your Character. A Character on the table does not block Line of Sight to another Character but does provide cover.</p>
    <p>If any terrain element, Character Model, or other obstruction is between you and your target, yet you can draw a line of sight to part of the model they are considered to have <strong style="color:var(--brass-light)">cover</strong>. Cover gives the target a +2 bonus on their Defence roll.</p>
    <p>Characters who are running can claim an additional +1 to their Ranged Defence roll on top of any cover or other bonuses.</p>
  </div>
  <div class="rule-block"><h3>💥 Resolving Ranged Damage</h3>
    <p>Once a hit has been scored roll the damage dice for the weapon and add any modifiers. Subtract the target's Armour value. The result is the number of Life points lost. Damage cannot be less than 0.</p>
    <div class="example-box">Gretel fires her Duelling Pistol (D8+6) and hits. She rolls a 5 on the D8, plus 6 = 11 damage. Target has Armour 6. Final damage = 11 − 6 = 5 Life lost.</div>
  </div>
  <div class="rule-block"><h3>⚔ Firing Into Close Combat</h3>
    <p>You may fire into a Close Combat melee but it is dangerous. You have two options:</p>
    <p><strong style="color:var(--brass-light)">Err on Caution:</strong> You take a -4 penalty to your attack roll but only your intended target can be hit.</p>
    <p><strong style="color:var(--brass-light)">Blaze Away:</strong> No penalty but the target is determined randomly from all Characters involved in the melee. Simply count the Characters, assign them numbers and roll an appropriate dice.</p>
  </div>
</div>

<div class="rules-page" id="rp-closecombat">
  <div class="rule-block"><h3>⚔️ Entering Close Combat</h3>
    <p>In order to enter Close Combat with another character your model must move into base to base contact with your foe. This movement must be the result of a regular move action or a charge. You may not Run into Close Combat.</p>
    <p>Once contact is made during the Activation Phase of the turn a Round of Close Combat is then fought immediately. It is not an Action to fight in Close Combat. Close Combat is always considered to be fought after all Actions for the turn have been taken by the relevant Character.</p>
  </div>
  <div class="rule-block"><h3>🎲 Rolling to Hit</h3>
    <p>To strike your opponent in Close Combat you roll a D20 and add your Close Combat Attack Bonus as printed on the Character card. This is an Opposed roll — your opponent rolls a D20 and adds his or her Close Combat Defence bonus.</p>
    <p>In addition there may be situational modifiers as listed below:</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      ${[['Charging','+1 to Hit, +1 Damage, −1 Defence until Maintenance'],['Jump Attack','+2 to Hit, +1 Damage, −1 Defence'],['Outnumbered','+1 to Hit per extra opponent in the Melee'],['Flanked / Rear','+1 to Hit (rear: first round of combat only)']].map(([n,d])=>`<div class="highlight-box"><strong>${n}:</strong><br>${d}</div>`).join('')}
    </div>
    <p style="margin-top:.5rem">Modifiers are cumulative — if you Charge, Outnumber and Flank at the same time you receive +4 to hit.</p>
  </div>
  <div class="rule-block"><h3>🚪 Disengaging</h3>
    <p>To Disengage from Close Combat roll a Finesse Check using a Difficulty of 10 plus the Close Combat Attack value of the foe you are in base to base contact with. If you beat the value then you may make a move action away from the combat.</p>
    <p>You must move away from the Character who engaged you and may not move past them. If you fail to disengage you stay engaged in Close Combat and your opponent gains an immediate free attack against you. You defend yourself normally against this free attack.</p>
    <p>You may not attempt to Disengage twice in the same turn. If you are in a Melee with multiple foes then the Disengagement check is taken against the highest Close Combat Attack value with an additional +1 for each opponent other than the first.</p>
  </div>
  <div class="rule-block"><h3>💥 Critical Hits (Natural 20)</h3>
    <p>A Natural 20 on the attack roll is always a Critical Hit:</p>
    <p>1. The attack automatically hits regardless of modifiers.</p>
    <p>2. The target's Armour is halved (rounded down) for this attack only.</p>
    <p>3. The target must make a Finesse check at Difficulty 10 plus the final damage caused. If they fail, they become Stunned.</p>
    <div class="notice">Weapons with the <strong>Razor Sharp</strong> property cause a Critical Hit on a base D20 roll of 19 or 20.</div>
  </div>
</div>

<div class="rules-page" id="rp-alcsystem">
  <div class="rule-block"><h3>🔮 The Four Schools of Alchemancy</h3>
    <p>Alchemancers in the Twisted World are individuals who have learned to tap into the energies of the world in a similar way to The Engine itself. Their powers, whilst sometimes great, are but feeble efforts compared to the world altering abilities of even the weakest of The Engine's Nodes.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem">
      <div style="background:rgba(200,80,30,.08);border:1px solid rgba(200,80,30,.22);border-radius:4px;padding:.65rem"><span style="color:#E08060">🔥 Fire</span> — Cause great destruction and enhance allies, making others more powerful</div>
      <div style="background:rgba(80,150,60,.08);border:1px solid rgba(80,150,60,.22);border-radius:4px;padding:.65rem"><span style="color:#70C060">🌿 Earth</span> — Power over life and death, summoning beings from Elemental Regions</div>
      <div style="background:rgba(74,158,204,.08);border:1px solid rgba(74,158,204,.22);border-radius:4px;padding:.65rem"><span style="color:var(--blue)">💨 Air</span> — Protect others, fly, pass through walls, move at great speed</div>
      <div style="background:rgba(80,130,200,.08);border:1px solid rgba(80,130,200,.22);border-radius:4px;padding:.65rem"><span style="color:#7090D0">💧 Water</span> — Specialise in Healing and can also weaken and confound foes</div>
    </div>
  </div>
  <div class="rule-block"><h3>💎 Alchemantic Essences</h3>
    <p>On the Character Card of someone with Alchemantic ability you will see a series of small boxes next to the name of the Schools of Alchemancy they possess. These represent the number of Essences of each element that the Alchemancer starts the game with.</p>
    <p>These Essences are used up when generating Alchemantic Invocations and may be replenished when the Alchemancer recovers from his or her efforts.</p>
  </div>
  <div class="rule-block"><h3>💫 Recovering Essences</h3>
    <p><strong style="color:var(--brass-light)">Partial Recovery (1 Action):</strong> You may recover half of the Essences you have used so far. This number is rounded up. You may choose which types of Essence you recover.</p>
    <p><strong style="color:var(--brass-light)">Full Recovery (2 Actions):</strong> By using both Actions for a turn the Character may restore all Essences used so far.</p>
    <p>In order to restore Essences the Alchemancer must not be engaged in Close Combat or otherwise under the influence of any adverse effect. It does take concentration so any distraction will cause it to fail.</p>
  </div>
  <div class="rule-block"><h3>✨ Calling Invocations</h3>
    <p>To call an Invocation you must spend the required number of Actions and Essences as noted on the Invocation card, then roll D20 + your Alchemancy Characteristic against the Difficulty listed for the Invocation.</p>
    <p>You may call up to two Alchemantic Invocations per turn if you have sufficient Essences available.</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.65rem">
      <div class="highlight-box" style="text-align:center"><strong>Focussed Cast</strong><br>Spend 2 Actions on 1 Invocation for +4 to your roll</div>
      <div class="highlight-box" style="text-align:center;background:rgba(61,184,140,.06);border-color:rgba(61,184,140,.28)"><strong>Perfect Cast (Nat 20)</strong><br>Only half the Essences required are used and damage dice are maximised</div>
      <div class="highlight-box" style="text-align:center;background:rgba(204,74,74,.06);border-color:rgba(204,74,74,.28)"><strong>Backfire (Nat 1)</strong><br>All Essences are lost and you must draw an Eye of The Engine card</div>
    </div>
  </div>
</div>

<div class="rules-page" id="rp-states">
  <div class="rule-block"><h3>💀 Status Conditions</h3>
    ${[
      ['Wounded','When Life drops to or below the red boxes on the Character Card all Characteristics are reduced by 2 except Life and Armour. The Character remains in play but is significantly weakened.','var(--rust-light)'],
      ['Out of Action','When Life reaches 0 the Character is removed from the table. The opposing Company receives 2 Victory Points. Some abilities trigger when an ally or enemy goes Out of Action.','var(--rust-light)'],
      ['Stunned','The Character loses one Action in their next Activation. Applied by Critical Hits (if Finesse check fails), weapons with the Stun property, and some abilities. Clears during the Maintenance Phase.','#E8C060'],
      ['Prone','The Character is knocked down. −2 CC Attack and CC Defence while prone. Enemy ranged attacks receive +1 to hit. Costs an Action to stand up. Applied by Bring \'em Down and similar abilities.','#D0A050'],
      ['Bleed','Ongoing damage. The target loses 2 Life at the end of each Maintenance Phase until healing is applied. Any successful healing will cause Bleed to cease effect immediately. Bleed will not affect Characters with the Mechanical ability.','var(--rust-light)'],
      ['Entangled','Character cannot move. −2 CC Attack and Defence while entangled. Must pass an Opposed Strength check to break free. This check costs an Action.','#A070D0'],
      ['Pinned','Character cannot voluntarily move away from their current position. Applied by certain weapons and abilities. Must pass a Strength check to break free.','var(--blue)'],

    ].map(([n,d,c])=>`<div class="highlight-box" style="margin-bottom:.4rem"><strong style="color:${c}">${n}:</strong> ${d}</div>`).join('')}
  </div>
</div>

<div class="rules-page" id="rp-terrain">
  <div class="rule-block"><h3>🏛 Terrain & Movement</h3>
    <p>You may not move through terrain under most circumstances. Walls and other solid objects are impassable and must be moved around or climbed over.</p>
    <p><strong style="color:var(--brass-light)">Walls & Low Terrain:</strong> To climb over a wall or any other terrain over an inch in height simply make a climb check as noted earlier and then make a jump check to get down safely. Lower terrain such as barrels and boxes up to 1" in height may be clambered over without a check — they are simply designated as Difficult Terrain.</p>
    <p><strong style="color:var(--brass-light)">Difficult Terrain:</strong> Movement costs 2" per 1" traveled. Running characters must make a Difficulty 12 Finesse check or go Prone.</p>
    <p><strong style="color:var(--brass-light)">Cover:</strong> If terrain is between you and a Ranged attacker, you gain +2 to Ranged Defence.</p>
  </div>
  <div class="rule-block"><h3>🏠 Buildings</h3>
    <p>Buildings are generally impassable but in certain cases you may move through them although it can be dangerous. If a building has doors modelled on more than one side you may attempt to break into the building.</p>
    <p>To open most doors in Twisted is a Difficulty 15 check using either Strength or Finesse. It is an Action to attempt this. Once inside the building the doors leading out may be opened freely.</p>
    <p>You must have sufficient movement available to clear the entire building in one Activation. You may not end your Activation partway through a building.</p>
  </div>
  <div class="rule-block"><h3>✨ Fascinating Features (Optional)</h3>
    <p>Roll D6 for number of features (1–3), then D20 for each to determine the type. These represent unusual elements of the Twisted world that can affect gameplay — explosive gunpowder, raw Essences, Sewer Slimes, sinkholes, and more. See the Missions tab for the full list of 20 Fascinating Features.</p>
  </div>
</div>

<div class="rules-page" id="rp-grenades">
  <div class="rule-block"><h3>💣 Grenades & Scatter</h3>
    <p>Grenades are thrown at a target point within range. The attacker rolls a Ranged Attack vs Difficulty 8. If the roll succeeds the grenade lands where intended.</p>
    <p>If the roll fails the grenade scatters. Roll a D8 for direction and a D6 for the number of inches it scatters from the intended target point.</p>
  </div>
  <div class="rule-block"><h3>💥 Blast Templates</h3>
    <p>Alchemantic Invocations, Grenades or other weapons that use the Blast or Cone Templates follow these rules:</p>
    <p><strong>Small Blast:</strong> 2" radius circular template. <strong>Large Blast:</strong> 4" radius circular template.</p>
    <p>Any Character whose base is fully covered by the template takes full damage. They may attempt to dodge with a Difficulty 15 Finesse check — success means no damage and the Character is moved 1" clear of the template.</p>
    <p>Any Character whose base is partially covered takes a Difficulty 15 Finesse check. Pass = no damage and moved 1" clear. Fail = full damage.</p>
  </div>
  <div class="rule-block"><h3>🔺 Cone Templates</h3>
    <p>Cone templates originate from the attacker's base and expand outward. Two sizes exist: 6" and 9" cones. The same Finesse checks as Blast templates apply to Characters caught in the cone.</p>
  </div>
</div>

<div class="rules-page" id="rp-company">
  <div class="rule-block"><h3>🏗 Building Your Company</h3>
    <p>A standard game of Twisted is played with Companies of <strong style="color:var(--brass-light)">200 points</strong>. You must include at least 1 Leader in your Company. A typical Company consists of 6–10 Characters.</p>
    <p>Any leftover points after selecting your Characters may be spent on Equipment from Dr Disraeli's Delights — unique items that provide bonuses and special abilities to your Characters.</p>
    <p>When you build your Company each Alchemancer you control should select the Invocations they wish to have available for the skirmish before the start of the game.</p>
  </div>
  <div class="rule-block"><h3>🤝 Guild of Harmony Allies</h3>
    <p>Characters from the Guild of Harmony may serve as allies to other factions. Each Guild Creed has a preferred alliance:</p>
    <p><strong style="color:var(--brass-light)">Anarchists</strong> — May ally with Dickensians (but not if the company includes Horace De Havilland)</p>
    <p><strong style="color:var(--brass-light)">Pragmatists</strong> — May ally with Servants of the Engine</p>
    <p><strong style="color:var(--brass-light)">Ethicists</strong> — May ally with any faction (but not if the company includes Avatar of Set)</p>
  </div>
  <div class="rule-block"><h3>🎲 Shifting Loyalties (Optional)</h3>
    <p>Guild allies can be unpredictable. At certain trigger events during the game you may need to roll to see if your Guild ally remains loyal. Roll a D20 — on a low result, roll a D6 for the Guild ally's reaction:</p>
    <p>1 = Double Cross (the ally joins the enemy Company!), 2 = Leaves the table, 3 = Skips next Activation, 4–6 = Carries on as normal.</p>
  </div>
</div>

</div><!-- rules-content -->

reg('characters',function(){
  if(document.getElementById('panel-characters').innerHTML.trim())return;
  const factions=[
    {key:'dickensians',label:'🔴 Dickensians'},
    {key:'servants',label:'🔵 Servants'},
    {key:'scions',label:'🏺 Scions'},
    {key:'guild',label:'🕵️ Guild'},
    {key:'favourites',label:'★ Favourites'},
    {key:'company',label:'📋 My Company'},
  ];
  const tabs=factions.map((f,i)=>`<button class="faction-tab${i===0?' active':''}" onclick="showFaction('${f.key}',this)">${f.label}</button>`).join('');
  const panels=factions.map((f,i)=>{
    if(f.key==='favourites'){
      const favs=Object.values(CHARS).flat().filter(c=>Store.get('fav_'+c.name,false));
      return`<div class="faction-panel${i===0?' active':''}" id="fp-favourites"><div class="char-grid">${favs.length?favs.map(charCard).join(''):'<div style="grid-column:1/-1;text-align:center;padding:3rem;font-family:\'IM Fell English\',serif;color:var(--parchment-dark)">No favourites yet — tap ★ on any character card</div>'}</div></div>`;
    }
    if(f.key==='company'){
      return`<div class="faction-panel" id="fp-company"><div id="company-roster-inner"></div></div>`;
    }
    return`<div class="faction-panel${i===0?' active':''} fp-${f.key}" id="fp-${f.key}"><div class="char-grid">${CHARS[f.key].map(charCard).join('')}</div></div>`;
  }).join('');
  document.getElementById('panel-characters').innerHTML=`
<div class="section-header"><h2 class="section-title">Character Rosters</h2><p class="section-subtitle">All factions across three books</p></div>
<div class="faction-tabs">${tabs}</div>${panels}`;
});

function toggleFav(name,btn){
  const isFav=!Store.get('fav_'+name,false);
  Store.set('fav_'+name,isFav);
  // Update ALL visible fav buttons for this character
  document.querySelectorAll('.fav-btn').forEach(b=>{
    if(b.onclick&&b.onclick.toString().includes(name.replace(/'/g,"\\'"))||b.getAttribute('onclick')&&b.getAttribute('onclick').includes(name)){
      b.classList.toggle('fav-active',isFav);
      b.title=isFav?'Unfavourite':'Favourite';
    }
  });
  showToast(isFav?`★ ${name} favourited`:`${name} unfavourited`);
  // Refresh favourites panel if visible
  const fp=document.getElementById('fp-favourites');
  if(fp&&fp.classList.contains('active'))renderFavPanel();
}

function renderFavPanel(){
  const favs=Object.values(CHARS).flat().filter(c=>Store.get('fav_'+c.name,false));
  const fp=document.getElementById('fp-favourites');
  if(!fp)return;
  fp.innerHTML=`<div class="char-grid">${favs.length?favs.map(charCard).join(''):'<div style="grid-column:1/-1;text-align:center;padding:3rem;font-family:\'IM Fell English\',serif;color:var(--parchment-dark)">No favourites yet — tap ★ on any character card</div>'}</div>`;
}

function renderCompanyInline(){
  const el=document.getElementById('company-roster-inner');
  if(!el)return;
  const roster=window._roster||[];
  const total=roster.reduce((s,c)=>s+c.pts,0);
  const limit=200;
  const over=total>limit;
  const factionColors={dickensians:'rgba(180,40,40,.35)',servants:'rgba(40,80,180,.35)',scions:'rgba(180,140,20,.35)',guild:'rgba(100,40,160,.35)'};
  el.innerHTML=`
  <div class="bldr-summary${over?' over-budget':''}" style="margin-bottom:1rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
      <div style="flex:1">
        <input value="${Store.get('roster_name','My Company')}" onchange="Store.set('roster_name',this.value)" placeholder="Company name..." style="background:transparent;border:none;border-bottom:1px solid rgba(201,168,76,.2);font-family:'Cinzel',serif;font-size:1rem;color:var(--brass-light);padding:.15rem 0;width:100%;max-width:200px;outline:none">
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.65rem;color:var(--brass-dark);margin-top:.25rem">${roster.length} character${roster.length!==1?'s':''} · Tap ⊕ on any character card to add</div>
      </div>
      <div style="text-align:right">
        <div class="bldr-pts ${over?'over':'ok'}">${total}</div>
        <div class="bldr-pts-lbl">/ ${limit} pts</div>
      </div>
    </div>
    <div class="bldr-bar"><div class="bldr-bar-fill ${over?'over':'ok'}" style="width:${Math.min(total/limit*100,100)}%"></div></div>
    ${roster.length>0?`<div style="margin-top:.75rem;text-align:right">
      <button onclick="if(confirm('Remove all ${roster.length} characters from your company?')){window._roster=[];Store.set('roster',[]);renderCompanyInline();showToast('Company cleared')}" style="background:rgba(204,74,74,.08);border:1px solid rgba(204,74,74,.3);color:#cc6a5a;font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.06em;padding:.4rem .9rem;border-radius:5px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(204,74,74,.18)'" onmouseout="this.style.background='rgba(204,74,74,.08)'">✕ Clear Entire Roster</button>
    </div>`:''}
  </div>
  ${roster.length===0?`<div style="text-align:center;padding:2.5rem;font-family:'IM Fell English',serif;color:var(--brass-dark)">No characters yet — go to a faction tab and tap ⊕ on any character card</div>`:
  roster.map((c,i)=>{
    const fc=factionColors[c.faction]||'rgba(201,168,76,.2)';
    return`<div class="bldr-roster-item" style="border-color:${fc}">
      <div style="flex:1;cursor:pointer" onclick="openChar('${c.name.replace(/'/g,"\\'")}')">
        <div class="bldr-char-name">${c.name}</div>
        <div class="bldr-char-meta">${c.role} · ${c.faction}</div>
      </div>
      <div class="bldr-char-pts">${c.pts}pts</div>
      <button onclick="event.stopPropagation();removeFromRoster(${i});renderCompanyInline()" title="Remove ${c.name}" style="background:transparent;border:1px solid rgba(204,74,74,.25);color:#cc6a5a;width:1.7rem;height:1.7rem;border-radius:50%;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0" onmouseover="this.style.borderColor='rgba(204,74,74,.6)'" onmouseout="this.style.borderColor='rgba(204,74,74,.25)'" aria-label="Remove ${c.name}">✕</button>
    </div>`;
  }).join('')}`;
}

function showFaction(k,btn){
  document.querySelectorAll('.faction-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.faction-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('fp-'+k).classList.add('active');
  btn.classList.add('active');
  if(k==='favourites')renderFavPanel();
  if(k==='company')renderCompanyInline();
}

function factionIcon(faction){

}

// ── HERALDIC CREST SYSTEM ─────────────────────────────────
// Each character gets a unique SVG crest: faction shield + bespoke sigil + ornamental details
function makeCrest(shield, sigil, palette){
  const {bg1,bg2,rim,glow,accent,sigC}=palette;
  return {
    bg: `linear-gradient(160deg,${bg1},${bg2})`,
    svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" width="120" height="110" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);overflow:visible">
      <defs>
        <radialGradient id="grd_${sigC.replace('#','')}" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="${bg2}" stop-opacity="0"/>
          <stop offset="100%" stop-color="${glow}" stop-opacity="0.55"/>
        </radialGradient>
        <filter id="glow_${sigC.replace('#','')}">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Ambient glow disc -->
      <ellipse cx="60" cy="52" rx="46" ry="42" fill="url(#grd_${sigC.replace('#','')})"/>
      <!-- Shield shape -->
      ${shield(rim,accent)}
      <!-- Sigil -->
      <g filter="url(#glow_${sigC.replace('#','')})" transform="translate(60,48)">
        ${sigil(sigC)}
      </g>
      <!-- Corner ornaments -->
      <g opacity="0.35" fill="${accent}">
        <path d="M14,14 L20,14 L20,20 M100,14 L106,14 L106,20 M14,90 L20,90 L20,96 M100,90 L106,90 L106,96" stroke="${accent}" stroke-width="1.2" fill="none"/>
      </g>
    </svg>`
  };
}

function getCharCrest(name,role,faction){
  const pal=FACTION_PALETTES[faction]||FACTION_PALETTES.default;
  const sigilFn=SIGILS[name];
  const shieldFn=SHIELDS[faction]||SHIELDS.scions;
  if(!sigilFn)return{bg:`linear-gradient(160deg,${pal.bg1},${pal.bg2})`,svg:''};
  return makeCrest(shieldFn,sigilFn,pal);
}

function charCard(c){
  const sk=Object.keys(c.stats);
  const faction=getFaction(c.name);
  const isFav=Store.get('fav_'+c.name,false);
  const crest=getCharCrest(c.name,c.role,faction);
  return`<div class="char-card" onclick='openChar(${JSON.stringify(c.name)})'>
    <div class="char-hero">
      <div class="char-hero-bg" style="--char-bg:${crest.bg}"></div>
      ${crest.svg}
      <div class="char-hero-overlay">
        <div class="char-name">${c.name}</div>
        <div class="char-role">${c.role}</div>
      </div>
      <div class="char-pts-badge">${c.pts}<span>pts</span></div>
      <button class="fav-btn${isFav?' fav-active':''}" onclick="event.stopPropagation();toggleFav('${c.name}',this)" title="${isFav?'Unfavourite':'Favourite'}">★</button>
      <button class="company-btn${isInCompany(c.name)?' in-company':''}" onclick="event.stopPropagation();toggleCompany('${c.name}',${c.pts},this)" title="${isInCompany(c.name)?'Remove from Company':'Add to Company'}" style="position:absolute;top:.5rem;left:2.2rem;background:transparent;border:none;font-size:1rem;cursor:pointer;color:${isInCompany(c.name)?'#5ddb8a':'rgba(255,255,255,.35)'};transition:color .25s,transform .2s,filter .25s;line-height:1;padding:0;text-shadow:0 1px 4px rgba(0,0,0,.6)">⊕</button>
    </div>
    <div class="char-stats">
      ${sk.map(k=>`<div class="stat-cell"><span class="stat-lbl">${k}</span><span class="stat-val ${statClass(c.stats[k])}">${c.stats[k]}</span></div>`).join('')}
    </div>
    <div class="char-abilities">
      ${c.abilities.slice(0,3).map(a=>`<span class="ability-tag">${a}</span>`).join('')}
      ${c.abilities.length>3?`<span class="ability-tag" style="opacity:.6">+${c.abilities.length-3} more</span>`:''}
      ${(c.schools||[]).map(s=>`<span class="ability-tag alc">⚗ ${s}</span>`).join('')}
    </div>
  </div>`;
}

reg('abilities',function(){
  if(document.getElementById('panel-abilities').innerHTML.trim())return;
  const types=['All',...new Set(ABILITIES.map(a=>a.t))];
  const entries=ABILITIES.map(a=>`<div class="glo-entry" data-name="${a.n.toLowerCase()}" data-type="${a.t}" onclick="this.classList.toggle('expanded')">
    <div class="glo-head"><span class="glo-name">${a.n}</span><span class="glo-type">${a.t}</span></div>
    <div class="glo-desc">${a.d}</div>
  </div>`).join('');
  document.getElementById('panel-abilities').innerHTML=`
<div class="section-header"><h2 class="section-title">Abilities Glossary</h2><p class="section-subtitle">Every special ability — click any entry to expand</p></div>
<input class="glo-search" placeholder="Search abilities…" oninput="filterAbil(this.value)">
<div class="filter-pills">${types.map((t,i)=>`<button class="filter-pill${i===0?' active':''}" onclick="filterType('${t}',this)">${t}</button>`).join('')}</div>
<div id="glo-list">${entries}</div>`;
});
function filterAbil(v){const lv=v.toLowerCase();document.querySelectorAll('.glo-entry').forEach(e=>e.classList.toggle('hidden',!e.dataset.name.includes(lv)));}
function filterType(t,btn){
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.glo-entry').forEach(e=>e.classList.toggle('hidden',t!=='All'&&e.dataset.type!==t));
}

function openChar(name){
  const c=Object.values(CHARS).flat().find(x=>x.name===name);
  if(!c)return;
  const statKeys=['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM','ALC','LIFE'];
  const stats=statKeys.filter(k=>c.stats[k]!==undefined);
  const faction=getFaction(c.name);
  const fi=factionIcon(faction);
  const crest=getCharCrest(c.name,c.role,faction);
  const pal=FACTION_PALETTES[faction]||FACTION_PALETTES.default;
  document.getElementById('m-name').textContent=c.name;
  document.getElementById('m-sub').textContent=`${c.role} · ${c.pts} pts`;
  document.getElementById('m-body').innerHTML=`
    <div style="width:100%;height:150px;border-radius:10px;margin-bottom:1.1rem;position:relative;overflow:hidden;${crest.bg?`background:${crest.bg}`:''};display:flex;align-items:center;justify-content:center">
      <div style="position:absolute;inset:0;background:${crest.bg||'linear-gradient(135deg,rgba(26,18,8,.9),rgba(10,6,20,.95))'}"></div>
      <div style="position:relative;transform:scale(1.45);filter:drop-shadow(0 6px 18px rgba(0,0,0,.7))">${crest.svg||''}</div>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(8,6,16,.95) 28%,rgba(8,6,16,.2) 60%,transparent)"></div>
      <div style="position:absolute;bottom:.75rem;left:1.1rem">
        <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:var(--brass-light);text-shadow:0 2px 8px rgba(0,0,0,.8)">${c.name}</div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.12em;color:${pal.rim||'var(--brass)'};text-transform:uppercase">${c.role} · ${faction}</div>
      </div>
      <div style="position:absolute;top:.65rem;right:.9rem;text-align:right;font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--brass-light);text-shadow:0 2px 8px rgba(0,0,0,.8)">${c.pts}<span style="display:block;font-family:'Josefin Sans',sans-serif;font-size:.52rem;color:${pal.rim||'var(--brass)'};letter-spacing:.1em">PTS</span></div>
    </div>
    <div class="modal-stats">
      ${stats.map(k=>`<div class="ms"><span class="ms-lbl">${k}</span><span class="ms-val">${c.stats[k]}</span></div>`).join('')}
    </div>
    ${(()=>{
      const life=parseInt(c.stats['LIFE'])||0;
      if(!life)return '';
      const woundedAt=Math.ceil(life/2);
      return `<div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;font-family:'Josefin Sans',sans-serif;font-size:.78rem;color:var(--brass);margin-bottom:.28rem">
          <span>LIFE</span><span>${life} · Wounded below ${woundedAt}</span>
        </div>
        <div class="life-bar"><div class="life-fill" style="width:100%"></div></div>
        <div class="life-bar" style="margin-top:2px"><div class="life-fill wounded" style="width:${(woundedAt/life*100).toFixed(0)}%"></div></div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--brass);margin-top:.18rem">▲ Full · ▲ Wounded threshold (−2 all stats)</div>
      </div>`;
    })()}
    ${c.lore?`<div class="highlight-box">${c.lore}</div>`:''}
    ${c.schools?`<div class="modal-section"><div class="modal-section-title">⚗ Schools</div><div>${c.schools.map(s=>`<span class="stat-pill">${s}</span>`).join('')}</div></div>`:''}
    ${c.weapons?`<div class="modal-section"><div class="modal-section-title">⚔ Weapons</div><div class="weapon-entry">${c.weapons.split(' · ').map(w=>`<div class="weapon-stats">${w.replace(/ (Range:)/,'<br>$1')}</div>`).join('<div style="border-top:1px solid rgba(201,168,76,.08);"></div>')}</div></div>`:''}
    <div class="modal-section"><div class="modal-section-title">⚡ Abilities</div>
      ${c.abilities.map(a=>`<div class="ability-entry" onclick="this.classList.toggle('expanded')">
        <div class="ability-ename">${a}</div>
        <div class="ability-edesc">${abilityDesc(a)}</div>
      </div>`).join('')}
    </div>
    ${c.ammo?`<div class="modal-section"><div class="modal-section-title">🔫 Ammunition Types</div><div class="weapon-entry">${c.ammo.split(' · ').map(a=>`<div class="weapon-stats">${a.replace(/ (Range:)/,'<br>$1')}</div>`).join('<div style="border-top:1px solid rgba(201,168,76,.08);"></div>')}</div></div>`:''}
    ${c.needsVerification?`<div class="notice warning" style="margin-top:.75rem">⚠ Guild character — stats pending verification against physical cards. Some values may differ from final printed cards.</div>`:''}
    <div class="modal-section" style="margin-top:.5rem">
      <button onclick="toggleCompany('${c.name}',${c.pts})" style="width:100%;background:linear-gradient(135deg,rgba(61,184,140,.1),rgba(61,184,140,.06));border:1px solid rgba(61,184,140,.35);color:#5ddb8a;font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.08em;padding:.55rem;border-radius:6px;cursor:pointer;transition:all .2s">${isInCompany(c.name)?'✕ Remove from Company':'⊕ Add to Company ('+c.pts+'pts)'}</button>
    </div>`;
  document.getElementById('char-modal').classList.add('open');
}

function showSchool(k,el){
  document.querySelectorAll('.school-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.invoc-list').forEach(l=>l.classList.remove('active'));
  el.classList.add('active');document.getElementById('il-'+k).classList.add('active');
}
function togglePip(el,idx,pip){
  const pips=[...document.querySelectorAll(`#ep-${el} .pip`)];
  if(pip.classList.contains('full'))pips.forEach((p,i)=>{if(i>=idx)p.classList.remove('full');});
  else pips.forEach((p,i)=>{if(i<=idx)p.classList.add('full');});
  const state=pips.map(p=>p.classList.contains('full'));
  Store.set('ess_'+el,state);
}
function refillEl(el){
  document.querySelectorAll(`#ep-${el} .pip`).forEach(p=>p.classList.add('full'));
  Store.set('ess_'+el,[true,true,true,true,true,true]);
}
function loadEssState(){
  ['fire','earth','air','water'].forEach(el=>{
    const saved=Store.get('ess_'+el,null);
    if(!saved)return;
    const pips=[...document.querySelectorAll(`#ep-${el} .pip`)];
    pips.forEach((p,i)=>p.classList.toggle('full',saved[i]));
  });
}

function toggleCond(charKey,cond,el){
  const key='cond_'+charKey+'_'+cond;
  const active=!Store.get(key,false);
  Store.set(key,active);
  el.classList.toggle('cond-active',!active);
  showToast(active?`${cond} applied`:`${cond} removed`);
}
function clearConds(charKey){
  ['Wounded','Stunned','Prone','Bleed','Entangled','Pinned'].forEach(cond=>{
    Store.del('cond_'+charKey+'_'+cond);
  });
  document.querySelectorAll(`#cond-track-${charKey} .cond-badge`).forEach(b=>b.classList.add('cond-active'));
  showToast('Conditions cleared');
}

function abilityDesc(name){
  const a=ABILITIES.find(x=>x.n===name||name.startsWith(x.n));
  return a?a.d:'Click to see description — check the Abilities tab for full details.';
}

function showRule(k,btn){
  document.querySelectorAll('.rules-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.rules-nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('rp-'+k).classList.add('active');
  btn.classList.add('active');
}

function drawSpirit(){

  if(window._canDeck.length===0){window._canDeck=[...SPIRITS];shuffle(window._canDeck);}
  window._drawn=window._canDeck.pop();window._domLevel=0;
  document.getElementById('can-count').textContent=window._canDeck.length+' spirits remaining';
  renderDrawn();
}

  {n:"Streetsweeper",turns:6,vp:"3",d:"For this mission you must decide which Company has the spy on the table and which is hunting for him or her. When you have determined Favour of The Engine and Priority the Company that ends up with Priority is the one that has a spy secreted somewhere on the table. During the game the hunting Company must try and find the Spy and stop him or her getting off the table. Any Character from the hunting Company within 2\" of any building can spend an Action to try and spot the hiding Spy. This is a Difficulty 15 Finesse Check. Should the Spy leave the table the controlling Company gains 3 Victory Points. If the Spy is taken Out of Action then the hunting Company gains 3 Victory Points."},
  {n:"Vengeance",turns:8,vp:"6",d:"At the start of the game each player randomly selects one Character in the opposing Company with a value of at least 25 points. This Character has done something that has greatly offended you and must be punished. For each instance in which you cause damage this Character you receive 1 bonus Victory Point. If they are taken Out of Action in a single attack you receive 6 Victory Points!"},
  {n:"Take and Hold",turns:8,vp:"2",d:"Before deployment of Characters the player who does not hold Priority must nominate a single building on the table. This is the objective for both Factions. It should be outside of both deployment zones if possible. No Character may deploy within 6\" of this building in any circumstance. For each Character from either Company that is within 2\" of the building at the end of the game 2 Victory Points are awarded."},
  {n:"Passing Through",turns:8,vp:"Varies",d:"Divide the table into four 18\" squares. Place a piece of scatter terrain such as a barrel, crate or chest in the centre of each quarter to serve as the objectives. The aim of this game is to have Characters touch these objectives. A Character may not touch the same objective twice. Characters may not touch the objectives nearest to their deployment zone until they have touched at least one that is further away. If all are equidistant then any may be touched. At the end of the game add up the number of touches: 1-5: 1VP, 5-10: 2VP, 11-15: 3VP, 15-20: 4VP, 20+: 5VP. Insignificant Characters have their touches halved and rounded down."},
  {n:"Rumble",turns:6,vp:"1-2",d:"For each opposing character brought to the Wounded state in Close Combat you receive 1 bonus Victory Point. For each opposing Character taken Out of Action in Close Combat you receive 2 bonus Victory Points."},
  {n:"Engine Tendrils",turns:8,vp:"2/tendril",d:"Place 4 markers around the table. The markers are placed adjacent to a building or significant piece of terrain in the same manner as scatter terrain but should be placed outside of any deployment zone. These markers represent exposed tendrils of The Engine. A Character may try and gain control of a Tendril by moving into contact with it and spending two Actions. A Finesse check with a difficulty of 15 is required to control a Tendril. You may not make this check if you are in Close Combat. For each Tendril controlled Characters receive a +2 bonus to any one roll of their choosing each turn. In addition you gain 2 Victory Points for each Tendril you control at the end of the game."},
  {n:"Search and Destroy",turns:8,vp:"1+",d:"In an area of contested city there are often objectives, documents or people that are important to the opposing Factions. A Character may spend a single Action when in contact with any building outside of a deployment zone to search it. For each building searched roll a D6, adding +1 for every building searched previously. On a 1-5 nothing is found. On a roll of 6 it proves to contain something of great value and is a prime target for arson! Once this building has been located no further buildings may be searched by your Company. You may set the building alight by spending 2 Actions whilst in contact with it. For each turn the building burns after the turn it is set alight you receive 1 Victory Point. After 3 turns you may roll a D6 and add the number of turns burned. Should this number add up to more than 8 then the building collapses. Should the building you have lit collapse you receive 3 additional Victory Points!"},
  {n:"The Engine's Presence",turns:6,vp:"Varies",d:"This mission brings The Engine to the fore. It has focussed its attention on this fight and is paying special heed to the results. At the start of the game, when the initial draw of Eye of The Engine cards is to occur each player draws a hand of 4 Eye of The Engine cards. These extra cards are drawn by each player, one card at a time starting with the player who holds Favour of The Engine. At any time during the game, when an Eye of The Engine card is due to be played, a player may discard the Eye of The Engine card drawn for the turn and take one of the 4 cards from the special draw in its place. During the game Victory Points are earned: negative Eye card affecting a Character = 2VP, positive Eye card affecting a Character = 1VP."},
  {n:"Scouting Mission",turns:8,vp:"2-4",d:"For this mission each Company rolls a D6. The player with the higher result is the defender and the lower result is the attacker. Place a piece of scatter terrain in the centre of the defender's deployment zone. This represents a stash of some kind that is important. The attacker must try and reach this stash, take the item and escape the table through their own deployment zone. To take the item a single Action must be spent whilst in base contact with the stash. No roll is required but the Character must be free of Close Combat. If the item is in the possession of the attackers but not off the table at end of game 2VP are earned. If they manage to get the item off the table 4VP are earned."},
  {n:"VIP",turns:8,vp:"2-4",d:"For this mission you will need an additional miniature or counter to represent Lord Cain-Pruis. This VIP is of importance to both Factions and may not be attacked in any way. He or she is considered to have a Speed of 4 for purposes of movement. The player who has Priority for the first turn is the one who is escorting the VIP. The VIP must leave the table from the edge opposite to where they started. Should the VIP be in contact with one of his escorts but not off the table at end of game 2VP are earned. Should he or she leave the table 4VP are earned. Should the VIP be in the possession of the attackers at the end of game 4VP are earned. If not in possession of either side the attackers earn 2VP."},
  {n:"Raiding Party",turns:8,vp:"1+",d:"For this mission your objective is to reduce as many opponents to Wounded or Out of Action as possible whilst keeping your own Company in good condition and escaping the scene. For each opposing Character reduced to the Wounded State or Out of Action by turn 5 you receive 1 bonus Victory Point. After turn 6 you get an additional bonus Victory Point for each of your Characters who leaves the table whilst not in the Wounded State. If you or your opponent have Characters with the Insignificant ability then 2 such characters must be Wounded, Out of Action or leave the table to claim the bonus Victory Points. This mission will end early should the entirety of any one Company leave the table."},
  {n:"Defence",turns:8,vp:"1-2",d:"Roll a D6 at the start of this mission. The player who rolls higher is the attacker and the player who rolls lower is the defender. The defender nominates an area of the table 12\" x 12\" that includes at least part of his or her deployment zone. The attacker receives 2 Victory Points for every Character that is in this zone at the end of the game. The defender gets 1 bonus Victory Point for each opponent in the zone who is in the Wounded State at the end of the game and 1 bonus Victory Point for each Character taken Out of Action whilst in the zone at any time during the game."},
  {n:"Carriage of Justice",turns:8,vp:"1-3",d:"For this mission you will need a model or counter to represent the Catch Wagon. Roll a D6 at the start. The player who rolls higher is the defender of the wagon and the player who rolls lower is the attacker whose companion has been arrested. The Catch Wagon is driven by a bonded Gentlefolk Bobby who may not leave it. The Catch Wagon starts at a table edge in the deployment zone of the defender and must exit by a table edge opposite. For each turn that the Wagon makes progress the defenders gain 1 Victory Point. For each turn it does not the attackers gain 1 Victory Point. Should it leave the table the defenders gain 3 Victory Points. Should the Wagon lose all its Life and be disabled the attackers gain 3 Victory Points."},
  {n:"Capture",turns:8,vp:"2-4",d:"At the start of this mission each player shuffles his or her Activation Cards and places them face down on the table. The top card is turned over and this Character as shown is the target of a capture attempt by your opponent. In order to capture the Character he or she must be taken Out of Action and a friendly Character must move into base to base contact and a single Action spent to pick them up. The unconscious foe must then be picked up and taken from the table by any table edge. The carrying Character may only make a single Move Action whilst carrying the limp form. Should either captured Character leave the table the Company that managed this feat receives 4 Victory Points. If the captured character is in the possession of your opponent but on the table they receive 2 Victory Points."},
  {n:"Blood on the Streets",turns:8,vp:"Varies",d:"This mission is all about doing damage to your opponent, plain and simple. Use the table below for bonus Victory Points awarded in addition to the normal ones for Wounding and taking foes Out of Action. These bonus Victory Points are cumulative. Causing over 5 damage in a single attack: 1VP. Incapacitating a foe by any means: 1VP. Causing over 10 damage in a single attack: 1VP. Causing a Critical Hit: 1VP. Taking a foe Out of Action in a single Attack: 2VP. Having the highest number of Characters on the table at the end of the game: 3VP. In order to claim the Victory Points for taking a foe Out of Action in a single attack the attack must have taken them from outside the Wounded state to Out of Action."},
];

const FEATURES=["1. Rough Ground — Areas of broken cobbles, debris or mud. Movement through is halved. Running characters must make Diff 10 Finesse or go Prone.","2. Guy's Gunpowder — Barrels of volatile gunpowder. If hit by a Ranged or Alchemantic attack they explode: 4\" Blast, D10+6 damage bypassing armour.","3. Errant Essences — Pools of raw Elemental Essences. An Alchemancer within 1\" may spend an Action to harvest D4 Essences.","4. Sewer Slime! — A foul creature from the sewers. Moves D6\" randomly each Maintenance Phase. Characters within 1\" suffer D4 damage bypassing armour.","5. Sinkholes — Unstable ground. Characters moving over must make Diff 12 Finesse check or fall into a pit, taking D6 damage and being trapped.","6. Twisted Trees — Engine-warped vegetation that has become semi-sentient. Characters within 2\" must make Diff 10 Strength check or be Entangled.","7. Leaking Gas Lamp — Damaged gas lamp leaking flammable vapour. Any Fire-based attack within 2\" causes a 3\" Blast explosion: D8+4 damage.","8. Dropped Delights — Scattered items from Dr Disraeli's collection. Characters may search (Action, Finesse Diff 12) to find a random 1-point Delight.","9. Crumbling Architecture — Unstable buildings and walls. Characters climbing or on top must make Diff 10 Finesse checks. Failure: D8 damage and Prone.","10. Rats in the Ranks — Swarms of large aggressive sewer rats. Move D6\" randomly each turn. Characters within 1\" suffer D4 damage and must make Diff 10 Finesse or lose 1 Action.","11. Ungodly Stench — Area of noxious fumes. Characters within 2\" suffer -2 to all Characteristics.","12. Angry Locals — A mob of angry citizens. Move towards nearest combat each turn. Attack both sides indiscriminately.","13. Lesser Engine Tendrils — Minor tendrils of Engine energy. An Alchemancer within 1\" gains +2 to Alchemancy checks. Non-Alchemancers must make Diff 12 Finesse or be Stunned.","14. Demolition Crew — A team of Gentlefolk workers demolishing a building. Each turn they remove a section. Characters nearby risk D6 falling debris damage.","15. Slippery When Wet — Rain-slicked cobblestones. Running characters must make Diff 10 Finesse or go Prone. Charging characters suffer -2 to attack roll.","16. Alchemantic Null Fields — Areas where Alchemancy doesn't work. No Invocations may be cast within the field. Existing effects are suppressed.","17. Billowing Steam — Clouds of steam from burst pipes. Blocks Line of Sight completely. Characters within move at half speed. Clears D6\" randomly each Maintenance.","18. Resistance! — Armed civilians fighting back. They shoot at nearest Character regardless of faction. Basic Ranged Attack 4, D8+3 damage.","19. Loose Carriage! — A runaway horse-drawn carriage. Moves 3D6\" straight each turn. Characters hit suffer D10+4 damage and are knocked Prone.","20. Timeskip Bubble — The Engine manipulates time. Characters entering roll D6: 1-2 lose an Action, 3-4 no effect, 5-6 gain an Action."];
const TAROT=[
  {n:"Elemental Vengeance",d:"Alchemancers are both powerful and cunning and their dominance in the theatre of battle can be of great import. If any opposing Character is taken Out of Action whilst under the influence of an Alchemantic Invocation called by an Alchemancer you control you gain 3 bonus Victory Points.",vp:3},
  {n:"Bring 'em Down",d:"Alchemancers are powerful and potentially dangerous. Often the best way to nullify them is from a distance. You must try and take all Characters in your opponent's Company with an Alchemancy characteristic of more than 0 Out of Action with ranged attacks. Should you manage this you receive 2 bonus Victory Points.",vp:2},
  {n:"Scouting Mission",d:"Nominate one of your Characters and send them out before the first Turn. This Character needs to make base contact with an area within 4\" of the centre of all four edges of the gaming table. Should you achieve this then you receive 2 bonus Victory Points.",vp:2},
  {n:"Vengeance",d:"Whichever of your opponent's Characters takes the first of your Company Out of Action becomes the target of this Task. This Character should be taken Out of Action as quickly as possible. You gain bonus Victory Points according to the following table: 1 Turn: 5VP, 2 Turns: 4VP, 3 Turns: 3VP, 4 Turns plus: 1VP.",vp:"1-5"},
  {n:"First Blood",d:"Select the Character from your opponent's Company that has the highest points value not including any of Dr Disraeli's Delights. If you can bring this Character to the Wounded state within the first 4 turns of the game you receive 1 bonus Victory Point. If you manage to take them Out of Action by the 4th turn of the game you receive 2 bonus Victory Points.",vp:"1-2"},
  {n:"Shoot 'em Up!",d:"The first time you manage to take an opposing Character Out of Action with a ranged attack you receive 3 bonus Victory Points. For Characters with the Insignificant ability you must take 2 Out of Action before claiming the bonus Victory Points.",vp:3},
  {n:"The Big Bang",d:"You get 3 bonus Victory Points should you manage to take an opposing Character Out of Action with any form of attack that uses a blast template.",vp:3},
  {n:"Hunt the Alchemancer",d:"Choose the Character with the highest Alchemancy characteristic in your opponent's Company. Should you manage to take them Out of Action you gain 4 bonus Victory Points.",vp:4},
  {n:"Duel to the Death",d:"Choose the Character with the highest Close Combat Attack characteristic in your opponent's Company. Should you manage to take them Out of Action in Close Combat you gain 3 bonus Victory Points.",vp:3},
  {n:"All Sneaky Like",d:"If you manage to have a Character on more than 50% Life in your opponent's deployment zone at the end of the game you gain 2 bonus Victory Points.",vp:2},
  {n:"Snipe the Sniper",d:"Choose the Character with the highest Ranged Combat Attack characteristic in your opponent's Company. Should you manage to take them Out of Action in Ranged Combat you gain 3 bonus Victory Points.",vp:3},
  {n:"Spy on 'em",d:"Nominate a Character in your Company as the secret spy. Should this Character manage to maintain line of sight to the highest point value Character in your opponent's Company for 3 turns and not come under attack then you receive 2 bonus Victory Points.",vp:2},
  {n:"Backstab",d:"If you manage to take an opposing Character out of action with a charge from the rear then you receive 3 bonus Victory Points. For Characters with the Insignificant ability you may receive 1 bonus Victory Point.",vp:"1-3"},
  {n:"The Bigger They Are",d:"If a Character in your Company manages to land the blow that takes an opposing Character at least 15 points more expensive Out of Action then you receive 2 bonus Victory Points.",vp:2},
  {n:"Hammer Time",d:"If you manage to achieve 10 or more damage in a single Close Combat attack then you receive 1 bonus Victory Point. If the Character has the Insignificant ability then you must achieve the feat twice to gain the Victory Points.",vp:1},
  {n:"The Power of The Engine",d:"You must try and take an opposing Character Out of Action whilst under the influence of an Eye of The Engine or Tempt Fate Card. Should you manage this feat you gain 3 bonus Victory Points and additionally should your opponent hold the Favour of The Engine they must immediately hand it over to you.",vp:3},
  {n:"Fight with Honour",d:"You must try to take the Character with the highest points value in your opponent's Company Out of Action in Close Combat without outnumbering them or attacking from the rear. Should you manage this you receive 3 bonus Victory Points.",vp:3},
  {n:"Counting Coup",d:"You must try and have your Characters move within 1\" of an opposing model and successfully pass by — perhaps with a colourful insult. Should you manage this impressive and difficult feat 3 times you receive 2 Victory Points.",vp:2},

reg('missions',function(){
  if(document.getElementById('panel-missions').innerHTML.trim())return;
  document.getElementById('panel-missions').innerHTML=`
<div class="section-header"><h2 class="section-title">Mission Generator</h2><p class="section-subtitle">Random deployments, objectives & terrain features</p></div>
<button class="gen-btn" onclick="genMission()">⚙ Generate Mission</button>
<div class="mission-box" id="mission-result"><div style="text-align:center;padding:3rem 0;color:var(--parchment-dark);font-family:'IM Fell English',serif;font-size:1rem">Click Generate Mission to create a random encounter</div></div>
<div class="grid-2">
  <div class="card"><div class="card-title">🗺 Deployments (D10)</div>
    ${DEPLOYS.map((d,i)=>`<div style="padding:.38rem 0;border-bottom:1px solid rgba(201,168,76,.07);font-size:.79rem"><span style="font-family:'Cinzel',serif;color:var(--brass-light)">${i+1}. </span>${d}</div>`).join('')}
  </div>
  <div class="card"><div class="card-title">🎯 Primary Objectives (D20)</div>

      <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:'Cinzel',serif;color:var(--brass-light)">${i+1}. ${o.n}</span><span style="font-family:'Josefin Sans',sans-serif;font-size:.65rem;color:var(--brass);white-space:nowrap">${o.turns||'?'} turns</span></div>
      <div style="font-size:.75rem;color:var(--parchment-dark);margin-top:.25rem;line-height:1.55">${o.d}</div>
    </div>`).join('')}
  </div>
</div>`;
});
function genMission(){
  const dep=DEPLOYS[Math.floor(Math.random()*10)];
  const obj=OBJECTIVES[Math.floor(Math.random()*20)];
  const nf=Math.floor(Math.random()*3)+1;
  const feats=shuffle([...FEATURES]).slice(0,nf);
  const t1=TAROT[Math.floor(Math.random()*TAROT.length)];
  const t2=TAROT.filter(t=>t.n!==t1.n)[Math.floor(Math.random()*(TAROT.length-1))];
  document.getElementById('mission-result').innerHTML=`
    <div class="m-head">Mission Generated</div>
    <div class="m-name">${obj.n}</div>
    <div style="font-size:.83rem;color:var(--parchment-dark)">${obj.d}</div>
    <div class="m-detail-grid">
      <div class="m-detail"><span class="m-dlbl">🗺 Deployment</span><div class="m-dval">${dep.split(' — ')[0]}</div><div style="font-size:.7rem;color:var(--parchment-dark);margin-top:.2rem">${dep.split(' — ')[1]||''}</div></div>
      <div class="m-detail"><span class="m-dlbl">⏱ Game Length</span><div class="m-dval" style="font-family:'Cinzel Decorative',serif;font-size:1.4rem">${obj.turns||6} turns</div></div>
      <div class="m-detail"><span class="m-dlbl">🌿 Features (${nf})</span>${feats.map(f=>`<div style="font-size:.72rem;color:var(--parchment-dark);margin-top:.18rem">• ${f}</div>`).join('')}</div>
    </div>
    <div style="margin-top:1rem">
      <div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.08em;color:var(--brass);text-transform:uppercase;margin-bottom:.5rem">🃏 Tarot of Taxing Tasks (Secret Objectives)</div>
      <div class="m-obj">Player A: <strong style="color:var(--brass-light)">${t1.n}</strong><div style="font-size:.75rem;color:var(--parchment-dark);margin-top:.2rem">${t1.d}</div></div>
      <div class="m-obj">Player B: <strong style="color:var(--brass-light)">${t2.n}</strong><div style="font-size:.75rem;color:var(--parchment-dark);margin-top:.2rem">${t2.d}</div></div>
    </div>
    <div style="margin-top:.9rem;padding-top:.9rem;border-top:1px solid rgba(201,168,76,.13);font-family:'Josefin Sans',sans-serif;font-size:.75rem;color:var(--parchment-dark)">
      <strong style="color:var(--brass-light)">Always active:</strong> Wound enemy = 1VP · OOA enemy = 2VP
    </div>`;
}

function rollD(sides){
  const r=Math.floor(Math.random()*sides)+1;
  const el=document.getElementById('dn');
  el.classList.remove('rolling');void el.offsetWidth;el.classList.add('rolling');
  el.textContent=r;
  const sp=document.getElementById('dspec');
  if(sides===20&&r===20)sp.innerHTML='<div class="spec-result spec-crit">✨ Critical Hit — Natural 20!</div>';
  else if(sides===20&&r===1)sp.innerHTML='<div class="spec-result spec-fumble">💀 Fumble — Natural 1!</div>';
  else sp.innerHTML=`<div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;color:var(--brass);margin-top:.35rem">D${sides}</div>`;
  // History
  addRollHistory(r,sides);
  if(navigator.vibrate)navigator.vibrate(sides===20?[30,10,20]:20);
  return r;
}

window._rollHistory=[];
function clearRollHistory(){
  window._rollHistory=[];
  const hist=document.getElementById('roll-history');
  if(hist)hist.innerHTML='';
  showToast('Roll history cleared');
}
function addRollHistory(r,sides){
  window._rollHistory.unshift({r,sides,ts:Date.now()});
  if(window._rollHistory.length>20)window._rollHistory.pop();
  const hist=document.getElementById('roll-history');
  if(!hist)return;
  hist.innerHTML=window._rollHistory.slice(0,16).map(h=>{
    const isCrit=h.sides===20&&h.r===20;
    const isFumble=h.sides===20&&h.r===1;
    return`<div class="roll-pip${isCrit?' crit':isFumble?' fumble':''}" title="D${h.sides} rolled ${h.r}">
      <span style="font-size:.62rem;opacity:.6;display:block;line-height:1;margin-bottom:.08rem">D${h.sides}</span>
      <span>${h.r}</span>
    </div>`;
  }).join('');
}

window._oppVals={a:null,b:null};
function rollOpp(side){
  const mod=parseInt(document.getElementById('m'+side).value)||0;
  const raw=Math.floor(Math.random()*20)+1;
  const total=raw+mod;
  window._oppVals[side]={raw,mod,total};
  document.getElementById('o'+side).textContent=total;
  updateOppResult();
}
function rollBoth(){rollOpp('a');rollOpp('b');}
function updateOppResult(){
  const {a,b}=window._oppVals;
  if(!a||!b)return;
  let msg='',col='';
  if(a.total>b.total){msg=`Attacker wins! (${a.total} vs ${b.total})`;col='var(--green)';}
  else if(b.total>a.total){msg=`Defender wins! (${b.total} vs ${a.total})`;col='var(--red)';}
  else{msg=`Tie! (${a.total} each) — Favour holder wins`;col='var(--brass-light)';}
  document.getElementById('opp-res').innerHTML=`<span style="color:${col}">${msg}</span>`;
}

function rollDmg(){
  const dice=document.getElementById('dd').value;
  const mod=parseInt(document.getElementById('dm').value)||0;
  const arm=parseInt(document.getElementById('da').value)||0;
  const crit=document.getElementById('dc').checked;
  const burn=document.getElementById('db').checked;
  const sides=parseInt(dice.replace('D',''));
  const raw=Math.floor(Math.random()*sides)+1;
  const total=raw+mod;
  let effArm=burn?0:crit?Math.floor(arm/2):arm;
  const dmg=Math.max(0,total-effArm);
  document.getElementById('dmg-res').textContent=dmg+' damage';
  let det=`D${sides} rolled ${raw} + ${mod} modifier = ${total}`;
  if(burn)det+=' · Armour ignored (Burning)';
  else if(crit)det+=` · Critical: Armour halved (${arm}→${effArm})`;
  else det+=` − ${arm} Armour`;
  document.getElementById('dmg-det').textContent=det;
}

      <p>At the heart of Twisted lies <strong style="color:var(--brass-light)">The Engine</strong> — a vast, unknowable machine of impossible complexity whose purpose no one fully understands. Buried deep beneath Victorian London, it thrums with a power that bleeds into the world above, warping the natural and the mechanical alike.</p>

      <p>Three great factions vie for control of The Engine and its secrets, while a fourth watches from the shadows.</p>

// ── MATCH SCORE (search scoring) ─────────────────────────────────────────
function matchScore(q,fields){
  let score=0;
  const ql=q.toLowerCase();
  fields.forEach((f,i)=>{
    if(!f)return;
    const fl=String(f).toLowerCase();
    if(fl===ql)score+=10;
    else if(fl.startsWith(ql))score+=6;
    else if(fl.includes(ql))score+=3;
    else{
      // word-by-word partial matching
      const words=ql.split(/\s+/);
      words.forEach(w=>{if(w.length>2&&fl.includes(w))score+=1;});
    }
    // Boost title/name fields (index 0)
    if(i===0)score*=1.5;
  });
  return score;
}

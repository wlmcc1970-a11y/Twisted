  const woundedAt=Math.ceil(maxLife/2);

  const CONDITIONS=['Stunned','Prone','Bleed','Entangled','Pinned','Dominated','On Fire','Poisoned'];
  const statKeys=['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM','ALC','LIFE'];
  const activeStats=statKeys.filter(k=>charData.stats[k]!==undefined);
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const nameEsc=name.replace(/'/g,"\\'");

  const state=CombatState.getOrInit(name,maxLife);

  const COND_PENALTIES={
    'Prone':{'CC ATT':-2,'CC DEF':-2},
    'Entangled':{'CC ATT':-2,'CC DEF':-2},
    'Pinned':{},'Dominated':{},'Stunned':{},'Bleed':{},
    'On Fire':{'FIN':-2},
    'Poisoned':{'STR':-2,'FIN':-2},
  };

  function lifeState(lv){
    if(lv<=0)return'ooa';
    if(lv<=woundedAt)return'wounded';
    return'ok';
  }

  function getEffectivePenalties(st,curConds){
    const pen={};
    if(st==='wounded'||st==='ooa'){
      ['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ALC'].forEach(k=>{pen[k]=(pen[k]||0)-2;});
    }
    curConds.forEach(cond=>{
      const cp=COND_PENALTIES[cond]||{};
      Object.entries(cp).forEach(([stat,val])=>{pen[stat]=(pen[stat]||0)+val;});
    });
    return pen;
  }

  function getEffStat(k,pen){
    const raw=charData.stats[k];
    if(raw===undefined)return{html:'',eff:0};
    const baseNum=parseInt(String(raw).split('/')[0])||0;
    const penalty=pen[k];
    if(penalty===undefined)return{html:`<span class="ct-stat-val">${raw}</span>`,eff:baseNum};
    const adj=Math.max(0,baseNum+penalty);
    return{html:`<span class="ct-stat-val debuffed" title="${k}: ${baseNum} (${penalty>0?'+':''}${penalty})">${adj}</span>`,eff:adj};
  }

  function getPenaltyNote(st,curConds){
    const parts=[];
    if(st==='wounded') parts.push('Wounded −2 all');
    if(st==='ooa') parts.push('Out of Action');
    curConds.forEach(cond=>{
      const cp=COND_PENALTIES[cond]||{};
      if(Object.keys(cp).length>0){
        parts.push(cond+': '+Object.entries(cp).map(([s,v])=>s+' '+v).join(', '));
      }
    });
    return parts.length?`<div style="font-family:'Josefin Sans',sans-serif;font-size:.6rem;color:var(--rust-light);margin-top:.35rem;line-height:1.5">${parts.join(' · ')}</div>`:'';
  }

  function parseWeapons(){
    const raw=charData.weapons||'';
    if(!raw) return[];
    return raw.split('·').map(w=>w.trim()).filter(Boolean).map(w=>{
      const m=w.match(/^(.+?)\s+(D\d+[^(]*?)\s*(?:\(([^)]+)\))?$/);
      if(m) return{name:m[1].trim(),dmg:m[2].trim(),tags:(m[3]||'').split(',').map(t=>t.trim()).filter(Boolean)};
      return{name:w,dmg:'',tags:[]};
    });
  }
  const weapons=parseWeapons();
  const dangerTags=['Bleed','Penetrating','Stun','Pain','Poison','Fire','Razor Sharp','Explosive','Tornado','Sever'];
  const specialTags=['Ethereal','Slow','Free','Ranged','Time','Arc','Piercing','AoE','Blast'];

  function getMaintItems(st,curConds){
    const items=[{id:'activation',label:'Reset Action pips — new Activation begins'}];
    if(curConds.includes('Bleed')) items.push({id:'bleed',label:'Bleed: lose D4 Life · Diff 12 FIN to clear'});
    if(curConds.includes('On Fire')) items.push({id:'onfire',label:'On Fire: lose D4 Life · Diff 12 FIN to extinguish'});
    if(curConds.includes('Stunned')) items.push({id:'stun',label:'Stunned clears at end of Maintenance'});
    if(st==='wounded') items.push({id:'wound_note',label:'Wounded: all stats −2 (except Life & ARM)'});
    if(charData.abilities&&charData.abilities.some(a=>/regen/i.test(a)))
      items.push({id:'regen',label:'Regeneration: recover D4 Life during Maintenance'});
    items.push({id:'essence',label:'Recover Essences (if Alchemancer)'});
    items.push({id:'favour',label:'Check Favour of The Engine'});
    return items;
  }

  // ── SURGICAL DOM UPDATES (#1, #10) ─────────────────────
  function updateLifeSection(){
    const s=CombatState.get(name);
    const currentLife=s.life;
    const st=lifeState(currentLife);
    const pct=Math.max(0,Math.min(100,(currentLife/maxLife)*100));
    const barClass=st==='ooa'?'critical':st==='wounded'?'wounded':'healthy';
    const stateLabel=st==='ooa'?'⚰ Out of Action':st==='wounded'?'⚠ Wounded':'✓ Active';
    const numEl=document.getElementById('ct-life-num-'+sKey);
    const barEl=document.getElementById('ct-life-bar-'+sKey);
    const badgeEl=document.getElementById('ct-state-badge-'+sKey);
    if(numEl)numEl.textContent=currentLife;
    if(barEl){barEl.className='ct-bar-fill '+barClass;barEl.style.width=pct+'%';}
    if(badgeEl){badgeEl.className='ct-state-badge '+st;badgeEl.textContent=stateLabel;}
    updateStatsSection();
    updateUndoBtn();
  }

  function updateStatsSection(){
    const s=CombatState.get(name);
    const st=lifeState(s.life);
    const pen=getEffectivePenalties(st,s.conds);
    activeStats.forEach(k=>{
      const cell=document.getElementById('ct-statcell-'+sKey+'-'+k.replace(/\s/g,'_'));
      if(cell){cell.innerHTML=getEffStat(k,pen).html;}
    });
    const penEl=document.getElementById('ct-pen-note-'+sKey);
    if(penEl)penEl.innerHTML=getPenaltyNote(st,s.conds);
    updateOppStatOptions();
  }

  function updateOppStatOptions(){
    const s=CombatState.get(name);
    const st=lifeState(s.life);
    const pen=getEffectivePenalties(st,s.conds);
    const sel=document.getElementById('ct-opp-stat-'+sKey);
    if(!sel)return;
    activeStats.filter(k=>k!=='LIFE'&&k!=='ARM').forEach(k=>{
      const opt=[...sel.options].find(o=>o.dataset.stat===k);
      if(opt){
        const base=parseInt(String(charData.stats[k]||0).split('/')[0])||0;
        const p=pen[k];
        const eff=typeof p==='number'?Math.max(0,base+p):base;
        opt.value=eff;
        opt.textContent=k+' ('+eff+')';
      }
    });
    const valEl=document.getElementById('ct-opp-val-'+sKey);
    if(valEl)valEl.textContent=sel.value;
  }

  function updateCondsSection(){
    const s=CombatState.get(name);
    CONDITIONS.forEach(cond=>{
      const el=document.getElementById('ctc-'+sKey+'-'+cond.replace(/\s/g,'_'));
      if(el)el.classList.toggle('active',s.conds.includes(cond));
    });
    updateStatsSection();
    updateUndoBtn();
  }

  function updateActionsSection(){
    const s=CombatState.get(name);
    [0,1].forEach(i=>{
      const pip=document.getElementById('ct-apip-'+sKey+'-'+i);
      if(pip)pip.classList.toggle('used',i<s.actions);
    });
    const lbl=document.getElementById('ct-act-lbl-'+sKey);
    if(lbl)lbl.textContent='⚡ Actions ('+(2-s.actions)+' left)';
    updateUndoBtn();
  }

  function updateUndoBtn(){
    const btn=document.getElementById('ct-undo-'+sKey);
    if(btn)btn.disabled=!CombatState.canUndo(name);
  }

  function buildContent(){
    const s=CombatState.get(name);
    const currentLife=s.life;const curConds=s.conds;const curNotes=s.notes;
    const curActions=s.actions;const curRound=s.round;const curMaint=s.maint;
    const st=lifeState(currentLife);
    const pct=Math.max(0,Math.min(100,(currentLife/maxLife)*100));
    const barClass=st==='ooa'?'critical':st==='wounded'?'wounded':'healthy';
    const stateLabel=st==='ooa'?'⚰ Out of Action':st==='wounded'?'⚠ Wounded':'✓ Active';
    const pen=getEffectivePenalties(st,curConds);
    const firstAtkStat=s.oppStat||activeStats.find(k=>k==='CC ATT'||k==='RNG ATT'||k==='FIN')||activeStats[0]||'SPD';
    const firstAtkBase=parseInt(String(charData.stats[firstAtkStat]||0).split('/')[0])||0;
    const firstAtkPen=pen[firstAtkStat];
    const firstAtkEff=typeof firstAtkPen==='number'?Math.max(0,firstAtkBase+firstAtkPen):firstAtkBase;
    const oppEnemy=s.oppEnemy||4;
    const maintItems=getMaintItems(st,curConds);

    return `
    <div class="ct-header">
      <div class="ct-hero" style="background:${crest.bg||'linear-gradient(135deg,rgba(26,18,8,.95),rgba(10,6,20,.98))'}">
        <div style="position:absolute;inset:0"></div>
        <div style="position:relative;transform:scale(1.3);filter:drop-shadow(0 4px 12px rgba(0,0,0,.6))">${crest.svg||''}</div>
        <div class="ct-hero-overlay"></div>
        <div class="ct-title-row">
          <div><div class="ct-name">${name}</div><div class="ct-role">${charData.role} · ${faction}</div></div>
          <div style="text-align:right"><div class="ct-pts">${charData.pts}</div><div style="font-family:'Josefin Sans',sans-serif;font-size:.52rem;color:${pal.rim||'var(--brass)'};letter-spacing:.1em">PTS</div></div>
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:.5rem;gap:.4rem">
      <button class="ct-undo-btn" id="ct-undo-${sKey}" onclick="ctUndo('${nameEsc}',${maxLife})" ${CombatState.canUndo(name)?'':'disabled'} aria-label="Undo last action">↩ Undo</button>
    </div>

    <div class="ct-section" style="padding:.7rem 1rem">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;align-items:start">
        <div>
          <div class="ct-section-title" style="margin-bottom:.5rem">⚙ Round</div>
          <div class="ct-round-row">
            <button class="ct-round-btn" onclick="ctAdjRound('${nameEsc}',-1)" aria-label="Previous round">−</button>
            <div class="ct-round-num" id="ctr-${sKey}">${curRound}</div>
            <button class="ct-round-btn" onclick="ctAdjRound('${nameEsc}',1)" aria-label="Next round">+</button>
          </div>
        </div>
        <div>
          <div class="ct-section-title" style="margin-bottom:.5rem" id="ct-act-lbl-${sKey}">⚡ Actions (${2-curActions} left)</div>
          <div class="ct-actions-row">
            ${[0,1].map(i=>`<div class="ct-action-pip${i<curActions?' used':''}" id="ct-apip-${sKey}-${i}" onclick="ctToggleAction('${nameEsc}',${i})" role="checkbox" aria-checked="${i<curActions}" aria-label="Action ${i+1}"><div class="pip-inner"></div></div>`).join('')}
          </div>
          <div style="font-family:'Josefin Sans',sans-serif;font-size:.58rem;text-align:center;color:var(--brass-dark);margin-top:.28rem">tap pip to use/restore</div>
        </div>
      </div>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">❤ Life Tracker</div>
      <div class="ct-life-display">
        <div style="text-align:center;min-width:3.5rem">
          <div class="ct-life-num" id="ct-life-num-${sKey}">${currentLife}</div>
          <div class="ct-life-max">/ ${maxLife}</div>
        </div>
        <div class="ct-life-bar-wrap">
          <div style="display:flex;justify-content:space-between;font-family:'Josefin Sans',sans-serif;font-size:.65rem;color:var(--brass);margin-bottom:.3rem">
            <span>LIFE POINTS</span><span style="color:var(--rust-light)">Wounded ≤ ${woundedAt}</span>
          </div>
          <div class="ct-bar" style="position:relative;overflow:visible">
            <div class="ct-bar-fill ${barClass}" id="ct-life-bar-${sKey}" style="width:${pct}%"></div>
            <div style="position:absolute;left:${(woundedAt/maxLife)*100}%;top:-2px;height:18px;width:2px;background:rgba(231,76,60,.75)"></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.35rem">
            <span style="font-family:'Josefin Sans',sans-serif;font-size:.62rem;color:var(--rust-light)">0</span>
            <span class="ct-state-badge ${st}" id="ct-state-badge-${sKey}">${stateLabel}</span>
            <span style="font-family:'Josefin Sans',sans-serif;font-size:.62rem;color:#5ddb8a">${maxLife}</span>
          </div>
        </div>
      </div>
      <div class="ct-stepper">
        <button class="ct-step-btn minus" onclick="ctStepLife('${nameEsc}',-1,${maxLife})" aria-label="Decrease life">−</button>
        <div class="ct-step-center">
          <select class="ct-step-select" id="ct-step-sel-${sKey}" aria-label="Damage amount">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
            <option value="8">8</option><option value="10">10</option>
          </select>
          <div class="ct-step-lbl">amount</div>
        </div>
        <button class="ct-step-btn plus" onclick="ctStepLife('${nameEsc}',1,${maxLife})" aria-label="Increase life">+</button>
      </div>
      <div style="display:flex;gap:.4rem;justify-content:center;margin-top:.4rem">
        <button class="ct-custom-btn" onclick="ctCustomDmg('${nameEsc}',${maxLife})">Custom ±</button>
      </div>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">📊 Characteristics</div>
      <div class="ct-stats">${activeStats.map(k=>`<div class="ct-stat"><span class="ct-stat-lbl">${k}</span><span id="ct-statcell-${sKey}-${k.replace(/\s/g,'_')}">${getEffStat(k,pen).html}</span></div>`).join('')}</div>
      <div id="ct-pen-note-${sKey}">${getPenaltyNote(st,curConds)}</div>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">☠ Conditions <span style="font-family:'Josefin Sans',sans-serif;font-size:.62rem;color:var(--brass-dark)">(tap to apply · updates stats above)</span></div>
      <div class="ct-cond-grid">${CONDITIONS.map(cond=>{
        const active=curConds.includes(cond);
        return `<div class="ct-cond${active?' active':''}" id="ctc-${sKey}-${cond.replace(/\s/g,'_')}" onclick="ctToggleCond('${nameEsc}','${cond}')" role="checkbox" aria-checked="${active}" aria-label="${cond} condition"><div class="ct-cond-dot"></div><span class="ct-cond-name">${cond}</span></div>`;
      }).join('')}</div>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">🎲 Dice Roller</div>
      <div class="ct-dice-row" style="margin-bottom:.5rem">
        ${['D4','D6','D8','D10','D12','D20'].map(d=>`<button class="ct-die-btn" onclick="ctRollDie('${d}','${sKey}')" aria-label="Roll ${d}">${d}</button>`).join('')}
      </div>
      <div class="ct-roll-result" id="ct-roll-${sKey}" aria-live="polite">—</div>
      <div class="ct-roll-detail" id="ct-roll-det-${sKey}"></div>
      <div style="border-top:1px solid rgba(201,168,76,.1);padding-top:.65rem;margin-top:.6rem">
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;color:var(--brass-dark);margin-bottom:.45rem;text-align:center">Opposed D20 Roll</div>
        <div class="ct-opp-grid">
          <div class="ct-opp-side">
            <select id="ct-opp-stat-${sKey}" onchange="ctSaveOppStat('${nameEsc}',this)" style="background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.25);color:var(--brass-light);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.25rem .35rem;border-radius:5px;width:100%;outline:none;margin-bottom:.25rem" aria-label="Your stat for opposed roll">
              ${activeStats.filter(k=>k!=='LIFE'&&k!=='ARM').map(k=>{
                const raw=charData.stats[k]||0;const base=parseInt(String(raw).split('/')[0])||0;
                const p=pen[k];const eff=typeof p==='number'?Math.max(0,base+p):base;
                return`<option value="${eff}" data-stat="${k}"${k===firstAtkStat?' selected':''}>${k} (${eff})</option>`;
              }).join('')}
            </select>
            <div class="ct-opp-stat-val" id="ct-opp-val-${sKey}">${firstAtkEff}</div>
            <div class="ct-opp-die" id="ct-opp-die-${sKey}">—</div>
            <div class="ct-opp-total" id="ct-opp-tot-${sKey}"></div>
          </div>
          <div class="ct-vs-div">VS</div>
          <div class="ct-opp-side">
            <div style="font-family:'Josefin Sans',sans-serif;font-size:.6rem;color:var(--brass-dark);margin-bottom:.25rem">Enemy stat</div>
            <input type="number" id="ct-opp-enemy-${sKey}" value="${oppEnemy}" min="0" max="20" onchange="ctSaveOppEnemy('${nameEsc}',this)" style="background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.25);color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.85rem;padding:.22rem;border-radius:5px;width:100%;outline:none;text-align:center;margin-bottom:.25rem" aria-label="Enemy stat value">
            <div class="ct-opp-die" id="ct-opp-enemy-die-${sKey}">—</div>
            <div class="ct-opp-total" id="ct-opp-enemy-tot-${sKey}"></div>
          </div>
        </div>
        <button class="ct-opp-roll-btn" onclick="ctOppRoll('${sKey}')">⚔ Roll Opposed D20</button>
      </div>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">⚔ Weapons</div>
      ${weapons.length?weapons.map(w=>`<div class="ct-weapon-card">
        <div class="ct-weapon-header"><span class="ct-weapon-name">${w.name}</span>${w.dmg?`<span class="ct-weapon-dmg">${w.dmg}</span>`:''}</div>
        ${w.tags.length?`<div class="ct-weapon-tags">${w.tags.map(t=>`<span class="ct-wtag${dangerTags.includes(t)?' danger':specialTags.includes(t)?' special':''}">${t}</span>`).join('')}</div>`:''}
      </div>`).join(''):`<div style="font-family:'IM Fell English',serif;font-size:.88rem;color:var(--brass-dark)">${charData.weapons||'—'}</div>`}
    </div>

    <div class="ct-section">
      <div class="ct-section-title">⚡ Abilities <span style="font-family:'Josefin Sans',sans-serif;font-size:.62rem;color:var(--brass-dark)">(tap to expand)</span></div>
      ${(charData.abilities||[]).map(aName=>{
        const aDef=ABILITIES?ABILITIES.find(x=>x.n===aName):null;
        return`<div class="ct-ability" onclick="this.classList.toggle('expanded')"><div class="ct-ability-header"><span class="ct-ability-name">${aName}</span>${aDef?`<span class="ct-ability-type">${aDef.t}</span>`:''}</div><div class="ct-ability-desc">${aDef?aDef.d:'See abilities glossary.'}</div></div>`;
      }).join('')}
    </div>

    ${charData.schools?`<div class="ct-section">
      <div class="ct-section-title">🔮 Alchemancy Schools</div>
      <div style="margin-bottom:.65rem">${charData.schools.map(s=>`<button class="ct-school-btn" onclick="ctToggleSchool('${nameEsc}','${s}',this)">⚗ ${s}</button>`).join('')}</div>
      <div id="ct-invocs-${sKey}" style="font-family:'IM Fell English',serif;font-size:.85rem;color:var(--brass-dark);text-align:center;padding:.5rem">Tap a school to see its invocations</div>
    </div>`:''}

    <div class="ct-section" id="ct-maint-section-${sKey}">
      <div class="ct-section-title">🔧 Maintenance Checklist</div>
      ${maintItems.map(item=>{
        const done=curMaint.includes(item.id);
        return`<div class="ct-maint-item${done?' done':''}" id="ctm-${sKey}-${item.id}" onclick="ctToggleMaint('${nameEsc}','${item.id}')"><div class="ct-maint-check">${done?'✓':''}</div><div class="ct-maint-text">${item.label}</div></div>`;
      }).join('')}
      <button onclick="ctClearMaint('${nameEsc}')" style="background:transparent;border:1px solid rgba(201,168,76,.18);color:var(--brass-dark);font-family:'Josefin Sans',sans-serif;font-size:.62rem;padding:.22rem .6rem;border-radius:4px;cursor:pointer;margin-top:.3rem;transition:all .2s">↺ Reset checklist</button>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">📝 Battle Notes</div>
      <textarea class="ct-notes" placeholder="Objectives, enemy conditions, VP scored, special orders…" oninput="ctSaveNotes('${nameEsc}',this.value)" aria-label="Battle notes">${curNotes}</textarea>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;gap:.5rem;flex-wrap:wrap">
      <button class="ct-reset-btn" onclick="ctReset('${nameEsc}',${maxLife})">↺ Reset All</button>
      <button onclick="openChar('${nameEsc}');closeCombatTracker()" style="background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--brass-light);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.38rem .85rem;border-radius:5px;cursor:pointer;transition:all .2s">👤 Full Character Card</button>
    </div>
    `;
  }

  window._ctUpdaters=window._ctUpdaters||{};
  window._ctUpdaters[name]={updateLifeSection,updateCondsSection,updateActionsSection,updateStatsSection,updateUndoBtn};
  window._ctBuilders=window._ctBuilders||{};
  window._ctBuilders[name]=buildContent;
  document.getElementById('ct-content').innerHTML=buildContent();
  document.getElementById('combat-modal').classList.add('open');
  document.getElementById('combat-modal').addEventListener('keydown',function(e){if(e.key==='Escape')closeCombatTracker();});
}

function ctAdjLife(name,delta,max){
  const s=CombatState.get(name);if(!s)return;
  CombatState.setField(name,'life',Math.max(0,Math.min(max,s.life+delta)));
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateLifeSection();
}
function ctStepLife(name,dir,max){
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const sel=document.getElementById('ct-step-sel-'+sKey);
  ctAdjLife(name,dir*(sel?parseInt(sel.value)||1:1),max);
}
function ctAdjRound(name,delta){
  const s=CombatState.get(name);if(!s)return;
  const next=Math.max(1,s.round+delta);
  CombatState.setField(name,'round',next,false);
  const el=document.getElementById('ctr-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.textContent=next;
}
function ctToggleAction(name,idx){
  const s=CombatState.get(name);if(!s)return;
  CombatState.setField(name,'actions',idx<s.actions?idx:idx+1);
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateActionsSection();
}
function ctToggleCond(name,cond){
  const s=CombatState.get(name);if(!s)return;
  const conds=[...s.conds];const i=conds.indexOf(cond);
  if(i>=0)conds.splice(i,1);else conds.push(cond);
  CombatState.setField(name,'conds',conds);
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateCondsSection();
}
function ctToggleCondEl(el){

function ctRollDie(die,sKey){
  const sides=parseInt(die.slice(1));const roll=Math.floor(Math.random()*sides)+1;
  const resEl=document.getElementById('ct-roll-'+sKey);const detEl=document.getElementById('ct-roll-det-'+sKey);
  if(!resEl) return;
  resEl.className='ct-roll-result'+(die==='D20'&&roll===20?' crit':die==='D20'&&roll===1?' fumble':'');
  resEl.textContent=roll;
  if(detEl){
    if(die==='D20'&&roll===20) detEl.textContent='⭐ CRITICAL HIT — Natural 20!';
    else if(die==='D20'&&roll===1) detEl.textContent='💀 CRITICAL FAILURE — Natural 1';
    else detEl.textContent=die+' roll';
  }
}
function ctOppRoll(sKey){
  const statSel=document.getElementById('ct-opp-stat-'+sKey);
  const enemyInp=document.getElementById('ct-opp-enemy-'+sKey);
  if(!statSel||!enemyInp) return;
  const myStat=parseInt(statSel.value)||0;const enemyStat=parseInt(enemyInp.value)||0;
  const myRoll=Math.floor(Math.random()*20)+1;const enemyRoll=Math.floor(Math.random()*20)+1;
  const myTotal=myStat+myRoll;const enemyTotal=enemyStat+enemyRoll;const myWin=myTotal>enemyTotal;
  const myDieEl=document.getElementById('ct-opp-die-'+sKey);const myTotEl=document.getElementById('ct-opp-tot-'+sKey);
  const enDieEl=document.getElementById('ct-opp-enemy-die-'+sKey);const enTotEl=document.getElementById('ct-opp-enemy-tot-'+sKey);
  if(myDieEl) myDieEl.textContent=myRoll+(myRoll===20?'⭐':myRoll===1?'💀':'');
  if(enDieEl) enDieEl.textContent=enemyRoll+(enemyRoll===20?'⭐':enemyRoll===1?'💀':'');
  const tie=myTotal===enemyTotal;
  if(myTotEl){myTotEl.className='ct-opp-total'+(tie?' ':myWin?' win':' lose');myTotEl.textContent=myTotal+(tie?' TIE→Favour':'');}
  if(enTotEl){enTotEl.className='ct-opp-total'+(tie?' ':myWin?' lose':' win');enTotEl.textContent=enemyTotal+(tie?' TIE→Favour':'');}
}

function showTerm(key){
  const d=TERM_DEFS[key];
  if(!d)return;
  const existing=document.getElementById('term-tooltip');
  if(existing)existing.remove();
  const el=document.createElement('div');
  el.id='term-tooltip';
  el.className='tooltip-modal';
  el.onclick=e=>{if(e.target===el)el.remove();};
  el.innerHTML=`<div class="tooltip-card">
    <button class="tooltip-close" onclick="document.getElementById('term-tooltip').remove()">✕</button>
    <div class="tooltip-title">${d.title}</div>
    <div class="tooltip-type">${d.type}</div>
    <div class="tooltip-body">${d.body}</div>
    ${d.example?`<div class="tooltip-example">📖 ${d.example}</div>`:''}
  </div>`;
  document.body.appendChild(el);
}

// Make stat pills clickable throughout the app
function makeStatPillsClickable(){
  document.querySelectorAll('.stat-pill').forEach(el=>{

// ── SERVICE WORKER (PWA offline support — improved #8) ───
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='twisted-v2';
const ASSETS=['/'];
const FONT_CACHE='twisted-fonts-v1';
self.addEventListener('install',e=>e.waitUntil(
  caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting())
));
self.addEventListener('activate',e=>e.waitUntil(
  caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE&&k!==FONT_CACHE).map(k=>caches.delete(k))))
));
self.addEventListener('fetch',e=>{
  const url=new URL(e.request.url);
  if(url.hostname==='fonts.googleapis.com'||url.hostname==='fonts.gstatic.com'){
    e.respondWith(caches.open(FONT_CACHE).then(c=>c.match(e.request).then(r=>{
      if(r)return r;
      return fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}).catch(()=>new Response('',{status:200,headers:{'Content-Type':'text/css'}}));
    })));
    return;
  }
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;
    }).catch(()=>caches.match('/')))
  );
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

function navTo(id){
  document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active','fade-in','slide-left','slide-right');});
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false');});
  const panel=document.getElementById('panel-'+id);
  panel.classList.add('active','fade-in');
  panel.addEventListener('animationend',()=>panel.classList.remove('fade-in'),{once:true});
  const btn=document.querySelector(`.nav-btn[data-panel="${id}"]`);
  if(btn){btn.classList.add('active');btn.setAttribute('aria-selected','true');}
  builders[id]&&builders[id]();
  sessionStorage.setItem('last_panel',id);
}

// ── SWIPE NAVIGATION BETWEEN TABS ─────────────────────────────────────────
(function(){
  let startX=0,startY=0,startTime=0;
  const THRESHOLD=55;
  const MAX_Y=80;
  const MAX_TIME=400;

  function getVisibleTabs(){
    const inGameMode=document.body.classList.contains('game-mode');
    return[...document.querySelectorAll('.nav-btn[data-panel]')].filter(b=>!inGameMode||!b.classList.contains('game-hidden'));
  }

  function shouldIgnore(e){
    const t=e.target;
    if(t.closest('.modal-overlay.open'))return true;
    if(t.closest('#search-overlay'))return true;
    if(t.closest('#combat-modal'))return true;
    const tag=t.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return true;
    if(t.closest('.roll-hist')||t.closest('.ct-dice-row'))return true;
    return false;
  }

  document.addEventListener('touchstart',function(e){
    if(shouldIgnore(e))return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startTime=Date.now();
  },{passive:true});

  document.addEventListener('touchend',function(e){
    if(!startTime)return;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    const dt=Date.now()-startTime;
    startTime=0;

    if(dt>MAX_TIME||Math.abs(dy)>MAX_Y||Math.abs(dx)<THRESHOLD)return;

    const tabs=getVisibleTabs();
    const current=tabs.findIndex(b=>b.classList.contains('active'));
    if(current<0)return;

    const next=dx<0?current+1:current-1;
    if(next<0||next>=tabs.length)return;

    const id=tabs[next].dataset.panel;
    const slideClass=dx<0?'slide-left':'slide-right';

    // Navigate directly — no .click() to avoid double animation
    document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active','fade-in','slide-left','slide-right');});
    document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false');});

    const panel=document.getElementById('panel-'+id);
    panel.classList.add('active',slideClass);
    panel.addEventListener('animationend',()=>panel.classList.remove(slideClass),{once:true});

    tabs[next].classList.add('active');
    tabs[next].setAttribute('aria-selected','true');
    builders[id]&&builders[id]();
    window.scrollTo({top:0,behavior:'smooth'});
    setTimeout(injectPanelQuotes,80);
    sessionStorage.setItem('last_panel',id);
  },{passive:true});
})();

// ── SPLASH SCREEN DISMISSAL ──────────────────────────────
window.addEventListener('load',function(){
  // Restore last active tab on refresh
  const lastPanel=sessionStorage.getItem('last_panel')||'welcome';
  if(lastPanel&&lastPanel!=='welcome'){
    navTo(lastPanel);
  }
  setTimeout(function(){
    const splash=document.getElementById('splash-screen');
    if(splash){splash.style.opacity='0';setTimeout(()=>splash.remove(),800);}
  },1200);
});

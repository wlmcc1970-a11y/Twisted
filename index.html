// Faction colour palettes — rich, distinct, premium
const FACTION_PALETTES={
  dickensians:{bg1:'rgba(50,10,6,.95)',bg2:'rgba(22,6,4,.98)',rim:'#C04030',glow:'rgba(200,60,40,.5)',accent:'#8B2820',sigC:'#E87060'},
  servants:   {bg1:'rgba(8,16,50,.95)',bg2:'rgba(4,8,28,.98)',rim:'#4070D0',glow:'rgba(60,100,210,.5)',accent:'#1A3A8B',sigC:'#80AAF0'},
  scions:     {bg1:'rgba(36,26,4,.95)',bg2:'rgba(18,12,2,.98)',rim:'#C09820',glow:'rgba(200,160,30,.5)',accent:'#7A6010',sigC:'#E8C040'},
  guild:      {bg1:'rgba(20,8,38,.95)',bg2:'rgba(10,4,22,.98)',rim:'#7840C0',glow:'rgba(120,60,200,.5)',accent:'#4A1880',sigC:'#B070E8'},
  default:    {bg1:'rgba(26,18,8,.95)',bg2:'rgba(14,10,4,.98)',rim:'#C9A84C',glow:'rgba(200,168,76,.4)',accent:'#8B6914',sigC:'#E8C97A'},
};

function getCharCrest(name,role,faction){
  const pal=FACTION_PALETTES[faction]||FACTION_PALETTES.default;
  const sigilFn=SIGILS[name];
  const shieldFn=SHIELDS[faction]||SHIELDS.scions;
  if(!sigilFn)return{bg:`linear-gradient(160deg,${pal.bg1},${pal.bg2})`,svg:''};
  return makeCrest(shieldFn,sigilFn,pal);
}

function charCard(c){
  const sk=Object.keys(c.stats);
  const faction=getFaction(c.name);
  const isFav=Store.get('fav_'+c.name,false);
  const crest=getCharCrest(c.name,c.role,faction);
  return`<div class="char-card" onclick='openChar(${JSON.stringify(c.name).replace(/'/g,"&#39;")})'>
    <div class="char-hero">
      <div class="char-hero-bg" style="--char-bg:${crest.bg}"></div>
      ${crest.svg}
      <div class="char-hero-overlay">
        <div class="char-name" translate="no">${c.name}</div>
        <div class="char-role" translate="no">${c.role}</div>
      </div>
      <div class="char-pts-badge">${c.pts}<span>pts</span></div>
      <button class="fav-btn${isFav?' fav-active':''}" onclick="event.stopPropagation();toggleFav('${c.name.replace(/'/g,"\\'")}',this)" title="${isFav?'Unfavourite':'Favourite'}">★</button>
      <button class="company-btn${isInCompany(c.name)?' in-company':''}" onclick="event.stopPropagation();toggleCompany('${c.name.replace(/'/g,"\\'")}',${c.pts},this)" title="${isInCompany(c.name)?'Remove from Company':'Add to Company'}" style="position:absolute;top:.35rem;left:2.6rem;background:transparent;border:none;font-size:1.15rem;cursor:pointer;color:${isInCompany(c.name)?'#5ddb8a':'rgba(255,255,255,.35)'};transition:color .25s,transform .2s,filter .25s;line-height:1;padding:.35rem;text-shadow:0 1px 4px rgba(0,0,0,.6);z-index:2">⊕</button>
    </div>
    <div class="char-stats">
      ${sk.map(k=>`<div class="stat-cell" translate="no"><span class="stat-lbl">${k}</span><span class="stat-val ${statClass(c.stats[k])}">${c.stats[k]}</span></div>`).join('')}
    </div>
    <div class="char-abilities">
      ${c.abilities.slice(0,3).map(a=>`<span class="ability-tag" translate="no">${a}</span>`).join('')}
      ${c.abilities.length>3?`<span class="ability-tag" style="opacity:.6">+${c.abilities.length-3} more</span>`:''}
      ${(c.schools||[]).map(s=>`<span class="ability-tag alc" translate="no">⚗ ${s}</span>`).join('')}
    </div>
  </div>`;
}

// ── ABILITIES DATA ────────────────────────────────────────
const ABILITIES=[
  {n:"Acrobatic",t:"Movement",d:"May re-roll any Fall Checks. May move through opposing Characters. May move through threatened areas with no Finesse Check."},
  {n:"Aid",t:"Action",d:"Aid allows the Character with this ability to assist allies in some manner. It is an Action to use the Aid ability and the card of the Character in question will give details of the exact effect the ability has. Examples — Overstuff: (B2B) +3 Armour for Haystack, reduces by 1 for each hit he suffers. Coffee: (B2B) May immediately Sober up Pascal or reduce level of Drunkenness by 1. Oil Can: (B2B) Increase Speed of Lackheart by 1, +2, reduces by 1 each Maintenance Phase. Here Boy: (12\") Toto may make a free Immediate Move Action towards Dorothy."},
  {n:"Aim",t:"Ranged",d:"Any Character with this ability may claim a +2 bonus on Ranged attacks should they not move before the shot takes place. An Aimed shot may only be taken once a turn and may not be combined with the Dual Fire ability."},
  {n:"Alchemantic Genius",t:"Special",d:"May freely select from all Invocations during game. Essences are counted as all Elements. May freely call in CC."},
  {n:"Alchemantic Proxy",t:"Ranged",d:"Characters with an Alchemantic Proxy can direct their Invocations through the nominated conduit. The relevant Character Card will specify any conditions that apply to this ability. Line of Sight and Range are calculated from the position of the Proxy."},
  {n:"Alchemantic Trap",t:"Active",d:"An Alchemantic Trap can be used to absorb the Essences used to power Invocations after they have been called. It is a free Action to do this but requires a successful Alchemancy Check with a Difficulty of 5 plus the Power of the Invocation plus the number of Essences to be absorbed. The target of the Invocation must be within line of sight of the holder of the Alchemantic Trap but the Alchemancer who calls the effect does not have to be. The use of the Alchemantic Trap is immediate upon the Invocation being successfully called and nullifies any effects the Invocation may have had if successful. The full number of Essences used to call the Invocation are added to the pool within the Trap and may be used as described on the relevant Character's card. An Invocation which fails to be called may not be absorbed in this manner. Any 'found' Essences may be fed into the Trap with no check required."},
  {n:"Alternate Fire",t:"Weapon",d:"A weapon with this property may be fired in a secondary mode rather quickly. The card of the Character in question will indicate what changes to the attack are made in terms of range and damage. Unlike the Ammunition Special Ability it is not an Action to change the firing mode of a weapon of this kind."},
  {n:"Ammo Carrier",t:"Action",d:"The Ammo Carrier ability allows a Character in base to base contact with the model that possesses it to swap the ammunition in his or her gun with one of the ammunition types noted on the card. This is considered part of a Ranged Attack Action and does not consume an Action on its own unlike the Ammunition ability. The types of ammunition available will be noted on the card of the Character who holds this ability. Unless otherwise noted the range of the weapon does not change, simply the damage and effect of the shot in question. You may not Dual Fire a weapon if a shot is affected by ammunition from a Character with this ability."},
  {n:"Ammunition",t:"Ranged",d:"A Character with this ability may take an Action to change the ammunition before his or her ranged weapon fires. The details of the various types of Ammunition carried are given on the relevant Character's card."},
  {n:"Amorphous",t:"Movement",d:"Amorphous Characters have bodies that are, or can become, shapeless blobs of semi solid matter. They may also be swarms of smaller creatures that form a kind of flowing mass. Their movement is not hampered by any terrain element 1\" high or less. They simply flow over or around it. In addition they are not affected by Difficult Terrain of any form and can simply move through it at their normal Speed. Characters with this ability can also climb terrain at full speed and need not make any kind of check to ascend. As usual they may not end their move partway up terrain. Their shapeless form also means they cannot be flanked or attacked from the rear and they have no 180° line of sight. They may attack in any direction at any time."},
  {n:"Arcing",t:"Weapon",d:"Weapons with the Arcing property fire bolts which can arc and hit Characters within 2\" of initial target. The user has some control over the arcing by careful timing of the shot but this is difficult and prone to accident. If the initial target of the attack is hit and takes at least 1 damage then the bolt may arc. Roll a D6: 1 — the bolt immediately arcs again hitting the next nearest target, friend or foe; 2-3 — the bolt doesn't arc; 4-6 — the bolt arcs to an opposing Character only. For each instance the bolt arcs you must roll a D6 as above to see what occurs. The arcing effect continues until any Character takes no damage from the attack."},
  {n:"Assault",t:"Ranged",d:"As part of a Charge Action a Character with this ability is able to make a single Ranged Attack against the target of the Charge. This attack is considered part of the move and does not require the use of a separate Action. The shot is resolved as normal, calculating range from the start of the Charge move. An additional -4 penalty applies to any penalties from the base range of the attack."},
  {n:"Aura of Death",t:"Combat",d:"Roll a D10 BEFORE the start of each Close Combat round for each foe in base to base contact with the Character and consult the table: 1-4 No Effect; 5-6 -1 to foe's Close Combat Characteristics; 7-8 -2 to foe's Close Combat Characteristics; 9-10 1D4 Immediate damage bypassing Armour. The effect is immediate and, with the exception of the damage result, only lasts for the current round of Close Combat. The effect must be re-rolled each round."},
  {n:"Authority",t:"Passive",d:"Having a Character with the Authority ability in your Company allows the player who controls the relevant Character to swap an allied Character next due to Activate with any other allied Character who has not yet Activated. This may only be done once a turn and resets in the Maintenance Phase."},
  {n:"Avatar",t:"Passive",d:"Characters with the Avatar ability are corporeal forms taken by otherworldly entities and rely on having followers or worshippers nearby to maintain their presence in our world. Each time a non-Insignificant ally is taken Out of Action the Avatar loses 1 point from a Characteristic of the player's choosing. This loss may be avoided if a Difficulty 30 Life Check can be made immediately after the ally is felled. An additional 2 points are lost for each full 25% loss of the overall points value of the Company. This loss cannot be avoided and Insignificant Characters count towards this calculation."},
  {n:"Awareness",t:"Passive",d:"Characters with this ability cannot be flanked. Their opponents receive no bonus for attacking from the rear. They may still be Outnumbered however."},
  {n:"Backstab",t:"Combat",d:"Characters with this ability cause an extra 2 damage should a Close Combat attack hit if attacking from outside the 180° line of sight arc of their opponent. This bonus is in addition to damage from charging or any other source."},
  {n:"Balanced Mind",t:"Active",d:"Once per turn, by using an Action a Character with Balanced Mind can treat any D20 rolled as an 11. This can be applied to any dice rolled during the Character's Activation and its use must be declared before any dice roll is made. For example if you are attacking you must declare you are using Balanced Mind before your opponent rolls."},
  {n:"Berserk",t:"Passive",d:"Characters with this ability will normally have one or more Characteristics that change when they become Berserk. These are noted on the Character Card. Also noted will be the circumstances under which the Character may become Berserk. Each instance is handled slightly differently so the Character Card will describe the effects more fully."},
  {n:"Blast",t:"Ranged",d:"A weapon with this property will use a template as defined in its rules when employed in a ranged attack. No roll to hit is necessary, simply place the template where desired and use the rules for template attacks. Any Character under the template is affected, even allies."},
  {n:"Bleed",t:"Weapon",d:"A Character who takes damage from a weapon with this property must make a Finesse check with a difficulty of 5 plus the final damage dealt. If failed, the target takes 2 damage in the Maintenance Phase of each turn until healing is applied. Any successful healing will cause Bleed to cease effect immediately. Additional instances of Bleed attacks do not increase the loss of Life but you may be made to bleed again if you have been previously healed from an earlier instance of this property. Bleed will not affect Characters with the Mechanical ability."},
  {n:"Blink",t:"Movement",d:"A Character who possesses Blink may take an immediate Move Action up to his or her Speed in any direction or elevation. This is not a physical move — the Character simply vanishes and reappears at the new point. The move may take the Character through intervening terrain or other obstructions. The number of times Blink may be used is indicated on the Character's card. Blink may be used to disengage from Close Combat without needing the usual Finesse Check. Should a Blink move take a Character into Close Combat a round of fighting takes place as normal but it is not considered a Charge."},
  {n:"Bow Out",t:"Action",d:"Characters who have this ability may make a special 1\" move as an Action that disengages them from Close Combat without the need for any opposed Finesse check. Further Actions may be taken, however the Character who has Bowed Out may not then Charge the same foe they disengaged from."},
  {n:"Bring 'em Down",t:"Combat",d:"On a Charge hit causing damage, target must pass Finesse check (Difficulty 10 + damage) or go Prone."},
  {n:"Burning",t:"Weapon",d:"Weapons with the Burning property bypass the armour of the target. Damage is done but the Armour of the target is not taken into account in the final total."},
  {n:"By The Engine's Will",t:"Weapon",d:"At the start of each mission choose a random Character from your opponent's Company. Launcelot receives a +2 on all attack rolls against that opponent. This bonus does not apply to damage caused."},
  {n:"C'mere Lads",t:"Passive",d:"Some Characters can call allies to their aid. This is normally an Action to perform and can generally only be used once a turn. The Difficulty and Characteristic used are given on the Character's card. Additional Characters summoned appear on the nearest table edge and Activate in the following turn."},
  {n:"Canopic Jar",t:"Special",d:"At the start of their Activation a Character who has the Canopic Jar ability may try and Access the spirit housed in the Canopic Jar. It is not an Action to try and Access the spirit contained in the Canopic Jar. Draw the top card from the Canopic Deck and consult the Access details shown thereon. Roll a D20 and add the relevant Characteristic. If the resulting figure is equal to or better than the Difficulty on the card then the Canopic Jar has been successfully Accessed and all changes to Characteristics apply immediately. Once a Canopic Card is drawn you may not discard it without attempting to Access the jar. Should you fail to Access the jar, it is placed back in the Canopic Deck and the deck is shuffled. You may not attempt to Access the Canopic Jar more than once a turn. Should your roll be a 1 or a 20 there are further effects — see Being Overcome and Subduing a Canopic Jar."},
  {n:"Catch",t:"Combat",d:"Weapons or Characters who have the Catch ability can draw opponents into base to base contact from up to 2\" away. It is an Action to use the Catch ability and the target is immediately moved into base to base contact with the Character using this ability by the shortest possible route. This engages the affected Character in Close Combat with the Character who has the Catch ability. This can pull a Character out of Close Combat with another Character or move them about if in a large melee."},
  {n:"Challenge",t:"Action",d:"As an Action a Character may issue a Challenge to an opposing Character within 6\". An Opposed Strength check is made. If the Challenger wins, the foe must immediately make a single Move Action towards the Challenger and attempt to enter Close Combat. The challenger must only attack the Challenged opponent. Effect ends in Maintenance Phase."},
  {n:"Chitinous",t:"Passive",d:"Characters with the Chitinous ability have armour or a hard shell that, whilst tough, can be broken. For every 5 points of Life lost in a single attack their Armour Characteristic is reduced by 1 for the rest of the game. Healing of the Character does not restore the lost Armour."},
  {n:"Clamber",t:"Movement",d:"+2 to Climb and Jump Checks, using whichever Characteristic is desired in the case of a Climb Check. May Climb at full Speed."},
  {n:"Cleave",t:"Weapon",d:"If the attack is 5 points or more higher than the Defence roll or a Critical Hit, roll a D4 and consult the table for additional effect: 1: -1 Strength, 2: -1 Finesse, 3: -1 Armour, 4: -1 Speed. Unmodified Life Check in the Maintenance Phase to clear all effects. A 1 on the D20 is always a failure of this check."},
  {n:"Commander",t:"Active",d:"May transfer Actions to allies within 12\". 1 Action only per ally. The Action is taken immediately it is transferred."},
  {n:"Confusion",t:"Weapon",d:"Any Character that takes Damage from this attack must make a Finesse check with a difficulty of 13 or be forced to move D4\" in a random direction immediately."},
  {n:"Consolidation",t:"Movement",d:"Characters with this ability may make a special move at the end of their activation. The distance and conditions are given on the Character's card. The Consolidating Character must end closer to an ally than when they began."},
  {n:"Cowl Form",t:"Passive",d:"If M'Dusa is reduced to Wounded state, all Characteristics change to bracketed values on her card. In this state she may not be healed except by Eye of The Engine Card. If in base contact with an opponent taken Out of Action, she regains 10 Life and can be healed normally."},
  {n:"Crushing",t:"Weapon",d:"An attack with the Crushing property inflicts an extra D4 damage to the target, bypassing armour, should the attacker expend an Action when the attack is made. This damage is applied separately to the initial damage from the attack and does not benefit from any enhancement the original attack may have been affected by."},
  {n:"Curiosity",t:"Passive",d:"May reroll Finesse Checks when interacting with objects or searching."},
  {n:"Curious Tinkerer",t:"Weapon",d:"Characters with this ability may re-roll Finesse checks when interacting with objects such as doors, chests or Tendrils of the Engine. May not re-roll Finesse to repair Mechanical allies, but takes a +4 bonus to that check instead. Successful repair heals an extra 2 damage."},
  {n:"Dead Eye",t:"Ranged",d:"The Dead Eye ability reduces the penalty for 'Erring on the side of caution' when firing into Close Combat from -4 to -2."},
  {n:"Determined",t:"Combat",d:"Should a Character with this ability take a foe Out of Action he or she may immediately make a single free Close Combat attack against a second foe who is also in base to base contact. Should this second foe also be taken Out of Action then an additional attack may be made should further opponents be in base to base contact. No movement may be taken between these attacks."},
  {n:"Dimension Step",t:"Movement",d:"As part of a Move Action may enter a doorway or window in any terrain element and immediately emerge from any door or window within 6\". This is not considered part of the Move. Three times per game."},
  {n:"Disorient",t:"Weapon",d:"If any damage is caused, the affected Character moves randomly until the end of their next Activation if any movement is taken. Use the Grenade Template to indicate the direction for each inch of movement. In addition the Character is -2 to Attack, Defence and Finesse until the next Maintenance Phase."},
  {n:"Disturbing",t:"Combat",d:"A Disturbing Character can cause his or her opponents to fight less effectively as they become shaken by the vile aura that surrounds them. When engaging a Character with the Disturbing ability in Close Combat make an opposed Life Check. Each Character rolls a D20 and adds his or her current Life. The higher result wins. Should this check fail then the attacker suffers a -2 to hit for the Close Combat Round at hand. This check is remade each time an attack is attempted against the Disturbing Character."},
  {n:"Diving Attack",t:"Combat",d:"A Character who possesses the Diving Attack ability may use a Flight Move to Charge into Close Combat. This move, unlike a normal Charge, need not be in a straight line, the momentum of the dive carrying much of the force. A Diving Attack gives the attacker bonuses of +2 to Hit and +1 on damage to all Close Combat attacks made in the turn but he or she suffers a -2 to their Close Combat Defence due to the furious nature of the attack."},
  {n:"Dodgy Grenades",t:"Passive",d:"When an Urkin throws a grenade roll D6 after determining where the grenade has landed. 1: Squib (no effect). 2: Smoke 4\" Template, clears in the Maintenance Phase 1 turn after thrown, blocks Line of Sight. 3: Pop! Splash Damage D6+5, Splash D6. 4-5: Bang! 2\" Blast Template D8+6 Damage. 6: Boom! 4\" Blast Template D10+6 Damage."},
  {n:"Drag",t:"Combat",d:"When a Character with Drag scores a hit in Close Combat, an opposed Strength check is made. If the Character attempting the Drag wins, he or she may use an Action to pull the target up to half his or her Speed in any direction. This can pull the target out of Close Combat with an ally and counts as a successful Disengage in this instance with no attack drawn from the ally."},
  {n:"Drain",t:"Weapon",d:"Drain is a Weapon Property that sucks the very life from the target. The effect of a Drain attack is normally to bypass armour but may vary depending on the Weapon — see the relevant character's card for details."},
  {n:"Drunkard",t:"Special",d:"At the start of Pascal's Activation you may drink (not an Action). Roll a D6 and consult the table on the Character Card. Mark off one Drunkenness box and add +1 to the D6 roll next time. On a 6: freely choose which Characteristic to increase (except Life). On 7+: add one extra level of Drunkenness and choose a Characteristic. You may only take one drink per turn. You may choose not to drink for a turn — this removes one level of Drunkenness and one Characteristic bonus of your choice. RED ZONE: Should the boxes marked in red be reached you must roll a D8 each time you take a Move Action. If the roll is less than the current level of Drunkenness the move becomes random — use the Grenade Template and roll direction separately for each inch of movement. Declare the distance before rolling. If the random move takes the Character into Close Combat, a round of fighting takes place immediately. Should the final Drunkenness box be reached, Pascal passes out: all Actions are lost for the turn, all Characteristics reset to normal and all Drunkenness is removed."},
  {n:"Dual Fire",t:"Weapon",d:"A Character who has a weapon with this property may fire two shots in rapid succession or two shots at the same time. When making this type of attack both shots are resolved as one attack roll using only a single Action. There is a -4 penalty to the Ranged Attack in addition to any penalties for range as usual. Should the shot hit home two lots of damage are rolled separately and the target's Armour is removed from each of the separate damage results. Any weapon is treated as Slow when dual firing which means you may not Dual Fire and then fire again in one Activation. You may not use one of Dr Disraeli's special bullets to affect a Dual Fire Ranged Attack. No Alternate Fire or special ammunition may be used."},
  {n:"Elemental",t:"Weapon",d:"Some Alchemancers can generate Alchemantic Bolts of energy that they can fire much like a weapon. You must choose the kind of elemental effect before making the attack. On a base D20 result of 15-20 on the attack roll one of the following effects is applied in addition to regular damage: Fire: +1D4 Damage bypassing Armour (only the bonus damage bypasses Armour). Earth: Target is treated as being Wounded until the next Maintenance Phase. Air: Target becomes a ghostly form and may not cause or receive damage from any physical attack until the next Maintenance Phase. Water: All dice rolls made by the target are reduced by 1 until the next Maintenance Phase. Not all Alchemancers or Weapons can use all of the elemental effects. The card of the Character in question will list which may be used."},
  {n:"Elementalist",t:"Alchemancy",d:"Alchemancers with this ability can swap Elemental Essences they hold for the Essences required to power certain types of Invocations. The type of Elements that can be generated in this manner are given on the specific Character's card. It is also possible that Characters with this ability may be able to spend more Essences when calling an Invocation to ensure it operates at the maximum of any variable value."},
  {n:"Engine Linked",t:"Alchemancy",d:"When an Engine Linked Character chooses to Tempt Fate he or she may draw a second card after having seen the first. This second card must then be taken regardless of the result. The first card is placed back in the Eye of The Engine deck as normal."},
  {n:"Entangle",t:"Weapon",d:"Any weapon or Character which has the Entangle property may, in the right circumstances, be able to hamper the movements of an opponent. If the base D20 attack roll is 15-20, and the attack hits, the attacker may choose to try and entangle the foe. Make an Opposed Finesse check. If the attacker wins the opponent is entangled and may not move or attack and all Defence rolls are at -2 if attacked. Entangled Characters must take an additional -2 penalty on any attempt to call an Alchemantic Invocation. If the weapon is a Close Combat weapon then the attacker may not move away from the Melee unless he or she chooses to end the Entangle effect. The entangled Character may attempt to break the effect using either Strength or Finesse against a Difficulty of 14. Ending the Entangle effect is not an Action."},
  {n:"Ethereal",t:"Weapon",d:"Close Combat attacks from a weapon with the Ethereal property ignore the Armour of the target. They may be Defended against as normal however."},
  {n:"Expendable",t:"Passive",d:"This ability allows any damage from a Close Combat attack directed at an ally who is in the same Melee as the Expendable Character to be taken by that Character. The Expendable Character must be in base to base contact with the Character whose damage is to be transferred. The attack is resolved as normal using the Combat Characteristics of the original target of the attack but damage is calculated using the Armour of the Expendable Character and he or she will suffer any damage. Whether or not this ability is to be used must be declared before the damage from the attack is rolled. The Expendable Character's card will note which allies may take advantage of this ability."},
  {n:"Eyebite",t:"Ranged",d:"Sowerberry’s gaze fell upon Nouveau. The Engine’s Servant felt an agonising pain tear through his body as part of his vitality was ripped away. Sowerberry’s Eyebite attack is a single Action to use just like any other ranged attack. It only has a range of 4” and requires no roll to hit and may not be defended against. It ignores the target’s Armour, ripping at their very soul."},
  {n:"Fairy Dust",t:"Active",d:"Four times per game. Provides the Flit Ability to any Character within 6\". Lasts current turn only. May be used on herself."},
  {n:"Familiar",t:"Special",d:"At any point during a Move, level with terrain, Donna can drop off her familiar. Line of Sight for Alchemancy can be drawn from its location. Familiar may move 4\" in Donna's Activation. Will immediately Move directly away if any foe gets within 3\". If attacked Familiar is Defence and Finesse 6. Should the attack hit it immediately returns to Donna."},
  {n:"Faulty",t:"Passive",d:"A mechanical Character with the Faulty ability is rusted, ill cared for or damaged in some way. Anytime a 1 is rolled on any D20 check this Character is required to make he or she seizes up briefly, ending their Activation immediately. Any attack which triggered this effect does not occur and no Defence Check is required. The attack is considered to have never taken place. Some other effects may nullify the Faulty ability for a time."},
  {n:"Fearsome",t:"Passive",d:"Opposed Life Check if Charged by this Character. Defender attacks at -2 until check is made. Recheck at the end of Defender's next Activation."},
  {n:"Flammable",t:"Passive",d:"Flammable characters are particularly vulnerable to fire based attacks or explosions as they catch fire easily. They take an additional D6 damage, bypassing armour, from any such attack. Blasts that are not explosive, such as the Cyclone Invocation, do not inflict additional damage."},
  {n:"Flight",t:"Movement",d:"The Flight ability allows a Character to expend two Actions to make a move that can carry him or her over intervening terrain or other Characters. The Ability has a number in brackets after it on the Character's Card. This is the multiplier for the Speed Characteristic that applies when making a Flight move. After making a Flight move the Character counts as running but must land at the end of the move. You may not end a Move Action in mid-air when flying. Additionally a Flight move may not carry the Character into Close Combat unless another ability allows it. Any effect that limits movement in any way also affects the use of the Flight ability."},
  {n:"Flit",t:"Movement",d:"As a single Action Characters that have the Flit ability may make a double speed move as a single Action. Characters who have this ability may Flit a number of times per game as shown on their Character Card. This move takes them airborne to some degree and they may move over intervening objects or Characters. Opposing Characters that are moved over do not require the usual opposed Finesse check for moving near to a foe. Characters with Flit can also fly up to land on nearby structures. Any move is measured including vertical distances using a straight line from the point of origin for the move. Characters with Flit may not end their move airborne nor can they Flit twice in a row without landing between the two actions."},
  {n:"Focussed Mind",t:"Special",d:"May freely call Invocations whilst in Close Combat. No penalty to Alchemancy Check. Uses 1 extra Essence of the Alchemancer's Choice appropriate to the Invocation."},
  {n:"Furious Charge",t:"Combat",d:"This ability must be combined with a Charge Action. The Charge range for this ability is increased to triple the Speed value of the Character. The Charge must still be in a straight line as normal. It also increases the bonus to the Close Combat Attack from +1 to +3, representing the ferocity of the attack."},
  {n:"Glide",t:"Movement",d:"A Character with the Glide ability may not run or charge, they simply float where they will. Characters with this ability cannot fall or jump. If the Character moves off the edge of any terrain element he or she glides down to the nearest solid surface. Measure movement including the vertical distance. The Character may continue with movement should any remain. If the vertical distance is greater than the Character's movement allowance then no further actions may be taken. Characters with Glide may move upwards at normal speed. No climb check is required. They may not end their move partway up any terrain element. They must always come to rest on a solid surface."},
  {n:"Grab",t:"Passive",d:"Under certain conditions, as listed on the relevant card, Characters with this ability can take firm hold of an opponent, keeping them in place and greatly reducing their ability to fight due to the bondage. Grabbed Characters are at -2 to Close Combat Attack and Defence and may not choose to Disengage. They also no longer count as a foe for the purposes of Flanking. To break free is an Opposed Strength Check as an Action."},
  {n:"Guard",t:"Passive",d:"Characters with this ability may not be flanked or outnumbered. An opponent still receives the +1 to hit if attacking from the rear during the initial round of combat however."},
  {n:"Hang On",t:"Passive",d:"As a free Action a Character with Hang On may grab onto another Character and be pulled along with them. This allows taking advantage of moves such as Flight, Leap, Flit and Alchemantic effects possessed by allies. It also negates special Move Abilities such as Bow Out, Retreat and Shifty — the Character moves with the foe if engaged in Close Combat with them. This can cause separation from a melee if the foe's movement takes them out of an existing fight. If a foe Disengages from a Character with Hang On, the Character can choose whether or not to follow."},
  {n:"Hard Target",t:"Passive",d:"If a Character with this ability is the target of a Ranged Attack after running then he or she may claim +2 on their Ranged Defence score in addition to the normal +1 for running. The Character is considered to have stopped running immediately that he or she spends an Action on anything other than movement or engages in Close Combat."},
  {n:"Heavy Hit",t:"Weapon",d:"If any damage is caused target is moved 1\" back immediately. If 10 or more damage is caused in a single turn the target is also Prone. May make a 1\" move to follow target."},
  {n:"Hunker Down",t:"Active",d:"As an Action Bastion can Hunker Down. Increases his Armour by 3 and gives a -2 penalty to Finesse checks to avoid blasts."},
  {n:"Hunter's Instinct",t:"Ranged",d:"This ability allows a Character to make a single Ranged Attack against an opponent who comes into line of sight. This attack occurs immediately the opportunity presents itself and may not be delayed. In addition there is a -2 penalty to the D20 roll, representing the swift nature of the shot. This attack uses an Action as normal and is counted against a Character's two Action Activation should they Activate later in the turn. If the Character has Activated earlier in the turn and has no Actions left then a shot may not be taken."},
  {n:"Hunting",t:"Weapon",d:"A Character who wields a weapon with this Ability may engage in Close Combat from a distance. The relevant Character's card will give details of the Ability but in essence he or she may make Close Combat attacks at some distance from the foe. Whether or not this is an Action is also given on the Character's card. In all cases, however, the Character in question is not considered engaged in Close Combat and may move and act freely whilst the Hunting attacks take place. Any Hunting attacks take place after the relevant Character has taken his or her two Actions for the turn or has declared that their Activation is complete. Characters attacked by a Hunting weapon are considered in Close Combat until the attack ends in some fashion. The Hunting weapon may disengage from Close Combat and return to its owner without the need for any check to leave the fight."},
  {n:"I Do Believe!",t:"Special",d:"Tinkerbelle may be healed by another allied Character within 6\" who makes a Finesse Check at 5 plus her current lost life. Heals Tinkerbelle of D4+1 wounds and causes 1 wound to the healer."},
  {n:"Impetuous",t:"Passive",d:"Must make a single free Move Action when a foe is taken Out of Action. Must end this move closer to an opponent than when the move was triggered. Take most direct route. May engage in Close Combat with an Impetuous move."},
  {n:"Inconspicuous",t:"Passive",d:"A Character with Inconspicuous may not be targeted with a ranged attack unless the attacker wins an opposed Finesse check. The attacker may choose a different target or engage in some other Action if the attempt fails. If the Character with this ability engages in any form of attack within line of sight of an opponent, or is engaged in Close Combat then the ability is nullified and he or she may be targeted as normal. Should the Inconspicuous Character leave the line of sight of all opponents then the ability is re-triggered."},
  {n:"Insignificant",t:"Passive",d:"A Character with this ability cannot achieve much on his or her own. Two of them are required to take or hold an objective in any mission that requires Characters to hold such things. In addition they are not always considered to be of significance to the objectives of their foes unless two of them are involved. See mission descriptions for more guidelines on how Insignificant affects the battle at hand."},
  {n:"Insubstantial",t:"Passive",d:"Characters with this ability may move through terrain as long as they can clear it in a single move Action. They must have sufficient movement to end their move with their entire base clear of the terrain. Deeper terrain may not be moved through. In addition Characters with the Insubstantial ability have no Wounded state and will fight as effectively as if they were unwounded until taken Out of Action."},
  {n:"Interference",t:"Combat",d:"When in Close Combat with a Character who has this ability an Opposed Finesse check must be made each round of Combat. If the check is won by the Character with Interference then the opponent is at -2 to their Attack or Defence depending on which is appropriate."},
  {n:"Interference (Falcon)",t:"Special",d:"When not out hunting or engaging a foe Horace's Falcon circles about its owner, striking at vulnerable points and generally being a nuisance and distraction for those that attack him. When in Close Combat with a Character who has this ability an Opposed Finesse check must be made each round of Combat. If the check is won by the Character with Interference then the opponent is at -2 to their Attack or Defence depending on which is appropriate. Check each round. May not use if Falcon is Hunting."},
  {n:"Keen Observer",t:"Action",d:"The Keen Observer ability allows the Character who holds it to expend a single Action to gain valuable intelligence about the actions of their foes. Use of this ability allows a player to select a single card that is currently held face down by their opponent and look at it. This includes Character Activation and Eye of The Engine Cards. It does not, however, include Tarot of Taxing Tasks cards."},
  {n:"Knockback",t:"Weapon",d:"Any Close Combat Attack from a Character with this ability that causes 6 or more final damage after Armour is subtracted may knock the foe back D4\". The direction of the Knockback is chosen by the attacker but must be within the 180° line of sight arc. This must be nominated before the distance is measured. If the unfortunate Character that is knocked back hits any terrain element D4 damage is taken, bypassing armour, and he or she is also considered prone. He or she may also be knocked off the edge of terrain elements which initiates a fall. You may choose not to Knockback your foe should you wish."},
  {n:"Lamplight",t:"Action",d:"Lamplight may be both used as an attack by spending an Action or it may be used in a passive manner. As an Action Nightingale may attempt to dazzle a foe. This effect has a range of 9\" and there is no roll to hit. Make an Opposed Finesse check. If target loses they may not make ranged attacks until after the next Maintenance Phase. The passive version of Lamplight allows Nightingale and Characters within 1\" of her to ignore effects that block line of sight or prevent ranged attacks. This does not include physical barriers such as terrain or other Characters."},
  {n:"Latch On",t:"Combat",d:"When a Character is hit in Close Combat by a foe with the Latch On ability an opposed Finesse check is made. Should the attacker win this check then he or she has latched on and has a very firm grip on some part of the defender's body. This reduces the defender's Speed by 2 and, in addition, should the defender move the attacker moves with them, maintaining the grip. The defender takes 1D4 damage, bypassing armour, in each subsequent Activation of the attacker. The grip can be broken with a successful opposed Strength check by spending 2 Actions. Latch On negates any ability that allows a Character to leave Close Combat freely such as Bow Out or Retreat. A Character who has Latched On may choose to let go at any time. This is not an Action."},
  {n:"Leap",t:"Movement",d:"A Character who has the Leap Ability may, once per turn, make a long and agile jump. This is a single Action and allows the Character to move up to his or her Speed Characteristic in any direction, including upwards. The move may take the Character over intervening terrain or other Characters if sufficient distance and height can be covered. No checks are required for landing or climbing when using the Leap ability. A Leap move may take the Character into Close Combat in which case it counts as a Leap attack gaining the extra +1 to hit this confers as opposed to a regular Charge. In the event that a move Action is unwilling, by whatever source, including Impetuous, the Leap Ability may not be used."},
  {n:"Lecture",t:"Action",d:"As a single Action the Gentlefolk Teacher may Lecture another Character within 6\" of her. Make an Opposed D20 check adding the current Life of both the Teacher and the unfortunate soul who has earned her ire. Should the Gentlefolk Teacher win this roll the target of her tirade loses all Actions for the turn. This effect lasts until the next Maintenance Phase."},
  {n:"Light Trigger",t:"Weapon",d:"Free shot at -4 as part of a Run or Jump Action. May not be combined with Dual Fire. May not be combined with a Charge Move."},
  {n:"Linked Finesse",t:"Passive",d:"Linked Finesse allows a Character to Interact with objects such as doors, chests or Engine Nodes from up to 6\" away. The number of Actions required to interact is determined by the object at hand. This is normally a single Action but some complex devices may require more Actions to be spent. There is no movement required, simply make the checks as though the Character making them was standing adjacent to the relevant object. Should an opposing Character be in contact with the object in question then the check is made with a -4 penalty."},
  {n:"Loyal",t:"Passive",d:"A Loyal Character must always move to assist the object of their Loyalty if he or she is engaged in Close Combat. The relevant Character's card will note to whom the Loyalty is owed. This movement does not occur if the Loyal Character is already in Close Combat. If the Loyal Character cannot reach the object of his or her loyalty in a single Activation they will continue to move towards them in subsequent Activations until contact is made or the Close Combat that triggered the ability has ended."},
  {n:"Lucky",t:"Passive",d:"When a Character with the Lucky ability fails any D20 roll by 5 or less than was required to succeed then he or she may take an immediate re-roll of the D20. The results of this new roll must be taken. You may not re-roll any dice that has already been re-rolled when you use the Lucky ability."},
  {n:"Lumber",t:"Movement",d:"The Lumber ability must be combined with a Move or Charge Action. It is a difficulty 13 Strength check to move through an opposing Character. The difficulty becomes 17 if model is large (on a 40mm base). Should the check succeed the opponent is scattered 1\" using the grenade template for direction and the Character with the Lumber ability may continue with his or her move. If the check is failed then the Character attempting the Lumber move stops and is engaged in Close Combat with the Character he or she attempted to move through."},
  {n:"Lurk",t:"Action",d:"As a single Action a Character with this ability may hide in the shadows or a convenient niche and cannot be targeted with a ranged attack at a range any greater than 3 inches away. Attacks from within 3 inches suffer no penalty however. In order to Lurk a Character with this ability must be within 1\" of any terrain element on the table. The Lurk counter stays in play until the Character spends an Action on anything other than Lurking. If a Character who Lurked in a previous turn takes no Action he or she is still considered to be Lurking."},
  {n:"Mastery",t:"Alchemancy",d:"A Character who possesses the Mastery ability may use Actions to swap one or all of the Alchemantic Invocations they have taken for the game at hand for any other he or she may normally be able to call. The selection must obey all the usual rules for selecting Invocations at the start of the game. It is a single Action to swap one Invocation but, by using both Actions for the turn the Character may swap out all Invocations. In addition the Character may attempt to break any Invocation that affects them immediately before its effects come into play. This does not include Invocations that have no Breaking value given on their card. Should this attempt fail the Character may try to break the invocation in the Maintenance Phase as normal."},
  {n:"Mechanical",t:"Passive",d:"Characters with this ability may not be healed by Alchemantic Invocations unless the Invocation specifies otherwise. They may be repaired by allies who spend 2 Actions whilst in base to base contact with the Character in question. This is a Finesse check with a Difficulty of 7 plus the current life lost. Mechanical Characters may not heal themselves. A successful check will repair D4+2 damage. Eye of The Engine and Tempt Fate cards will repair Mechanical Characters should they be played upon them. Any Mechanical Character who is taken Out of Action may not be repaired. Characters who have this ability are not affected by the Bleed Weapon Property."},
  {n:"Miasma",t:"Action",d:"Miasma allows a Character to generate an area of vile air or a cloud of foul substance. It is 1 Action and generates a blast template touching the base of the Character. Any Character fully under the template must make an Opposed Life Check or be treated as Wounded, suffering -2 to all Characteristics except Armour. Characters partially under the template may make the usual Finesse Check to avoid its effects. Characters affected may make a Difficulty 15 Strength or Finesse Check to recover in the Maintenance Phase."},
  {n:"Multi Fire",t:"Weapon",d:"As a single Action may fire both weapons. Same or different targets. Weapons are Slow if fired in this manner. All targets get chance to avoid templates. Covered: Diff 15, Partial Diff 12. Direct attacks at -2."},
  {n:"Multi Strike",t:"Combat",d:"Characters who have Multi Strike may attack twice in Close Combat. If the Character has more than one type of Close Combat Weapon then each attack is considered to be with a different weapon. The two attacks may be divided between two opponents or both attacks may be directed at the same foe. In either case each attack is resolved separately including individual Attack and Defence rolls."},
  {n:"Multi-Talented",t:"Special",d:"8 Characteristic points to distribute at start of game. No more than 2 to any one Characteristic. Once selected may not change."},
  {n:"Murderous",t:"Combat",d:"If a Character with the Murderous ability manages to achieve a Critical Hit then an additional D6 damage is caused."},
  {n:"Mutagenic",t:"Special",d:"Duviel has a pool of a total of 12 points to add to his Characteristics. No Characteristic may change by more than 2 a turn to a maximum of 8. Note distribution at start of game. May redistribute in Maintenance Phase for free."},
  {n:"Mystical",t:"Weapon",d:"Mystical attacks ignore cover from all sources. May fire into CC at no penalty."},
  {n:"Nimble",t:"Passive",d:"Those who possess the Nimble ability may re-roll Finesse checks to avoid effects that use a template such as grenades or certain Alchemantic Invocations. The result of the second roll must then be taken unless you have Favour of The Engine in which case The Engine's Blessing may be used."},
  {n:"Oooo - Ladies!",t:"Special",d:"After Pigsty has Activated he must make a single free Move Action towards any female foe in line of sight. Use closest Character if multiple choices are available. Does not start Close Combat. Does not apply if he is in Close Combat."},
  {n:"Opportunity Fire",t:"Ranged",d:"This ability allows a Character to make a ranged attack in any direction without expending a Move Action to turn around. The model representing the Character does not change position and remains facing the direction he or she did before the shot was taken."},
  {n:"Overcharge Edison",t:"Action",d:"As an Action Tesla can choose to Overcharge Edison, his powered suit. Once activated it is also an Action to return the suit to normal power which he may do at any time unless the suit has Overloaded. Once Overcharged the Characteristics marked in brackets on Tesla's Character Card are used. Whilst Edison is in the Overcharged state any roll of 1 or 2 on a D20 roll of any kind will cause the suit to go into Overload. All Characters within 2\" of Tesla take D4 damage bypassing armour when Tesla Activates as the powered drive sends out arcing bolts of uncontrolled plasma. If Edison is not deactivated in 2 turns the suit explodes causing D10+10 damage to Tesla with splash damage of D10+2 to any Character in base to base contact. Armour protects against these damage rolls."},
  {n:"Overload",t:"Special",d:"Tesla may overcharge Edison. Replace normal Characteristics with bracketed values. At the end of each Activation roll a D20. On a 1, Edison shuts down — revert to normal stats and lose remaining Actions."},
  {n:"Overseer (Hounds of Set)",t:"Active",d:"The Overseer Ability allows the Character to issue Orders to Hounds of Set under his or her command. It is a single Action to give an Order to one Hound or, by expending both Actions for the turn, all Hounds are affected by the same Order. Only one Order can be given to any Character each turn. Orders take effect immediately they are given and interrupt the normal turn sequence. Orders expire in the Maintenance Phase of the turn and must be given anew each Activation. The exact effect of the Orders is given on the relevant Character's Card."},
  {n:"Pain",t:"Weapon",d:"Any Character that takes any damage from a weapon with the Pain property must make a Strength check with a Difficulty of 5 plus the final damage dealt or be Stunned."},
  {n:"Passing Strike",t:"Combat",d:"In order to perform a Passing Strike a Character with this ability must attempt to move past a foe within 1\" of their base. This is still subject to the Threatened Area rule. However the Character with Passing Strike receives a +4 bonus on the opposed Finesse check. If this opposed check is won by the Character with Passing Strike he or she may make an immediate free Close Combat attack against the Character they are moving past. This is not an Action but is a free bonus attack. If the check is failed then the usual rules apply."},
  {n:"Penetrating",t:"Weapon",d:"When firing a weapon with this property you can nominate a target point on the table. Distance to that point becomes the range of the shot. The attack may penetrate through every model in its path. A separate Ranged Attack is rolled for each target minus the range penalty for the final point nominated. If any potential target is hit but takes no damage from the attack then the shot ends at that point. You may not use one of Dr Disraeli's special bullets to affect a Penetrating Ranged Attack. You can choose to fire normally, ignoring this weapon feature."},
  {n:"Pickpocket",t:"Passive",d:"To use the Pickpocket ability a Character must move into base to base contact with an opponent. Make an Opposed Finesse check and, should the pickpocket win he or she may take any single item of his choice that the opponent holds. This attempt is not an Action, much like a Close Combat attack. You may not steal equipment printed on a Character's Card. Immediately after stealing the item the Pickpocket may move away from the target of the theft should he or she have an Action left to do so. There is no Opposed Finesse roll to do this unlike a normal Close Combat disengagement. Should the initial Finesse check fail or the Pickpocket not move away then Close Combat is initiated. A Pickpocket will drop all stolen items he or she holds if any damage is taken."},
  {n:"Piercing",t:"Weapon",d:"Any attack with a weapon that has the Piercing property reduces the Armour Characteristic of the target by 2 if the unmodified D20 roll is 15-20."},
  {n:"Pinning",t:"Weapon",d:"A weapon with the Pinning property can render a target which it hits immobile. The target must be between the Character attacking and a piece of terrain and within 1\" of the terrain in question. Should any damage be taken from the attack the target must make a Finesse Check with a difficulty of 5 plus the final damage dealt or be pinned in place by the attack. The affected Character may not move or change facing until a successful Difficulty 12 Strength Check is made to pull free. When pulling free of the Pinning attack D4 damage is taken by the unfortunate Character which bypasses Armour."},
  {n:"Plough Through",t:"Movement",d:"Plough Through must be combined with a Charge Action. It allows the Character to move through opposing Characters and some terrain to reach their target. It is a difficulty 13 Strength check to move through an opposing Character (17 if large on a 40mm base). Moving through terrain requires a difficulty 15 Strength check. Should the Charging Character fail either check then movement is ended at the point of contact. Scatter terrain and foes that are successfully Ploughed Through are moved back D4\" using Grenade Template for direction. This ability may not be combined with Furious Charge."},
  {n:"Power Up",t:"Weapon",d:"May use Essences to power up shots. 1 Essence: D8+6 Range:7/9/12/16. 3 Essences: D10+6 Range:9/10/14/18. 6 Essences: D12+6 Range:10/11/16/20."},
  {n:"Precision",t:"Weapon",d:"Precision applies when an opponent is struck by a weapon with this property. If the Attack Score is 5 points or more higher than the Defence Score, then add 3 additional points to the damage caused."},
  {n:"Ramshackle",t:"Weapon",d:"When firing a Ramshackle gun if the base D20 roll is a 1 when attacking the weapon backfires. This causes double the normal amount of damage the weapon does to the shooter. Conversely if the opponent's Defence roll before modification is a 1 the damage from the attack is doubled. In both cases roll damage twice, don't simply double the damage from a single roll. Armour is subtracted from the overall doubled figure, not from each roll separately."},
  {n:"Razor Sharp",t:"Weapon",d:"A weapon with this property will cause a Critical Hit on a base D20 roll of 19 or 20."},
  {n:"Reach",t:"Combat",d:"Reach allows a Close Combat attack to be made from behind an ally who is already engaged in Close Combat. The Character with Reach must be in base to base contact with the ally. Neither the Character attacked in this manner or the attacker are considered engaged in Close Combat with each other however they are considered to be part of the same Melee. A Reach attack is not considered a Charge even if the initial contact with the intervening Character is the result of a Charge Move."},
  {n:"Reaction",t:"Passive",d:"The Reaction ability allows a Character to take a certain course of action in response to an event that happens on the table. The specifics of the Reaction ability, and the conditions that trigger it are given on the relevant Character's card. The Reaction must be used immediately when its triggering event occurs. Whether or not the Reaction is an Action or not is also given on the Character's card. Each instance of Reaction is different but regardless of this the ability may only be used in response to a specific event."},
  {n:"Reactive Call",t:"Alchemancy",d:"Alchemancers with this ability may reserve a single Action during their Activation to call an Alchemantic Invocation later in the turn. This may take place at any point during the turn, even during an opposing Character's Activation. It interrupts Actions taking place if necessary. Should the Alchemancy Check fail however the full allocation of Essences are removed from the Alchemancer's reserves rather than the half that is normal should an Invocation fail. The reserved Action resets in the Maintenance Phase of the turn should it not be used."},
  {n:"Rear Defence",t:"Passive",d:"If a Character with this ability is attacked from the rear he or she gets an immediate attack against the foe at -4 to the D20 roll. The Character who is the recipient of this special attack may Defend themselves normally. If the attack from Rear Defence does not take the foe Out of Action then the Close Combat proceeds as normal."},
  {n:"Regenerate",t:"Passive",d:"Each Maintenance Phase, after suffering some wounds, the Character rolls a D6. 1-2: No regeneration takes place. 3-4: 1 Life is healed. 5: 2 Life is healed. 6: 3 Life is healed. Should a Character with Regeneration be taken Out of Action then one final check may be made in the following Maintenance Phase. Should the roll be 6 then the Character remains on the table with the appropriate gain in life, although Prone."},
  {n:"Reinforce",t:"Passive",d:"When a Character with this ability is taken Out of Action but at least one other Character of the same general type with the ability remains on the table roll a D6 and consult the table printed on the relevant Character's card. An Urkin Slasher, for example, may reinforce if an Urkin Shooter remains on the table as they are both Urkin. This table will give you the number of reinforcing Characters that arrive and also give you any other options that may be applicable in regards to the type of Character that arrives."},
  {n:"Rend",t:"Weapon",d:"If a Character with this ability hits with a Close Combat Attack and the total Attack score is 5 points higher than the Defence score of their opponent then an additional D6 damage is caused as the attacker grabs hold, ripping and tearing at the defender."},
  {n:"Resilient",t:"Passive",d:"Characters with the Resilient ability can shrug off massive hits that would take others down. They are immune to Critical Hits, treating them as normal attacks. No Defence roll can be made as usual but the halving of Armour and any other effects are negated. In addition a Resilient Character will fight on until the Maintenance Phase of the turn if they are taken Out of Action. He or she is still treated as Wounded however if the card shows a Wounded state. Some weapons or effects may bypass Resilient."},
  {n:"Resist Element",t:"Passive",d:"Characters with this ability take less damage and are better able to break the effects of any Alchemantic Invocation or attack that is keyed to the Elemental Schools as listed on their card. The actual benefits vary from Character to Character but all Characters with this ability will take a certain amount less damage when subjected to an attack that causes direct harm to them. The damage reduction is taken into account before armour is removed from the total. They will also receive a bonus to the check to break an Alchemantic Invocation that is of the School as listed on their card."},
  {n:"Retreat",t:"Movement",d:"Characters with this ability may leave Close Combat as part of a Move Action with no need for a check of any kind. They may simply move away from their opponent. They may not re-enter Close Combat with, or otherwise attack the foe they have retreated from in the same turn. Other than that they are unrestricted in the Actions they may choose to undertake."},
  {n:"Run 'Em Down",t:"Combat",d:"If the Gamekeeper charges and causes damage, the target is knocked Prone. May make a free additional attack against the Prone target."},
  {n:"Run Through",t:"Combat",d:"Should a Character with this ability Charge and the base D20 attack roll be 15-20 he may elect to continue with his move after the initial attack and, if desired engage a second Character in Close Combat. There is no opposed Finesse check made to move past the initial foe even if the attack results in no damage. The second Character who is engaged is not considered to have been Charged however."},
  {n:"Scope",t:"Ranged",d:"By spending 2 Actions on a single shot a Character with this ability may reduce all penalties due to range by 2 points. This ability may not be combined with Dual Fire."},
  {n:"Scout",t:"Ranged",d:"A Character with this ability may fire his or her ranged weapon at any point during a Move Action. This attack still counts as an Action so, in effect the Move Action is interrupted by the use of a second Action but continues after the Ranged Attack is resolved."},
  {n:"Scything Attack",t:"Combat",d:"2 Actions to trigger. Single attack at -2 with Sharp Bits at all foes in base to base contact. Counts as CC attack for the turn. If single foe then attack twice."},
  {n:"Seeker Snakes",t:"Action",d:"As an Action M'Dusa may release a single Seeker Snake from her Cowl. Place a marker in contact with her base, representing the now independent Seeker. Seekers move during M'Dusa's Activation with a Speed of 4. They do not require an Action to be spent to move and are independent of M'Dusa's 2 Actions for the turn. Seeker Snakes may not run or attack in any way when independent of M'Dusa, nor may they assist in Close Combat to flank or outnumber an enemy. M'Dusa may only have one Seeker Snake free of her at any time. A Seeker can be destroyed by any successful attack against it. Seekers have a Defence of 3 in both Ranged and Close Combat but due to their small size always count as being Prone against ranged attacks when considering cover. Should a Seeker be destroyed M'Dusa generates a fresh one within her cowl and it must be released anew."},
  {n:"Servant of The Engine",t:"Passive",d:"Characters with the Servant of The Engine ability may draw two Eye of The Engine cards when Tempting Fate and choose which to apply. Additionally when a Company contains a Character with Servant of The Engine and they hold the Favour of The Engine a third Eye of The Engine card may be drawn at the start of each turn. This third card must be taken if drawn however."},
  {n:"Shatter",t:"Action",d:"This ability allows a Character who possesses it to spend 2 Actions in an attempt to Shatter an object. This gives a +6 bonus to a Finesse or Strength check to open any door, barrel or crate. If an object has wounds or an Armour score the Armour is halved and 3 damage is added to the total inflicted."},
  {n:"Shifty",t:"Movement",d:"If involved in a Melee where other members of his or her Company are present a Character with this ability is able to leave the combat without the need for an opposed Finesse check. Use of the Shifty ability prevents the Character who has left the Melee re-entering it during the same Activation in which he or she left the fight."},
  {n:"Sicken",t:"Weapon",d:"Finesse or Strength Check with Difficulty of 10 plus final damage dealt to avoid. -1 to all Characteristics except Armour. Ends at affected Character's Activation in the following turn."},
  {n:"Slow",t:"Ranged",d:"Weapons with this property may only fire once a turn. No Action is required to reload them, it is assumed that they are reloaded each turn."},
  {n:"Smoke",t:"Action",d:"Some Characters can make smoke in one form or another. This might be an ability they have or it may be a property of a weapon they carry. When Smoke is an ability the Character's card will note whether or not an Action is required to generate it. Where it is the property of a weapon the usual rules for using weapons of that type should be followed. Smoke is normally a template of one kind or another and the relevant Character Card will give you the type of template to be used. Smoke blocks line of sight when in place and Ranged Attacks may not be made through it. Smoke is generally static and clears in the next Maintenance Phase unless specified otherwise."},
  {n:"Snap Shot",t:"Ranged",d:"Characters with this ability can fire their ranged weapons whilst engaged in Close Combat. They suffer a -2 penalty to the shot and may not fire upon any Character that is in base to base contact with them."},
  {n:"Sniper",t:"Ranged",d:"Cover cannot be claimed from other Characters between the target of the Ranged attack and the attacker when a Character with this ability fires his or her gun. Cover may still be claimed from other physical terrain elements however."},
  {n:"Spotter (Agatha)",t:"Ranged",d:"The Spotter ability allows the Character who possesses it to act as a proxy for line of sight for another Character when making ranged attacks. Line of sight, including cover, is drawn from the Character with Spotter however range is calculated from the position of the Character taking the shot. The card of the Character will specify which of their allies may benefit from the ability."},
  {n:"Spring Attack",t:"Combat",d:"Spring Attack allows a Character who possesses it to reserve an Action during their Activation for use as a special Close Combat attack later in the turn. When the Action is reserved and any opposing Character moves within a radius equal to the Speed of the Character with Spring Attack then the attack is triggered. The Character with Spring Attack may take an immediate single Move Action to bring him or her into Close Combat with the foe. A single round of Close Combat is then fought. After this combat the attacker may then choose to move away, using a single Move Action, as though under the effects of the Retreat ability. The attacker does not have to leave Close Combat and may stay engaged if desired. The initial Move Action granted by Spring Attack must bring the Character into Close Combat and may not be used to move away or end up not engaged with any Character other than the one who triggered the ability."},
  {n:"Sprint",t:"Movement",d:"Characters with the Sprint ability may choose to add an extra D4+1\" to their total move when they run during their activation. This extra movement is added after all normal movement is taken and may not be taken if the relevant Character is in an area of Difficult terrain. Should the Sprint move take the Character into Difficult terrain the move will end at the edge of such an element. A Sprint move may not carry a Character into Close Combat."},
  {n:"Stand and Deliver",t:"Ranged",d:"Stand and Deliver allows a Character to take a single shot at any foe who attacks in Close Combat from within his or her 180° line of sight. This is not an Action and does not count against the Character's allotment of two Actions for the turn. This shot is taken at a -2 penalty but is assumed to take place at the edge of short range for the weapon in question should it become important to know where the attack took place. Stand and Deliver may not be combined with Dual Fire."},
  {n:"Stand Firm",t:"Action",d:"It is an Action for a Character with the Stand Firm ability to ready themselves. A Character who is Standing Firm reduces the range penalties for any ranged attack by 2. This can reduce the penalty to 0 but does not result in a bonus for short ranged attacks. Once activated he or she is considered Standing Firm until the Character chooses to move. Whilst Standing Firm a Character may not be repositioned by any effect with the exception of an Eye of The Engine or Tempt Fate card and is considered to fail any Finesse check that may be required to avoid blasts or other area effects."},
  {n:"Stealthy",t:"Passive",d:"If a Character with this ability uses no Action other than Movement for a turn and both starts and ends his or her Activation in cover then the following effects apply. The Character may not be targeted by a Ranged Attack at any further than short range and, should such an attack take place the bonus to Defence for Cover is increased from +2 to +4. This cannot be combined with the +1 bonus to Defence that Running provides. Weapons that have the Blast property or other forms of template attack ignore the Stealthy ability even if the Character has cover from the attacker. NOTE: If the Stealthy Character cannot claim cover from the Character who is firing at him or her the Stealthy ability does not apply and the shot is resolved normally."},
  {n:"Stern",t:"Passive",d:"When a Character with the Stern ability takes any damage roll a D20. Should this roll be lower than the current life of the Character then the total of the damage is reduced by 2. Current Life is calculated including the damage just taken. This can reduce damage from an attack to 0."},
  {n:"Stop It You Naughty Boy!",t:"Passive",d:"In order to engage the Gentlefolk Teacher in Close Combat an opponent must make a Strength check with a Difficulty equal to her current Life. Should the attacker fail this test then the Close Combat attack is not possible and the Activation of the Character in question ends immediately at the start of the move that would have lead to the Close Combat occurring. Should the Teacher initiate the Close Combat then no test is required for subsequent rounds of fighting and the opponent may attack normally."},
  {n:"Stun",t:"Weapon",d:"A weapon with this property has a chance to leave the target Stunned. If the final damage after Armour is subtracted is 6 or more, the target must make a Finesse Check with a Difficulty of 5 plus the damage dealt. If the check fails the target is stunned until the next Maintenance Phase."},
  {n:"Supernatural Speed",t:"Passive",d:"A Character who has this ability may re-roll Defence Rolls against Ranged Attacks. The result of the second roll must then be taken unless you have Favour of The Engine in which case The Engine's Blessing may be used."},
  {n:"Sure Footed",t:"Passive",d:"+4 on Finesse Checks to Climb, Jump or land safely from a fall. May re-roll failures but rerolls don't benefit from the +4 bonus. Re-roll must be taken."},
  {n:"Sweep",t:"Weapon",d:"Weapons with the Sweep property can be used to make an attack against all foes in base to base contact with the Character in question. It counts as a single Close Combat attack but the attack against each foe is resolved separately. For each opponent after the first the damage caused by the attack is reduced by 3, representing the force of the attack being dispersed. You may decide on which opponent to begin the attack but thereafter the attack proceeds in an anti clockwise direction around all foes. Should any target be hit and no damage be caused then the Sweep attack stops at that point. Additionally no ability that affects Close Combat attacks may be used to affect a Sweep attack however Eye of The Engine and Tempt Fate effects may be applied."},
  {n:"Swift",t:"Weapon",d:"A weapon with the Swift property entitles the bearer to a second Close Combat attack when Charging. This attack takes place immediately after the initial attack and is taken with a -4 penalty on the D20 roll. Any other attacks, from whatever source, take place after the Swift attack is resolved."},
  {n:"Swift Step",t:"Action",d:"A Character who has this ability may spend an Action to move around an opposing Character with whom they are in Close Combat. They may move to any free area around the opponent but may not break base to base contact, nor may he or she move through any other Character engaged in the melee. If the Character is in base to base contact with two opponents he or she may move to a point around the base of either opponent, breaking contact with one or the other as desired."},
  {n:"Take Wing",t:"Movement",d:"As a Move Action may fly. Add number as shown to Speed for each Action. May move over terrain or foes if high enough. Include vertical movement in distance. May Run in this mode. May not engage in Close Combat whilst Flying. May remain in flight at end of move. Mark elevation with dice. Range includes vertical distance."},
  {n:"Taser",t:"Weapon",d:"Weapons that have this property can deliver a massive jolt when they strike. The unfortunate target must make a Finesse check with a Difficulty of 5 plus the final damage dealt after Armour is accounted for. Failure renders the target Incapacitated until the next Maintenance Phase. Any weapon with this property is treated as Slow when firing in this manner. The weapon may be fired normally, ignoring the Taser property and in that case the Slow property does not apply."},
  {n:"Terror",t:"Passive",d:"When a Character who possesses the Terror ability takes an opponent Out of Action any ally of that fallen Character with line of sight may take fright. Make an opposed Life Check using the current Life of the Character with the Terror ability and the current Life of the Character who views the event. Make a separate check for each Character who has line of sight. Should this check fail then the affected Character will take an immediate Move Action away from the Character with the Terror ability. If a Character with line of sight is engaged in Close Combat when the Terror effect is triggered they are unaffected."},
  {n:"Threaten",t:"Action",d:"As an Action a Character with this ability may attempt to Threaten an opponent. The range of this ability is noted on the relevant Character's Card. Make an Opposed Strength check and if the target of the threat loses he or she must immediately make a run move, fleeing directly away from the Threatening Character. This does not count towards the affected Character's allotment of two Actions for the turn. Characters do not flee off the table but will stop at a table edge."},
  {n:"Thrust",t:"Action",d:"Weapons with the Thrust property can be used to generate a blast of elemental energy that is capable of forcing foes backwards. It is an Action to use Thrust but no attack roll is required. As long as the opponent is within the range printed on the Character's Card the Thrust attack hits. Make an Opposed Finesse check, if the attacker wins the defender is moved D4 inches in a direction chosen by the attacker. The movement must be away from the attacker. Characters affected by a Thrust stop at any terrain over 1\" in height."},
  {n:"Thundering Charge",t:"Weapon",d:"If a Character with this ability Charges into Close Combat and hits an additional D4 damage is caused for the initial round of Close Combat only. In addition the defender must make a Finesse check at a difficulty of 5 plus final damage dealt or be knocked prone. Large Characters on a 40mm base may take a +4 bonus to this check."},
  {n:"Time Shift",t:"Active",d:"Four times a game. Allows a Character within 6\" to retake a single Action. The initial Action is cancelled immediately. The Action retaken may not be the same as the previous one."},
  {n:"Timestop",t:"Weapon",d:"Any target that takes any damage from Sowerberry's Eyebite attack must roll a Finesse check with a Difficulty of 10 plus the damage dealt or become Incapacitated until the next Maintenance Phase as their soul is temporarily pulled into the realm of death."},
  {n:"Tough",t:"Passive",d:"Damage caused is reduced by D4 points for each attack against a Character with this ability. This can reduce damage to 0. Attacks that cause two separate lots of damage in a single attack such as Dual Fire lose a D4 damage from each of the damage rolls. Any other form of bonus damage is unaffected."},
  {n:"Transform",t:"Action",d:"As a single Action a Character with this ability may attempt to transform into an alternate form. The Difficulty of the check required and the Characteristic which affects the roll will be detailed on the relevant Character's card. There may also be other circumstances under which the Transformation may occur. These are also detailed on the card of the Character in question. When a Character Transforms replace the miniature of the Character with the alternate form."},
  {n:"Trapsetter",t:"Action",d:"Spend an Action to place a hidden trap within 2\". Enemy moving within 1\" triggers it. Effect noted on Character Card."},
  {n:"Turbo",t:"Movement",d:"Add D6\" to double Take Wing Move. Must be a straight line from start of final Move Action. May not stop mid Turbo move."},
  {n:"Unstable",t:"Passive",d:"A transformed Character may revert. At start of each Activation, roll D10: on 1-2, reverts to original form for this Activation."},
  {n:"Unthinking",t:"Ranged",d:"Cannot use Ranged weapons. Must always attempt to move into Close Combat. Immune to Challenge and Threaten."},
  {n:"Venom",t:"Weapon",d:"When any damage is taken from a weapon with this property a Strength check is required to avoid becoming poisoned. The Difficulty of this check and the effects of the venom are given on the Character Card or in the full rules for the Character in question. A poisoned Character may not be poisoned again whilst affected."},
  {n:"Vent",t:"Weapon",d:"Uses 9\" Cone Template. D8+2 Damage caused. Weapon is Slow when fired in this manner."},
  {n:"Vicious",t:"Combat",d:"If a foe is brought to the Wounded state by a Close Combat attack may make an Immediate second Attack."},
  {n:"Voodoo",t:"Action",d:"It is a single Action for a Character with this ability to bring it into effect. The ability has a range of 10\" and no roll to hit is required. Make an opposed Finesse check. If the Character with Voodoo wins then the target is -1 to any one Characteristic as chosen by the Character bringing the effect into play. Any loss of ability lasts until the next Maintenance Phase."},
  {n:"Wallop",t:"Weapon",d:"Weapons that have the Wallop feature may be used to Stun foes rather than harm them. When a hit is scored with such a weapon then, before the damage is rolled, you must decide whether to try and cause actual harm or stun your target. If you choose to cause normal damage then the attack proceeds as usual. Should you choose to try and Stun the foe then roll damage, adding Strength as usual but no damage is caused. Instead your opponent must make either a Strength or Finesse check, whichever is better, against a Difficulty equal to the overall damage caused. Armour is not taken into account."},
  {n:"Wands",t:"Action",d:"At the start of a game of Twisted a Character with this ability may take a number of Alchemantic Invocations equal to the number of Wands indicated on his or her card. In some cases these are randomly generated and in some cases the Character may choose the Invocations much like an Alchemancer does. Once a Wand is used the Invocation that was associated with it is discarded and may not be used again. The Alchemancy Characteristic relevant to this ability will be noted on the Character's card. Using a Wand is an Action and all usual Alchemancy rules apply. No Elemental Essences are required to use a Wand."},
  {n:"Wheeled",t:"Movement",d:"A Character noted as being Wheeled may not climb but may use stairs or jump as normal. He or she may leap up a short distance given sufficient run up and an elevation of 3\" may be achieved if the jump is part of a run or charge."},
  {n:"Witch Hunter",t:"Combat",d:"Characters with this ability are at +2 on all attacks against opponents with an Alchemancy Characteristic of more than 0 and that have at least 1 Elemental Essence available to them in normal circumstances. In addition an Alchemancer loses Elemental Essences equal to half the final damage dealt after Armour is subtracted from any damage caused. This is rounded down so 5 damage translates into the loss of 2 Elemental Essences. The affected Alchemancer may choose which Essences are lost."},
  {n:"Wrench",t:"Weapon",d:"Use Str Characteristic in brackets when making a Str Check to open doors or interact with objects. Twice per game may use adjusted Str in Close Combat."}
];

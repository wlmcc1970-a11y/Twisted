function ctKey(name,field){return'ct_'+name.replace(/[^a-z0-9]/gi,'_')+'_'+field;}

function openCombatTracker(name){
  const charData=Object.values(CHARS).flat().find(x=>x.name===name);
  if(!charData){showToast('Character not found');return;}
  const faction=getFaction(name);
  const crest=getCharCrest(name,charData.role,faction);
  const pal=FACTION_PALETTES[faction]||FACTION_PALETTES.default;
  const maxLife=parseInt(String(charData.stats['LIFE']||0).split('/')[0])||1;
  const woundedAt=Math.ceil(maxLife/2);

  const CONDITIONS=['Stunned','Prone','Bleed','Entangled','Pinned','Dominated','On Fire','Poisoned'];
  const statKeys=['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM','ALC','LIFE'];
  const activeStats=statKeys.filter(k=>charData.stats[k]!==undefined);
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const nameEsc=name.replace(/'/g,"\\'");

  const state=CombatState.getOrInit(name,maxLife);

  const COND_PENALTIES={
    'Prone':{'CC ATT':-2,'CC DEF':-2},
    'Entangled':{'CC ATT':-2,'CC DEF':-2},
    'Pinned':{},'Dominated':{},'Stunned':{},'Bleed':{},
    'On Fire':{'FIN':-2},
    'Poisoned':{'STR':-2,'FIN':-2},
  };

  function lifeState(lv){
    if(lv<=0)return'ooa';
    if(lv<=woundedAt)return'wounded';
    return'ok';
  }

  function getEffectivePenalties(st,curConds){
    const pen={};
    if(st==='wounded'||st==='ooa'){
      ['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ALC'].forEach(k=>{pen[k]=(pen[k]||0)-2;});
    }
    curConds.forEach(cond=>{
      const cp=COND_PENALTIES[cond]||{};
      Object.entries(cp).forEach(([stat,val])=>{pen[stat]=(pen[stat]||0)+val;});
    });
    return pen;
  }

  function getEffStat(k,pen){
    const raw=charData.stats[k];
    if(raw===undefined)return{html:'',eff:0};
    const baseNum=parseInt(String(raw).split('/')[0])||0;
    const penalty=pen[k];
    if(penalty===undefined)return{html:`<span class="ct-stat-val">${raw}</span>`,eff:baseNum};
    const adj=baseNum+penalty;
    return{html:`<span class="ct-stat-val debuffed" title="${k}: ${baseNum} (${penalty>0?'+':''}${penalty})">${adj}</span>`,eff:adj};
  }

  function getPenaltyNote(st,curConds){
    const parts=[];
    if(st==='wounded') parts.push('Wounded −2 all');
    if(st==='ooa') parts.push('Out of Action');
    curConds.forEach(cond=>{
      const cp=COND_PENALTIES[cond]||{};
      if(Object.keys(cp).length>0){
        parts.push(cond+': '+Object.entries(cp).map(([s,v])=>s+' '+v).join(', '));
      }
    });
    return parts.length?`<div style="font-family:'Josefin Sans',sans-serif;font-size:.68rem;color:var(--rust-light);margin-top:.35rem;line-height:1.5">${parts.join(' · ')}</div>`:'';
  }

  function parseWeapons(){
    const raw=charData.weapons||'';
    if(!raw) return[];
    return raw.split('·').map(w=>w.trim()).filter(Boolean).map(w=>{
      const m=w.match(/^(.+?)\s+(D\d+[^(]*?)\s*(?:\(([^)]+)\))?$/);
      if(m) return{name:m[1].trim(),dmg:m[2].trim(),tags:(m[3]||'').split(',').map(t=>t.trim()).filter(Boolean)};
      return{name:w,dmg:'',tags:[]};
    });
  }
  const weapons=parseWeapons();
  const dangerTags=['Bleed','Penetrating','Stun','Pain','Poison','Fire','Razor Sharp','Explosive','Tornado','Sever'];
  const specialTags=['Ethereal','Slow','Free','Ranged','Time','Arc','Piercing','AoE','Blast'];

  function getMaintItems(st,curConds){
    const items=[{id:'activation',label:'Reset Action pips — new Activation begins'}];
    if(curConds.includes('Bleed')) items.push({id:'bleed',label:'Bleed: lose D4 Life · Diff 12 FIN to clear'});
    if(curConds.includes('On Fire')) items.push({id:'onfire',label:'On Fire: lose D4 Life · Diff 12 FIN to extinguish'});
    if(curConds.includes('Stunned')) items.push({id:'stun',label:'Stunned clears at end of Maintenance'});
    if(st==='wounded') items.push({id:'wound_note',label:'Wounded: all stats −2 (except Life & ARM)'});
    if(charData.abilities&&charData.abilities.some(a=>/regen/i.test(a)))

    return items;

    const s=CombatState.get(name);

    ${charData.schools?`<div class="ct-section">
      <div class="ct-section-title">🔮 Alchemancy Schools</div>
      <div style="margin-bottom:.65rem">${charData.schools.map(s=>`<button class="ct-school-btn" onclick="ctToggleSchool('${nameEsc}','${s}',this)">⚗ ${s}</button>`).join('')}</div>
      <div id="ct-invocs-${sKey}" style="font-family:'IM Fell English',serif;font-size:.85rem;color:var(--brass-dark);text-align:center;padding:.5rem">Tap a school to see its invocations</div>
    </div>`:''}

    <div class="ct-section" id="ct-maint-section-${sKey}">
      <div class="ct-section-title">🔧 Maintenance Checklist</div>
      ${maintItems.map(item=>{
        const done=curMaint.includes(item.id);
        return`<div class="ct-maint-item${done?' done':''}" id="ctm-${sKey}-${item.id}" onclick="ctToggleMaint('${nameEsc}','${item.id}')"><div class="ct-maint-check">${done?'✓':''}</div><div class="ct-maint-text">${item.label}</div></div>`;
      }).join('')}
      <button onclick="ctClearMaint('${nameEsc}')" style="background:transparent;border:1px solid rgba(201,168,76,.18);color:var(--brass-dark);font-family:'Josefin Sans',sans-serif;font-size:.68rem;padding:.22rem .6rem;border-radius:4px;cursor:pointer;margin-top:.3rem;transition:all .2s">↺ Reset checklist</button>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">📝 Battle Notes</div>
      <textarea class="ct-notes" placeholder="Objectives, enemy conditions, VP scored, special orders…" oninput="ctSaveNotes('${nameEsc}',this.value)" aria-label="Battle notes">${curNotes}</textarea>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;gap:.5rem;flex-wrap:wrap">
      <button class="ct-reset-btn" onclick="ctReset('${nameEsc}',${maxLife})">↺ Reset All</button>
      <button onclick="openChar('${nameEsc}');closeCombatTracker()" style="background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--brass-light);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.38rem .85rem;border-radius:5px;cursor:pointer;transition:all .2s">👤 Full Character Card</button>
    </div>
    `;
  }

  window._ctUpdaters=window._ctUpdaters||{};
  window._ctUpdaters[name]={updateLifeSection,updateCondsSection,updateActionsSection,updateStatsSection,updateUndoBtn};
  window._ctBuilders=window._ctBuilders||{};
  window._ctBuilders[name]=buildContent;
  document.getElementById('ct-content').innerHTML=buildContent();
  document.getElementById('combat-modal').classList.add('open');
}

function ctAdjLife(name,delta,max){
  const s=CombatState.get(name);if(!s)return;
  CombatState.setField(name,'life',Math.max(0,Math.min(max,s.life+delta)));
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateLifeSection();
}
function ctStepLife(name,dir,max){
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const sel=document.getElementById('ct-step-sel-'+sKey);
  ctAdjLife(name,dir*(sel?parseInt(sel.value)||1:1),max);
}
function ctAdjRound(name,delta){
  const s=CombatState.get(name);if(!s)return;
  const next=Math.max(1,s.round+delta);
  CombatState.setField(name,'round',next,false);
  const el=document.getElementById('ctr-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.textContent=next;
}
function ctToggleAction(name,idx){
  const s=CombatState.get(name);if(!s)return;
  CombatState.setField(name,'actions',idx<s.actions?idx:idx+1);
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateActionsSection();
}
function ctToggleCond(name,cond){
  const s=CombatState.get(name);if(!s)return;
  const conds=[...s.conds];const i=conds.indexOf(cond);
  if(i>=0)conds.splice(i,1);else conds.push(cond);
  CombatState.setField(name,'conds',conds);
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateCondsSection();
}
function ctToggleCondEl(el){
  const sKey=el.dataset.ctname;const cond=el.dataset.ctcond;
  const name=Object.keys(window._ctBuilders||{}).find(n=>n.replace(/[^a-z0-9]/gi,'_')===sKey)||sKey;
  ctToggleCond(name,cond);
}
function ctRollDie(die,sKey){
  const sides=parseInt(die.slice(1));const roll=Math.floor(Math.random()*sides)+1;
  const resEl=document.getElementById('ct-roll-'+sKey);const detEl=document.getElementById('ct-roll-det-'+sKey);
  if(!resEl) return;
  resEl.className='ct-roll-result'+(die==='D20'&&roll===20?' crit':die==='D20'&&roll===1?' fumble':'');
  resEl.textContent=roll;
  if(detEl){
    if(die==='D20'&&roll===20) detEl.textContent='⭐ CRITICAL HIT — Natural 20!';
    else if(die==='D20'&&roll===1) detEl.textContent='💀 CRITICAL FAILURE — Natural 1';
    else detEl.textContent=die+' roll';
  }
}
function ctOppRoll(sKey){
  const statSel=document.getElementById('ct-opp-stat-'+sKey);
  const enemyInp=document.getElementById('ct-opp-enemy-'+sKey);
  if(!statSel||!enemyInp) return;
  const myStat=parseInt(statSel.value)||0;const enemyStat=parseInt(enemyInp.value)||0;
  const myRoll=Math.floor(Math.random()*20)+1;const enemyRoll=Math.floor(Math.random()*20)+1;
  const myTotal=myStat+myRoll;const enemyTotal=enemyStat+enemyRoll;const myWin=myTotal>enemyTotal;
  const myDieEl=document.getElementById('ct-opp-die-'+sKey);const myTotEl=document.getElementById('ct-opp-tot-'+sKey);
  const enDieEl=document.getElementById('ct-opp-enemy-die-'+sKey);const enTotEl=document.getElementById('ct-opp-enemy-tot-'+sKey);
  if(myDieEl) myDieEl.textContent=myRoll+(myRoll===20?'⭐':myRoll===1?'💀':'');
  if(enDieEl) enDieEl.textContent=enemyRoll+(enemyRoll===20?'⭐':enemyRoll===1?'💀':'');
  const tie=myTotal===enemyTotal;
  if(myTotEl){myTotEl.className='ct-opp-total'+(tie?' ':myWin?' win':' lose');myTotEl.textContent=myTotal+(tie?' TIE→Favour':'');}
  if(enTotEl){enTotEl.className='ct-opp-total'+(tie?' ':myWin?' lose':' win');enTotEl.textContent=enemyTotal+(tie?' TIE→Favour':'');}
}
function ctSaveOppStat(name,sel){
  const opt=sel.options[sel.selectedIndex];
  if(opt)CombatState.setField(name,'oppStat',opt.dataset.stat,false);
  const valEl=document.getElementById('ct-opp-val-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(valEl)valEl.textContent=sel.value;
}
function ctSaveOppEnemy(name,inp){CombatState.setField(name,'oppEnemy',parseInt(inp.value)||0,false);}
function ctToggleMaint(name,itemId){
  const s=CombatState.get(name);if(!s)return;
  const maint=[...s.maint];const idx=maint.indexOf(itemId);
  if(idx>=0)maint.splice(idx,1);else maint.push(itemId);
  CombatState.setField(name,'maint',maint,false);
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const el=document.getElementById('ctm-'+sKey+'-'+itemId);
  if(el){const done=maint.includes(itemId);el.classList.toggle('done',done);const check=el.querySelector('.ct-maint-check');if(check) check.textContent=done?'✓':'';}
}
function ctClearMaint(name){
  CombatState.setField(name,'maint',[],false);
  if(window._ctBuilders&&window._ctBuilders[name])document.getElementById('ct-content').innerHTML=window._ctBuilders[name]();
}
function ctSaveNotes(name,val){CombatState.setField(name,'notes',val,false);}
function ctCustomDmg(name,max){
  // Build a steampunk-themed prompt modal (replaces native prompt() which is ugly on iOS Safari and may be stripped by some PWA wrappers)
  const overlay=document.createElement('div');
  overlay.className='modal-overlay open';
  overlay.style.zIndex='1300';
  overlay.innerHTML=`
    <div style="background:linear-gradient(160deg,rgba(14,10,26,.98),rgba(20,14,8,.98));border:1px solid rgba(201,168,76,.45);border-radius:12px;padding:1.4rem 1.4rem 1.2rem;max-width:380px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.85)">
      <div style="font-family:'Cinzel Decorative',serif;color:var(--brass-light);font-size:1.05rem;margin-bottom:.5rem;text-align:center">Custom Adjustment</div>
      <div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;color:var(--parchment-dark);text-align:center;margin-bottom:1rem;line-height:1.5">Enter a value (e.g. <span style="color:var(--rust-light)">-7</span> for damage, <span style="color:#5ddb8a">+3</span> for healing)</div>
      <input type="number" id="ct-cdmg-input" inputmode="numeric" autofocus style="width:100%;padding:.65rem;background:rgba(26,18,8,.7);border:1px solid rgba(201,168,76,.35);border-radius:6px;color:var(--brass-light);font-family:'Cinzel',serif;font-size:1.15rem;text-align:center;outline:none">
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button id="ct-cdmg-cancel" style="flex:1;background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--brass-dark);font-family:'Cinzel',serif;font-size:.85rem;padding:.6rem;border-radius:6px;cursor:pointer;transition:all .2s">Cancel</button>
        <button id="ct-cdmg-ok" style="flex:1;background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(184,115,51,.12));border:1px solid rgba(201,168,76,.5);color:var(--brass-light);font-family:'Cinzel',serif;font-size:.85rem;padding:.6rem;border-radius:6px;cursor:pointer;transition:all .2s">Apply</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input=document.getElementById('ct-cdmg-input');
  setTimeout(()=>input.focus(),50);
  const close=()=>overlay.remove();
  const submit=()=>{
    const n=parseInt(input.value);
    if(isNaN(n)){showToast('Invalid number');return;}
    close();
    ctAdjLife(name,n,max);
  };
  document.getElementById('ct-cdmg-cancel').onclick=close;
  document.getElementById('ct-cdmg-ok').onclick=submit;
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();submit();}
    if(e.key==='Escape'){e.preventDefault();close();}
  });
  overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
}
function ctUndo(name,max){
  const field=CombatState.undo(name);
  if(!field){showToast('Nothing to undo');return;}
  const u=window._ctUpdaters&&window._ctUpdaters[name];
  if(!u)return;
  if(field==='life')u.updateLifeSection();
  else if(field==='conds')u.updateCondsSection();
  else if(field==='actions')u.updateActionsSection();
  else if(window._ctBuilders&&window._ctBuilders[name])document.getElementById('ct-content').innerHTML=window._ctBuilders[name]();
  showToast('↩ Undone: '+field);
}
function ctReset(name,max){
  CombatState.reset(name,max);
  if(window._ctBuilders&&window._ctBuilders[name])document.getElementById('ct-content').innerHTML=window._ctBuilders[name]();
  showToast(name+' reset to full');
}
function ctUpdateOppStat(sKey){
  const sel=document.getElementById('ct-opp-stat-'+sKey);const valEl=document.getElementById('ct-opp-val-'+sKey);
  if(sel&&valEl) valEl.textContent=sel.value;
}
function ctToggleSchool(name,school,btn){
  const invocs=INVOC&&INVOC[school.toLowerCase()];
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const container=document.getElementById(`ct-invocs-${sKey}`);if(!container)return;
  const wasActive=btn.classList.contains('ct-school-active');
  btn.parentElement.querySelectorAll('.ct-school-btn').forEach(b=>{b.classList.remove('ct-school-active');b.style.background='rgba(100,40,160,.12)';});
  if(wasActive){container.innerHTML='<div style="font-family:\'IM Fell English\',serif;font-size:.85rem;color:var(--brass-dark);text-align:center;padding:.5rem">Tap a school to see its invocations</div>';return;}
  btn.classList.add('ct-school-active');btn.style.background='rgba(100,40,160,.35)';
  if(!invocs||!invocs.length){container.innerHTML='<div style="color:var(--brass-dark);font-size:.82rem;padding:.5rem">No invocations found.</div>';return;}
  container.innerHTML=invocs.map(v=>`<div class="ct-invoc" onclick="this.classList.toggle('expanded')"><div style="display:flex;justify-content:space-between"><span class="ct-invoc-name" translate="no">${v.n}</span><span class="ct-invoc-power">Power ${v.pw}</span></div><div class="ct-invoc-desc">${v.d}</div></div>`).join('');
}

// ── TERMINOLOGY & STAT DEFINITIONS ───────────────────────────────────────
const TERM_DEFS={
  'SPD':     {title:'SPD — Speed',      type:'Characteristic',body:'How many inches the character can move per Move Action. Higher Speed characters can cross the battlefield quickly and are harder to pin down.',example:'SPD 5 = moves up to 5" per Move Action. SPD 7⊕ means wheeled movement with special rules.'},
  'STR':     {title:'STR — Strength',   type:'Characteristic',body:'Raw physical power. Used for Close Combat damage calculation and some special ability checks. Characters with high Strength hit harder in melee.',example:'Strength 6 + CC weapon die = devastating close combat damage.'},
  'FIN':     {title:'FIN — Finesse',    type:'Characteristic',body:'Agility, precision and dexterity. Used for Ranged attacks, dodging, many skill checks, and resisting certain conditions. The most versatile stat.',example:'Finesse 8 makes Feygin nearly impossible to catch or outmanoeuvre.'},
  'CC ATT':  {title:'CC ATT — Close Combat Attack',type:'Characteristic',body:'Your roll when attacking in melee. Add to D20 and compare against opponent\'s CC DEF. The higher this number, the more reliably you hit in close combat.',example:'CC ATT 6 + D20 roll vs opponent\'s CC DEF + D20 roll. Highest total wins.'},
  'CC DEF':  {title:'CC DEF — Close Combat Defence',type:'Characteristic',body:'Your resistance roll when being attacked in melee. Add to D20 roll. High CC DEF makes you hard to hit in close combat.',example:'A character with CC DEF 7 is very hard to hit reliably even by strong attackers.'},
  'RNG ATT': {title:'RNG ATT — Ranged Attack',type:'Characteristic',body:'Accuracy with ranged weapons. Add to D20 vs target\'s RNG DEF. Affected by range bands, cover, and modifiers like Aim and Snap Shot.',example:'RNG ATT 6 + D20. Ranges: Short / Mid / Long / Extreme — each adds penalties.'},
  'RNG DEF': {title:'RNG DEF — Ranged Defence',type:'Characteristic',body:'Your ability to dodge or avoid ranged fire. Add to D20 when being shot at. Taking cover adds further bonuses.',example:'Characters in cover get additional RNG DEF bonuses on top of their base stat.'},
  'ARM':     {title:'ARM — Armour',     type:'Characteristic',body:'Damage reduction. After damage is calculated, subtract your Armour value. Armour cannot reduce damage below 0. Some weapons and abilities bypass or reduce it.',example:'Take 9 damage with ARM 4 = 5 Life lost. Penetrating weapons halve your ARM.'},
  'ALC':     {title:'ALC — Alchemancy', type:'Characteristic',body:'Magical aptitude. Required to cast Invocations. Used as a bonus on Alchemancy rolls. Only Alchemancers have this stat — it determines how powerful their spells are.',example:'ALC 7 makes Nancy one of the most powerful Alchemancers in the game.'},
  'LIFE':    {title:'LIFE — Life Points',type:'Characteristic',body:'Your character\'s health. When Life drops to or below the red boxes on the Character Card, they enter the Wounded state: all Characteristics are reduced by 2 (except Armour). This can reduce a Characteristic below 0, becoming a penalty to the D20 roll. At 0 Life they are Out of Action and removed.',example:'A Character with red boxes at 14 Life enters Wounded once damage drops them to or below 14. CC ATT 6 becomes 4, FIN drops 2, etc. — Armour stays the same.'},
  'Favour':         {title:'Favour of The Engine',type:'Game Mechanic',body:'A special resource representing The Engine\'s blessing, providing three benefits: ties in opposed rolls (Intervention), a once-per-turn re-roll (Blessing), and drawing two Eye of The Engine cards instead of one (Aid). Determined at game start by a D20 roll minus your Company size — higher result starts with Favour. Can shift hands during play via the "Eye is Elsewhere" card. Lost by failing a Blessing re-roll, drawing a red Eyecon while Tempting Fate, or your opponent playing certain Eye cards.',example:'You hold Favour. You and an opponent both total 14 on an opposed roll — Intervention means you win the tie automatically.'},
  'Tempting Fate':  {title:'Tempting Fate',type:'Game Mechanic',body:'A Character involved in the action may Tempt Fate at any time — during their Activation, when attacked, or affected by an Invocation. Draw the top Eye of The Engine card; its effect comes into play immediately. If the card shows a red Eyecon, you lose Favour of The Engine. A green Eyecon means Favour is unaffected. The card is then shuffled back into the deck.',example:'Failed CC Attack — Tempt Fate, draw "Engine Guides My Aim" (green Eyecon). The card\'s bonus applies; you keep Favour.'},
  'Priority':       {title:'Priority',type:'Game Mechanic',body:'Priority determines which player activates their first Character each turn. At the start of the game the player who rolled lower when determining Favour gets Priority. Thereafter Priority is earned by events: Reduce an opponent to Wounded State, Take a foe Out of Action, or Achieve an Objective. The Company that holds the Priority token at the end of the current turn has Priority for the next turn.',example:'You take an enemy Out of Action and claim the Priority token. Next turn you choose which Character activates first.'},
  'Activation':     {title:'Activation',type:'Game Mechanic',body:'Each character\'s turn in a round. Players alternate activating characters. Each character gets 2 Actions per Activation. The order is determined by Activation cards sorted in Phase I.',example:'Player A activates Carter (2 Actions: Move + Shoot). Then Player B activates a Guardian.'},
  'Natural 1':      {title:'Natural 1 — Critical Failure',type:'Game Mechanic',body:'Rolling a 1 on the D20 (before any modifiers) always fails, regardless of bonuses. This can\'t be saved by a high characteristic value.',example:'CC ATT 10 + Natural 1 = automatic failure. The modifier doesn\'t matter.'},
  'Natural 20':     {title:'Natural 20 — Critical Success',type:'Game Mechanic',body:'Rolling a 20 on the D20 always succeeds. In combat it\'s a Critical Hit: the target may not roll a Defence check and their Armour is halved (rounded down). In Close Combat only, the target must also pass a Finesse check (Diff 10 + final damage) or become Stunned.',example:'Natural 20 on CC Attack: no Defence roll, ARM halved, Stun check. Ranged Crit: no Defence roll, ARM halved, no Stun check.'},
  'Out of Action':  {title:'Out of Action (OOA)',type:'Game State',body:'When a character\'s Life reaches 0, they are taken Out of Action and removed from the game. Some abilities trigger when an ally or enemy goes OOA. Scoring 2VP for opponent characters taken OOA is always active.',example:'Enemy model reaches 0 Life = removed from board. You score 2VP automatically.'},
  'Wounded':        {title:'Wounded',type:'Game State',body:'When Life drops to or below the red boxes on the Character Card, all Characteristics are reduced by 2 except Armour. This can reduce a Characteristic below 0, in which case it becomes a penalty to the D20 roll. The Character still acts but is significantly weakened.',example:'Check your card for the red box threshold. When wounded: STR 5→3, FIN 4→2, CC ATT 6→4, etc.'},
  'Stunned':        {title:'Stunned',type:'Condition',body:'May not Attack. May Defend normally. Speed halved. -2 to Finesse Checks to avoid area effects. Disengage attempts are at −2. Does not have a Threatened Area. -4 to call Alchemantic Invocations and may not focus to regain Essences. Clears in the Maintenance Phase.',example:'Stunned: can\'t attack, half Speed, −2 Finesse/Disengage, −4 Invocations, no Essence recovery.'},
  'Prone':          {title:'Prone',type:'Condition',body:'Move Action to rise. -2 to Defence in Close Combat. -2 to Attack in Close Combat. If you try and rise whilst engaged in Close Combat your opponent gets a free Close Combat Attack. -4 to Finesse Check to avoid effects.',example:'Knocked Prone: spend 1 Move Action to stand, or stay prone and fight at -2 CC stats.'},
  'Bleed':          {title:'Bleed',type:'Condition',body:'Ongoing damage. The target loses 2 Life in the Maintenance Phase of each turn until healing is applied. Any successful healing will cause Bleed to cease immediately. Bleed will not affect Characters with the Mechanical ability.',example:'Bleed applied: lose 2 Life each Maintenance Phase. Any healing clears it.'},
  'Entangled':      {title:'Entangled',type:'Condition',body:'Character may not move or attack. All Defence rolls are at −2 if attacked. −2 penalty on any attempt to call an Alchemantic Invocation. May attempt to break free using Strength or Finesse against a Difficulty of 14.',example:'Entangled: can\'t move or attack, −2 Defence, −2 Invocations, STR or FIN vs Diff 14 to escape.'},
  'Pinned':         {title:'Pinned',type:'Condition',body:'Character may not voluntarily move or change facing. Inflicted by weapons with the Pinning property when the target is between attacker and terrain. To break free: make a Difficulty 12 Strength Check — success ends the pin but inflicts D4 damage that bypasses Armour as the Character pulls themselves loose.',example:'Pinned by Arielle\'s Long Spear: −2 Defence, can\'t move, must pass STR 12 (taking D4 damage) to escape.'},
  'Dominated':      {title:'Dominated',type:'Condition',body:'A character successfully accessed by a Canopic Spirit and then dominated. The spirit controls their movement and actions according to that spirit\'s Dominated rules. Only Canopic spirits can cause this.',example:'Successfully dominated by Raneb: host may not leave CC until all opponents have fallen.'},
  'On Fire':        {title:'On Fire',type:'Condition',body:'Inflicted by a weapon with the Burning property. The Character burns for 2 turns, subtracting the damage taken from any D20 rolls during that time. Burning damage itself bypasses Armour. Mechanical Characters are not affected by Burning.',example:'Hit by Hot Coals (D4 Burning): take damage bypassing armour, then subtract that damage from D20 rolls for 2 turns.'},
  'Poisoned':       {title:'Poisoned',type:'Condition',body:'Inflicted when damage is taken from a weapon with the Venom property and the target fails a Strength Check. The Difficulty of the check and the ongoing effect of the poison are given on the attacker\'s Character Card. A poisoned Character may not be poisoned again whilst already affected.',example:'Hit by M\'Dusa\'s Seekers (Venom): pass STR vs Difficulty on her card or become Poisoned per the card\'s effect.'},
  'Burning':        {title:'Burning (Weapon Property)',type:'Weapon',body:'Weapons with the Burning property bypass the target\'s Armour entirely — damage is applied without subtracting Armour. Many Burning weapons also inflict the On Fire condition on the target.',example:'Hot Coals D4 (Burning): D4 damage bypasses armour, target catches fire for 2 turns.'},
  'Venom':          {title:'Venom (Weapon Property)',type:'Weapon',body:'When any damage is taken from a weapon with this property a Strength check is required to avoid becoming Poisoned. The Difficulty of this check and the effects of the venom are given on the attacker\'s Character Card. A poisoned Character may not be poisoned again whilst already affected.',example:'Senior Agent\'s Assassin\'s Dirk (Venom): on damage, target makes STR check at Difficulty on the card or becomes Poisoned.'},
  'Squeezing Past': {title:'Squeezing Past',type:'Movement',body:'A Character may move through a friendly Character only if there is no other viable route around them and neither model is in the Threatened Area of an opponent at the start or end of the move. The squeeze-past move costs 2" of movement and may only occur between two Characters that both have 30mm bases. Large Characters on 40mm bases or larger may not be squeezed past and may not squeeze past another model.',example:'Nightingale needs to reach Launcelot but Tesla is blocking the alley — she may spend 2" of movement to squeeze past Tesla, provided neither is in an enemy Threatened Area.'},
  'Incapacitated':  {title:'Incapacitated',type:'Condition',body:'May take no Actions. Any attack against the Character is an unopposed roll with a Difficulty of 11. Finesse Checks to avoid any effect are considered failures. No Threatened Area. This is a severe condition that renders a Character almost helpless.',example:'An Incapacitated Character cannot act and is very vulnerable to attack.'},
  'Invocation':     {title:'Invocation',type:'Game Mechanic',body:'A spell-like effect called by an Alchemancer. Requires the listed number and types of Essences. The caster makes an Alchemancy Check (D20 + ALC) and must equal or beat the Invocation\'s Difficulty for the effect to come into being. Failure costs half the required Essences (rounded down, min 1). Natural 20 = Perfect Cast (half cost, max effect). Natural 1 = Backfire.',example:'Cast Fire Burst (Difficulty 12, 2 Fire + 1 Air): roll D20+ALC, need 12+. Success: 2" Blast Template, D10+4 damage.'},
  'Essence':        {title:'Essence',type:'Game Mechanic',body:'Magical resources tied to the four schools: Fire, Earth, Air, Water. Alchemancers spend Essences to cast Invocations. Recovery is done during Activation as an Action: 1 Action restores half used (rounded up), 2 Actions restores all. Essences do not recover in the Maintenance Phase.',example:'Cast a Fire Invocation: spend Fire Essences. Use 1 Action to recover half, or 2 Actions for full recovery.'},
  'Victory Points': {title:'Victory Points',type:'Game Mechanic',body:'Victory Points determine the winner. Reducing a foe to the Wounded state: 1VP. Taking a foe Out of Action: 2VP. Achieving Primary Objectives or Taxing Tasks: varies. Insignificant Characters earn only half VP (rounded down). If all opposing Characters are Out of Action you win regardless of VP totals. See Core Basics rules page for full details.',example:'Wound an opponent: 1VP. Take them Out of Action: 2VP. Complete mission objective: see mission card.'},
  'Falling':        {title:'Falling',type:'Game Mechanic',body:'If you fall from any height, make a Finesse check vs Difficulty 10 + height of fall in inches. Failure: 1D4 damage +1 per inch over 3", bypassing armour, and placed Prone. Success: no ill effects, placed standing directly below. If you fall onto another Character, scatter 1" using Grenade template; they must also make the same Finesse check or take 1D4 damage bypassing armour.',example:'Fall from 4": Finesse check Diff 14. Fail: D4+1 damage (bypassing armour), Prone. Pass: land safely.'},
  'Handing Off':    {title:'Handing Off',type:'Game Mechanic',body:'Use 1 Action to transfer an item to another Character. Both Characters must be in base to base contact. Neither may be engaged in Close Combat. No dice roll required. The new owner may use the item during his or her turn. Characters may not hand off weapons printed on their cards.',example:'Delight transfer: spend 1 Action, must be in base contact, not in CC. New holder can use it their turn.'},
};

function showTerm(key){
  const d=TERM_DEFS[key];
  if(!d)return;
  const existing=document.getElementById('term-tooltip');
  if(existing)existing.remove();
  const el=document.createElement('div');
  el.id='term-tooltip';
  el.className='tooltip-modal';
  el.onclick=e=>{if(e.target===el)el.remove();};
  el.innerHTML=`<div class="tooltip-card">
    <button class="tooltip-close" onclick="document.getElementById('term-tooltip').remove()">✕</button>
    <div class="tooltip-title" translate="no">${d.title}</div>
    <div class="tooltip-type" translate="no">${d.type}</div>
    <div class="tooltip-body">${d.body}</div>
    ${d.example?`<div class="tooltip-example">📖 ${d.example}</div>`:''}
  </div>`;
  document.body.appendChild(el);
}

// Make stat pills clickable throughout the app
function makeStatPillsClickable(){
  // Fast bail-out: if every pill is already bound, skip the full sweep.
  if(!document.querySelector('.stat-pill:not([data-term-bound])'))return;
  document.querySelectorAll('.stat-pill').forEach(el=>{
    if(el.dataset.school)return;
    const txt=el.textContent.trim();
    // Match "SPD Speed" → key "SPD", or "STR Strength" → "STR" etc.
    const key=Object.keys(TERM_DEFS).find(k=>txt.startsWith(k));
    if(key&&!el.dataset.termBound){
      el.dataset.termBound='1';
      el.title='Click for details';
      el.onclick=e=>{e.stopPropagation();showTerm(key);};
    }
  });
}

// Run after renders
document.addEventListener('click',()=>setTimeout(makeStatPillsClickable,200));

let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='flex';
  const wb=document.getElementById('welcome-install');
  if(wb)wb.style.display='block';
});
window.addEventListener('appinstalled',()=>{
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='none';
  _deferredPrompt=null;
});
function pwaInstall(){
  if(_deferredPrompt){_deferredPrompt.prompt();_deferredPrompt.userChoice.then(()=>{_deferredPrompt=null;});}
  else{alert('To install:\n📱 iPhone/iPad: Tap Share → "Add to Home Screen"\n🤖 Android: Tap menu → "Add to Home Screen"\n💻 Chrome: Look for install icon in address bar');}
}

function navTo(id,pushHistory){
  window.scrollTo(0,0);
  if(pushHistory!==false){
    try{history.pushState({panel:id},'');}catch{}
  }
  document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active','fade-in','slide-left','slide-right');});
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false');});
  const panel=document.getElementById('panel-'+id);
  if(!panel)return;
  panel.classList.add('active','fade-in');
  panel.addEventListener('animationend',()=>panel.classList.remove('fade-in'),{once:true});
  const btn=document.querySelector(`.nav-btn[data-panel="${id}"]`);
  if(btn){btn.classList.add('active');btn.setAttribute('aria-selected','true');}
  builders[id]&&builders[id]();
  sessionStorage.setItem('last_panel',id);
}

// ── SWIPE NAVIGATION BETWEEN TABS ─────────────────────────────────────────
(function(){
  let startX=0,startY=0,startTime=0;
  const THRESHOLD=55;
  const MAX_Y=80;
  const MAX_TIME=400;

  function getVisibleTabs(){
    const inGameMode=document.body.classList.contains('game-mode');
    return[...document.querySelectorAll('.nav-btn[data-panel]')].filter(b=>!inGameMode||!b.classList.contains('game-hidden'));
  }

  function shouldIgnore(e){
    const t=e.target;
    if(t.closest('.modal-overlay.open'))return true;
    if(t.closest('#search-overlay'))return true;
    if(t.closest('#combat-modal'))return true;
    const tag=t.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return true;
    if(t.closest('.roll-hist')||t.closest('.ct-dice-row'))return true;
    return false;
  }

  document.addEventListener('touchstart',function(e){
    if(shouldIgnore(e))return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startTime=Date.now();
  },{passive:true});

  document.addEventListener('touchend',function(e){
    if(!startTime)return;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    const dt=Date.now()-startTime;
    startTime=0;

    if(dt>MAX_TIME||Math.abs(dy)>MAX_Y||Math.abs(dx)<THRESHOLD)return;

    const tabs=getVisibleTabs();
    const current=tabs.findIndex(b=>b.classList.contains('active'));
    if(current<0)return;

    const next=dx<0?current+1:current-1;
    if(next<0||next>=tabs.length)return;

    const id=tabs[next].dataset.panel;
    const slideClass=dx<0?'slide-left':'slide-right';
    window.scrollTo(0,0);

    // Navigate directly — no .click() to avoid double animation
    document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active','fade-in','slide-left','slide-right');});
    document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false');});

    const panel=document.getElementById('panel-'+id);
    panel.classList.add('active',slideClass);
    panel.addEventListener('animationend',()=>panel.classList.remove(slideClass),{once:true});

    tabs[next].classList.add('active');
    tabs[next].setAttribute('aria-selected','true');
    builders[id]&&builders[id]();
    setTimeout(injectPanelQuotes,80);
    sessionStorage.setItem('last_panel',id);
  },{passive:true});
})();

// ── SPLASH SCREEN DISMISSAL ──────────────────────────────
window.addEventListener('load',function(){
  // Restore last active tab on refresh
  const lastPanel=sessionStorage.getItem('last_panel')||'welcome';
  if(lastPanel&&lastPanel!=='welcome'){
    navTo(lastPanel);
  }
  setTimeout(function(){
    const splash=document.getElementById('splash-screen');
    if(splash){splash.style.opacity='0';setTimeout(()=>splash.remove(),800);}
  },1200);
});

  'Priority':       {title:'Priority',type:'Game Mechanic',body:'Priority determines which player activates their first Character each turn. At the start of the game the player who rolled lower when determining Favour gets Priority. Thereafter Priority is earned by events: Reduce an opponent to Wounded State, Take a foe Out of Action, or Achieve an Objective. The Company that holds the Priority token at the end of the current turn has Priority for the next turn.',example:'You take an enemy Out of Action and claim the Priority token. Next turn you choose which Character activates first.'},

  'Natural 20':     {title:'Natural 20 — Critical Success',type:'Game Mechanic',body:'Rolling a 20 on the D20 always succeeds. In combat it\'s a Critical Hit: the target may not roll a Defence check and their Armour is halved (rounded down). In Close Combat only, the target must also pass a Finesse check (Diff 10 + final damage) or become Stunned.',example:'Natural 20 on CC Attack: no Defence roll, ARM halved, Stun check. Ranged Crit: no Defence roll, ARM halved, no Stun check.'},

};

function showTerm(key){
  const d=TERM_DEFS[key];
  if(!d)return;
  const existing=document.getElementById('term-tooltip');
  if(existing)existing.remove();
  const el=document.createElement('div');
  el.id='term-tooltip';
  el.className='tooltip-modal';
  el.onclick=e=>{if(e.target===el)el.remove();};
  el.innerHTML=`<div class="tooltip-card">
    <button class="tooltip-close" onclick="document.getElementById('term-tooltip').remove()">✕</button>
    <div class="tooltip-title" translate="no">${d.title}</div>
    <div class="tooltip-type" translate="no">${d.type}</div>
    <div class="tooltip-body">${d.body}</div>
    ${d.example?`<div class="tooltip-example">📖 ${d.example}</div>`:''}
  </div>`;
  document.body.appendChild(el);
}

// Make stat pills clickable throughout the app
function makeStatPillsClickable(){
  document.querySelectorAll('.stat-pill').forEach(el=>{
    if(el.dataset.school)return;
    const txt=el.textContent.trim();
    // Match "SPD Speed" → key "SPD", or "STR Strength" → "STR" etc.
    const key=Object.keys(TERM_DEFS).find(k=>txt.startsWith(k));
    if(key&&!el.dataset.termBound){
      el.dataset.termBound='1';
      el.title='Click for details';
      el.onclick=e=>{e.stopPropagation();showTerm(key);};
    }
  });
}

  const url=new URL(e.request.url);
  if(url.hostname==='fonts.googleapis.com'||url.hostname==='fonts.gstatic.com'){
    e.respondWith(caches.open(FONT_CACHE).then(c=>c.match(e.request).then(r=>{
      if(r)return r;
      return fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}).catch(()=>new Response('',{status:200,headers:{'Content-Type':'text/css'}}));
    })));
    return;
  }
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;
    }).catch(()=>caches.match('/')))
  );
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  const btn=document.getElementById('pwa-install-btn');

  const btn=document.getElementById('pwa-install-btn');

});
function pwaInstall(){
  if(_deferredPrompt){_deferredPrompt.prompt();_deferredPrompt.userChoice.then(()=>{_deferredPrompt=null;});}
  else{alert('To install:\n📱 iPhone/iPad: Tap Share → "Add to Home Screen"\n🤖 Android: Tap menu → "Add to Home Screen"\n💻 Chrome: Look for install icon in address bar');}

function navTo(id){
  document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active','fade-in','slide-left','slide-right');});
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false');});
  const panel=document.getElementById('panel-'+id);
  panel.classList.add('active','fade-in');
  panel.addEventListener('animationend',()=>panel.classList.remove('fade-in'),{once:true});
  const btn=document.querySelector(`.nav-btn[data-panel="${id}"]`);
  if(btn){btn.classList.add('active');btn.setAttribute('aria-selected','true');}
  builders[id]&&builders[id]();
  sessionStorage.setItem('last_panel',id);
}

// ── SWIPE NAVIGATION BETWEEN TABS ─────────────────────────────────────────
(function(){
  let startX=0,startY=0,startTime=0;
  const THRESHOLD=55;
  const MAX_Y=80;
  const MAX_TIME=400;

  function getVisibleTabs(){
    const inGameMode=document.body.classList.contains('game-mode');
    return[...document.querySelectorAll('.nav-btn[data-panel]')].filter(b=>!inGameMode||!b.classList.contains('game-hidden'));
  }

  function shouldIgnore(e){
    const t=e.target;
    if(t.closest('.modal-overlay.open'))return true;
    if(t.closest('#search-overlay'))return true;
    if(t.closest('#combat-modal'))return true;
    const tag=t.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return true;
    if(t.closest('.roll-hist')||t.closest('.ct-dice-row'))return true;
    return false;
  }

  document.addEventListener('touchstart',function(e){
    if(shouldIgnore(e))return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startTime=Date.now();
  },{passive:true});

  document.addEventListener('touchend',function(e){
    if(!startTime)return;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    const dt=Date.now()-startTime;
    startTime=0;

    if(dt>MAX_TIME||Math.abs(dy)>MAX_Y||Math.abs(dx)<THRESHOLD)return;

    const tabs=getVisibleTabs();
    const current=tabs.findIndex(b=>b.classList.contains('active'));
    if(current<0)return;

    const next=dx<0?current+1:current-1;
    if(next<0||next>=tabs.length)return;

    const id=tabs[next].dataset.panel;
    const slideClass=dx<0?'slide-left':'slide-right';

    // Navigate directly — no .click() to avoid double animation
    document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active','fade-in','slide-left','slide-right');});
    document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false');});

    const panel=document.getElementById('panel-'+id);
    panel.classList.add('active',slideClass);
    panel.addEventListener('animationend',()=>panel.classList.remove(slideClass),{once:true});

    tabs[next].classList.add('active');
    tabs[next].setAttribute('aria-selected','true');
    builders[id]&&builders[id]();
    window.scrollTo({top:0,behavior:'smooth'});
    setTimeout(injectPanelQuotes,80);
    sessionStorage.setItem('last_panel',id);
  },{passive:true});
})();

// ── SPLASH SCREEN DISMISSAL ──────────────────────────────
window.addEventListener('load',function(){
  // Restore last active tab on refresh
  const lastPanel=sessionStorage.getItem('last_panel')||'welcome';
  if(lastPanel&&lastPanel!=='welcome'){
    navTo(lastPanel);
  }
  setTimeout(function(){
    const splash=document.getElementById('splash-screen');
    if(splash){splash.style.opacity='0';setTimeout(()=>splash.remove(),800);}
  },1200);
});

body:has(#panel-welcome.active) .bg-vignette{opacity:.55;}
.twisted-rune{display:inline-block;width:.38em;height:1.45em;background:var(--twisted-rune) no-repeat center/contain;vertical-align:-.32em;filter:drop-shadow(0 0 .12em rgba(80,180,220,.55));animation:twisted-rune-pulse 3s ease-in-out infinite;}

*{margin:0;padding:0;box-sizing:border-box;}
span[translate="no"]{display:inline;margin:0 .1em}
html{overflow-x:hidden;max-width:100vw;}
body{background:var(--iron-dark);color:var(--steam);font-family:'IM Fell English',Georgia,'Times New Roman',serif;min-height:100vh;overflow-x:hidden;max-width:100vw;overflow-wrap:break-word;word-wrap:break-word;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(184,115,51,.06) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* HEADER */
header{background:linear-gradient(180deg,rgba(26,18,8,.98),rgba(26,26,40,.95));border-bottom:1px solid var(--brass-dark);padding:0 1.25rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.5);}
.header-inner{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:0;padding:.5rem 0 .45rem;}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.42rem;min-width:0;}
.logo-twisted{font-family:'Cinzel Decorative',serif;font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--brass-light),var(--brass),var(--copper));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;filter:drop-shadow(0 0 8px rgba(201,168,76,.4));white-space:nowrap;line-height:1.1;}
.logo-sub{font-family:'Josefin Sans',sans-serif;font-size:.62rem;letter-spacing:.22em;color:var(--brass);text-transform:uppercase;display:block;margin-top:2px;}
nav{display:flex;flex-wrap:wrap;justify-content:center;gap:.22rem;}
.nav-btn{background:transparent;border:1px solid transparent;color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;padding:.34rem .55rem;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap;text-align:center;flex:0 1 auto;}
.nav-btn:hover{color:var(--brass-light);border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06);}
.nav-btn.active{color:var(--brass-light);border-color:var(--brass-dark);background:rgba(201,168,76,.1);}
.header-actions{display:flex;gap:.6rem;align-items:center;flex-shrink:0;}
.header-icon-btn{background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.45);color:var(--brass-light);font-size:1rem;width:40px;height:40px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;padding:0;line-height:1;}
.header-icon-btn:hover{border-color:var(--brass);background:rgba(201,168,76,.22);box-shadow:0 0 8px rgba(201,168,76,.15);}
.gm-btn.gm-off{background:linear-gradient(135deg,rgba(180,60,60,.25),rgba(140,40,40,.12));border-color:rgba(200,70,70,.6);color:#e06060;box-shadow:0 0 8px rgba(200,70,70,.2);text-shadow:0 0 6px rgba(200,70,70,.3);}
.gm-btn.gm-off:hover{border-color:#e06060;background:rgba(200,70,70,.3);box-shadow:0 0 12px rgba(200,70,70,.3);}
.gm-btn.gm-on{background:linear-gradient(135deg,rgba(61,184,100,.25),rgba(61,184,100,.12));border-color:rgba(93,219,138,.6);color:#5ddb8a;box-shadow:0 0 8px rgba(61,184,100,.25);text-shadow:0 0 6px rgba(61,184,100,.3);}
.gm-btn.gm-on:hover{border-color:#5ddb8a;background:rgba(61,184,100,.3);box-shadow:0 0 12px rgba(61,184,100,.3);}
.gm-dropdown-wrap{position:relative;}
.gm-dropdown{opacity:0;pointer-events:none;position:absolute;top:calc(100% + .5rem);right:50%;transform:translateX(50%);z-index:99999;background:linear-gradient(135deg,rgba(26,18,8,.98),rgba(26,26,40,.98));border:1px solid var(--brass-dark);border-radius:8px;padding:.6rem .5rem;box-shadow:0 8px 32px rgba(0,0,0,.7),0 0 12px rgba(201,168,76,.1);transition:opacity .2s;min-width:210px;display:flex;flex-direction:column;gap:.3rem;}
.gm-dropdown.open{opacity:1;pointer-events:auto;}
.gm-dropdown-title{font-family:'Josefin Sans',sans-serif;font-size:.7rem;letter-spacing:.08em;color:var(--brass-dark);text-transform:uppercase;padding:0 .4rem .4rem;border-bottom:1px solid rgba(201,168,76,.15);margin-bottom:.15rem;}
.gm-option{background:transparent;border:1px solid rgba(201,168,76,.15);color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.75rem;padding:.45rem .6rem;border-radius:5px;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;gap:.4rem;}
.gm-option:hover{border-color:var(--brass);background:rgba(201,168,76,.08);color:var(--brass-light);}
.gm-option.active{border-color:var(--brass);background:rgba(201,168,76,.12);color:var(--brass-light);}
.gm-option.active .gm-opt-icon{color:var(--brass-light);}
.gm-opt-icon{font-size:.7rem;color:var(--brass-dark);}

/* MAIN */
main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.35rem 1.5rem;}
.panel{display:none;}
.panel.active{display:block;}
.panel.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(45px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-45px)}to{opacity:1;transform:translateX(0)}}
.panel.slide-left{animation:slideInLeft .22s ease-out;}
.panel.slide-right{animation:slideInRight .22s ease-out;}

/* SECTION HEADER */
.section-header{text-align:center;margin-bottom:1.75rem;padding-bottom:1.1rem;border-bottom:1px solid rgba(201,168,76,.2);position:relative;}
.section-header::after{content:'⚙';position:absolute;bottom:-.65rem;left:50%;transform:translateX(-50%);background:var(--iron-dark);padding:0 .5rem;color:var(--brass-dark);font-size:1.1rem;}
.section-title{font-family:'Cinzel',serif;font-size:1.7rem;font-weight:700;background:linear-gradient(135deg,var(--brass-light),var(--brass));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;margin-bottom:.35rem;}
.section-subtitle{font-family:'Josefin Sans',sans-serif;font-size:.82rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);}

/* CARDS */
.card{background:linear-gradient(135deg,rgba(42,38,30,.9),rgba(30,28,40,.9));border:1px solid rgba(201,168,76,.2);border-radius:6px;padding:1rem 1.1rem;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--brass-dark),transparent);}
.card-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);letter-spacing:.08em;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem;align-items:start;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;}

/* WELCOME */
.welcome-emblem{font-size:4.5rem;display:block;margin-bottom:.75rem;filter:drop-shadow(0 0 14px rgba(201,168,76,.45));animation:pulse 3s ease-in-out infinite;transform-origin:center;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 14px rgba(201,168,76,.45));transform:scale(1)}50%{filter:drop-shadow(0 0 42px rgba(201,168,76,1));transform:scale(1.06)}}
.welcome-tagline{font-family:'Josefin Sans',sans-serif;font-size:.85rem;letter-spacing:.4em;text-transform:uppercase;color:var(--brass);margin:.6rem 0 1.6rem;}
.welcome-divider{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--brass-dark),transparent);margin:0 auto 2rem;}
.welcome-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:.7rem;max-width:960px;margin:0 auto 2rem;}.welcome-grid>.welcome-card{width:calc(25% - .53rem);min-width:0;}.wc-spacer{display:none;}
.welcome-card{background:linear-gradient(135deg,rgba(42,38,30,.8),rgba(30,28,40,.8));border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:.95rem .75rem;cursor:pointer;transition:all .3s;text-align:center;}
.welcome-card:hover{border-color:var(--brass);transform:translateY(-3px);box-shadow:0 8px 28px rgba(201,168,76,.14);}
.wc-icon{font-size:1.8rem;margin-bottom:.45rem;display:block;}
.wc-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);letter-spacing:.06em;margin-bottom:.35rem;}
.wc-desc{font-family:'Josefin Sans',sans-serif;font-size:.8rem;color:var(--parchment);line-height:1.5;}

/* RULES */
.rules-layout{display:grid;grid-template-columns:220px 1fr;gap:1.75rem;align-items:start;}
.rules-nav{background:rgba(26,26,40,.8);border:1px solid rgba(201,168,76,.15);border-radius:6px;padding:.9rem;position:sticky;top:76px;}
.rules-nav-title{font-family:'Josefin Sans',sans-serif;font-size:.7rem;color:var(--brass-dark);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid rgba(201,168,76,.15);}
.rules-nav-item{display:flex;align-items:center;gap:.4rem;width:100%;background:transparent;border:none;text-align:left;padding:.48rem .72rem;cursor:pointer;border-radius:4px;font-family:'Josefin Sans',sans-serif;font-size:.85rem;letter-spacing:.04em;color:var(--parchment);transition:all .2s;margin-bottom:.06rem;}
.rules-nav-item:hover{background:rgba(201,168,76,.08);color:var(--brass-light);}
.rules-nav-item.active{background:rgba(201,168,76,.12);color:var(--brass-light);border-left:2px solid var(--brass);}
.rules-page{display:none;}
.rules-page.active{display:block;animation:fadeIn .25s ease;}
/* rule-block: see readability section below */
.highlight-box{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.28);border-radius:6px;padding:.8rem 1.05rem;margin:.5rem 0 1rem;font-size:.97rem;color:var(--parchment);line-height:1.72;}
.highlight-box strong{color:var(--brass-light);}
.example-box{background:rgba(61,184,140,.06);border-left:3px solid var(--green);padding:.8rem 1.05rem;margin:.7rem 0;font-size:.97rem;border-radius:0 6px 6px 0;color:var(--parchment);line-height:1.72;}
.notice{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:.85rem 1.1rem;font-family:'Josefin Sans',sans-serif;font-size:.92rem;color:var(--parchment);margin:.8rem 0;line-height:1.65;}
.notice.warning{background:rgba(204,74,74,.06);border-color:rgba(204,74,74,.25);}
.notice.tip{background:rgba(61,184,140,.06);border-color:rgba(61,184,140,.25);}
.stat-pill{display:inline-block;background:rgba(201,168,76,.14);border:1px solid rgba(201,168,76,.4);color:#F0C060;font-family:'Josefin Sans',sans-serif;font-size:.8rem;letter-spacing:.07em;padding:.22rem .55rem;border-radius:4px;margin:.12rem;cursor:pointer;transition:all .2s;position:relative;box-shadow:0 0 6px rgba(201,168,76,.12);text-shadow:0 0 8px rgba(240,160,40,.2);}
.stat-pill:hover{background:rgba(201,168,76,.25);border-color:#FFD060;transform:translateY(-1px);box-shadow:0 0 12px rgba(201,168,76,.3);}
.stat-pill::after{content:'ℹ';font-size:.65em;margin-left:.3em;opacity:.55;vertical-align:middle;}
.stat-pill[data-school]::after{content:'→';}
.term-link{color:#F0C060;border-bottom:1.5px solid rgba(240,160,40,.55);cursor:pointer;transition:all .25s;font-style:inherit;text-decoration:none;text-shadow:0 0 10px rgba(240,160,40,.25);position:relative;}
.term-link:hover{color:#FFD060;border-bottom-color:#FFD060;text-shadow:0 0 14px rgba(255,210,40,.55);}
.term-link::after{content:'⤴';font-size:.55em;vertical-align:super;margin-left:.12em;opacity:.6;font-style:normal;}
.tooltip-modal{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:rgba(6,4,12,.85);backdrop-filter:blur(8px);animation:fadeIn .18s ease;}
.tooltip-card{background:linear-gradient(135deg,rgba(36,26,8,.98),rgba(20,16,34,.98));border:1px solid rgba(201,168,76,.45);border-radius:12px;padding:1.6rem 1.8rem;max-width:480px;width:100%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,168,76,.15);}
.tooltip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--brass),transparent);border-radius:12px 12px 0 0;}
.tooltip-title{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--brass-light);margin-bottom:.3rem;letter-spacing:.08em;}
.tooltip-type{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--brass);margin-bottom:.9rem;padding-bottom:.65rem;border-bottom:1px solid rgba(201,168,76,.15);}
.tooltip-body{font-family:'IM Fell English',serif;font-size:1rem;line-height:1.82;color:var(--parchment);}
.tooltip-example{background:rgba(61,184,140,.07);border-left:3px solid var(--green);padding:.65rem .9rem;margin-top:.85rem;font-size:.92rem;color:var(--parchment-dark);border-radius:0 6px 6px 0;line-height:1.65;}
.tooltip-close{position:absolute;top:.75rem;right:.85rem;background:transparent;border:1px solid rgba(201,168,76,.25);color:var(--brass-dark);width:1.8rem;height:1.8rem;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.tooltip-close:hover{border-color:var(--brass);color:var(--brass-light);}
.turn-sequence{display:flex;gap:0;margin:1.25rem 0;}
.turn-step{flex:1;text-align:center;padding:.9rem .6rem;background:rgba(30,28,40,.8);border:1px solid rgba(201,168,76,.18);position:relative;}
.turn-step:first-child{border-radius:6px 0 0 6px;}
.turn-step:last-child{border-radius:0 6px 6px 0;}
.turn-step::after{content:'▶';position:absolute;right:-.55rem;top:50%;transform:translateY(-50%);color:var(--brass);font-size:.65rem;z-index:1;}
.turn-step:last-child::after{display:none;}
.ts-num{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--brass-light);display:block;}
.ts-name{font-family:'Cinzel',serif;font-size:.85rem;color:var(--brass-light);display:block;margin:.25rem 0;}
.ts-desc{font-family:'Josefin Sans',sans-serif;font-size:.82rem;color:var(--parchment);line-height:1.6;}

/* CHARACTERS */
.faction-tabs{display:flex;gap:.4rem;margin-bottom:1.75rem;flex-wrap:wrap;}
.faction-tab{background:rgba(26,26,40,.8);border:1px solid rgba(201,168,76,.18);color:var(--parchment-dark);font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:.42rem .9rem;border-radius:4px;cursor:pointer;transition:all .2s;}
.faction-tab:hover{border-color:rgba(201,168,76,.4);color:var(--brass-light);}
.faction-tab.active{background:rgba(201,168,76,.12);border-color:var(--brass);color:var(--brass-light);}
.faction-panel{display:none;}
.faction-panel.active{display:block;animation:fadeIn .3s ease;}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:.9rem;}
.char-card{background:linear-gradient(135deg,rgba(26,18,8,.9),rgba(30,28,40,.9));border:1px solid rgba(201,168,76,.18);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .3s;}
.char-card:hover{border-color:var(--brass);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.4),0 0 18px rgba(201,168,76,.1);}
.char-header{padding:.9rem 1.1rem;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(201,168,76,.1);background:linear-gradient(135deg,rgba(42,32,10,.5),transparent);}
.char-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);}
.char-role{font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass);margin-top:.18rem;}
.char-pts{font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--brass);}
.char-pts-lbl{font-family:'Josefin Sans',sans-serif;font-size:.65rem;color:var(--brass);text-align:right;}
.char-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:1px;background:rgba(201,168,76,.08);border-bottom:1px solid rgba(201,168,76,.1);}
.stat-cell{background:rgba(26,22,15,.8);padding:.28rem .15rem;text-align:center;}
.stat-lbl{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.04em;color:var(--brass);display:block;text-transform:uppercase;}
.stat-val{font-family:'Cinzel',serif;font-size:.85rem;color:var(--steam);display:block;margin-top:.08rem;}
.char-abilities{padding:.65rem 1.1rem;display:flex;flex-wrap:wrap;gap:.25rem;}
.ability-tag{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.04em;padding:.18rem .5rem;border-radius:4px;}
.ability-tag.alc{background:rgba(74,158,204,.1);border-color:rgba(74,158,204,.28);color:var(--blue);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,8,15,.85);z-index:1000;backdrop-filter:blur(4px);justify-content:center;align-items:center;padding:1rem;}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
/* ── COMBAT TRACKER ──────────────────────────────────────── */
#combat-modal .modal-box{max-width:640px;max-height:92vh;overflow-y:auto;}
.ct-header{position:relative;border-radius:10px;overflow:hidden;margin-bottom:1rem;}
.ct-hero{height:130px;display:flex;align-items:center;justify-content:center;position:relative;}
.ct-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,6,18,.98) 30%,rgba(8,6,18,.5) 70%,transparent);}
.ct-title-row{position:absolute;bottom:.8rem;left:1rem;right:1rem;display:flex;justify-content:space-between;align-items:flex-end;}
.ct-name{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--brass-light);text-shadow:0 2px 8px rgba(0,0,0,.9);}
.ct-role{font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass);margin-top:.15rem;}
.ct-pts{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:var(--brass-light);}
.ct-section{background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.12);border-radius:8px;padding:.85rem 1rem;margin-bottom:.75rem;}
.ct-section-title{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--brass);margin-bottom:.65rem;padding-bottom:.4rem;border-bottom:1px solid rgba(201,168,76,.12);}
/* Life tracker */
.ct-life-display{display:flex;align-items:center;gap:.75rem;margin-bottom:.65rem;}
.ct-life-num{font-family:'Cinzel Decorative',serif;font-size:2.2rem;color:var(--brass-light);min-width:3rem;text-align:center;line-height:1;}
.ct-life-max{font-family:'Josefin Sans',sans-serif;font-size:.7rem;color:var(--brass-dark);display:block;text-align:center;margin-top:.1rem;}
.ct-life-bar-wrap{flex:1;}
.ct-bar{height:14px;background:rgba(26,18,8,.8);border-radius:7px;border:1px solid rgba(201,168,76,.2);overflow:hidden;margin-bottom:.3rem;}
.ct-bar-fill{height:100%;border-radius:7px;transition:width .4s ease,background .4s ease;}
.ct-bar-fill.healthy{background:linear-gradient(90deg,#2ecc71,#27ae60);}
.ct-bar-fill.wounded{background:linear-gradient(90deg,#e67e22,#d35400);}
.ct-bar-fill.critical{background:linear-gradient(90deg,#e74c3c,#c0392b);}
.ct-wounded-marker{height:14px;width:2px;background:rgba(231,76,60,.8);position:absolute;top:0;transform:translateX(-1px);}
.ct-step-btn{width:3rem;height:3rem;border-radius:50%;cursor:pointer;font-size:1.5rem;font-weight:700;font-family:'Cinzel Decorative',serif;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;line-height:1;border:2px solid;}
.ct-step-btn.minus{background:rgba(204,74,74,.15);border-color:rgba(204,74,74,.5);color:var(--rust-light);}
.ct-step-btn.minus:hover{background:rgba(204,74,74,.3);border-color:var(--rust-light);box-shadow:0 0 14px rgba(204,74,74,.35);transform:scale(1.08);}
.ct-step-btn.minus:active{transform:scale(.94);}
.ct-step-btn.plus{background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.45);color:#5ddb8a;}
.ct-step-btn.plus:hover{background:rgba(46,204,113,.25);border-color:#5ddb8a;box-shadow:0 0 14px rgba(46,204,113,.3);transform:scale(1.08);}
.ct-step-btn.plus:active{transform:scale(.94);}
.ct-step-amount{display:flex;flex-direction:column;align-items:center;gap:.25rem;}
.ct-step-amount select{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.3);color:var(--brass-light);font-family:'Cinzel Decorative',serif;font-size:1.1rem;padding:.3rem .5rem;border-radius:6px;text-align:center;cursor:pointer;outline:none;width:3.8rem;}
.ct-step-amount select:focus{border-color:var(--brass);}
.ct-step-lbl{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dark);}
.ct-step-custom{background:transparent;border:1px solid rgba(201,168,76,.2);color:var(--brass-dark);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.22rem .5rem;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:.06em;}
.ct-step-custom:hover{border-color:var(--brass);color:var(--brass-light);}
.ct-state-badge{display:inline-flex;align-items:center;gap:.35rem;font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .7rem;border-radius:5px;font-weight:600;}
.ct-state-badge.ok{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.35);color:#5ddb8a;}
.ct-state-badge.wounded{background:rgba(230,126,34,.12);border:1px solid rgba(230,126,34,.4);color:#e8a458;}
.ct-state-badge.ooa{background:rgba(204,74,74,.12);border:1px solid rgba(204,74,74,.4);color:var(--rust-light);}
/* Conditions */
.ct-cond-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.45rem;}
.ct-cond{display:flex;align-items:center;gap:.45rem;background:rgba(26,18,8,.6);border:1px solid rgba(201,168,76,.12);border-radius:6px;padding:.42rem .6rem;cursor:pointer;transition:all .2s;user-select:none;}
.ct-cond.active{background:rgba(204,74,74,.12);border-color:rgba(204,74,74,.5);}
.ct-cond-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(201,168,76,.3);flex-shrink:0;transition:all .2s;}
.ct-cond.active .ct-cond-dot{background:var(--rust-light);border-color:var(--rust-light);box-shadow:0 0 5px rgba(204,74,74,.5);}
.ct-cond-name{font-family:'Josefin Sans',sans-serif;font-size:.7rem;letter-spacing:.05em;color:var(--parchment-dark);transition:color .2s;}
.ct-cond.active .ct-cond-name{color:var(--rust-light);}
/* Stats grid */
.ct-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.35rem;}
.ct-stat{background:rgba(26,18,8,.7);border:1px solid rgba(201,168,76,.12);border-radius:5px;padding:.35rem .2rem;text-align:center;}
.ct-stat-lbl{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--brass);display:block;margin-bottom:.2rem;}
.ct-stat-val{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--brass-light);}
.ct-stat-val.debuffed{color:var(--rust-light);}
/* Abilities */
.ct-ability{background:rgba(26,18,8,.6);border:1px solid rgba(201,168,76,.1);border-radius:6px;padding:.55rem .75rem;margin-bottom:.35rem;cursor:pointer;transition:all .2s;}
.ct-ability:hover{border-color:rgba(201,168,76,.35);background:rgba(42,30,8,.7);}
.ct-ability-header{display:flex;align-items:center;gap:.5rem;}
.ct-ability-name{font-family:'Cinzel',serif;font-size:.88rem;color:var(--brass-light);}
.ct-ability-type{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dark);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);padding:.05rem .3rem;border-radius:3px;}
.ct-ability-desc{font-family:'IM Fell English',serif;font-size:.85rem;line-height:1.65;color:var(--parchment-dark);margin-top:.4rem;display:none;}
.ct-ability.expanded .ct-ability-desc{display:block;}
/* Schools / Invocations */
.ct-school-btn{background:rgba(100,40,160,.12);border:1px solid rgba(100,40,160,.3);color:#c090f0;font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.3rem .7rem;border-radius:5px;cursor:pointer;margin:.2rem;transition:all .2s;}
.ct-school-btn:hover{background:rgba(100,40,160,.25);}
.ct-invoc{background:rgba(26,18,8,.6);border:1px solid rgba(100,40,160,.15);border-radius:6px;padding:.5rem .7rem;margin-bottom:.3rem;cursor:pointer;transition:all .2s;}
.ct-invoc:hover{border-color:rgba(100,40,160,.4);}
.ct-invoc-name{font-family:'Cinzel',serif;font-size:.85rem;color:#c090f0;}
.ct-invoc-power{font-family:'Josefin Sans',sans-serif;font-size:.68rem;color:var(--brass);margin-left:.4rem;}
.ct-invoc-desc{font-family:'IM Fell English',serif;font-size:.83rem;line-height:1.6;color:var(--parchment-dark);margin-top:.38rem;display:none;}
.ct-invoc.expanded .ct-invoc-desc{display:block;}
/* Notes */
.ct-notes{width:100%;background:rgba(26,18,8,.7);border:1px solid rgba(201,168,76,.2);color:var(--parchment);font-family:'IM Fell English',serif;font-size:.9rem;padding:.6rem .8rem;border-radius:6px;outline:none;resize:vertical;min-height:70px;line-height:1.6;}
.ct-notes:focus{border-color:rgba(201,168,76,.45);}
.ct-reset-btn{background:rgba(204,74,74,.1);border:1px solid rgba(204,74,74,.25);color:var(--rust-light);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.38rem .85rem;border-radius:5px;cursor:pointer;transition:all .2s;}
.ct-reset-btn:hover{background:rgba(204,74,74,.2);}
/* ── ACTION TRACKER ────────────────────────────────────────── */
.ct-actions-row{display:flex;gap:.6rem;justify-content:center;margin-bottom:.3rem;}
.ct-action-pip{width:2.8rem;height:2.8rem;border-radius:50%;border:2px solid rgba(201,168,76,.3);background:rgba(26,18,8,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .22s;flex-shrink:0;}
.ct-action-pip.used{background:rgba(201,168,76,.22);border-color:var(--brass);box-shadow:0 0 12px rgba(201,168,76,.45);}
.ct-action-pip .pip-inner{width:1rem;height:1rem;border-radius:50%;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);transition:all .22s;}
.ct-action-pip.used .pip-inner{background:var(--brass);border-color:var(--brass-light);box-shadow:0 0 7px rgba(201,168,76,.7);}
/* ── DICE ROLLER ─────────────────────────────────────────── */
.ct-dice-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;}
.ct-die-btn{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.22);color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.04em;padding:.35rem .6rem;border-radius:6px;cursor:pointer;transition:all .18s;}
.ct-die-btn:hover{border-color:var(--brass);color:var(--brass-light);background:rgba(42,30,8,.9);}
.ct-die-btn:active{transform:scale(.9);}
.ct-roll-result{font-family:'Cinzel Decorative',serif;font-size:2.2rem;text-align:center;color:var(--brass-light);min-height:2.8rem;transition:all .25s;text-shadow:0 0 12px rgba(201,168,76,.45);}
.ct-roll-result.crit{color:#FFD700;text-shadow:0 0 22px rgba(255,215,0,.9),0 0 45px rgba(255,215,0,.4);animation:critPulse .5s ease;}
.ct-roll-result.fumble{color:var(--rust-light);text-shadow:0 0 18px rgba(204,74,74,.7);}
@keyframes critPulse{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
.ct-roll-detail{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--brass-dark);text-align:center;min-height:1rem;}
/* ── OPPOSED ROLL ──────────────────────────────────────── */
.ct-opp-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;align-items:center;padding:.5rem 0;}
.ct-opp-side{text-align:center;}
.ct-opp-stat-val{font-family:'Cinzel Decorative',serif;font-size:1.5rem;color:var(--brass-light);}
.ct-opp-stat-name{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dark);}
.ct-opp-die{font-family:'Cinzel Decorative',serif;font-size:2.4rem;color:var(--parchment);min-height:2.8rem;line-height:1.1;}
.ct-opp-total{font-family:'Cinzel',serif;font-size:.9rem;margin-top:.1rem;}
.ct-opp-total.win{color:#5ddb8a;text-shadow:0 0 10px rgba(93,219,138,.4);}
.ct-opp-total.lose{color:var(--rust-light);}
.ct-vs-div{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--brass-dark);}
.ct-opp-roll-btn{width:100%;background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(184,115,51,.08));border:1px solid rgba(201,168,76,.3);color:var(--brass-light);font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.08em;padding:.42rem .5rem;border-radius:6px;cursor:pointer;transition:all .2s;margin-top:.4rem;text-transform:uppercase;}
.ct-opp-roll-btn:hover{background:rgba(201,168,76,.2);border-color:var(--brass);}
/* ── MAINTENANCE ──────────────────────────────────────────── */
.ct-maint-item{display:flex;align-items:center;gap:.55rem;padding:.42rem .65rem;border-radius:6px;border:1px solid rgba(201,168,76,.1);margin-bottom:.28rem;background:rgba(26,18,8,.5);cursor:pointer;transition:all .2s;user-select:none;}
.ct-maint-item.done{background:rgba(61,184,140,.07);border-color:rgba(61,184,140,.22);}
.ct-maint-check{width:1.3rem;height:1.3rem;border-radius:4px;border:2px solid rgba(201,168,76,.3);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:.78rem;}
.ct-maint-item.done .ct-maint-check{background:rgba(61,184,140,.25);border-color:#5ddb8a;color:#5ddb8a;}
.ct-maint-text{font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--parchment-dark);flex:1;line-height:1.4;}
.ct-maint-item.done .ct-maint-text{text-decoration:line-through;color:var(--brass-dark);}
/* ── WEAPON QUICK CARDS ───────────────────────────────────── */
.ct-weapon-card{background:rgba(26,18,8,.6);border:1px solid rgba(201,168,76,.15);border-radius:7px;padding:.55rem .75rem;margin-bottom:.3rem;transition:border-color .2s;}
.ct-weapon-card:hover{border-color:rgba(201,168,76,.3);}
.ct-weapon-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.22rem;}
.ct-weapon-name{font-family:'Cinzel',serif;font-size:.9rem;color:var(--brass-light);}
.ct-weapon-dmg{font-family:'Cinzel Decorative',serif;font-size:1.05rem;color:#FFD060;text-shadow:0 0 8px rgba(255,208,60,.35);}
.ct-weapon-tags{display:flex;gap:.28rem;flex-wrap:wrap;}
.ct-wtag{font-family:'Josefin Sans',sans-serif;font-size:.65rem;letter-spacing:.05em;padding:.1rem .32rem;border-radius:3px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.18);color:var(--parchment-dark);}
.ct-wtag.special{background:rgba(100,40,160,.12);border-color:rgba(100,40,160,.28);color:#c090f0;}
.ct-wtag.danger{background:rgba(204,74,74,.1);border-color:rgba(204,74,74,.25);color:var(--rust-light);}
/* ── ROUND COUNTER ────────────────────────────────────────── */
.ct-round-row{display:flex;align-items:center;justify-content:center;gap:.75rem;}
.ct-round-num{font-family:'Cinzel Decorative',serif;font-size:3rem;color:var(--brass-light);line-height:1;text-shadow:0 0 18px rgba(201,168,76,.45);min-width:3.5rem;text-align:center;}
.ct-round-btn{width:2.2rem;height:2.2rem;border-radius:50%;border:1px solid rgba(201,168,76,.28);background:rgba(26,18,8,.6);color:var(--brass-dark);cursor:pointer;font-size:1.1rem;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.ct-round-btn:hover{border-color:var(--brass);color:var(--brass-light);background:rgba(42,30,8,.8);}
/* ── STEPPER ──────────────────────────────────────────────── */
.ct-stepper{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.6rem;}
.ct-step-btn{width:3.2rem;height:3.2rem;border-radius:50%;cursor:pointer;font-size:1.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;line-height:1;border:2px solid;}
.ct-step-btn.minus{background:rgba(204,74,74,.15);border-color:rgba(204,74,74,.45);color:var(--rust-light);}
.ct-step-btn.minus:hover{background:rgba(204,74,74,.28);border-color:var(--rust-light);box-shadow:0 0 16px rgba(204,74,74,.35);transform:scale(1.08);}
.ct-step-btn.minus:active{transform:scale(.92);}
.ct-step-btn.plus{background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.4);color:#5ddb8a;}
.ct-step-btn.plus:hover{background:rgba(46,204,113,.25);border-color:#5ddb8a;box-shadow:0 0 16px rgba(46,204,113,.3);transform:scale(1.08);}
.ct-step-btn.plus:active{transform:scale(.92);}
.ct-step-center{display:flex;flex-direction:column;align-items:center;gap:.2rem;}
.ct-step-select{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.3);color:var(--brass-light);font-family:'Cinzel Decorative',serif;font-size:1.05rem;padding:.28rem .4rem;border-radius:6px;text-align:center;cursor:pointer;outline:none;width:4rem;}
.ct-step-select:focus{border-color:var(--brass);}
.ct-step-lbl{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dark);}
.ct-custom-btn{background:transparent;border:1px solid rgba(201,168,76,.18);color:var(--brass-dark);font-family:'Josefin Sans',sans-serif;font-size:.68rem;padding:.2rem .5rem;border-radius:4px;cursor:pointer;transition:all .2s;margin-top:.3rem;letter-spacing:.05em;}
.ct-custom-btn:hover{border-color:var(--brass);color:var(--brass-light);}
.ct-full-heal-btn{background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);color:var(--brass-dark);font-family:'Josefin Sans',sans-serif;font-size:.68rem;padding:.2rem .5rem;border-radius:4px;cursor:pointer;transition:all .2s;margin-top:.3rem;letter-spacing:.05em;}
.ct-full-heal-btn:hover{background:rgba(46,204,113,.2);border-color:#5ddb8a;color:#5ddb8a;}
.modal{background:linear-gradient(135deg,rgba(26,18,8,.98),rgba(20,20,35,.98));border:1px solid rgba(201,168,76,.4);border-radius:12px;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 70px rgba(0,0,0,.7),0 0 35px rgba(201,168,76,.08);}
.modal-head{padding:1.35rem 1.75rem;border-bottom:1px solid rgba(201,168,76,.18);background:linear-gradient(135deg,rgba(42,32,10,.5),transparent);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;backdrop-filter:blur(10px);}
.modal-title{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--brass-light);}
.modal-close{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--brass-dark);width:1.9rem;height:1.9rem;border-radius:50%;cursor:pointer;font-size:.95rem;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{border-color:var(--brass);color:var(--brass-light);}
.modal-body{padding:1.35rem 1.75rem;}
.modal-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(65px,1fr));gap:.65rem;margin-bottom:1.25rem;}
.ms{background:rgba(42,38,30,.6);border:1px solid rgba(201,168,76,.14);border-radius:5px;padding:.65rem .4rem;text-align:center;}
.ms-lbl{font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.08em;color:var(--brass);text-transform:uppercase;display:block;}
.ms-val{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--steam);display:block;margin-top:.2rem;}
.modal-section{margin-bottom:1rem;}
.modal-section-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem;padding-bottom:.3rem;border-bottom:1px solid rgba(201,168,76,.15);}
.weapon-entry{background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.1);border-radius:4px;padding:.55rem .7rem;}
.weapon-name{color:var(--brass-light);font-family:'Cinzel',serif;font-size:.97rem;}
.weapon-stats{color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.85rem;margin-top:.18rem;line-height:1.55;}
.ability-entry{background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.1);border-radius:4px;padding:.55rem .7rem;margin-bottom:.35rem;cursor:pointer;transition:border-color .2s;}
.ability-entry:hover{border-color:rgba(201,168,76,.28);}
.ability-ename{color:var(--brass-light);font-family:'Cinzel',serif;font-size:.97rem;}
.ability-edesc{color:var(--parchment);font-family:'IM Fell English',serif;font-size:.97rem;margin-top:.35rem;line-height:1.78;display:none;}
.ability-entry.expanded .ability-edesc{display:block;}

/* ALCHEMANCY */
.schools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.75rem;}
.school-card{border-radius:8px;padding:1.1rem;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent;}
.sc-fire{background:linear-gradient(135deg,rgba(200,80,30,.14),rgba(120,40,10,.18));border-color:rgba(200,80,30,.28);}
.sc-earth{background:linear-gradient(135deg,rgba(80,150,60,.14),rgba(40,100,20,.18));border-color:rgba(80,150,60,.28);}
.sc-air{background:linear-gradient(135deg,rgba(74,158,204,.14),rgba(30,100,160,.18));border-color:rgba(74,158,204,.28);}
.sc-water{background:linear-gradient(135deg,rgba(80,130,200,.14),rgba(30,60,150,.18));border-color:rgba(80,130,200,.28);}
.sc-fire:hover,.sc-fire.active{border-color:rgba(200,100,50,.7);box-shadow:0 0 18px rgba(200,80,30,.2);}
.sc-earth:hover,.sc-earth.active{border-color:rgba(100,180,80,.7);box-shadow:0 0 18px rgba(80,150,60,.2);}
.sc-air:hover,.sc-air.active{border-color:rgba(100,180,220,.7);box-shadow:0 0 18px rgba(74,158,204,.2);}
.sc-water:hover,.sc-water.active{border-color:rgba(80,130,220,.7);box-shadow:0 0 18px rgba(80,130,200,.2);}
.sc-icon{font-size:2.2rem;display:block;margin-bottom:.4rem;}
.sc-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);letter-spacing:.08em;}
.sc-theme{font-family:'Josefin Sans',sans-serif;font-size:.78rem;color:var(--parchment);letter-spacing:.07em;margin-top:.2rem;}
.invoc-list{display:none;}
.invoc-list.active{display:block;animation:fadeIn .3s ease;}
/* invoc-card/name/desc/head/body styles: see readability section below */
.invoc-badges{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
.ib{font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.04em;padding:.18rem .48rem;border-radius:4px;white-space:nowrap;}
.ib-action{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.22);color:var(--brass-light);}
.ib-range{background:rgba(74,158,204,.1);border:1px solid rgba(74,158,204,.22);color:var(--blue);}
.ib-diff{background:rgba(204,74,74,.1);border:1px solid rgba(204,74,74,.22);color:var(--red);}
.ib-elem{background:rgba(61,184,140,.1);border:1px solid rgba(61,184,140,.22);color:var(--green);}

/* ESSENCE TRACKER */
.ess-tracker{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.18);border-radius:8px;padding:1.1rem;margin-bottom:1.75rem;}
.ess-row{display:flex;align-items:center;gap:.9rem;margin-bottom:.65rem;}
.ess-lbl{font-family:'Josefin Sans',sans-serif;font-size:.76rem;letter-spacing:.08em;width:75px;display:flex;align-items:center;gap:.35rem;}
.ess-pips{display:flex;gap:.3rem;flex:1;}
.pip{width:26px;height:26px;border-radius:50%;border:2px solid;cursor:pointer;transition:all .2s;}
.pip-fire{border-color:rgba(200,80,30,.45);}
.pip-fire.full{background:rgba(200,80,30,.65);box-shadow:0 0 7px rgba(200,80,30,.4);}
.pip-earth{border-color:rgba(80,150,60,.45);}
.pip-earth.full{background:rgba(80,150,60,.65);box-shadow:0 0 7px rgba(80,150,60,.4);}
.pip-air{border-color:rgba(74,158,204,.45);}
.pip-air.full{background:rgba(74,158,204,.65);box-shadow:0 0 7px rgba(74,158,204,.4);}
.pip-water{border-color:rgba(80,130,200,.45);}
.pip-water.full{background:rgba(80,130,200,.65);box-shadow:0 0 7px rgba(80,130,200,.4);}

/* ABILITIES GLOSSARY */
.glo-search{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.28);color:var(--parchment);font-family:'IM Fell English',serif;font-size:.88rem;padding:.68rem 1.1rem;border-radius:6px;width:100%;margin-bottom:.9rem;transition:border-color .2s;}
.glo-search:focus{outline:none;border-color:var(--brass);}
.glo-search::placeholder{color:var(--brass);}
.filter-pills{display:flex;gap:.45rem;margin-bottom:1.35rem;flex-wrap:wrap;}
.filter-pill{background:transparent;border:1px solid rgba(201,168,76,.22);color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;padding:.32rem .75rem;border-radius:20px;cursor:pointer;transition:all .2s;}
.filter-pill:hover,.filter-pill.active{background:rgba(201,168,76,.1);border-color:var(--brass);color:var(--brass-light);}
.glo-entry.hidden{display:none;}
/* glo-head/name/type/desc: see readability section below */

/* CANOPIC */
.can-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.75rem;}
.can-deck{text-align:center;padding:1.75rem;background:rgba(26,18,8,.8);border:2px dashed rgba(201,168,76,.2);border-radius:12px;cursor:pointer;transition:all .3s;}
.can-deck:hover{border-color:rgba(201,168,76,.45);}
.jar-icon{font-size:4.5rem;display:block;margin-bottom:.9rem;filter:drop-shadow(0 0 14px rgba(201,168,76,.3));}
.draw-btn{background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(184,115,51,.15));border:1px solid var(--brass-dark);color:var(--brass-light);font-family:'Cinzel',serif;font-size:.88rem;padding:.7rem 1.35rem;border-radius:6px;cursor:pointer;transition:all .2s;}
.draw-btn:hover{border-color:var(--brass);box-shadow:0 0 14px rgba(201,168,76,.2);}
.spirit-card{background:linear-gradient(135deg,rgba(42,32,10,.95),rgba(30,25,45,.95));border:2px solid var(--brass-dark);border-radius:12px;padding:1.35rem;animation:revealCard .45s ease;}

/* MISSIONS */

.score-btns{display:flex;gap:.45rem;justify-content:center;margin-top:.45rem;}
.score-btn{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.28);color:var(--brass-light);font-family:'Cinzel',serif;font-size:1.1rem;width:2.3rem;height:2.3rem;border-radius:4px;cursor:pointer;transition:all .2s;}

.act-title{font-family:'Cinzel',serif;font-size:.9rem;color:var(--brass-light);}
.act-sub{font-family:'Josefin Sans',sans-serif;font-size:.8rem;color:var(--brass);letter-spacing:.06em;}
.camp-missions{display:grid;gap:1px;background:rgba(201,168,76,.07);}
.m-cell{background:rgba(26,22,15,.9);padding:.9rem;cursor:pointer;transition:background .2s;position:relative;}
.m-cell:hover{background:rgba(42,38,28,.9);}
.m-cell.done{background:rgba(61,184,140,.06);}
.m-cell.done::after{content:'✓';position:absolute;top:.45rem;right:.7rem;color:var(--green);font-size:.95rem;}

.m-desc{font-family:'Josefin Sans',sans-serif;font-size:.82rem;color:var(--parchment);margin-top:.3rem;line-height:1.58;}

/* DICE */
.dice-section{max-width:780px;margin:0 auto;}
.dice-main{background:linear-gradient(135deg,rgba(26,18,8,.95),rgba(26,26,40,.95));border:2px solid rgba(201,168,76,.28);border-radius:12px;padding:2.2rem;text-align:center;margin-bottom:1.75rem;position:relative;overflow:hidden;}
.dice-main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.07) 0%,transparent 60%);pointer-events:none;}
.dice-num{font-family:'Cinzel Decorative',serif;font-size:6.5rem;color:var(--brass-light);line-height:1;display:block;min-height:7.5rem;filter:drop-shadow(0 0 18px rgba(201,168,76,.45));transition:all .1s;}
.dice-num.rolling{animation:droll .55s ease;}
@keyframes droll{0%{transform:scale(1) rotate(0)}25%{transform:scale(1.2) rotate(-14deg)}50%{transform:scale(.9) rotate(9deg)}75%{transform:scale(1.1) rotate(-4deg)}100%{transform:scale(1) rotate(0)}}
.dice-lbl{font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);margin-bottom:.42rem;}
.dice-btns{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;margin:1.35rem 0;}
.d-btn{background:linear-gradient(135deg,rgba(42,38,30,.9),rgba(30,28,40,.9));border:1px solid rgba(201,168,76,.28);color:var(--brass-light);font-family:'Cinzel',serif;font-size:.88rem;padding:.7rem 1.15rem;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.d-btn:hover{border-color:var(--brass);transform:translateY(-2px);box-shadow:0 4px 14px rgba(201,168,76,.18);}
.d-btn.primary{background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(184,115,51,.18));border-color:var(--brass);font-size:.95rem;padding:.9rem 1.75rem;}
.spec-result{font-family:'Cinzel',serif;font-size:.95rem;padding:.45rem .9rem;border-radius:4px;margin:.45rem auto;display:inline-block;}
.spec-crit{background:rgba(61,184,140,.14);color:var(--green);border:1px solid rgba(61,184,140,.38);}
.spec-fumble{background:rgba(204,74,74,.14);color:var(--red);border:1px solid rgba(204,74,74,.38);}
.opp-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:.9rem;align-items:center;margin:1rem 0;}
.opp-side{background:rgba(26,26,40,.8);border:1px solid rgba(201,168,76,.13);border-radius:6px;padding:1.1rem;text-align:center;}
.opp-side h4{font-family:'Cinzel',serif;font-size:.82rem;color:var(--brass-light);margin-bottom:.65rem;}
.opp-val{font-family:'Cinzel Decorative',serif;font-size:2.8rem;color:var(--brass-light);display:block;min-height:3.2rem;}
.mod-input{background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.28);color:var(--brass-light);font-family:'Josefin Sans',sans-serif;font-size:.95rem;padding:.38rem .65rem;border-radius:4px;width:75px;text-align:center;display:block;margin:.45rem auto;}
.vs-div{font-family:'Cinzel Decorative',serif;color:var(--brass-light);font-size:1.15rem;text-align:center;}

/* LORE */
/* Responsive grid keeps the six lore tabs equal-width and tidy at every    */
/* viewport: 2 cols on phones, 3 on tablets, 6 on desktop. minmax(0,1fr)    */
/* lets long labels (e.g. "Servants of The Engine") wrap inside the button  */
/* instead of overflowing the grid track on narrow screens.                 */
.lore-tabs{display:grid;gap:.4rem;margin-bottom:1.75rem;grid-template-columns:repeat(2,minmax(0,1fr));}
.lore-tabs .faction-tab{text-align:center;}
@media(min-width:520px){.lore-tabs{grid-template-columns:repeat(3,minmax(0,1fr));}}
@media(min-width:900px){.lore-tabs{grid-template-columns:repeat(6,minmax(0,1fr));}}
.lore-panel{display:none;}
.lore-panel.active{display:block;animation:fadeIn .3s ease;}
/* lore-text: see readability section below */

/* LORE EASTER EGGS — publisher-exclusive fragments
   Surfaces:
   - Faction tabs: tap the highlighted faction name in the lore prose to
     open that faction's signed declaration (a single inline reveal panel).
   - Engine tab: tap the archivist's seal at the foot of the lore to open
     a panel containing the three Recovered & Disputed Documents,
     navigable via sub-tabs.
   All styling is dormant until chunk 3 wires up the DOM.
*/
/* Tappable faction-name anchor — barely-visible dotted underline that
   brightens on hover. Reads as a typographic flourish until you notice it. */
/* Tappable faction-name anchor — clearly visible "lit from within" treatment.
   The whole word shifts to a brass tone with a soft glow, slowly pulsing to
   draw the eye without becoming distracting. Hover stops the pulse and locks
   in the peak state. Users with reduced-motion preference get a static
   visible state. */
.ee-anchor{cursor:pointer;color:rgba(201,168,76,.9);border-bottom:1px dotted rgba(201,168,76,.7);text-shadow:0 0 6px rgba(201,168,76,.2);transition:color .2s,border-color .2s,text-shadow .2s;animation:ee-pulse 3s ease-in-out infinite;}
.ee-anchor:hover{color:#f5d997;border-bottom-color:var(--brass);text-shadow:0 0 14px rgba(201,168,76,.7);animation:none;}
.ee-anchor:focus-visible{outline:2px solid var(--brass);outline-offset:2px;border-radius:2px;}
@keyframes ee-pulse{0%,100%{color:rgba(201,168,76,.82);text-shadow:0 0 4px rgba(201,168,76,.12);border-bottom-color:rgba(201,168,76,.55);}50%{color:#f5d997;text-shadow:0 0 14px rgba(201,168,76,.55);border-bottom-color:rgba(201,168,76,.95);}}
@media(prefers-reduced-motion:reduce){.ee-anchor{animation:none;color:#f5d997;border-bottom-color:rgba(201,168,76,.85);}}

/* Reveal panel — inline expanding fragment, document-aged feel. */
.ee-reveal{display:none;margin-top:1.5rem;padding:1.5rem 1.75rem 1.1rem;background:linear-gradient(135deg,rgba(40,35,28,.55),rgba(28,26,32,.7));border:1px solid rgba(201,168,76,.28);border-radius:6px;position:relative;}
.ee-reveal.active{display:block;animation:fadeIn .35s ease;}
.ee-reveal-title{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--brass-light);margin:0 0 .9rem;letter-spacing:.02em;border-bottom:1px solid rgba(201,168,76,.2);padding-bottom:.55rem;padding-right:1.5rem;}
.ee-reveal-body{font-size:1rem;line-height:1.85;color:var(--parchment);}
.ee-reveal-body p{margin:0 0 1rem;}
.ee-reveal-body p:last-child{margin-bottom:0;}

/* Redaction markers — censor-bar look for the Redacted Doctrine. */
.ee-reveal-body p.ee-redact{font-family:'Courier New',monospace;font-size:.78rem;color:rgba(180,140,60,.55);text-align:center;letter-spacing:.18em;padding:.45rem .6rem;background:rgba(0,0,0,.35);border-left:3px solid rgba(60,40,20,.7);border-right:3px solid rgba(60,40,20,.7);margin:.95rem auto;max-width:78%;text-transform:uppercase;}

/* Faction sign-offs — italic right-aligned attributions. */
.ee-signoff{font-family:'IM Fell English',serif;font-style:italic;color:var(--brass);text-align:right;margin:1.25rem 0 0;font-size:.95rem;letter-spacing:.02em;}

/* Discovery tag — sits at the TOP of each reveal panel as a small in-world
   confirmation that the user has found a publisher-exclusive fragment. */
.ee-footer{margin:0 0 1.25rem;padding:0 2rem .75rem 0;border-bottom:1px dotted rgba(201,168,76,.28);font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--brass);font-style:italic;text-align:center;letter-spacing:.07em;}

/* Close button (top-right) */
.ee-close{position:absolute;top:.55rem;right:.7rem;background:transparent;border:none;color:var(--brass-dark);cursor:pointer;font-size:1.2rem;line-height:1;padding:.25rem .45rem;border-radius:3px;transition:color .2s,background .2s;}
.ee-close:hover{color:var(--brass-light);background:rgba(201,168,76,.08);}
.ee-close:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}

/* Sub-tabs (Engine reveal — Mechanist / Folkloric / Doctrine) */
.ee-subtabs{display:flex;gap:.4rem;flex-wrap:wrap;margin:0 0 1rem;}
.ee-subtab{background:rgba(26,26,40,.55);border:1px solid rgba(201,168,76,.18);color:var(--parchment-dark);font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.07em;text-transform:uppercase;padding:.36rem .7rem;border-radius:4px;cursor:pointer;transition:all .2s;}
.ee-subtab:hover{border-color:rgba(201,168,76,.4);color:var(--brass-light);}
.ee-subtab.active{background:rgba(201,168,76,.12);border-color:var(--brass);color:var(--brass-light);}
.ee-subtab:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}

/* ── ARCHIVE EASTER EGG — sigils, mode chrome, celebrations ──────
   Five tiny brass glyphs scattered across the app, one per faction.
   Default: muted decorative chrome (~28% opacity).
   Archive Mode: unfound sigils pulse brass to draw the eye.
   Sealed (found): muted again with a thin brass ring, like an
   archivist's stamp on a recovered document.
   Activation: tap the TWISTED logo 5 times within ~3 seconds. */
.ee-sigil{display:inline-flex;align-items:center;justify-content:center;width:14px;height:22px;background:var(--twisted-rune) no-repeat center/contain;opacity:0;visibility:hidden;pointer-events:none;cursor:default;vertical-align:middle;box-sizing:content-box;padding:8px 11px;border-radius:6px;transition:opacity .4s ease,visibility .4s ease,transform .2s ease,filter .3s ease;-webkit-tap-highlight-color:transparent;}
.ee-sigil svg{display:none;}
.ee-sigil:focus-visible{outline:2px solid rgba(120,210,245,.7);outline-offset:2px;}
/* Archive Mode on: sigils become visible and interactive.
   Unsealed sigils pulse with the rune's signature blue glow.
   Sealed sigils stay statically visible with a soft blue aura —
   recovered, no further action. */
body.archive-mode-on .ee-sigil{visibility:visible;pointer-events:auto;cursor:pointer;}
body.archive-mode-on .ee-sigil.sealed{cursor:default;}
body.archive-mode-on .ee-sigil:not(.sealed){animation:archiveSigilPulse 2s ease-in-out infinite;}
@keyframes archiveSigilPulse{0%,100%{opacity:.55;transform:scale(1);filter:drop-shadow(0 0 4px rgba(80,180,220,.45));}50%{opacity:1;transform:scale(1.18);filter:drop-shadow(0 0 14px rgba(120,210,245,.95));}}
.ee-sigil.sealed{opacity:.55;animation:none;filter:drop-shadow(0 0 5px rgba(80,180,220,.45));}
/* Tap-flash — fires the instant a sigil is tapped (before sealed state settles in).
   The animation wins over .sealed's animation:none via source order while both
   classes coexist. After 600ms the JS removes .tap-flash, sealed takes over,
   and the end-state of the keyframe matches the sealed visual for a seamless landing. */
.ee-sigil.tap-flash{animation:sigilTapFlash .5s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes sigilTapFlash{
  0%{transform:scale(1);opacity:1;filter:drop-shadow(0 0 14px rgba(120,210,245,.95));}
  40%{transform:scale(1.42);opacity:1;filter:drop-shadow(0 0 26px rgba(160,230,255,1)) drop-shadow(0 0 48px rgba(120,210,245,.75));}
  100%{transform:scale(1);opacity:.55;filter:drop-shadow(0 0 5px rgba(80,180,220,.45));}
}
@media(prefers-reduced-motion:reduce){body.archive-mode-on .ee-sigil:not(.sealed){animation:none;opacity:.9;filter:drop-shadow(0 0 8px rgba(120,210,245,.7));}.ee-sigil.tap-flash{animation:none;filter:drop-shadow(0 0 14px rgba(120,210,245,.95));}}

/* Helper for sigil containers (welcome card with sigil overlay) */
.has-archive-sigil{position:relative;}

/* Activation banner — slides down from top for ~1.8s */
/* Activation banner — appears at viewport center for ~1.8s, then exits */
.archive-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.92);z-index:9999;background:linear-gradient(135deg,rgba(40,32,18,.97),rgba(28,22,12,.97));border:1px solid rgba(232,201,122,.55);border-radius:8px;padding:.95rem 1.7rem;font-family:'Cinzel',serif;font-size:.95rem;color:var(--brass-light);letter-spacing:.12em;white-space:nowrap;box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 24px rgba(232,201,122,.28);opacity:0;transition:opacity .45s ease,transform .55s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:92vw;text-align:center;}
.archive-banner.visible{opacity:1;transform:translate(-50%,-50%) scale(1);animation:bannerGlowBurst 1.4s ease-out;}
@keyframes bannerGlowBurst{
  0%{box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 70px rgba(232,201,122,.8),0 0 130px rgba(232,201,122,.4);}
  60%{box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 36px rgba(232,201,122,.5);}
  100%{box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 24px rgba(232,201,122,.28);}
}

/* Persistent countdown ring — top-right corner during Archive Mode */
.archive-countdown{position:fixed;top:5rem;right:1rem;z-index:9990;width:34px;height:34px;pointer-events:none;opacity:0;transition:opacity .4s ease;}
.archive-countdown.visible{opacity:1;}
.archive-countdown svg{width:100%;height:100%;display:block;}
.archive-countdown .ring-bg{stroke:rgba(201,168,76,.2);}
.archive-countdown .ring-fg{stroke:var(--brass-light);stroke-linecap:round;filter:drop-shadow(0 0 4px rgba(232,201,122,.6));}
.archive-countdown .ac-gear{fill:var(--brass);opacity:.85;}

/* First-find celebratory in-world card — slides in at center, dismisses to make way for reveal */
.archive-first-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:9999;background:linear-gradient(135deg,rgba(42,32,18,.97),rgba(28,22,14,.97));border:1.5px solid var(--brass);border-radius:8px;padding:1.6rem 2rem 1.4rem;text-align:center;box-shadow:0 14px 42px rgba(0,0,0,.65),0 0 32px rgba(232,201,122,.32);opacity:0;pointer-events:none;transition:opacity .5s ease,transform .55s cubic-bezier(.34,1.56,.64,1);max-width:90vw;width:380px;}
.archive-first-card.visible{opacity:1;transform:translate(-50%,-50%) scale(1);animation:firstCardGlowBurst 1.4s ease-out;}
@keyframes firstCardGlowBurst{
  0%{box-shadow:0 14px 42px rgba(0,0,0,.65),0 0 100px rgba(232,201,122,.85),0 0 180px rgba(232,201,122,.45);}
  60%{box-shadow:0 14px 42px rgba(0,0,0,.65),0 0 50px rgba(232,201,122,.55);}
  100%{box-shadow:0 14px 42px rgba(0,0,0,.65),0 0 32px rgba(232,201,122,.32);}
}
.archive-first-card .afc-mark{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.18em;color:var(--brass-light);margin-bottom:.85rem;text-shadow:0 0 12px rgba(232,201,122,.55);}
.archive-first-card .afc-msg{font-family:'IM Fell English',serif;font-size:1rem;color:var(--parchment);line-height:1.65;margin:0 0 .75rem;font-style:italic;}
.archive-first-card .afc-sig{font-family:'Josefin Sans',sans-serif;font-size:.7rem;letter-spacing:.14em;color:var(--brass);text-transform:uppercase;}

/* Radial brass shockwave that bursts outward from the card on first find — pure visual punch */
.archive-first-flash{position:fixed;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,rgba(232,201,122,.7) 0%,rgba(201,168,76,.35) 28%,rgba(201,168,76,.12) 55%,transparent 75%);transform:translate(-50%,-50%);pointer-events:none;z-index:9998;opacity:0;animation:firstFindFlash 1s cubic-bezier(.16,.84,.44,1) forwards;}
@keyframes firstFindFlash{
  0%{width:8px;height:8px;opacity:0;}
  15%{opacity:1;}
  100%{width:180vmax;height:180vmax;opacity:0;}
}

/* Subsequent-find toast — brass strip from the bottom */
.archive-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:9995;background:linear-gradient(135deg,rgba(40,32,18,.97),rgba(28,22,12,.97));border:1.5px solid var(--brass);border-radius:8px;padding:1rem 1.6rem;font-family:'Cinzel',serif;font-size:.98rem;color:var(--brass-light);letter-spacing:.1em;box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 28px rgba(232,201,122,.3);opacity:0;transition:opacity .5s ease,transform .55s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.archive-toast.visible{opacity:1;transform:translate(-50%,-50%) scale(1);animation:toastGlowBurst 1.4s ease-out;}
@keyframes toastGlowBurst{
  0%{box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 80px rgba(232,201,122,.85),0 0 150px rgba(232,201,122,.4);}
  60%{box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 44px rgba(232,201,122,.55);}
  100%{box-shadow:0 10px 32px rgba(0,0,0,.6),0 0 28px rgba(232,201,122,.3);}
}

/* Close button shared across all three notifications (banner, toast, first-card).
   Overrides parent's pointer-events:none so users can dismiss manually.
   The rest of each notification stays click-through so underlying app stays interactive. */
.archive-close-btn{position:absolute;top:.4rem;right:.5rem;width:28px;height:28px;border-radius:50%;background:transparent;border:none;color:var(--brass);font-size:1.2rem;line-height:1;cursor:pointer;pointer-events:auto;display:flex;align-items:center;justify-content:center;opacity:.55;transition:opacity .2s ease,color .2s ease,background .2s ease;-webkit-tap-highlight-color:transparent;padding:0;font-family:inherit;z-index:1;}
.archive-close-btn:hover,.archive-close-btn:focus-visible{opacity:1;color:var(--brass-light);background:rgba(232,201,122,.12);outline:none;}

/* Reduced-motion: keep the content but skip the flashy animations */
@media(prefers-reduced-motion:reduce){
  .archive-first-flash{display:none;}
  .archive-first-card,.archive-banner,.archive-toast{transform:translate(-50%,-50%);transition:opacity .3s ease;}
  .archive-first-card.visible,.archive-banner.visible,.archive-toast.visible{transform:translate(-50%,-50%);animation:none;}
}

/* The Archivist hint phrase — fades in on welcome after a few sessions */


/* Title rune completion glow — adds an extra brass aura on top of
   the existing shimmer, applied only after all 5 fragments found.
   Does not replace shimmer; layers via drop-shadow. */
body.archive-complete .welcome-title{filter:drop-shadow(0 0 16px rgba(232,201,122,.32)) drop-shadow(0 0 30px rgba(201,168,76,.18));}

/* Logo tap-tick — faint flash on tap 4 to signal "almost" */
.logo-twisted.tap-tick,.welcome-title.tap-tick{animation:logoTapTick .4s ease-out;}
@keyframes logoTapTick{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.4));}50%{filter:drop-shadow(0 0 16px rgba(232,201,122,.9));}}

/* Archives link — appears in welcome panel only after completion (5/5) */
/* Archives welcome-card — inserted into the grid between Search and Shop
   after all 5 fragments are recovered. Pulses until first clicked, then
   settles into a normal-card state. Pulse uses filter+border (not box-shadow)
   so it doesn't fight the existing .welcome-card:hover treatment. */
.welcome-card.archives{border-color:rgba(232,201,122,.4);background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(28,22,12,.92));}
.welcome-card.archives.unread{animation:archivesCardPulse 2.4s ease-in-out infinite;}
.welcome-card.archives.unread:hover{animation:none;border-color:var(--brass);}
@keyframes archivesCardPulse{
  0%,100%{filter:drop-shadow(0 0 4px rgba(232,201,122,.2));border-color:rgba(232,201,122,.45);}
  50%{filter:drop-shadow(0 0 22px rgba(232,201,122,.75));border-color:rgba(232,201,122,.95);}
}
@media(prefers-reduced-motion:reduce){.welcome-card.archives.unread{animation:none;border-color:rgba(232,201,122,.9);filter:drop-shadow(0 0 16px rgba(232,201,122,.5));}}

/* Archivist's Letter modal — the 6th post-completion fragment */
.archive-letter-modal{position:fixed;inset:0;background:rgba(10,8,4,.78);z-index:10000;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .35s ease;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
.archive-letter-modal.visible{opacity:1;pointer-events:auto;}
.archive-letter-modal .archive-letter-card{background:linear-gradient(135deg,rgba(42,32,18,.98),rgba(28,22,14,.98));border:1.5px solid var(--brass);border-radius:10px;padding:2rem 2.2rem;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 18px 50px rgba(0,0,0,.7),0 0 38px rgba(232,201,122,.3);}
.archive-letter-modal .archive-letter-card .ee-reveal-title{font-family:'Cinzel',serif;font-size:1.15rem;color:var(--brass-light);margin:0 0 .9rem;letter-spacing:.04em;border-bottom:1px solid rgba(201,168,76,.25);padding-bottom:.7rem;padding-right:2rem;}
.archive-letter-modal .archive-letter-card .ee-footer{margin:0 0 1.25rem;padding-bottom:.6rem;border-bottom:1px dotted rgba(201,168,76,.28);font-family:'Josefin Sans',sans-serif;font-size:.7rem;color:var(--brass);font-style:italic;text-align:center;letter-spacing:.07em;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--iron-dark);}
::-webkit-scrollbar-thumb{background:var(--brass-dark);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--brass);}

/* BACK TO TOP */
#back-top{position:fixed;bottom:1.5rem;right:1.5rem;width:2.6rem;height:2.6rem;background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(184,115,51,.18));border:1px solid var(--brass-dark);border-radius:50%;color:var(--brass-light);font-size:1.1rem;cursor:pointer;z-index:200;display:none;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 4px 18px rgba(0,0,0,.4);}
#back-top:hover{border-color:var(--brass);transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.5);}
#back-top.visible{display:flex;}

/* ANIMATED BACKGROUND GEARS */
.bg-gear{position:fixed;pointer-events:none;z-index:0;opacity:.04;font-size:18rem;color:var(--brass);line-height:1;user-select:none;}
.bg-gear-1{top:-4rem;right:-4rem;animation:gearSpin 60s linear infinite;}
.bg-gear-2{bottom:-6rem;left:-5rem;font-size:14rem;animation:gearSpin 40s linear infinite reverse;}
.bg-gear-3{top:40%;left:35%;font-size:8rem;opacity:.025;animation:gearSpin 80s linear infinite;}
@keyframes gearSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* TITLE SHIMMER */
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.welcome-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2.2rem,5vw,4.5rem);font-weight:900;background:linear-gradient(135deg,#E8C97A 0%,#C9A84C 28%,#fff8e7 48%,#D4B468 60%,#B89548 75%,#D4B468 90%,#E8C97A 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;line-height:1.1;animation:shimmer 5s linear infinite;filter:drop-shadow(0 0 15px rgba(201,168,76,.3));}

/* TOAST */
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:rgba(42,38,30,.97);border:1px solid var(--brass);color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:.8rem;padding:.65rem 1.25rem;border-radius:6px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* CHAR HERO (replaces image) */
.char-hero{position:relative;height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid rgba(201,168,76,.14);}
.char-hero svg{transition:transform .4s cubic-bezier(.34,1.56,.64,1),filter .3s;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));}
.char-card:hover .char-hero svg{transform:scale(1.07);filter:drop-shadow(0 6px 20px rgba(0,0,0,.6)) drop-shadow(0 0 14px var(--char-glow,rgba(201,168,76,.35)));}
.char-hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:.5rem .9rem;background:linear-gradient(to top,rgba(10,8,15,.95) 55%,transparent);}
.char-hero-bg{position:absolute;inset:0;background:var(--char-bg,linear-gradient(135deg,rgba(42,32,10,.9),rgba(26,18,8,.95)));transition:opacity .3s;}
.char-pts-badge{position:absolute;top:.55rem;right:.7rem;font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--brass-light);line-height:1;text-align:right;}
.char-pts-badge span{display:block;font-family:'Josefin Sans',sans-serif;font-size:.65rem;letter-spacing:.1em;color:var(--brass);text-transform:uppercase;}
.fav-btn{position:absolute;top:.35rem;left:.4rem;background:transparent;border:none;font-size:1.3rem;cursor:pointer;color:rgba(255,255,255,.55);transition:color .25s,transform .2s,filter .25s;line-height:1;padding:.35rem;text-shadow:0 1px 4px rgba(0,0,0,.6);z-index:2;}
.fav-btn:hover{color:rgba(255,255,255,.9);transform:scale(1.25);}
.fav-btn.fav-active{color:#FFD700;filter:drop-shadow(0 0 5px rgba(255,215,0,.7));transform:scale(1.05);}
.fav-btn.fav-active:hover{transform:scale(1.25);}

/* SEARCH highlight */
.search-hl{background:rgba(201,168,76,.25);border-radius:2px;padding:0 .1rem;}

/* LOADING SPINNER */
.spinner{width:32px;height:32px;border:3px solid rgba(201,168,76,.15);border-top-color:var(--brass);border-radius:50%;animation:spin .8s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* STAT BAR (life visualisation in modal) */
.life-bar{height:6px;background:rgba(26,18,8,.6);border-radius:3px;overflow:hidden;}
.life-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--brass));transition:width .4s ease;}
.life-fill.wounded{background:linear-gradient(90deg,var(--rust-light),#E06040);}

/* FACTION COLOUR CODING */
.fp-dickensians .char-card{border-color:rgba(180,40,40,.25);}
.fp-dickensians .char-card::before{background:linear-gradient(90deg,transparent,rgba(180,40,40,.35),transparent);}
.fp-dickensians .char-card:hover{border-color:rgba(200,60,60,.6);box-shadow:0 8px 28px rgba(0,0,0,.4),0 0 18px rgba(180,40,40,.15);}
.fp-servants .char-card{border-color:rgba(40,80,180,.25);}
.fp-servants .char-card::before{background:linear-gradient(90deg,transparent,rgba(40,80,180,.35),transparent);}
.fp-servants .char-card:hover{border-color:rgba(60,100,200,.6);box-shadow:0 8px 28px rgba(0,0,0,.4),0 0 18px rgba(40,80,180,.15);}
.fp-scions .char-card{border-color:rgba(180,140,20,.25);}
.fp-scions .char-card::before{background:linear-gradient(90deg,transparent,rgba(180,140,20,.35),transparent);}
.fp-scions .char-card:hover{border-color:rgba(200,160,40,.6);box-shadow:0 8px 28px rgba(0,0,0,.4),0 0 18px rgba(180,140,20,.15);}
.fp-guild .char-card{border-color:rgba(100,40,160,.25);}
.fp-guild .char-card::before{background:linear-gradient(90deg,transparent,rgba(100,40,160,.35),transparent);}
.fp-guild .char-card:hover{border-color:rgba(120,60,180,.6);box-shadow:0 8px 28px rgba(0,0,0,.4),0 0 18px rgba(100,40,160,.15);}

/* STAT VALUE COLOUR CODING */
.stat-hi{color:#3DB88C!important;text-shadow:0 0 8px rgba(61,184,140,.4);}
.stat-mid{color:var(--brass-light)!important;}
.stat-lo{color:var(--rust-light)!important;}

/* CONDITION BADGES */
.cond-badge{display:inline-flex;align-items:center;gap:.3rem;font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.05em;padding:.22rem .6rem;border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid;margin:.15rem;}
.cond-wounded{background:rgba(180,40,40,.15);border-color:rgba(180,40,40,.4);color:#E07060;}
.cond-stunned{background:rgba(220,180,40,.1);border-color:rgba(220,180,40,.35);color:#D4C060;}
.cond-prone{background:rgba(140,100,40,.15);border-color:rgba(140,100,40,.4);color:#C09050;}
.cond-bleed{background:rgba(160,30,30,.15);border-color:rgba(160,30,30,.4);color:#D05050;}
.cond-entangled{background:rgba(100,40,160,.15);border-color:rgba(100,40,160,.4);color:#A070D0;}
.cond-pinned{background:rgba(40,80,160,.15);border-color:rgba(40,80,160,.4);color:#6090C0;}
.cond-active{opacity:.4;}

/* DICE HISTORY */
.roll-hist{display:flex;gap:.4rem;flex-wrap:wrap;min-height:2.2rem;padding:.4rem 0;}
.roll-pip{font-family:'Cinzel Decorative',serif;font-size:1rem;background:rgba(26,18,8,.8);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:.28rem .55rem .22rem;color:var(--parchment);text-align:center;line-height:1.2;min-width:2.2rem;}
.roll-pip.crit{border-color:rgba(61,184,140,.5);color:var(--green);}
.roll-pip.fumble{border-color:rgba(204,74,74,.5);color:var(--red);}

/* ── READABILITY ── */
.glo-entry{background:linear-gradient(135deg,rgba(26,18,8,.85),rgba(30,28,40,.85));border:1px solid rgba(201,168,76,.12);border-radius:6px;padding:.82rem 1.1rem;margin-bottom:.45rem;cursor:pointer;transition:border-color .2s;}
.glo-entry:hover{border-color:rgba(201,168,76,.4);}
.glo-name{font-family:'Cinzel',serif;font-size:1.08rem;color:var(--brass-light);letter-spacing:.04em;}
.glo-type{font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dark);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);padding:.18rem .55rem;border-radius:3px;}
.glo-desc{font-size:1rem;line-height:1.85;color:var(--parchment);max-height:0;overflow:hidden;transition:max-height .38s ease,padding-top .38s;font-family:'IM Fell English',serif;}
.glo-entry.expanded .glo-desc{max-height:500px;padding-top:.75rem;}
.mission-obj.expanded .glo-desc{max-height:3000px;}
.mission-obj{padding:.65rem .75rem;}
.mission-obj .glo-name{font-size:.88rem;letter-spacing:0;}
.mission-obj .glo-head{gap:.4rem;flex-wrap:wrap;}
.mission-obj .glo-type{font-size:.68rem;white-space:nowrap;}
.invoc-name{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--brass-light);letter-spacing:.04em;}
.invoc-desc{font-size:1rem;line-height:1.85;color:var(--parchment);max-height:0;overflow:hidden;transition:max-height .38s ease,padding-top .38s;font-family:'IM Fell English',serif;}
.invoc-card{background:linear-gradient(135deg,rgba(26,18,8,.85),rgba(30,28,40,.85));border:1px solid rgba(201,168,76,.12);border-radius:6px;padding:.82rem 1.1rem;margin-bottom:.45rem;cursor:pointer;transition:border-color .2s;}
.invoc-card:hover{border-color:rgba(201,168,76,.4);}
.invoc-head{display:flex;justify-content:space-between;align-items:center;gap:.6rem;}
.invoc-power-tag{font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dark);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);padding:.18rem .55rem;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.invoc-body{max-height:0;overflow:hidden;transition:max-height .42s ease,padding-top .38s;}
.invoc-card.expanded .invoc-body{max-height:520px;padding-top:.7rem;}
.invoc-card.expanded .invoc-desc{max-height:300px;}
.invoc-card.expanded .invoc-badges{margin-top:.55rem;}
.lore-text{font-size:1.05rem;line-height:2.0;color:var(--steam);max-width:820px;}

.lore-quote{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--brass-light);font-style:italic;border-left:3px solid var(--brass-dark);padding:.95rem 1.55rem;margin:1.9rem 0;background:rgba(201,168,76,.05);line-height:1.82;}
.rule-block{background:linear-gradient(135deg,rgba(26,18,8,.65),rgba(30,28,40,.65));border:1px solid rgba(201,168,76,.13);border-radius:8px;padding:.95rem 1.2rem;margin-bottom:.75rem;}

.rule-block ul li{margin-bottom:.42rem;}
.eye-card-entry{padding:.65rem .9rem;border-bottom:1px solid rgba(201,168,76,.08);cursor:pointer;transition:background .2s;border-radius:4px;}
.eye-card-entry:hover{background:rgba(201,168,76,.06);}
.eye-card-entry .ec-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--brass-light);}
.eye-card-entry .ec-timing{font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--brass);margin:.14rem 0;}
.eye-card-entry .ec-desc{font-size:.98rem;line-height:1.82;color:var(--parchment);max-height:0;overflow:hidden;transition:max-height .32s ease,padding-top .32s;font-family:'IM Fell English',serif;}
.eye-card-entry.expanded .ec-desc{max-height:500px;padding-top:.55rem;}
.spirit-entry{padding:.62rem .9rem;border-bottom:1px solid rgba(201,168,76,.08);cursor:pointer;transition:background .2s;border-radius:4px;}
.spirit-entry:hover{background:rgba(201,168,76,.07);}
.spirit-entry.expanded .spirit-expand{max-height:600px;padding-top:.6rem;}
.spirit-expand{max-height:0;overflow:hidden;transition:max-height .38s ease,padding-top .38s;font-size:.97rem;line-height:1.82;color:var(--parchment);}
.sp-row{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;padding:.52rem 0;border-bottom:1px solid rgba(201,168,76,.09);font-size:.97rem;line-height:1.7;}
.sp-name{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--brass-light);letter-spacing:.06em;}
.sp-title{font-family:'Josefin Sans',sans-serif;font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);margin-top:.22rem;}
.spirit-card{background:linear-gradient(135deg,rgba(42,32,10,.95),rgba(30,25,45,.95));border:2px solid var(--brass-dark);border-radius:12px;padding:1.45rem;animation:revealCard .45s ease;}
/* PANEL QUOTES */
.panel-quote{display:flex;align-items:flex-start;gap:.7rem;padding:.85rem 1.3rem;margin-bottom:1.4rem;background:linear-gradient(135deg,rgba(201,168,76,.09),rgba(184,115,51,.04));border-left:3px solid var(--brass-light);border-radius:0 8px 8px 0;box-shadow:-2px 0 12px rgba(201,168,76,.18),inset 1px 0 0 rgba(201,168,76,.08);cursor:pointer;transition:border-color .3s;}
.pq-mark{font-family:'Cinzel Decorative',serif;font-size:2.8rem;color:var(--brass-light);opacity:.8;line-height:.8;flex-shrink:0;margin-top:0;filter:drop-shadow(0 0 8px rgba(201,168,76,.7)) drop-shadow(0 0 18px rgba(201,168,76,.35));}
.pq-text{font-family:'IM Fell English',serif;font-style:italic;font-size:.95rem;line-height:1.72;color:var(--parchment);flex:1;text-shadow:0 0 20px rgba(201,168,76,.08);}

/* WELCOME QUOTE */
.welcome-quote{max-width:600px;margin:1.75rem auto 0;padding:1.2rem 1.6rem 1.1rem;background:linear-gradient(135deg,rgba(201,168,76,.11),rgba(184,115,51,.07));border:1px solid rgba(201,168,76,.4);border-radius:12px;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 30px rgba(201,168,76,.08),inset 0 1px 0 rgba(201,168,76,.18);cursor:pointer;transition:border-color .3s;}
.welcome-quote::before{content:'"';position:absolute;top:-.65rem;left:1.25rem;font-family:'Cinzel Decorative',serif;font-size:4.2rem;color:var(--brass-light);opacity:.7;line-height:1;filter:drop-shadow(0 0 10px rgba(201,168,76,.8)) drop-shadow(0 0 25px rgba(201,168,76,.4));}
.wq-text{font-family:'IM Fell English',serif;font-style:italic;font-size:1.1rem;line-height:1.88;color:var(--parchment);display:block;margin-bottom:.6rem;}
.wq-attr{font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);}
@media(max-width:900px){.rules-layout{grid-template-columns:1fr}.rules-nav{position:static}.schools-grid{grid-template-columns:repeat(2,1fr)}.can-layout{grid-template-columns:1fr}.m-detail-grid{grid-template-columns:1fr 1fr}}

.hamburger-btn{display:none;background:linear-gradient(135deg,rgba(184,115,51,.2),rgba(201,168,76,.1));border:1px solid var(--copper);color:var(--brass-light);width:2.1rem;height:2.1rem;border-radius:6px;cursor:pointer;font-size:1.15rem;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;box-shadow:0 0 8px rgba(184,115,51,.25);}

.mobile-menu{display:none;position:fixed;inset:0;background:rgba(10,8,15,.96);z-index:200;backdrop-filter:blur(8px);padding:1rem 1.5rem;overflow-y:auto;animation:fadeIn .2s ease;}

.mobile-menu-close{background:transparent;border:1px solid rgba(201,168,76,.28);color:var(--brass);width:2rem;height:2rem;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}

.mobile-nav-item:hover,.mobile-nav-item:active{border-color:var(--brass-dark);color:var(--brass-light);background:rgba(201,168,76,.08);}

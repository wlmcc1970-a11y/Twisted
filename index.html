function filterAbil(v){const lv=v.toLowerCase();document.querySelectorAll('#panel-abilities .glo-entry').forEach(e=>e.classList.toggle('hidden',!e.dataset.name.includes(lv)));}
function filterType(t,btn){
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('#panel-abilities .glo-entry').forEach(e=>e.classList.toggle('hidden',t!=='All'&&e.dataset.type!==t));
}

function openChar(name){
  const c=Object.values(CHARS).flat().find(x=>x.name===name);
  if(!c)return;
  const statKeys=['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM','ALC','LIFE'];
  const stats=statKeys.filter(k=>c.stats[k]!==undefined);
  const faction=getFaction(c.name);
  const fi=factionIcon(faction);
  const crest=getCharCrest(c.name,c.role,faction);
  const pal=FACTION_PALETTES[faction]||FACTION_PALETTES.default;
  document.getElementById('m-name').textContent=c.name;
  document.getElementById('m-sub').textContent=`${c.role} · ${c.pts} pts`;
  document.getElementById('m-body').innerHTML=`
    <div style="width:100%;height:150px;border-radius:10px;margin-bottom:1.1rem;position:relative;overflow:hidden;${crest.bg?`background:${crest.bg}`:''};display:flex;align-items:center;justify-content:center">
      <div style="position:absolute;inset:0;background:${crest.bg||'linear-gradient(135deg,rgba(26,18,8,.9),rgba(10,6,20,.95))'}"></div>
      <div style="position:relative;transform:scale(1.45);filter:drop-shadow(0 6px 18px rgba(0,0,0,.7))">${crest.svg||''}</div>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(8,6,16,.95) 28%,rgba(8,6,16,.2) 60%,transparent)"></div>
      <div style="position:absolute;bottom:.75rem;left:1.1rem">
        <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:var(--brass-light);text-shadow:0 2px 8px rgba(0,0,0,.8)" translate="no">${c.name}</div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.12em;color:${pal.rim||'var(--brass)'};text-transform:uppercase" translate="no">${c.role} · ${faction}</div>
      </div>
      <div style="position:absolute;top:.65rem;right:.9rem;text-align:right;font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--brass-light);text-shadow:0 2px 8px rgba(0,0,0,.8)">${c.pts}<span style="display:block;font-family:'Josefin Sans',sans-serif;font-size:.65rem;color:${pal.rim||'var(--brass)'};letter-spacing:.1em">PTS</span></div>
    </div>
    <div class="modal-stats">
      ${stats.map(k=>`<div class="ms" translate="no"><span class="ms-lbl">${k}</span><span class="ms-val">${c.stats[k]}</span></div>`).join('')}
    </div>
    ${(()=>{
      const life=parseInt(c.stats['LIFE'])||0;
      if(!life)return '';
      const woundedAt=Math.ceil(life/2);
      return `<div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;font-family:'Josefin Sans',sans-serif;font-size:.78rem;color:var(--brass);margin-bottom:.28rem">
          <span>LIFE</span><span>${life} · Wounded below ${woundedAt}</span>
        </div>
        <div class="life-bar"><div class="life-fill" style="width:100%"></div></div>
        <div class="life-bar" style="margin-top:2px"><div class="life-fill wounded" style="width:${(woundedAt/life*100).toFixed(0)}%"></div></div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--brass);margin-top:.18rem">▲ Full · ▲ Wounded threshold (−2 all stats)</div>
      </div>`;
    })()}
    ${c.lore?`<div class="highlight-box">${c.lore}</div>`:''}
    ${c.schools?`<div class="modal-section"><div class="modal-section-title">⚗ Schools</div><div>${c.schools.map(s=>`<span class="stat-pill" data-school="${s.toLowerCase()}" onclick="event.stopPropagation();goToSchool('${s}')" title="View ${s} invocations" translate="no">${s}</span>`).join('')}</div></div>`:''}
    ${c.weapons?`<div class="modal-section"><div class="modal-section-title">⚔ Weapons</div><div class="weapon-entry">${c.weapons.split(' · ').map(w=>`<div class="weapon-stats">${w.replace(/ (Range:)/,'<br>$1')}</div>`).join('<div style="border-top:1px solid rgba(201,168,76,.08);"></div>')}</div></div>`:''}
    <div class="modal-section"><div class="modal-section-title">⚡ Abilities</div>
      ${c.abilities.map(a=>`<div class="ability-entry" onclick="this.classList.toggle('expanded')">
        <div class="ability-ename" translate="no">${a}</div>
        <div class="ability-edesc">${abilityDesc(a)}</div>
      </div>`).join('')}
    </div>
    ${c.ammo?`<div class="modal-section"><div class="modal-section-title">🔫 Ammunition Types</div><div class="weapon-entry">${c.ammo.split(' · ').map(a=>`<div class="weapon-stats">${a.replace(/ (Range:)/,'<br>$1')}</div>`).join('<div style="border-top:1px solid rgba(201,168,76,.08);"></div>')}</div></div>`:''}
    ${c.needsVerification?`<div class="notice warning" style="margin-top:.75rem">⚠ Guild character — stats pending verification against physical cards. Some values may differ from final printed cards.</div>`:''}
    <div class="modal-section" style="margin-top:.5rem">
      <button onclick="toggleCompany('${c.name.replace(/'/g,"\\'")}',${attrJs(c.pts)})" style="width:100%;background:linear-gradient(135deg,rgba(61,184,140,.1),rgba(61,184,140,.06));border:1px solid rgba(61,184,140,.35);color:#5ddb8a;font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.08em;padding:.55rem;border-radius:6px;cursor:pointer;transition:all .2s">${isInCompany(c.name)?'✕ Remove from Company':'⊕ Add to Company ('+c.pts+'pts)'}</button>
    </div>`;
  document.getElementById('char-modal').classList.add('open');
}

function showSchool(k,el){
  document.querySelectorAll('.school-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.invoc-list').forEach(l=>l.classList.remove('active'));
  el.classList.add('active');document.getElementById('il-'+k).classList.add('active');
}
function goToSchool(name){
  const k=name.toLowerCase();
  document.getElementById('char-modal').classList.remove('open');
  navTo('alchemancy');
  setTimeout(()=>{
    const cards=document.querySelectorAll('.school-card');
    const map={fire:0,earth:1,air:2,water:3};
    const idx=map[k];
    if(idx!==undefined&&cards[idx]){
      showSchool(k,cards[idx]);
      const list=document.getElementById('il-'+k);
      if(list){const y=list.getBoundingClientRect().top+window.scrollY-80;window.scrollTo({top:y,behavior:'smooth'});}
    }
  },300);
}
function togglePip(el,idx,pip){
  const pips=[...document.querySelectorAll(`#ep-${el} .pip`)];
  if(pip.classList.contains('full'))pips.forEach((p,i)=>{if(i>=idx)p.classList.remove('full');});
  else pips.forEach((p,i)=>{if(i<=idx)p.classList.add('full');});
  const state=pips.map(p=>p.classList.contains('full'));
  Store.set('ess_'+el,state);
}
function refillEl(el){
  document.querySelectorAll(`#ep-${el} .pip`).forEach(p=>p.classList.add('full'));
  Store.set('ess_'+el,[true,true,true,true,true,true]);
}
function loadEssState(){
  ['fire','earth','air','water'].forEach(el=>{
    const saved=Store.get('ess_'+el,null);
    if(!saved)return;
    const pips=[...document.querySelectorAll(`#ep-${el} .pip`)];
    pips.forEach((p,i)=>p.classList.toggle('full',saved[i]));
  });
}

function toggleCond(charKey,cond,el){
  const key='cond_'+charKey+'_'+cond;
  const active=!Store.get(key,false);
  Store.set(key,active);
  el.classList.toggle('cond-active',!active);
  showToast(active?`${cond} applied`:`${cond} removed`);
}
function clearConds(charKey){
  ['Wounded','Stunned','Prone','Bleed','Entangled','Pinned'].forEach(cond=>{
    Store.del('cond_'+charKey+'_'+cond);
  });
  document.querySelectorAll(`#cond-track-${charKey} .cond-badge`).forEach(b=>b.classList.add('cond-active'));
  showToast('Conditions cleared');
}

function abilityDesc(name){
  const a=ABILITIES.find(x=>x.n===name||name.startsWith(x.n));
  return a?a.d:'Click to see description — check the Abilities tab for full details.';
}

function showRule(k,btn){
  document.querySelectorAll('.rules-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.rules-nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('rp-'+k).classList.add('active');
  btn.classList.add('active');
}

    <div style="margin:.55rem 0;padding:.42rem .6rem;background:rgba(201,168,76,.05);border-radius:3px;font-size:.76rem;color:var(--parchment-dark)"><strong style="color:var(--brass-dark)">Quirk:</strong> ${s.quirk}</div>
    <div class="dom-track">
      <div class="dom-lbl">Dominance Track — ${d}/${dt} turns (penalty: ${d===0?'±0':d>=dt?'AUTO':penLabel})</div>
      <div class="dom-pips">${Array(dt).fill(0).map((_,i)=>`<div class="dom-pip${i===dt-1?' danger':''}${i<d?' filled':''}" onclick="setDom(${i+1})"${i<dp.length?' title="Penalty: '+dp[i]+'"':'title="Auto-Dominated"'}></div>`).join('')}</div>
      <div style="margin-top:.65rem;display:flex;gap:.45rem;flex-wrap:wrap">
        <button onclick="setDom(${Math.min(d+1,dt)})" style="background:rgba(204,74,74,.1);border:1px solid rgba(204,74,74,.28);color:var(--rust-light);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.28rem .55rem;border-radius:3px;cursor:pointer">+1 Turn (Dom Risk)</button>
        <button onclick="disconnectJar()" style="background:transparent;border:1px solid rgba(201,168,76,.18);color:var(--brass-dark);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.28rem .55rem;border-radius:3px;cursor:pointer">Disconnect</button>
      </div>
      ${d>=dt?`<div style="margin-top:.5rem;padding:.45rem;background:rgba(204,74,74,.1);border:1px solid rgba(204,74,74,.3);border-radius:4px;font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--rust-light)"><strong>⚠ DOMINATED!</strong> ${s.dominated}</div>`:''}
    </div>
  </div>`;
}
function setDom(v){const dt=(window._drawn&&window._drawn.domTotal)||5;window._domLevel=Math.min(v,dt);renderDrawn();}
function disconnectJar(){
  if(window._drawn){window._canDeck.push(window._drawn);shuffle(window._canDeck);}
  window._drawn=null;window._domLevel=0;
  document.getElementById('can-count').textContent=window._canDeck.length+' spirits remaining';
  document.getElementById('drawn-spirit').innerHTML='<div class="notice">🏺 Spirit returned and deck shuffled.</div>';
}
function resetDeck(){
  window._canDeck=[...SPIRITS];shuffle(window._canDeck);window._drawn=null;window._domLevel=0;
  document.getElementById('can-count').textContent='20 spirits — click to draw';
  document.getElementById('drawn-spirit').innerHTML='';
}
function showSpiritDetail(name){
  const s=SPIRITS.find(x=>x.n===name);if(!s)return;
  document.getElementById('spirit-detail').innerHTML=`<div class="card">
    <div class="card-title" translate="no">🏺 ${s.n} — ${s.title}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem;font-size:.82rem;margin-bottom:.75rem">
      <div><div style="font-family:'Josefin Sans',sans-serif;font-size:.75rem;letter-spacing:.07em;text-transform:uppercase;color:var(--brass);margin-bottom:.25rem">Access Check</div>Difficulty <strong style="color:var(--brass-light)">${s.acc}</strong> · Stat: <strong style="color:var(--brass-light)">${s.accSt}</strong></div>
      <div><div style="font-family:'Josefin Sans',sans-serif;font-size:.75rem;letter-spacing:.07em;text-transform:uppercase;color:var(--brass);margin-bottom:.25rem">Dominance</div>Difficulty <strong style="color:var(--rust-light)">${s.dom}</strong> · Stat: <strong style="color:var(--rust-light)">${s.domSt}</strong></div>
      <div><div style="font-family:'Josefin Sans',sans-serif;font-size:.75rem;letter-spacing:.07em;text-transform:uppercase;color:var(--brass);margin-bottom:.25rem">Bonuses</div>${s.bonus}</div>
      <div><div style="font-family:'Josefin Sans',sans-serif;font-size:.75rem;letter-spacing:.07em;text-transform:uppercase;color:var(--brass);margin-bottom:.25rem">Abilities <span style="font-size:.68rem;color:var(--parchment-dark)">(choose ${s.pick} of ${s.abil.split(',').length})</span></div>${s.abil}</div>
    </div>
    <div style="font-size:.8rem;margin-bottom:.5rem"><strong style="color:var(--brass-light)">⚠ Quirk:</strong> ${s.quirk}</div>
    <div style="font-size:.8rem;color:var(--rust-light)"><strong>When Dominated:</strong> ${s.dominated}</div>
  </div>`;
}

const OBJECTIVES=[
  {n:"Assassinate",turns:6,vp:"4+",d:"Consult your opponent's Company of Characters and select the 4 most expensive Characters in terms of points (not including any of Dr Disraeli's Delights). Roll a D4 to randomly select one of them as the target of your Assassination attempt. If you manage to take this Character out of the game you receive 4 bonus Victory Points. You receive an extra Victory Point if the Character is Out of Action by the third turn of the game. Game Length: 6 Turns. If, at the end of 6 turns, neither Character nominated to be Assassinated has met an untimely end then the game is extended until one or the other is eliminated."},
  {n:"No Mercy",turns:6,vp:"Varies",multi:1,d:"Sometimes it is best to despatch your opponents quickly. In this mission you gain bonus Victory Points by Wounding and taking your foes Out of Action quickly. Victory Points by turn: Turn 1: Wounded +3, OOA +4. Turn 2: Wounded +2, OOA +3. Turn 3: Wounded +1, OOA +2. Turn 4-6: No bonus for Wounded, Turn 4 OOA +1. Note: By Wounded we refer to them being reduced to the Wounded state, not simply having suffered damage. Characters who are Insignificant only gain you half the stated number of Victory Points, rounded down."},
  {n:"Territorial Dispute",turns:6,vp:"1/zone",multi:2,d:"Divide the table into six 12\" x 12\" squares. Each of these areas represents an area of the city that can be controlled by one or other of the Companies involved in the skirmish to come. At the end of the game count the Characters from each Company in each area and you receive 1 Victory Point should you have more of your Characters in a given area than your opponent or opponents. Separate Victory points are awarded for each area. You must have 2 Characters who are Insignificant for every opponent in an area to claim the Victory Point."},
  {n:"Kill or be Killed",turns:6,vp:"Varies",d:"Both players shuffle their Activation Cards and place them face down on the table. Each player then turns the first card over to reveal which two Characters are holding a grudge for this mission. To earn Victory Points one of the Characters selected must take the other Out of Action. The relevant Character must deliver the final blow that takes their foe out to gain the points. Compare the points value of the two Characters and consult the table: +26 or more: 2VP, +11 to +25: 3VP, -10 to +10: 4VP, -11 to -25: 5VP, -26 or more: 6VP."},
  {n:"The Boxes",turns:8,vp:"3/box",multi:3,d:"Place 6 items of scatter terrain around the table following the rules for placing these items. Where possible these items should be placed outside of any deployment zone. No Character may deploy within 6\\\" of these terrain elements. These represent 6 stashes of valuable goods. Each one contains a random item. For each item gained by a Company and taken from the table they receive 3 Victory Points. In order to take an item a Character must use two Actions to search the stash. This is a Finesse check with a difficulty of 12. If the check is failed it may be taken again by spending a further 2 Actions. You may not make this check if you are engaged in Close Combat. Once a stash has been successfully searched place a marker on it and it may not then be searched again. Items, once taken, may be transferred from Character to Character using a Handing Off Action. The item may not be dropped willingly, it must be Handed Off. If a Character is taken Out of Action whilst in possession of an item it scatters 1\\\" using the grenade template and may be picked up by any Character who moves over it (no Action required other than the move). If an item is usable (such as a Delight or Essence) and is used up, only 1 Victory Point is gained from it exiting the table. D8 Loot Table: 1 = D4 Fire Essences, 2 = 1pt Delight, 3 = D4 Earth Essences, 4 = 2pt Delight, 5 = D4 Air Essences, 6 = 3pt Delight, 7 = D4 Water Essences, 8 = 4pt Delight. Generate any Delights randomly from the tables in the rulebook. This mission will run for 8 turns unless all items exit the table prior to this, in which case the game ends immediately."},
  {n:"Streetsweeper",turns:6,vp:"3",multi:4,d:"For this mission you must decide which Company has the spy on the table and which is hunting for him or her. Ideally represent the Spy with a miniature. When you have determined Favour of The Engine and Priority the Company that ends up with Priority is the one that has a spy secreted somewhere on the table. During the game the hunting Company must try and find the Spy and stop him or her getting off the table. Any Character from the hunting Company within 2\" of any building can spend an Action to try and spot the hiding Spy. This is a Difficulty 15 Finesse Check. Once the Spy is spotted he or she is placed in contact with the building by the player who is not hunting. The Spy immediately makes a single Move Action away from the Character who discovered him. The Spy must now attempt to get off the table through the deployment zone of his allies (if multiple deployment zones are applicable, use the most distant one from the Spy's initial location). A Character Card representing the Spy is included — it gives all the statistics necessary. After the initial move the Spy is activated in a unique manner: the only actions the Spy can take are Move Actions. One is used at the start of the Activation Phase and one is used at the end of the Activation Phase. The distance and direction of these moves are decided by the player that controls the Spy. Should the Spy leave the table the controlling Company gains 3 Victory Points. If the Spy is taken Out of Action the hunting Company gains 3 Victory Points. If the Spy ends the game on the table but out of the Wounded state the controlling Company gains 1 Victory Point. If on the table and Wounded, the hunting Company gains 1 Victory Point. ⚔ Multi Company Variation: In games with more than two Companies the Spy is still controlled by the Company with Priority but the Victory Points are won by whichever company manages to Wound or take the Spy Out of Action."},
  {n:"Vengeance",turns:8,vp:"6",multi:5,d:"At the start of the game each player randomly selects one Character in the opposing Company with a value of at least 25 points. This Character has done something that has greatly offended you and must be punished. For each instance in which you cause damage to this Character you receive 1 bonus Victory Point. If they are taken Out of Action in a single attack you receive 6 Victory Points! Should both selected Characters have fallen the player who holds Priority may try and end the game early by sacrificing 2 Victory Points. Roll an Opposed D20 with both you and your opponent subtracting the number of Characters you currently have on the table. The player with the highest result may choose whether or not the game is to continue."},
  {n:"Take and Hold",turns:8,vp:"2",multi:6,d:"Before deployment of Characters the player who does not hold Priority must nominate a single building on the table. This is the objective for both Factions. It should be outside of both deployment zones if possible. No Character may deploy within 6\" of this building in any circumstance. For each Character from either Company that is within 2\" of the building at the end of the game 2 Victory Points are awarded."},
  {n:"Passing Through",turns:8,vp:"Varies",multi:7,d:"Divide the table into four 18\" squares. Place a piece of scatter terrain such as a barrel, crate or chest in the centre of each quarter to serve as the objectives. The aim of this game is to have Characters touch these objectives. A Character may not touch the same objective twice. Characters may not touch the objectives nearest to their deployment zone until they have touched at least one that is further away. If all are equidistant then any may be touched. At the end of the game add up the number of touches: 1-5: 1VP, 5-10: 2VP, 11-15: 3VP, 15-20: 4VP, 20+: 5VP. Insignificant Characters have their touches halved and rounded down."},
  {n:"Rumble",turns:6,vp:"1-2",multi:8,d:"For each opposing character brought to the Wounded state in Close Combat you receive 1 bonus Victory Point. For each opposing Character taken Out of Action in Close Combat you receive 2 bonus Victory Points."},
  {n:"Engine Tendrils",turns:8,vp:"2/tendril",multi:9,d:"Place 4 markers around the table. The markers are placed adjacent to a building or significant piece of terrain in the same manner as scatter terrain but should be placed outside of any deployment zone. These markers represent exposed tendrils of The Engine. A Character may try and gain control of a Tendril by moving into contact with it and spending two Actions. A Finesse check with a difficulty of 15 is required to control a Tendril. You may not make this check if you are in Close Combat. For each Tendril controlled Characters receive a +2 bonus to any one roll of their choosing each turn. In addition you gain 2 Victory Points for each Tendril you control at the end of the game."},
  {n:"Search and Destroy",turns:8,vp:"1+",d:"In an area of contested city there are often objectives, documents or people that are important to the opposing Factions. A Character may spend a single Action when in contact with any building outside of a deployment zone to search it. You may only search one building a turn. For each building searched roll a D6, adding +1 for every building searched previously. On a 1-5 nothing is found. Place a marker near the building to indicate it has been searched — your Company may not search that building again, but it may be searched by your opponent. On a roll of 6 it proves to contain something of great value and is a prime target for arson! Once this building has been located no further buildings may be searched by your Company. You may set the building alight by spending 2 Actions whilst in contact with it. You may not set light to the building if you are engaged in Close Combat. For each turn the building burns after the turn it is set alight you receive 1 Victory Point. Place a dice near the building with the appropriate number facing up to mark how many turns it has burned. After 3 turns you may roll a D6 and add the number of turns the building has burned for. Should this number add up to more than 8 then the building collapses and is removed from the table — replace it with an area marker representing smoking rubble that may not be moved through. Should the building you have lit collapse you receive 3 additional Victory Points! Models from the opposing Company may attempt to extinguish the fire. A Character in contact with the burning building may spend a single Action to make a Finesse check with a difficulty of 12 to turn the dice back one number. Should this reduce the total to less than 1 the fire is extinguished and must be relit."},
  {n:"The Engine's Presence",turns:6,vp:"Varies",multi:10,d:"This mission brings The Engine to the fore. It has focussed its attention on this fight and is paying special heed to the results. At the start of the game, when the initial draw of Eye of The Engine cards is to occur each player draws a hand of 4 Eye of The Engine cards. These extra cards are drawn by each player, one card at a time starting with the player who holds Favour of The Engine. At any time during the game, when an Eye of The Engine card is due to be played, a player may discard the Eye of The Engine card drawn for the turn and take one of the 4 cards from the special draw in its place. During the game Victory Points are earned: negative Eye card affecting a Character = 2VP, positive Eye card affecting a Character = 1VP."},
  {n:"Scouting Mission",turns:8,vp:"2-4",d:"For this mission each Company rolls a D6. The player with the higher result is the defender and the lower result is the attacker. Place a piece of scatter terrain in the centre of the defender's deployment zone. This represents a stash of some kind that is important. The attacker must try and reach this stash, take the item and escape the table through their own deployment zone. To take the item a single Action must be spent whilst in base contact with the stash. No roll is required but the Character must be free of Close Combat. The item can be transferred using the usual Handing Off rules and may not be dropped willingly. If a Character is taken Out of Action whilst in possession of the item it scatters 1\\\" using the grenade template and may be picked up by any Character who moves over it (no Action other than the move required). Any defending Character who picks up the item must try and return it to its starting position as quickly as possible — at least 1 Move Action per Activation towards the starting position. Attacker VP: 2VP if item in possession but not off table, 4VP if item exits table. Defender VP: 2VP if item in possession but not at starting position, 4VP if item is at starting position. Victory Points are not cumulative."},
  {n:"VIP",turns:8,vp:"2-4",d:"For this mission you will need an additional miniature or counter to represent Lord Cain-Pruis (or some other notable figure). This VIP is of importance to both Factions and may not be attacked in any way. He or she is considered to have a Speed of 4 for purposes of movement. The player who has Priority for the first turn is the one who is escorting the VIP. The VIP must leave the table from the edge opposite to where they started. In the case that this could be multiple edges simply roll a dice to determine which edge is the objective. Place the VIP in base to base contact with one of your Characters no closer than 4\" to the leading edge of your deployment zone. When this Character moves the VIP will move with them, remaining in base contact, but the VIP may not exceed his or her Speed of 4. The VIP may run however if the Escort is faster. The escorting Character may not willingly break base to base contact with the VIP. If for any reason base to base contact is lost the VIP will immediately make a single Move Action towards the nearest Character from the escorting Company. If base to base contact is not made by the next Maintenance Phase then the VIP is moved into the nearest cover and cowers until one Company or other makes base to base contact. Should a Character from the attacking Company get into base to base contact whilst the VIP is free of escorts, they may try to force the VIP to move with them by making a Strength check with a difficulty of 12 (this check must be made each turn — if it fails the VIP breaks contact and immediately runs towards the nearest escort). Should the VIP be in contact with one of his escorts but not off the table at end of game 2VP are earned. Should he or she leave the table 4VP are earned. Should the VIP be in the possession of the attackers at the end of game 4VP are earned. If not in possession of either side the attackers earn 2VP. ⚔ Multi Company Variation: In a game with more than two Companies the 4 Victory Points for possessing the VIP goes to the Company that holds him should this not be the escorting Company. Should he be in the possession of no Company then 1 Victory Point is earned by all Companies other than the one whose job it was to escort him safely away."},
  {n:"Raiding Party",turns:8,vp:"1+",multi:11,d:"For this mission your objective is to reduce as many opponents to Wounded or Out of Action as possible whilst keeping your own Company in good condition and escaping the scene. For each opposing Character reduced to the Wounded State or Out of Action by turn 5 you receive 1 bonus Victory Point. After turn 6 you get an additional bonus Victory Point for each of your Characters who leaves the table whilst not in the Wounded State. If you or your opponent have Characters with the Insignificant ability then 2 such characters must be Wounded, Out of Action or leave the table to claim the bonus Victory Points. This mission will end early should the entirety of any one Company leave the table."},
  {n:"Defence",turns:8,vp:"1-2",d:"Roll a D6 at the start of this mission. The player who rolls higher is the attacker and the player who rolls lower is the defender. The defender nominates an area of the table 12\" x 12\" that includes at least part of his or her deployment zone. The attacker receives 2 Victory Points for every Character that is in this zone at the end of the game. The defender gets 1 bonus Victory Point for each opponent in the zone who is in the Wounded State at the end of the game and 1 bonus Victory Point for each Character taken Out of Action whilst in the zone at any time during the game."},
  {n:"Carriage of Justice",turns:8,vp:"1-3",d:"For this mission you will need a model or counter to represent the Catch Wagon (approximately 2\" x 3\"). Roll a D6 at the start. The player who rolls higher is the defender of the wagon and the player who rolls lower is the attacker whose companion has been arrested. The Catch Wagon is driven by a bonded Gentlefolk Bobby who may not leave it. A Character Card is provided for the Catch Wagon — it is treated as a large Character with 35 Life. The Catch Wagon starts at a table edge in the deployment zone of the defender and must exit by a table edge opposite (if more than one edge is applicable, randomly choose). The Catch Wagon may not double move. It is considered to Activate last in the defending player's turn at all times and may move as desired by that player. It may move freely through Threatened Areas and cannot be locked in Close Combat due to its Retreat ability. Any Character the Catch Wagon moves into or over is moved immediately to be 1\" clear of it by the shortest possible route. If they cannot get clear they take D4 damage (bypassing Armour) and are placed Prone. The attackers may temporarily stop the Catch Wagon by causing it damage — any effect that causes more than 6 damage in a single attack will cause the Wagon to halt for the current turn while the Bobby goes into auto-repair mode. It acts as normal the following turn if not damaged further. The Catch Wagon will be disabled permanently if it loses all 35 of its Life. For each turn that the Wagon makes progress the defenders gain 1 Victory Point. For each turn it does not the attackers gain 1 Victory Point. Should it leave the table the defenders gain 3 Victory Points. Should the Wagon lose all its Life and be disabled the attackers gain 3 Victory Points. This mission will end as soon as the Catch Wagon leaves the table or is disabled."},
  {n:"Capture",turns:8,vp:"2-4",d:"At the start of this mission each player shuffles his or her Activation Cards and places them face down on the table. The top card is turned over and this Character as shown is the target of a capture attempt by your opponent. In order to capture the Character he or she must be taken Out of Action and a friendly Character must move into base to base contact and a single Action spent to pick them up. When the relevant Character is taken Out of Action replace the model with a small dice or marker that is more easily moved. In order to pick up the Character no opposing Character may be in Close Combat with the Character attempting to lift them. It is an Action to pick up the unconscious Character. The unconscious foe must then be picked up and taken from the table by any table edge. The carrying Character may only make a single Move Action whilst carrying the limp form. Should two Characters be in base to base contact the move may be 1½ times the Speed of the slowest Character. Should three be in contact a Run Action may be taken at the Speed of the slowest Character. All Characters carrying a captured foe are considered to Activate at the same time as the Character who first picked up the unconscious Character. Should any Character carrying the captured foe be taken Out of Action then the captured Character is dropped and an Action must be spent as above in order to continue movement. Should either captured Character leave the table the Company that managed this feat receives 4 Victory Points. If the captured character is in the possession of your opponent but on the table they receive 2 Victory Points. In any other result no Victory Points are awarded."},
  {n:"Blood on the Streets",turns:8,vp:"Varies",multi:12,d:"This mission is all about doing damage to your opponent, plain and simple. Use the table below for bonus Victory Points awarded in addition to the normal ones for Wounding and taking foes Out of Action. These bonus Victory Points are cumulative. Causing over 5 damage in a single attack: 1VP. Incapacitating a foe by any means: 1VP. Causing over 10 damage in a single attack: 1VP. Causing a Critical Hit: 1VP. Taking a foe Out of Action in a single Attack: 2VP. Having the highest number of Characters on the table at the end of the game: 3VP. In order to claim the Victory Points for taking a foe Out of Action in a single attack the attack must have taken them from outside the Wounded state to Out of Action."},
];

const FEATURES=[
{id:1,n:"Rough Ground",sum:"Loose cobblestones create Difficult Terrain zones — no running or charging through.",rules:"Roll D6 to determine how many areas: 1–2 = 1 area, 3–4 = 2 areas, 5–6 = 3 areas.<br><br>For each area, place a 2\" × 2\" square marker on the table after all other terrain is placed but before generating missions.<br><br>Each area is Difficult Terrain — Characters may not Run or Charge through it. Areas may be placed anywhere on the table."},
{id:2,n:"Guy's Gunpowder",sum:"Scatter terrain may contain hidden gunpowder stashes that detonate from stray bullets.",rules:"Affects all scatter terrain (barrels, boxes, carts) — not buildings, walls, or trees. Mark which scatter terrain may contain gunpowder with your opponent before starting.<br><br>If a Character claiming cover from such terrain is <em>missed</em> by a Ranged Attack, roll D6. On a 6, a hidden stash detonates.<br><br>The Character takes D4 damage, bypassing Armour, engulfed in flame and shrapnel.<br><br>This can trigger multiple times for the same terrain piece — Guy has often hidden more than one stash."},
{id:3,n:"Errant Essences",sum:"Lost Alchemantic Accoutrements can be found by searching near terrain.",rules:"Any Character in base-to-base contact with any terrain element may spend 1 Action to search. Finesse Check, Difficulty 12.<br><br>On success, roll D4 for the school of kit found:<br>1 = Fire, 2 = Earth, 3 = Air, 4 = Water<br><br>Then roll for a random Invocation from that school. The kit contains enough Essences to power the found Invocation.<br><br><strong>Any Character</strong> may call the found Invocation, even with Alchemancy 0 — it is a straight D20 roll with no Alchemancy bonus. An Alchemancer may instead swap one of their selected Invocations for the found one (obeying normal limits).<br><br>Found Essences may be carried in addition to Delights and can be transferred via Handing Off. They can also power other Invocations if the Character has such abilities."},
{id:4,n:"Sewer Slime!",sum:"Foul sewer creatures emerge when any unmodified D20 roll is a 1.",rules:"Place 4 numbered Sewer Grate Counters around the table, each touching a piece of terrain. They cannot be placed in the open or centre of a street.<br><br>Whenever any D20 is rolled during the game and the unmodified result is a 1, a Sewer Slime emerges. Roll D4 for which grate it appears at.<br><br>The Sewer Slime acts in the Maintenance Phase of every turn (including arrival turn). It has 2 Actions and a Character Card (provided in box). Controlled by neither player — it moves toward the nearest Character and attacks if possible.<br><br>Either player may attack the Sewer Slime normally. If it takes a Character Out of Action, it retreats to the sewers and is removed (unless still engaged in Close Combat).<br><br>Maximum 1 Sewer Slime on the table at a time. A new one may arrive if the first is taken Out of Action or retreats."},
{id:5,n:"Sinkholes",sum:"Close Combat can cause the ground to collapse, swallowing combatants.",rules:"Sinkholes are not placed initially — they appear during the game.<br><br>When a round of Close Combat finishes, roll D20. Take the Strength of the strongest Character in the Melee and add 1 per Character involved. If the D20 is <em>less than</em> this number, the ground collapses. Only one Sinkhole per Melee. Randomly determine which Character is affected.<br><br>That Character must make a Finesse Check, Difficulty 10, or fall in — taking D4 damage bypassing Armour. Remove the Character from the table and place a 1\" Sinkhole counter.<br><br><strong>While in a Sinkhole:</strong> Cannot be attacked except by a grenade dropped in by an adjacent Character (no attack roll needed, no Finesse Check to avoid).<br><br><strong>Escaping:</strong> Climb Check, Difficulty 12. Placed standing next to the Sinkhole. If an opponent is in base-to-base with the Sinkhole, they get a free attack on the emerging Character.<br><br><strong>Expanding:</strong> Any movement within 1\" of a Sinkhole requires a Finesse Check, Difficulty 12. On failure, replace the 1\" counter with a 2\" counter — any Character touched by the new counter must check or fall in. Sinkholes cannot exceed 2\" diameter."},
{id:6,n:"Twisted Trees",sum:"Engine-warped plants lash out at Characters who venture within 2\".",rules:"Affects all trees, hedges, and plants on the table. If none exist, place D3+1 markers (D6: 1–2 = 1, 3–4 = 2, 5–6 = 3, then +1). Agree with your opponent which existing plants are included.<br><br>Any Character moving within 2\" of a plant must make a Finesse Check, Difficulty 14.<br><br><strong>Failure:</strong> The plant makes a Close Combat attack (Attack Characteristic 2). If it hits: D8+4 damage and the Character's Activation ends immediately (ensnared).<br><br><strong>Success:</strong> The plant ignores that Character until they leave and re-enter the 2\" zone.<br><br>A check must be made each turn a Character moves or remains within 2\". If a Character moves <em>directly away</em> from the plant, no check is needed. Moving through the zone but not directly away requires a check.<br><br>Plants cannot be attacked."},
{id:7,n:"Leaking Gas Lamps",sum:"Damaged gas lamps may explode when nearby Ranged Attacks miss.",rules:"Note any lamp-like structures on the table with your opponent. If none exist, place D3+1 markers.<br><br>When a Ranged Attack is made at a Character within 2\" of a lamp and the attack <em>misses</em>, roll D6. On a 5–6, a spark ignites the leaking gas.<br><br>Place the 4\" Blast Template over the lamp. Each Character affected takes D4 damage, bypassing Armour. Any Character who takes 4 damage is also placed Prone. Normal template rules apply.<br><br>Once a lamp explodes, it is removed from the table — it will not detonate again."},
{id:8,n:"Dropped Delights",sum:"Search the streets for lost items from Dr Disraeli's collection.",rules:"Any Character may spend 1 Action to search for Dropped Delights at any time during the game. Make a Finesse Check:<br><br>10 or less — No Delight found<br>11–17 — 1 Point Delight found<br>18–20 — 2 Point Delight found<br>21–23 — 3 Point Delight found<br>24 or above — 4 Point Delight found<br><br>Roll D20 on the appropriate Delight table to determine the exact item. Found Delights may be used as normal.<br><br>A Character already holding a Delight may not search for another — the one-Delight-per-Character limit remains in force."},
{id:9,n:"Crumbling Architecture",sum:"Masonry may fall on Characters near unstable buildings.",rules:"Any time a Character starts their Activation within 1\" of any building or significant terrain piece, roll D6. On a 1, a piece of masonry or heavy timber falls.<br><br>The Character must make a Finesse Check, Difficulty 12. On failure: D4 damage, bypassing Armour. If 4 damage is taken, the Character is also knocked Prone immediately.<br><br>The affected Character retains their two normal Actions."},
{id:10,n:"Rats in the Ranks",sum:"A swarm of aggressive rats moves randomly, attacking anyone it contacts.",rules:"Place the 2\" Rat Swarm counter as centrally on the table as possible after terrain is placed. A Character Card is provided in the box.<br><br>The Rat Swarm acts in the Maintenance Phase each turn. It has 2 Actions, both Move Actions only. It moves randomly — use the Grenade Scatter template (align 1 with the arrow on the counter). Roll separately for each Action.<br><br>Both Actions are taken unless the swarm contacts a Character. On contact: an immediate Close Combat Attack (can be Defended normally).<br><br>The Rat Swarm does not stay engaged — it moves normally next Maintenance Phase and may leave Close Combat without Finesse Checks. Random movement may bring it into contact with the same Character again.<br><br>The Rat Swarm can be attacked normally by either player. If taken Out of Action or if random movement takes it off the table, it is removed from play."},
{id:11,n:"Ungodly Stench",sum:"The entire area reeks — Characters may be briefly overcome when Activating.",rules:"The entire table is shrouded in a foul-smelling miasma.<br><br>When any Character Activates, roll D6. On a 1, that Character is affected as though Wounded for the duration of their Activation only (−2 to all Characteristics except Armour).<br><br>The effect ends when the Character finishes their Activation."},
{id:12,n:"Angry Locals",sum:"Residents hurl objects at anyone firing near their homes.",rules:"Any Character who makes a Ranged Attack from within 1\" of any building is subjected to a resident's wrath.<br><br>A single Ranged Attack is made by the angry local with no bonus to the D20 roll. This may be Defended against normally.<br><br>If hit: 2 damage, bypassing Armour. In addition, the Character must make a Finesse Check, Difficulty 10, or be immediately Stunned."},
{id:13,n:"Lesser Engine Tendrils",sum:"Dominate a hidden Tendril for a one-use re-roll this turn.",rules:"A Character in base-to-base contact with any building may spend 1 Action to attempt to locate a Lesser Engine Tendril. Finesse Check, Difficulty 16.<br><br>On success, the Tendril is automatically dominated. The Company gains one re-roll of any single die during the current turn only.<br><br>The Engine detects the intrusion and withdraws the Tendril — the re-roll expires in the Maintenance Phase if not used.<br><br>Failing this re-roll does <em>not</em> lose Favour of The Engine (unlike failing a re-roll from The Engine's Blessing)."},
{id:14,n:"Demolition Crew",sum:"Stashes of explosives provide unlimited grenades to nearby Characters.",rules:"Place 4 Fascinating Features counters on or touching scatter terrain (barrels, boxes, etc.). Place them following the same order used for terrain setup.<br><br>These represent stashes of explosives left behind by a fleeing demolition crew. Any Character in base-to-base contact with these scatter terrain elements has access to unlimited grenades.<br><br><strong>Demolition Bomb:</strong> Range 4 / 6 / 8 / —, 2\" Blast Template, D10+6 damage.<br><br>A Character must maintain contact with the stash to throw. Once they move away, they lose access. Grenades cannot be carried away for later use."},
{id:15,n:"Slippery When Wet",sum:"Slick cobblestones create Difficult Terrain that can send runners sprawling.",rules:"Each player marks two 3\" × 3\" areas on the table (same placement order as terrain).<br><br>These areas are Difficult Terrain — movement costs 2\" of Speed per 1\" travelled.<br><br>Running through these areas (spending more than one Action on movement in an Activation) requires a Finesse Check, Difficulty 12. On failure, the Character is placed Prone at the midpoint of the Move Action that triggered the check, in a straight line from the start point in the direction of travel.<br><br>This may engage the sliding Character in Close Combat with a foe."},
{id:16,n:"Alchemantic Null Fields",sum:"Buildings fitted with Abstractors create zones where Alchemancy cannot function.",rules:"After terrain is placed but before the first turn, each player designates one building or structure (max 7\" footprint in any dimension). The Null Field extends 2\" from all sides and includes the building itself. Mark the boundary with dice or counters.<br><br><strong>Inside the Null Field:</strong> No Invocations may be called, and no Invocations may be called upon Characters within it.<br><br><strong>Line of Sight through the field</strong> (endpoint beyond): Invocation may still be called but with a −2 penalty to the Alchemancy Check.<br><br><strong>Active Invocations:</strong> Area effects end at the Null Field edge. Invocations on Characters entering the field are suspended — they resume when the Character leaves. Healing already applied is not reversed.<br><br><strong>Finding the Abstractor:</strong> Action + Finesse Check Difficulty 17, while inside the Null Field. Once found, it can be attacked in Close Combat (if touching building) or at Range by any Company member.<br><br><strong>Abstractor stats:</strong> Defence 5/5, Armour 6, Life 10. Once destroyed, the field dissipates immediately."},
{id:17,n:"Billowing Steam",sum:"Steam clouds limit visibility — Ranged Attacks beyond short range suffer penalties.",rules:"Any Ranged Attack made at longer than short range suffers an additional −2 to hit. Line of sight for any effect (including Alchemancy) cannot be drawn further than 12\".<br><br>Before each Activation Phase, starting from Turn 2, roll D6 and add the current turn number. On a result of 8 or more, the steam clears by the following Maintenance Phase.<br><br><em>Example: On Turn 3, roll D6+3. A result of 5 or 6 on the die means the steam clears.</em>"},
{id:18,n:"Resistance!",sum:"Local snipers fire at a random Character each turn.",rules:"Armed locals have taken up positions in windows and on rooftops around the area.<br><br>Each turn, at the start of the Activation Phase, randomly select one Character on the table from either faction. That Character is subjected to a single Ranged Attack.<br><br>The attack is made at +2 to the D20 roll with no penalties for range. A Defence Check is made normally, but no cover is applied.<br><br>If hit: D10+1 damage. The Resistance Fighters continue firing every turn of the game."},
{id:19,n:"Loose Carriage!",sum:"An out-of-control vehicle careens across the table each turn.",rules:"Place the Catch Wagon counter centrally on a randomly determined table edge (roll D4). The Carriage will cross toward the opposite edge.<br><br>It moves 9\" in the Maintenance Phase each turn, taking the most direct route to the opposite table edge. Roll D6: 1–3 = moved by the player with Favour of The Engine, 4–6 = moved by the player with Priority. It must always move the full 9\" and must move every turn.<br><br>Any Character the Carriage contacts must make a Finesse Check, Difficulty 12. On failure: D8+4 damage. If the Carriage moves completely over the Character's base, they are also placed Prone.<br><br>On success: the Character makes a special 2\" move to get clear. If no clear area exists within 2\", the check is considered failed.<br><br>The Loose Carriage cannot be stopped or attacked. It is removed if it exits the table."},
{id:20,n:"Timeskip Bubble",sum:"A rift in reality moves randomly, causing unpredictable time effects on contact.",rules:"Divide the table into quarters and roll D4 to select one. Place a marker near the centre of that quarter.<br><br>The Timeskip Bubble is a dome 2\" high and 2\" in diameter (use 2\" Blast Template for footprint). During each Maintenance Phase it moves 6\" randomly: place the Grenade Scatter template over it, roll D8, move 2\". Repeat twice more (three 2\" moves, each with a new direction). It can move through terrain but stays on the ground.<br><br>Any Character the Bubble contacts rolls D8:<br>1 — Phases out: cannot act next turn, not placed in Activation Deck<br>2 — Acts normally but restricted to 1 Action<br>3 — Immediately moved D4\" in a random direction (may cause a fall)<br>4 — Immediately moved D8\" in a random direction (may cause a fall)<br>5 — +1 Speed next turn<br>6 — −1 Speed next turn<br>7 — Gains 1 free Action immediately<br>8 — Gains 2 free Actions immediately<br><br>If the Timeskip Bubble leaves the table it is removed from play."}
];
const TAROT=[
  {n:"Elemental Vengeance",d:"Alchemancers are both powerful and cunning and their assistance in the throes of battle can be of great import. If any opposing Character is taken Out of Action whilst under the influence of an Alchemantic Invocation called by an Alchemancer you control you gain 2 bonus Victory Points.",vp:2},
  {n:"Bring 'em Down",d:"Alchemancers are powerful and potentially dangerous. Often the best way to nullify them is from a distance. You must try and take all Characters in your opponent's Company with an Alchemancy characteristic of more than 0 Out of Action with ranged attacks. Should you manage this you receive 2 bonus Victory Points.",vp:2},
  {n:"Scouting Mission",d:"\"'Avin' a good look about\" is useful. It can reveal your opponent's disposition and you can often find out some very handy information. Nominate one of your Characters and note them down before the first turn. This Character needs to make base contact with an area within 3\" of the centre of all four edges of the gaming table. Should you achieve this then you receive 3 bonus Victory Points.",vp:3},
  {n:"Vengeance",d:"When one of your allies falls it is best to show your foe that their temerity will not go unpunished. Whichever of your opponent's Characters takes the first of your Company Out of Action becomes the target of this Task. This Character should be taken Out of Action as quickly as possible. You gain bonus Victory Points according to the following table: 1 Turn: 4VP, 2 Turns: 3VP, 3 Turns: 2VP, 4 Turns plus: 1VP.",vp:"1-4"},
  {n:"First Blood",d:"Sometimes it is important to get your vengeance in first. Select the Character from your opponent's Company that has the highest points value not including any of Dr Disraeli's Delights. If you can bring this Character to the Wounded state within the first 4 turns of the game you receive 1 bonus Victory Point. If you manage to take them Out of Action by the 4th turn of the game you receive 2 bonus Victory Points.",vp:"1-2"},
  {n:"Shoot 'em Up!",d:"When things get dire it is often best to wound your foes from afar before closing to finish them off. The first time you manage to take an opposing Character Out of Action with a ranged attack you receive 2 bonus Victory Points. For Characters with the Insignificant ability you must take 2 Out of Action before claiming the bonus Victory Points.",vp:2},
  {n:"The Big Bang",d:"There is nothing more satisfying than blowing your opponent into tiny bits. You get 2 bonus Victory Points should you manage to take an opposing Character Out of Action with any form of attack that uses a blast template.",vp:2},
  {n:"Hunt the Alchemancer",d:"Alchemancers are dangerous and wild — the less of them your foe has on his side the better. Choose the Character with the highest Alchemancy characteristic in your opponent's Company. Should you manage to take them Out of Action you gain 2 bonus Victory Points.",vp:2},
  {n:"Duel to the Death",d:"The more skilled the foe the greater the victory! Choose the Character with the highest Close Combat Attack characteristic in your opponent's Company. Should you manage to take them Out of Action in Close Combat you gain 3 bonus Victory Points.",vp:3},
  {n:"All Sneaky Like",d:"The cunning can contribute to a battle by getting behind enemy lines. If you manage to have a Character on more than 50% Life in your opponent's deployment zone at the end of the game you gain 2 bonus Victory Points.",vp:2},
  {n:"Snipe the Sniper",d:"A skilled shooter is deadly but much less so when he or she is bleeding from a nasty gunshot. Choose the Character with the highest Ranged Combat Attack characteristic in your opponent's Company. Should you manage to take them Out of Action in Ranged Combat you gain 3 bonus Victory Points.",vp:3},
  {n:"Spy on 'em",d:"If you can garner intelligence on your foe then victory is much more certain. Nominate a Character in your Company and keep this secret. Should this Character manage to maintain line of sight to the highest point value Character in your opponent's Company for 2 turns and not come under attack then you receive 2 bonus Victory Points.",vp:2},
  {n:"Backstab",d:"The safest way to attack is from the dark. If your foe can't see you they can't hurt you. If you manage to take an opposing Character out of action with a charge from the rear then you receive 2 bonus Victory Points. For Characters with the Insignificant ability you only receive 1 bonus Victory Point.",vp:"1-2"},
  {n:"The Bigger They Are",d:"Sometimes even the most skilled foe can fall to a lucky attack from an opponent who is obviously his or her inferior. If a Character in your Company manages to land the blow that takes an opposing Character at least 15 points more expensive Out of Action then you receive 2 bonus Victory Points.",vp:2},

function genMission(){
  const depIdx=Math.floor(Math.random()*10);
  const objIdx=Math.floor(Math.random()*20);
  const nf=Math.floor(Math.random()*3)+1;
  const featIds=shuffle([...FEATURES]).slice(0,nf).map(f=>f.id);
  const t1Idx=Math.floor(Math.random()*TAROT.length);
  const t2Pool=TAROT.filter((_,i)=>i!==t1Idx);
  const t2Idx=TAROT.indexOf(t2Pool[Math.floor(Math.random()*t2Pool.length)]);
  Store.set('mission',{depIdx,objIdx,featIds,t1Idx,t2Idx});
  renderMission();
}

function rollScatter(){
  const dir=Math.floor(Math.random()*8)+1;
  const dist=Math.floor(Math.random()*6)+1;
  const arrows=['↑','↗','→','↘','↓','↙','←','↖'];
  const labels=['straight ahead','ahead-right','right','behind-right','straight behind','behind-left','left','ahead-left'];
  const angles=[270,315,0,45,90,135,180,225];
  const rad=angles[dir-1]*Math.PI/180;
  const ax=80+Math.cos(rad)*60, ay=80+Math.sin(rad)*60;
  const arrow=document.getElementById('sc-arrow');
  arrow.setAttribute('x2',ax);arrow.setAttribute('y2',ay);arrow.setAttribute('opacity','1');
  [1,2,3,4,5,6,7,8].forEach(n=>{
    const t=document.getElementById('sc-n'+n);
    if(t)t.setAttribute('fill',n===dir?'#E8C060':'rgba(201,168,76,.3)');
  });
  document.getElementById('scatter-result').textContent=arrows[dir-1]+' '+dist+'"';
  document.getElementById('scatter-detail').textContent='Direction '+dir+' ('+labels[dir-1]+') — '+dist+' inch'+(dist!==1?'es':'');
  const cb=document.getElementById('scatter-clear-btn');if(cb)cb.style.display='';
  if(navigator.vibrate)navigator.vibrate([20,10,20]);
}

function rollD(sides){
  const r=Math.floor(Math.random()*sides)+1;
  const el=document.getElementById('dn');
  el.classList.remove('rolling');void el.offsetWidth;el.classList.add('rolling');
  el.textContent=r;
  const sp=document.getElementById('dspec');
  if(sides===20&&r===20)sp.innerHTML='<div class="spec-result spec-crit">✨ Critical Hit — Natural 20!</div>';
  else if(sides===20&&r===1)sp.innerHTML='<div class="spec-result spec-fumble">💀 Fumble — Natural 1!</div>';
  else sp.innerHTML=`<div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;color:var(--brass);margin-top:.35rem">D${sides}</div>`;
  // History
  addRollHistory(r,sides);
  if(navigator.vibrate)navigator.vibrate(sides===20?[30,10,20]:20);
  return r;
}

window._rollHistory=[];
function clearRollHistory(){
  window._rollHistory=[];
  const hist=document.getElementById('roll-history');
  if(hist)hist.innerHTML='';
  const dn=document.getElementById('dn');if(dn){dn.textContent='—';dn.className='dice-num';}
  const ds=document.getElementById('dspec');if(ds)ds.innerHTML='';
  showToast('Roll history cleared');
}
function addRollHistory(r,sides){
  window._rollHistory.unshift({r,sides,ts:Date.now()});
  if(window._rollHistory.length>20)window._rollHistory.pop();
  const hist=document.getElementById('roll-history');
  if(!hist)return;
  hist.innerHTML=window._rollHistory.slice(0,16).map(h=>{
    const isCrit=h.sides===20&&h.r===20;
    const isFumble=h.sides===20&&h.r===1;
    return`<div class="roll-pip${isCrit?' crit':isFumble?' fumble':''}" title="D${h.sides} rolled ${h.r}">
      <span style="font-size:.68rem;opacity:.6;display:block;line-height:1;margin-bottom:.08rem">D${h.sides}</span>
      <span>${h.r}</span>
    </div>`;
  }).join('');
}

window._oppVals={a:null,b:null};
function rollOpp(side){
  const mod=parseInt(document.getElementById('m'+side).value)||0;
  const raw=Math.floor(Math.random()*20)+1;
  const total=raw+mod;
  window._oppVals[side]={raw,mod,total};
  document.getElementById('o'+side).textContent=total;
  const ocb=document.getElementById('opp-clear-btn');if(ocb)ocb.style.display='';
  updateOppResult();
}
function rollBoth(){rollOpp('a');rollOpp('b');}
function updateOppResult(){
  const {a,b}=window._oppVals;
  if(!a||!b)return;
  let msg='',col='';
  if(a.total>b.total){msg=`Attacker wins! (${a.total} vs ${b.total})`;col='var(--green)';}
  else if(b.total>a.total){msg=`Defender wins! (${b.total} vs ${a.total})`;col='var(--red)';}
  else{msg=`Tie! (${a.total} each) — Favour holder wins`;col='var(--brass-light)';}
  document.getElementById('opp-res').innerHTML=`<span style="color:${col}">${msg}</span>`;
  const ocb=document.getElementById('opp-clear-btn');if(ocb)ocb.style.display='';
}

function rollDmg(){
  const dice=document.getElementById('dd').value;
  const mod=parseInt(document.getElementById('dm').value)||0;
  const arm=parseInt(document.getElementById('da').value)||0;
  const crit=document.getElementById('dc').checked;
  const burn=document.getElementById('db').checked;
  const sides=parseInt(dice.replace('D',''));
  const raw=Math.floor(Math.random()*sides)+1;
  const total=raw+mod;
  let effArm=burn?0:crit?Math.floor(arm/2):arm;
  const dmg=Math.max(0,total-effArm);
  document.getElementById('dmg-res').textContent=dmg+' damage';
  let det=`D${sides} rolled ${raw} + ${mod} modifier = ${total}`;
  if(burn)det+=' · Armour ignored (Burning)';
  else if(crit)det+=` · Critical: Armour halved (${arm}→${effArm})`;
  else det+=` − ${arm} Armour`;
  document.getElementById('dmg-det').textContent=det;
  const dcb=document.getElementById('dmg-clear-btn');if(dcb)dcb.style.display='';
}

  catch(e){return {found:[],sessions:0,everActivated:false,everCompleted:false};}
}
function archiveSetState(s){try{localStorage.setItem(ARCHIVE_STORAGE_KEY,JSON.stringify(s));}catch(e){}}

}

}
function archiveDeactivate(){
  document.body.classList.remove('archive-mode-on');
  archiveHideCountdown();
  if(_archiveTimer){clearTimeout(_archiveTimer);_archiveTimer=null;}
  _archivePausedRemainingMs=null;
}
function archiveStartCountdown(ms){
  if(_archiveTimer)clearTimeout(_archiveTimer);
  _archiveTimerStart=Date.now();
  _archiveTimer=setTimeout(archiveDeactivate,ms);
  archiveRenderCountdown(ms);
}
function archivePauseTimer(){
  if(!_archiveTimer)return;
  clearTimeout(_archiveTimer);_archiveTimer=null;
  const elapsed=Date.now()-_archiveTimerStart;
  _archivePausedRemainingMs=Math.max(0,ARCHIVE_DURATION_MS-elapsed);
  const ring=document.querySelector('.archive-countdown .ring-fg');
  if(ring){const cs=getComputedStyle(ring).strokeDashoffset;ring.style.transition='none';ring.style.strokeDashoffset=cs;}
}
function archiveResumeTimer(){
  if(_archivePausedRemainingMs===null)return;
  if(_archivePausedRemainingMs<=0){archiveDeactivate();return;}
  const remaining=_archivePausedRemainingMs;_archivePausedRemainingMs=null;
  _archiveTimerStart=Date.now()-(ARCHIVE_DURATION_MS-remaining);
  _archiveTimer=setTimeout(archiveDeactivate,remaining);
  const ring=document.querySelector('.archive-countdown .ring-fg');
  if(ring){requestAnimationFrame(()=>{ring.style.transition=`stroke-dashoffset ${remaining}ms linear`;ring.style.strokeDashoffset='94.25';});}
}

function archiveHideCountdown(){const c=document.querySelector('.archive-countdown');if(c)c.classList.remove('visible');}
function archiveShowFirstFindCard(onDismiss){
  // Radial brass shockwave behind the card — pure visual flash to draw the eye
  const flash=document.createElement('div');

  flash.setAttribute('aria-hidden','true');
  document.body.appendChild(flash);

  document.body.appendChild(card);
  // Single dismiss path — auto-timeout and manual X-click both call this.
  // Flag prevents double-fire if both happen (e.g., user clicks X right as the timeout would have fired).
  let dismissed=false;
  function dismiss(){
    if(dismissed)return;
    dismissed=true;
    card.classList.remove('visible');
    setTimeout(()=>{card.remove();if(onDismiss)onDismiss();},520);
  }
  card.querySelector('.archive-close-btn').onclick=dismiss;
  requestAnimationFrame(()=>card.classList.add('visible'));

let _toastHideTimeout=null;

// Sigil DOM factory — eeSigilSVG and eeSigilHTML are defined earlier
// in this script (before the welcome IIFE) for hoist-order reasons.
function archiveUpdateSealedStates(){
  document.querySelectorAll('.ee-sigil').forEach(el=>{
    const key=el.dataset.eeKey;
    if(key&&archiveIsFound(key))el.classList.add('sealed');
    else el.classList.remove('sealed');
  });
}

// Sigil tap — pause timer, mark found, celebrate, open reveal ─────
function eeSigilTap(key){
  // Guard: sigils are only interactive while Archive Mode is active.
  // CSS pointer-events:none already blocks taps from registering when
  // mode is off; this JS check is belt-and-suspenders for edge cases
  // (programmatic dispatch, focus-then-Enter during the fade-out
  // transition, browser quirks). Outside Archive Mode, taps no-op.
  if(!document.body.classList.contains('archive-mode-on'))return;
  const wasFound=archiveIsFound(key);
  // Note: the 20s timer runs uninterrupted — no pause/resume coordination needed
  if(wasFound){archiveOpenReveal(key);return;}
  // Tap-flash on the sigil itself — tactile "thunk" of acknowledgment at the
  // point of action, separate from the centered toast/card celebration.
  const sigilEl=document.querySelector('.ee-sigil[data-ee-key="'+key+'"]');
  if(sigilEl){sigilEl.classList.add('tap-flash');setTimeout(()=>sigilEl.classList.remove('tap-flash'),600);}
  const stateAfter=archiveMarkFound(key);
  const n=stateAfter.found.length;
  archiveUpdateSealedStates();
  if(n===1){archiveShowFirstFindCard(()=>archiveOpenReveal(key));}
  else if(n===ARCHIVE_KEYS.length){
    document.body.classList.add('archive-complete');
    archiveShowToast('Fragment '+n+' of '+ARCHIVE_KEYS.length+' · Archive Complete');
    archiveEnsureArchivesCard();
    archiveOpenReveal(key);
  }
  else{archiveShowToast('Fragment '+n+' of '+ARCHIVE_KEYS.length+' · Recovered');archiveOpenReveal(key);}
}

// Open reveal — navigate to lore, switch to faction tab, open panel.
// Observes the reveal's class for closure to resume the Archive Mode
// timer where it left off.
function archiveOpenReveal(key){
  if(typeof navTo==='function')navTo('lore');
  setTimeout(()=>{
    if(typeof showLore==='function'){
      const btn=document.querySelector('.faction-tab[onclick*="\''+key+'\'"]');
      if(btn)showLore(key,btn);else showLore(key);
    }
    setTimeout(()=>{
      if(typeof toggleEE==='function')toggleEE(key);
      // Auto-dismiss the find toast 1.5s after the reveal opens — gives the
      // user a moment to register "Fragment N of 5 · Recovered" but clears
      // the toast so it doesn't obscure the lore reveal content.
      const t=document.querySelector('.archive-toast');
      if(t&&t.classList.contains('visible')){
        setTimeout(()=>{
          t.classList.remove('visible');
          if(_toastHideTimeout){clearTimeout(_toastHideTimeout);_toastHideTimeout=null;}
        },1500);
      }
    },100);
  },80);
}

  const wp=document.getElementById('panel-welcome');

  // ...nav cards → Search → Archives → Shop.
  const shopCard=grid.querySelector('a.welcome-card[href*="dementedgamesstore"]');

  const card=document.createElement('div');
  card.className='welcome-card archives'+(unread?' unread':'');

  card.innerHTML='<div style="font-size:1.8rem;margin-bottom:.45rem;line-height:1" aria-hidden="true">\ud83d\udcdc</div><div class="wc-title">Archives</div><div class="wc-desc">The Archivist\u2019s Letter</div>';
  const open=function(){
    archiveOpenLetter();
    const s=archiveGetState();
    if(!s.archivesViewed){s.archivesViewed=true;archiveSetState(s);card.classList.remove('unread');}

reg('lore',function(){

    engine:`<div class="lore-text">
      <p>They say The Engine was first discovered beneath a cathedral that had never been built, its foundations laid in a century that did not yet exist. There are accounts that place The Engine at the beginning of all things, turning slowly in a darkness that had not yet learned to call itself time. Others insist it was assembled piece by piece in an age of reason, an inevitable culmination of industry and arrogance. A handful of forbidden texts claim it has not yet been built—that it is reaching backward, assembling itself through consequence rather than design. These histories do not reconcile. They are not meant to. In truth, no one knows when The Engine came to be…or even what The Engine actually is…machine…flesh…god. The only thing that is certain, is that its power over all things is supreme…for now.</p>
      <p>There are stories older than industry that name it something else. In forgotten folklore it is the Heart Beneath the World, a thing that beat before men learned to count time. In certain alchemical circles it is described as a perfect equation, one that resolves all matter into inevitability. Some whisper that it is a god that fell asleep and is slowly remembering itself. Each begins in familiarity—something graspable, almost comforting—until it turns. The Heart demands sacrifice measured in cities. The Equation solves for extinction. The Sleeping God dreams in smoke and wakes in iron.</p>
      <p>What can be agreed upon, is that the world has settled into patterns not entirely its own. Cities rise where they should not, flourish where they cannot, and endure calamities that ought to erase them. Beneath these places—though “beneath” is an imprecise comfort—lie the Nodes. They are not entrances, nor are they fragments. They are expressions…where The Engine’s will asserts itself upon the surface of reality. No hand guides them. No voice speaks from them. Yet their presence imposes a quiet correction upon the world, as though something vast is continually adjusting a mechanism too intricate to perceive.</p>
      <p>The popular conceit is that The Engine calculates. That it weighs futures, selects outcomes, and nudges existence toward some immaculate conclusion. This is a comforting fiction, one that suggests intent can be understood, even opposed. But there are older interpretations that describe no such deliberation—only inevitability. The Engine does not choose. It resolves. Possibility collapses in its vicinity not through decision, but through function. What appears as foresight is merely the world aligning itself with a result already in motion.</p>
      <p>Time, under such pressure, ceases to behave. Events echo before they occur. Consequences linger after their causes have been forgotten. Individuals may brush against a Node and find themselves displaced not in distance, but in sequence—out of step with their own lives. Records contradict themselves. Dates lose authority. Attempts to impose order upon this unraveling have produced only more elaborate confusion. The closer one draws to these places, the less certain it becomes that “before” and “after” were ever distinct.</p>
      <p>And still, the world persists in orbit around something it cannot perceive. The Engine remains unseen, not because it is hidden, but because it does not occupy a place that can be found. It exerts, it corrects, it continues. Whether it is threatened, whether it defends itself, whether it even recognizes such conditions—these are assumptions born of human habit. What is evident is simpler, and far more troubling: the world is being made into something precise. Something immaculate. And whatever survives that process will do so because it is permitted to.</p>

      <p>The streets of London belong to the Dickensians—not by right, but by endurance. They were the first to be touched when the London Node awakened, and they bear its mark in flesh and mind alike. What others call corruption, they call opportunity. Twisted forms, broken bodies, and unstable transformations are simply the cost of proximity to power. They do not seek to understand The Engine, nor do they fear it. They use what they can, survive what they must, and take what is left. In the alleys and underways where the city decays into something stranger, the Dickensians thrive—not because they are chosen, but because they refuse to be anything else.</p>
    </div>`,
    guild:`<div class="lore-text">
      <p><em>— Where power gathers, they restore the balance before it breaks the world.</em></p>
      <p>Where others see power or divinity, the Guild sees imbalance. Formed in secrecy and sustained through discipline, the Guild of Harmony exists to ensure that no single force—human or otherwise—tips the world beyond recovery. They study The Engine not out of reverence, but necessity, cataloguing its effects and intervening where its influence threatens to spiral beyond control. Divided into competing creeds yet united in purpose, the Guild walks a narrow line between knowledge and catastrophe. They do not seek to stop The Engine. Nor do they allow it to proceed unchecked. In a world being rewritten, they are the last to insist that something of it must remain.</p>

function drawEye(n){
  if(window._eyeDeck.length===0){window._eyeDeck=EYE_CARDS.flatMap(c=>Array(c.copies||1).fill(c));window._eyeDiscard=[];shuffle(window._eyeDeck);showToast('Deck reshuffled!');}
  const drawn=[];
  for(let i=0;i<n&&window._eyeDeck.length>0;i++){
    const card=window._eyeDeck.pop();
    window._eyeDiscard.push(card);
    drawn.push(card);
  }
  document.getElementById('eye-count').textContent=window._eyeDeck.length+' cards remaining';
  const typeColour={positive:'rgba(61,184,140,.15)',neutral:'rgba(201,168,76,.1)',negative:'rgba(204,74,74,.12)'};
  const typeBorder={positive:'rgba(61,184,140,.4)',neutral:'rgba(201,168,76,.35)',negative:'rgba(204,74,74,.35)'};
  document.getElementById('eye-drawn').innerHTML=drawn.map((c,i)=>`
    <div style="background:${typeColour[c.type]};border:2px solid ${typeBorder[c.type]};border-radius:10px;padding:1.25rem;margin-bottom:.75rem;animation:revealCard .4s ease ${i*.15}s both">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem">
        <div>
          <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--brass-light)" translate="no">${c.eyecon} ${c.name}</div>

    </div>`).join('');
}
function drawTemptFate(){
  // Tempt Fate: draw one card from deck. Red-type cards = lose Favour.
  // Negative cards are the "red Eyecon" — Engine's punishment.
  if(window._eyeDeck.length===0){
    window._eyeDeck=EYE_CARDS.flatMap(c=>Array(c.copies||1).fill(c));
    window._eyeDiscard=[];
    shuffle(window._eyeDeck);
    showToast('Deck reshuffled!');
  }
  const card=window._eyeDeck.pop();
  if(card) window._eyeDiscard.push(card);
  document.getElementById('eye-count').textContent=window._eyeDeck.length+' cards remaining';

  const isRed=card&&card.type==='negative';
  const bgCol=isRed?'rgba(204,74,74,.18)':'rgba(61,184,140,.12)';
  const borderCol=isRed?'rgba(204,74,74,.65)':'rgba(61,184,140,.45)';

function getDelightsBudget(){
  const charPts=(window._roster||[]).reduce((s,c)=>s+(parseInt(c.pts)||0),0);
  const delPts=(window._delightsRoster||[]).reduce((s,d)=>s+(parseInt(d.pts)||0),0);
  return{charPts,delPts,total:charPts+delPts,remaining:200-charPts-delPts};
}

function isDelightSelected(name){return(window._delightsRoster||[]).some(d=>d.n===name);}

function toggleDelight(name,pts){
  window._delightsRoster=Store.get('delights_roster',[]);
  window._roster=Store.get('roster',[]);
  const roster=window._delightsRoster;
  const idx=roster.findIndex(d=>d.n===name);
  if(idx>=0){
    roster.splice(idx,1);
    Store.set('delights_roster',roster);
    showToast(`${name} removed`);
  } else {
    const b=getDelightsBudget();
    if(b.remaining<pts){showToast('\u26a0 Would exceed 200pt Company limit');return;}
    roster.push({n:name,pts:pts});
    Store.set('delights_roster',roster);
    showToast(`${name} added \u2014 ${pts}pt`);
  }
  renderDelights();
  if(document.getElementById('panel-company').innerHTML.trim())renderBuilder();
}

function isInCompany(name){return(window._roster||[]).some(r=>r.name===name);}
function toggleCompany(name,pts,btn){
  const roster=window._roster||[];
  const idx=roster.findIndex(r=>r.name===name);
  if(idx>=0){
    roster.splice(idx,1);
    Store.set('roster',roster);
    showToast(`${name} removed from Company`);
  } else {
    const total=roster.reduce((s,r)=>s+(parseInt(r.pts)||0),0)+(window._delightsRoster||[]).reduce((s,d)=>s+(parseInt(d.pts)||0),0);
    const ptsNum=parseInt(pts)||0;
    if(total+ptsNum>200){showToast('\u26a0 Would exceed 200pt limit');return;}
    const c=Object.values(CHARS).flat().find(x=>x.name===name);
    if(!c)return;
    roster.push({name:c.name,role:c.role,pts:c.pts,faction:getFaction(name)});
    Store.set('roster',roster);
    showToast(`${name} added — ${pts}pts`);
  }
  // Update ALL visible company buttons for this character
  const inCo=isInCompany(name);
  document.querySelectorAll('.company-btn').forEach(b=>{
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes(name)){
      b.style.color=inCo?'#5ddb8a':'rgba(255,255,255,.35)';
      b.classList.toggle('in-company',inCo);
      b.title=inCo?'Remove from Company':'Add to Company';
    }
  });
  if(document.getElementById('panel-company').innerHTML.trim())renderBuilder();
  if(document.getElementById('panel-delights').innerHTML.trim())renderDelights();
  
}

function getFaction(name){
  for(const[k,v] of Object.entries(CHARS)){if(v.find(c=>c.name===name))return k;}return'unknown';
}
function addToRoster(name){
  const c=Object.values(CHARS).flat().find(x=>x.name===name);
  if(!c)return;
  window._roster.push({name:c.name,role:c.role,pts:c.pts,faction:getFaction(name)});
  Store.set('roster',window._roster);
  renderBuilder();
  showToast(`${c.name} added — ${c.pts}pts`);
}
function removeFromRoster(i){
  const name=window._roster[i].name;
  window._roster.splice(i,1);
  Store.set('roster',window._roster);
  // Update ALL visible company buttons for this character
  document.querySelectorAll('.company-btn').forEach(b=>{
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes(name)){
      b.style.color='rgba(255,255,255,.35)';
      b.classList.remove('in-company');
      b.title='Add to Company';
    }
  });
  renderBuilder();
  
  if(document.getElementById('panel-delights').innerHTML.trim())renderDelights();
  showToast(`${name} removed`);
}
function clearRoster(){window._roster=[];Store.set('roster',[]);window._delightsRoster=[];Store.set('delights_roster',[]);
  document.querySelectorAll('.company-btn').forEach(b=>{b.style.color='rgba(255,255,255,.35)';b.classList.remove('in-company');b.title='Add to Company';});
  renderBuilder();if(document.getElementById('panel-delights').innerHTML.trim())renderDelights();showToast('Roster cleared');}
function removeDelight(i){const name=window._delightsRoster[i].n;window._delightsRoster.splice(i,1);Store.set('delights_roster',window._delightsRoster);renderBuilder();if(document.getElementById('panel-delights').innerHTML.trim())renderDelights();showToast(`${name} removed`);}
function filterBuilder(v){

function getQuoteHTML(excludeIdx=-1){
  const available=ALL_QUOTES.filter((_,i)=>i!==excludeIdx);
  const q=available[Math.floor(Math.random()*available.length)];
  return`<div class="panel-quote" onclick="refreshQuote(this)" title="Tap for another quote"><span class="pq-mark">"</span><span class="pq-text">${q.q}</span><span class="pq-attr">— ${q.attr}</span></div>`;
}

function refreshQuote(el){
  const newQ=ALL_QUOTES[Math.floor(Math.random()*ALL_QUOTES.length)];
  el.querySelector('.pq-text').textContent=newQ.q;
  el.querySelector('.pq-attr').textContent='— '+newQ.attr;
  el.style.opacity='0';
  setTimeout(()=>{el.style.opacity='1';},50);
}

function refreshWelcomeQuote(el){
  const newQ=ALL_QUOTES[Math.floor(Math.random()*ALL_QUOTES.length)];
  el.querySelector('.wq-text').textContent=newQ.q;
  el.querySelector('.wq-attr').textContent='— '+newQ.attr;
  el.style.opacity='0';
  setTimeout(()=>{el.style.opacity='1';},50);
}

function injectPanelQuotes(){
  document.querySelectorAll('.panel.active').forEach(p=>{
    if(!p.querySelector('.panel-quote')&&p.innerHTML.trim()){
      const existing=p.querySelector('.section-header');
      if(existing)existing.insertAdjacentHTML('afterend',getQuoteHTML());
    }
    // Inject DigiRune footer on all panels except welcome (which has its own)
    if(p.id!=='panel-welcome'&&!p.querySelector('.digirune-footer')&&p.innerHTML.trim()){
      p.insertAdjacentHTML('beforeend',getFooterHTML());
    }
  });

// ── SEARCH NAV — universal deep-link helper ──────────────────────────────
function searchNav(panel,opts){
  // opts: {id, delay, callback, expandClass, scrollBlock}
  opts=opts||{};
  toggleSearch();
  navTo(panel);
  const delay=opts.delay||400;
  function tryFind(attempt){
    if(opts.callback){opts.callback();return;}
    if(!opts.id)return;
    const el=document.getElementById(opts.id);
    if(!el){if(attempt<3)setTimeout(()=>tryFind(attempt+1),300);return;}
    el.scrollIntoView({behavior:'smooth',block:opts.scrollBlock||'center'});
    if(opts.expandClass)el.classList.add(opts.expandClass);
    // flash highlight
    el.style.transition='box-shadow .3s';
    el.style.boxShadow='0 0 18px rgba(201,168,76,.5),inset 0 0 8px rgba(201,168,76,.15)';
    setTimeout(()=>{el.style.boxShadow='';},1800);
  }
  setTimeout(()=>tryFind(0),delay);
}

// ── MATCH SCORE (search scoring) ─────────────────────────────────────────
// Stopwords ignored during word-by-word partial matching. These are common
// English connectors that pass the length>2 filter but carry no search intent
// (e.g. searching "scions of the sands" should NOT word-match every record
// containing "the"). Multi-word queries are still found via the full-phrase
// startsWith/includes branches inside matchScore.
const SEARCH_STOPWORDS=new Set(['the','and','for','but','with','from','are','was','were','has','have','had','this','that']);

function matchScore(q,fields){
  let score=0;
  const ql=q.toLowerCase();
  fields.forEach((f,i)=>{
    if(!f)return;
    const fl=String(f).toLowerCase();
    if(fl===ql)score+=10;
    else if(fl.startsWith(ql))score+=6;
    else if(fl.includes(ql))score+=3;
    else{
      // word-by-word partial matching (stopwords excluded)
      const words=ql.split(/\s+/);
      words.forEach(w=>{if(w.length>2&&!SEARCH_STOPWORDS.has(w)&&fl.includes(w))score+=1;});
    }
    // Boost title/name fields (index 0)
    if(i===0)score*=1.5;
  });
  return score;
}

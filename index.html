reg('rules',function(){
  if(document.getElementById('panel-rules').innerHTML.trim())return;
  document.getElementById('panel-rules').innerHTML=`
<div class="section-header"><h2 class="section-title">Rules & Tutorial</h2><p class="section-subtitle">Complete game mechanics reference</p></div>
<div class="rules-layout">
<aside class="rules-nav">
  <div class="rules-nav-title">Contents</div>
  ${[
    ['basics','🎯 Core Basics'],['turn','🔄 Turn Sequence'],['favour','⭐ Favour & Eye'],
    ['movement','👣 Movement'],['ranged','🏹 Ranged Combat'],['closecombat','⚔️ Close Combat'],
    ['alcsystem','🔮 Alchemancy'],['canopic','🏺 Canopic Jars'],['states','💀 Conditions'],['terrain','🏛 Terrain'],
    ['grenades','💣 Templates'],['company','🏗 Company Building'],
  ].map(([k,l],i)=>`<button class="rules-nav-item${i===0?' active':''}" onclick="showRule('${k}',this)">${l}</button>`).join('')}
</aside>
<div class="rules-content">

<div class="rules-page active" id="rp-basics">
  <div class="rule-block"><h3>🎲 The D20 System</h3>
    <p>Twisted uses an Opposed D20 system. Both players roll a D20 and add their relevant Characteristic. The highest total wins. In the event of a tie, the player holding <strong style="color:var(--brass-light)">Favour of The Engine</strong> wins.</p>
    <div class="highlight-box"><strong class="term-link" onclick="showTerm('Natural 1')">Natural 1</strong> always fails regardless of modifiers. <strong class="term-link" onclick="showTerm('Natural 20')">Natural 20</strong> always succeeds. In combat a Natural 20 is a Critical Hit: the attack automatically hits, the target may not roll a Defence check, and the target's Armour is halved (rounded down). In Close Combat, the target must also pass a Finesse check (Difficulty 10 + final damage) or become Stunned.</div>
    <p>Pre-measuring is always allowed. You may measure any distance at any time before committing to an action.</p>
  </div>
  <div class="rule-block"><h3>📊 Characteristics</h3>
    <p>Every Character in Twisted has the following Characteristics printed on their Character Card. These define how the Character performs in all aspects of the game:</p>
    <div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem">
      ${['SPD Speed','STR Strength','FIN Finesse','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM Armour','ALC Alchemancy','LIFE'].map(s=>{const key=s.split(' ')[0];return`<span class="stat-pill" onclick="showTerm('${key}')" title="Click for full description" style="cursor:pointer" translate="no">${s}</span>`;}).join('')}
    </div>
    <p style="margin-top:.75rem">The first number listed next to Close Combat is the Attack Characteristic. The second is Defence. For Ranged the first is Attack, the second Defence.</p>
  </div>
  <div class="rule-block"><h3>⚡ Actions</h3>
    <p>Each Character in Twisted may perform <strong style="color:var(--brass-light)">two Actions</strong> per Turn. These actions might be:</p>
    <p><strong>Move:</strong> Move up to your Speed value in inches. You may also choose to Charge or Run by using both Actions for movement.</p>
    <p><strong>Ranged Attack:</strong> Fire your weapon at your foe. You may make two Ranged Attacks per turn by using both Actions unless your weapon specifies otherwise.</p>
    <p><strong>Interact:</strong> Open doors, search barrels, pass items to allies, or use Dr Disraeli's Delights.</p>
    <p><strong>Use Ability:</strong> Use an Active ability printed on your Character Card.</p>
    <p><strong>Alchemancy:</strong> Channel an Alchemantic Invocation, break a Backfire, or restore Alchemantic Essences.</p>
    <div class="notice tip">Close Combat is not an Action — it ensues automatically when two opposing Characters come into base to base contact. You cannot fight a round of Close Combat and then take your two Actions.</div>
  </div>
  <div class="rule-block"><h3>🩸 Wounded & Out of Action</h3>
    <p>When a Character's Life drops to or below the red boxes on their Character Card they enter the <strong style="color:var(--rust-light)">Wounded</strong> state. All Characteristics are reduced by 2 except Armour. This can reduce a Characteristic below 0, in which case it becomes a penalty to the D20 roll.</p>
    <p>When Life reaches 0 the Character is <strong style="color:var(--rust-light)">Out of Action</strong> and removed from the table. The opposing Company receives 2 Victory Points for each non-Insignificant Character taken Out of Action.</p>
  </div>
  <div class="rule-block"><h3>🏆 Victory Points</h3>
    <p>Victory Points determine the winner of the game. At the end of the game add up your Victory Points and the player with the highest total wins. Should all your opponent's Characters be Out of Action you win regardless of the Victory Point totals.</p>
    <div style="display:grid;grid-template-columns:1fr auto;gap:.35rem;margin-top:.5rem">
      ${[['Reducing a foe to the Wounded state','1 VP'],['Taking an opposing Character Out of Action','2 VP'],['Achieving a Primary Objective or Taxing Task','Varies']].map(([a,v])=>`<div style="font-size:.82rem;color:var(--parchment);padding:.35rem .5rem;background:rgba(201,168,76,.04);border-radius:4px">${a}</div><div style="font-family:'Cinzel Decorative',serif;font-size:.95rem;color:var(--brass-light);text-align:center;padding:.35rem .5rem">${v}</div>`).join('')}
    </div>
    <div class="notice tip" style="margin-top:.65rem"><strong>Insignificant Characters:</strong> Characters with the Insignificant ability earn only half the stated Victory Points when Wounded or taken Out of Action, rounded down.</div>
  </div>
</div>

<div class="rules-page" id="rp-turn">
  <div class="turn-sequence">
    ${[['I','Sorting Phase','Arrange your Activation Deck in the order you wish your Characters to Activate'],['II','Eye of The Engine','Draw 1 Eye of The Engine card (2 if you hold Favour, keep 1)'],['III','Activation Phase','Players alternate activating Characters — each takes 2 Actions'],['IV','Maintenance Phase','Clear expired effects, resolve Bleed/Venom/Regenerate, clear Stun, remove OOA cards, try to Break Invocations, shuffle EotE deck']].map(([n,t,d])=>`<div class="turn-step"><span class="ts-num">${n}</span><span class="ts-name">${t}</span><div class="ts-desc">${d}</div></div>`).join('')}
  </div>
  <div class="rule-block"><h3>I. Sorting Phase</h3>
    <p>Arrange your Activation Deck in any order you choose. This is the order in which your Characters will Activate during the turn. Abilities like <em>Organised</em> (Agatha) can further influence this order.</p>
  </div>
  <div class="rule-block"><h3>II. Eye of The Engine Draw</h3>
    <p>Draw one Eye of The Engine card from the shared deck. If you hold Favour of The Engine you may draw a second card and choose which to keep for the turn.</p>
    <p>Eye cards are played at specific times as noted on the card: Pre-Activation, During Activation, Maintenance, or Any. Some cards are Persistent and remain in play until used or cancelled.</p>
    <div class="highlight-box"><strong>Eyecon Symbols</strong> on the cards only matter when Tempting Fate. A red Eyecon means you lose Favour of The Engine. A green Eyecon means you keep Favour but the Tempt Fate effect still occurs.</div>
  </div>
  <div class="rule-block"><h3>III. Activation Phase</h3>
    <p>Characters Activate in an alternating manner during the Activation Phase. The player who holds Priority turns the top card of his or her Activation Deck face up and the Character as shown begins his or her two Actions.</p>
    <p>Activation of Characters switches between Companies on a Character by Character basis. Once the player who holds Priority has completed the two Actions for his or her first Character then the first Character of the opposing Company is Activated.</p>
    <p>Character Activations continue in this manner until all Characters on the table have been Activated for the turn.</p>
    <p>Using an Eye of The Engine card or Tempting Fate is not considered an action and does not use up one of a Character's two actions. If the Eye of The Engine card affects another action the action is used up as normal.</p>
  </div>
  <div class="rule-block"><h3>🏆 Priority</h3>
    <p>The player who does not start with Favour of The Engine is given Priority for the first turn. Thereafter, Priority is earned by achieving any of the following during the game:</p>
    <p><strong style="color:var(--brass-light)">Wounding:</strong> Reduce an opposing Character to the Wounded state. <strong style="color:var(--brass-light)">Taking Out of Action:</strong> Reduce an opposing Character to 0 Life. <strong style="color:var(--brass-light)">Achieving an Objective:</strong> Complete a mission objective or Tarot of Taxing Tasks objective.</p>
    <p>The Priority Token can change hands several times during a turn. The player holding it at the start of the next turn has Priority and activates first. If one side has fewer Characters to activate, they receive Pass Cards equal to half the difference (rounded down). A Pass Card skips one Activation but you may not Pass twice in a row.</p>
  </div>
  <div class="rule-block"><h3>IV. Maintenance Phase</h3>
    <p>During the Maintenance Phase the following events occur:</p>
    <p>1. All effects that expire this turn end — remove tokens or markers. Effects lasting multiple turns have their duration marked off. 2. Resolve ongoing effects: Bleed (lose 2 Life), Venom (Diff 10 Finesse or D4 damage), Regenerate (D6 roll for healing). 3. Clear Stunned condition. 4. Clear temporary Characteristic bonuses/penalties from Invocations and abilities. 5. Remove Charge tokens. 6. Out of Action Characters have their cards removed from the Activation decks. 7. You may try to Break an Invocation or Invocation Backfire. 8. Shuffle the Eye of The Engine deck.</p>
    <div class="notice tip"><strong>Note:</strong> Recovering Essences is done during Activation as an Action (Partial: 1 Action restores half used; Full: 2 Actions restores all). It does not happen in the Maintenance Phase.</div>
  </div>
</div>

<div class="rules-page" id="rp-favour">
  <div class="rule-block"><h3>⭐ Favour of The Engine</h3>
    <p>The Engine always has a plan. It is constantly considering all the possible futures it can perceive and acting in a way that it feels will best achieve its ends. This is represented in part by the Favour of The Engine rules and The Eye of The Engine cards.</p>
    <p>At the start of the game, the Favour of The Engine is determined by each player rolling a D20 and subtracting the number of Characters in their Company from the roll. The player with the higher result begins the game with Favour. The player who rolled lower is given Priority for the first turn.</p>
    <p>Favour provides three benefits:</p>
    <p><strong style="color:var(--brass-light)">The Engine's Intervention:</strong> Any tied results in Opposed Rolls are resolved as a win for the Character from the Company that holds the Favour of The Engine.</p>
    <p><strong style="color:var(--brass-light)">The Engine's Blessing:</strong> Once per turn a Character from the Company who holds the Favour of The Engine may re-roll any one dice at any time, even after you have seen the results of the first roll. You may not re-roll a dice once any subsequent dice has been rolled. The results of this new roll must be taken and may not be re-rolled by any means.</p>
    <p><strong style="color:var(--brass-light)">The Engine's Aid:</strong> When drawing Eye of The Engine cards the Company who holds the Favour of The Engine may draw a second card and choose which card to keep for the turn.</p>
    <div class="notice warning"><strong>Losing Favour:</strong> If you use the Engine's Blessing to re-roll and the second roll is worse than the first or still fails, you immediately lose the Favour of The Engine. Also lost when you Tempt Fate and draw a card with a red Eyecon.</div>
  </div>
  <div class="rule-block"><h3>🎴 Tempting Fate</h3>
    <p>The Eye of The Engine cards are also used when Tempting Fate. On each card is printed a green or red Engine Eyecon.</p>
    <p>If you Tempt Fate and the card drawn has a red Eyecon on it you immediately lose Favour with The Engine and the results of the Tempt Fate draw come into play. If the Card has a green Eyecon the results of the card still come into play but you retain the Favour of The Engine.</p>
    <p>These icons are only used when Tempting Fate. They do not apply when playing Eye of The Engine cards drawn at the start of the turn.</p>
    <div class="highlight-box"><strong>The Eye is Elsewhere:</strong> If your opponent plays <em>The Eye is Elsewhere</em> Eye of The Engine Card, which cancels out an Eye of The Engine Card you have played, then the Favour of The Engine changes hands immediately.</div>
  </div>
</div>

<div class="rules-page" id="rp-movement">
  <div class="rule-block"><h3>👣 Movement Basics</h3>
    <p>All movement in Twisted is measured in Inches. A model with a Speed value of 4 may move 4" in a single Move Action.</p>
    <p>The Miniatures in Twisted have a line of sight that is 180 degrees from the front of the Miniature. During a Move Action a model may change its facing freely. At any other time you must take a Move Action to turn around.</p>
  </div>
  <div class="rule-block"><h3>🏃 Running</h3>
    <p>You may use two move actions one after the other in order to move more quickly. Any Character who does this is considered to be running. You may not run and engage in Close Combat — you must Charge instead.</p>
    <p>Characters who are running can claim a +1 on their Defence checks against Ranged Attacks.</p>
    <p>A Character is considered to have stopped running immediately when he or she spends an Action on anything other than movement or engages in Close Combat.</p>
  </div>
  <div class="rule-block"><h3>⚔ Charging</h3>
    <p>A model may make a double move and enter Close Combat only as a Charge move. This movement must be in a straight line and must bring you into contact with an opponent.</p>
    <p>A successful charge means you are at +1 to hit and +1 to damage but suffer a -1 to your Close Combat Defence until the next Maintenance Phase.</p>
  </div>
  <div class="rule-block"><h3>🧗 Climbing</h3>
    <p>Characters may climb walls or other terrain elements. Climbing is considered a Move Action. A Character climbs at half the rate at which they move. You may not end your move halfway up a wall or terrain element.</p>
    <p>Simply measure the height and make a Finesse or Strength check versus a Difficulty of 12. If you make the check you succeed and the Character is placed atop the surface climbed. If you fail the check by up to 5 you simply make no progress. If you fail by more than 5 you fall.</p>
  </div>
  <div class="rule-block"><h3>⬇️ Falling</h3>
    <p>If you fall from any height you must make a Finesse check against a Difficulty of 10 plus the height of the fall in inches.</p>
    <p>If you fail this check you take 1D4 damage +1 damage for every inch of the fall over 3", bypassing armour, and you are placed Prone.</p>
    <p>If you pass the check you suffer no ill effects but end up standing in a position directly below where the fall was initiated.</p>
    <p>If another Character is in the position onto which you fall, you scatter 1" using the Grenade template. The Character onto which you fell must also make a Finesse check with the same Difficulty — failure means they suffer 1D4 damage, bypassing armour.</p>
  </div>
  <div class="rule-block"><h3>🦘 Jumping</h3>
    <p>A Character may attempt to jump gaps, drop off walkways, leap nimbly from building to building or dive down to attack a foe. Measure the distance to be jumped and compare it to the table below:</p>
    <ul><li>Up to 2": Diff 6</li><li>Up to 3": Diff 10</li><li>Up to 4": Diff 12</li><li>Up to 6": Diff 15</li></ul>
    <p>You may not jump any further than 6". Jumping into Close Combat is considered to have Charged but you gain an additional +1 to your Attack roll.</p>
  </div>
  <div class="rule-block"><h3>⚠️ Threatened Areas</h3>
    <p>Characters in Twisted may try to move past Characters from the opposing Company providing there is sufficient room for their base to pass by without touching the base of their foe.</p>
    <p>If you wish to move past an opponent and your base comes within an inch of their base then you must make an Opposed Finesse roll or suffer an immediate Close Combat attack from them. This 1" area is known as a Threatened Area.</p>
    <p>If the Opposed Finesse roll is won by the moving Character or no damage is caused by the attack he or she passes by freely and continues with the move as normal. The player of the Character being moved past may elect to allow the opponent to pass by without the attack occurring.</p>
    <p>If the attack causes damage, the Characters are moved into base to base contact and are engaged in Close Combat — however a round of Close Combat is not fought until either Character's next Activation. Stunned or Incapacitated Characters do not threaten the area around their base.</p>
  </div>
  <div class="rule-block"><h3>🏚 Difficult Terrain</h3><p>Movement through Difficult Terrain costs 2" for every 1" traveled. Characters who are Running through Difficult Terrain must make a Difficulty 12 Finesse check or go Prone.</p></div>
  <div class="rule-block"><h3>🏠 Buildings</h3>
    <p>In most cases buildings are impassable and must be moved around or climbed. If a building has doors modelled on more than one side you may attempt to break into the building and move through it.</p>
    <p>To open most doors in Twisted is a Difficulty 15 check using either Strength or Finesse. It is an Action to attempt this. Once inside, doors leading out may be opened freely. You must have sufficient movement available to clear the entire building in one Activation. You may not end your Activation partway through a building.</p>
    <p>When moving through a building, make a Difficulty 14 Finesse check to avoid the indignant residents — failure means D4 damage bypassing Armour. Once a Character has moved through, the door is considered locked again; subsequent Characters must break in anew.</p>
  </div>
  <div class="rule-block"><h3>🤝 Handing Off</h3>
    <p>If you wish to give another Character an item you hold it is counted as one of your Actions for the turn. You must be in base to base contact with the Character receiving the item.</p>
    <p>You may not hand off an item if either you or the receiving Character are engaged in Close Combat. There are no dice rolls involved — simply transfer the item. The new owner may use it in the usual fashion during his or her turn.</p>
    <p>Characters may not hand off weapons printed on their cards.</p>
  </div>
</div>

<div class="rules-page" id="rp-ranged">
  <div class="rule-block"><h3>🎯 Range Bands</h3>
    <p>To determine the range of the attack simply measure the distance between you and your target, from base edge to base edge. You may measure the range before deciding whether or not to take the shot. Once you have the range compare this to the range bands of the weapon as printed on the Character's Play Card.</p>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.5rem">
      ${[['Short','±0','var(--green)'],['Medium','−2','var(--brass-light)'],['Long','−4','var(--copper)'],['Extreme','−6','var(--red)']].map(([r,m,c])=>`<div style="text-align:center;background:rgba(26,18,8,.5);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:.5rem"><div style="font-family:'Cinzel',serif;color:${c};font-size:.78rem">${r}</div><div style="font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:${c}">${m}</div></div>`).join('')}
    </div>
    <p style="margin-top:.5rem">Some weapons have a value printed as "–" in the Extreme Range band. This means they are ineffective at ranges any further than Long Range. No weapon is effective beyond its extreme range.</p>
  </div>
  <div class="rule-block"><h3>👁 Line of Sight & Cover</h3>
    <p>To shoot at an opponent you need to be able to see them. You may fire at any target that you can see within the 180 degree front arc of your Character. A Character on the table does not block Line of Sight to another Character but does provide cover.</p>
    <p>If any terrain element, Character Model, or other obstruction is between you and your target, yet you can draw a line of sight to part of the model they are considered to have <strong style="color:var(--brass-light)">cover</strong>. Cover gives the target a +2 bonus on their Defence roll.</p>
    <p>Characters who are running can claim an additional +1 to their Ranged Defence roll on top of any cover or other bonuses.</p>
  </div>
  <div class="rule-block"><h3>💥 Resolving Ranged Damage</h3>
    <p>Once a hit has been scored roll the damage dice for the weapon and add any modifiers. Subtract the target's Armour value. The result is the number of Life points lost. Damage cannot be less than 0.</p>
    <div class="example-box">Gretel fires her Duelling Pistol (D8+6) and hits. She rolls a 5 on the D8, plus 6 = 11 damage. Target has Armour 6. Final damage = 11 − 6 = 5 Life lost.</div>
  </div>
  <div class="rule-block"><h3>⚔ Firing Into Close Combat</h3>
    <p>You may fire into a Close Combat melee but it is dangerous. You have two options:</p>
    <p><strong style="color:var(--brass-light)">Err on Caution:</strong> You take a -4 penalty to your attack roll but only your intended target can be hit.</p>
    <p><strong style="color:var(--brass-light)">Blaze Away:</strong> No penalty to your attack roll. Roll a D6: on a 1–3 you end up targeting a random Character in the Melee (count the Characters, assign numbers and roll an appropriate dice); on a 4–6 you fire at your intended target. Resolve the shot against whichever model ends up being the target in the normal way.</p>
  </div>
</div>

<div class="rules-page" id="rp-closecombat">
  <div class="rule-block"><h3>⚔️ Entering Close Combat</h3>
    <p>In order to enter Close Combat with another character your model must move into base to base contact with your foe. This movement must be the result of a regular move action or a charge. You may not Run into Close Combat.</p>
    <p>Once contact is made during the Activation Phase of the turn a Round of Close Combat is then fought immediately. It is not an Action to fight in Close Combat. Close Combat is always considered to be fought after all Actions for the turn have been taken by the relevant Character.</p>
    <p><strong style="color:var(--brass-light)">Already Engaged:</strong> If your Character is engaged in CC before their Activation, you retain both Actions but options are limited: you may attempt to Disengage, call an Invocation (at −2 unless "0 (cc)"), use certain abilities, or use Delights — but you may not make Ranged Attacks or interact with objects. You may spend both Actions and still attack in CC. You only get a single CC attack per Activation. If you take your foe Out of Action you do not get to use any remaining Actions.</p>
  </div>
  <div class="rule-block"><h3>🎲 Rolling to Hit</h3>
    <p>To strike your opponent in Close Combat you roll a D20 and add your Close Combat Attack Bonus as printed on the Character card. This is an Opposed roll — your opponent rolls a D20 and adds his or her Close Combat Defence bonus.</p>
    <p>In addition there may be situational modifiers as listed below:</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      ${[['Charging','+1 to Hit, +1 Damage, −1 Defence until Maintenance'],['Jump Attack','+2 to Hit, +1 Damage, −1 Defence'],['Outnumbered','+1 to Hit (more opponents than allies in the Melee)'],['Flanked','+1 to Hit (models directly opposite each other through target)'],['Attacking from Rear','+1 to Hit (first round of Close Combat only)']].map(([n,d])=>`<div class="highlight-box"><strong>${n}:</strong><br>${d}</div>`).join('')}
    </div>
    <p style="margin-top:.5rem">Modifiers are cumulative — if you Charge, Outnumber, Flank and attack from the rear at the same time you receive +4 to hit.</p>
  </div>
  <div class="rule-block"><h3>🚪 Disengaging</h3>
    <p>To Disengage from Close Combat roll a Finesse Check using a Difficulty of 10 plus the Close Combat Attack value of the foe you are in base to base contact with. If you beat the value then you may make a move action away from the combat.</p>
    <p>You must move away from the Character who engaged you and may not move past them. If you fail to disengage you stay engaged in Close Combat and your opponent gains an immediate free attack against you. You defend yourself normally against this free attack. After a failed disengage you may still use your remaining Action (to attack, use an ability, etc.) and then fight a round of Close Combat as normal.</p>
    <p>You may not attempt to Disengage twice in the same turn. If you are in a Melee with multiple foes then the Disengagement check is taken against the highest Close Combat Attack value with an additional +1 for each opponent other than the first.</p>
  </div>
  <div class="rule-block"><h3>💥 Critical Hits (Natural 20)</h3>
    <p>A Natural 20 on the attack roll is always a Critical Hit, whether Ranged or Close Combat:</p>
    <p>1. The attack automatically hits regardless of modifiers.</p>
    <p>2. The target may not roll a Defence check to avoid the hit.</p>
    <p>3. The target's Armour is halved (rounded down) for this attack only.</p>
    <p>In <strong style="color:var(--brass-light)">Close Combat only</strong>, the target must also make a Finesse check at Difficulty 10 plus the final damage caused. If they fail, they become Stunned.</p>
    <div class="notice">Weapons with the <strong>Razor Sharp</strong> property cause a Critical Hit on a base D20 roll of 19 or 20.</div>
  </div>
</div>

<div class="rules-page" id="rp-alcsystem">
  <div class="rule-block"><h3>🔮 The Four Schools of Alchemancy</h3>
    <p>Alchemancers in the Twisted World are individuals who have learned to tap into the energies of the world in a similar way to The Engine itself. Their powers, whilst sometimes great, are but feeble efforts compared to the world altering abilities of even the weakest of The Engine's Nodes.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem">
      <div style="background:rgba(200,80,30,.08);border:1px solid rgba(200,80,30,.22);border-radius:4px;padding:.65rem"><span style="color:#E08060">🔥 Fire</span> — Cause great destruction and enhance allies, making others more powerful</div>
      <div style="background:rgba(80,150,60,.08);border:1px solid rgba(80,150,60,.22);border-radius:4px;padding:.65rem"><span style="color:#70C060">🌿 Earth</span> — Power over life and death, summoning beings from Elemental Regions</div>
      <div style="background:rgba(74,158,204,.08);border:1px solid rgba(74,158,204,.22);border-radius:4px;padding:.65rem"><span style="color:var(--blue)">💨 Air</span> — Protect others, fly, pass through walls, move at great speed</div>
      <div style="background:rgba(80,130,200,.08);border:1px solid rgba(80,130,200,.22);border-radius:4px;padding:.65rem"><span style="color:#7090D0">💧 Water</span> — Specialise in Healing and can also weaken and confound foes</div>
    </div>
  </div>
  <div class="rule-block"><h3>💎 Alchemantic Essences</h3>
    <p>On the Character Card of someone with Alchemantic ability you will see a series of small boxes next to the name of the Schools of Alchemancy they possess. These represent the number of Essences of each element that the Alchemancer starts the game with.</p>
    <p>These Essences are used up when generating Alchemantic Invocations and may be replenished when the Alchemancer recovers from his or her efforts.</p>
  </div>
  <div class="rule-block"><h3>💫 Recovering Essences</h3>
    <p><strong style="color:var(--brass-light)">Partial Recovery (1 Action):</strong> You may recover half of the Essences you have used so far. This number is rounded up. You may choose which types of Essence you recover.</p>
    <p><strong style="color:var(--brass-light)">Full Recovery (2 Actions):</strong> By using both Actions for a turn the Character may restore all Essences used so far.</p>
    <p>In order to restore Essences the Alchemancer must not be engaged in Close Combat or otherwise under the influence of any adverse effect. It does take concentration so any distraction will cause it to fail.</p>
  </div>
  <div class="rule-block"><h3>✨ Calling Invocations</h3>
    <p>To call an Invocation you must spend the required number of Actions and Essences as noted on the Invocation card, then roll D20 + your Alchemancy Characteristic against the Difficulty listed for the Invocation.</p>
    <p>You may call up to two Alchemantic Invocations per turn if you have sufficient Essences available.</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.65rem">
      <div class="highlight-box" style="text-align:center"><strong>Focussed Cast</strong><br>Spend 2 Actions on 1 Invocation for +4 to your roll. May not Focus an Invocation that already costs 2 Actions.</div>
      <div class="highlight-box" style="text-align:center;background:rgba(61,184,140,.06);border-color:rgba(61,184,140,.28)"><strong>Perfect Cast (Nat 20)</strong><br>Only half the Essences required are used (rounded down, min 1) and any dice the Invocation calls for are at maximum value</div>
      <div class="highlight-box" style="text-align:center;background:rgba(204,74,74,.06);border-color:rgba(204,74,74,.28)"><strong>Backfire (Nat 1)</strong><br>Full quota of Essences are lost. Apply the Backfire effects listed on the Invocation card. Draw an Eye of The Engine card as if Tempting Fate.</div>
    </div>
    <p style="margin-top:.65rem"><strong style="color:var(--brass-light)">Failed Invocation:</strong> If the roll fails, the Invocation is not generated and half the required Essences are lost (rounded down, minimum 1). Losses come from the Invocation's School Element first.</p>
    <p><strong style="color:var(--brass-light)">Alchemancy in Close Combat:</strong> Unless the Invocation range is listed as "0 (cc)" the Alchemancer suffers a −2 penalty to the Alchemancy check when calling an Invocation while engaged in Close Combat.</p>
  </div>
</div>

<div class="rules-page" id="rp-states">
  <div class="rule-block"><h3>💀 Status Conditions</h3>
    ${[
      ['Wounded','When Life drops to or below the red boxes on the Character Card all Characteristics are reduced by 2 except Armour. This can reduce a Characteristic below 0, becoming a penalty to the D20 roll. The Character remains in play but is significantly weakened.','var(--rust-light)'],
      ['Out of Action','When Life reaches 0 the Character is removed from the table. The opposing Company receives 2 Victory Points. Some abilities trigger when an ally or enemy goes Out of Action.','var(--rust-light)'],
      ['Stunned','Movement is halved and the Character may not attack (may still defend). Finesse checks to avoid area effects are at −2. Disengage attempts are at −2. Does not threaten the area around their base. Stunned Alchemancers are at −4 to call Invocations and may not focus to regain Essences. Clears during the Maintenance Phase.','#E8C060'],
      ['Prone','Costs a Move Action to rise. −2 to CC Attack and −2 to CC Defence while prone. May fire ranged weapons, call Invocations, and move at half Speed while prone. If a prone Character tries to rise while engaged in Close Combat, the opponent gets an immediate free attack (defender may defend normally). Finesse checks to avoid effects are at −4.','#D0A050'],
      ['Bleed','Ongoing damage. The target loses 2 Life at the end of each Maintenance Phase until healing is applied. Any successful healing will cause Bleed to cease effect immediately. Bleed will not affect Characters with the Mechanical ability.','var(--rust-light)'],
      ['Entangled','Character may not move or attack. All Defence rolls are at −2 if attacked. −2 penalty on any attempt to call an Alchemantic Invocation. The entangled Character may attempt to break the effect using either Strength or Finesse against a Difficulty of 14.','#A070D0'],
      ['Pinned','Character cannot voluntarily move away from their current position. Applied by certain weapons and abilities. Must pass a Strength check to break free.','var(--blue)'],
      ['Incapacitated','May take no Actions. Any attack against Character is an unopposed roll with a Difficulty of 11. Finesse Checks to avoid any effect are considered failures. No Threatened Area.','#cc6a5a'],
    ].map(([n,d,c])=>`<div class="highlight-box" style="margin-bottom:.4rem"><strong style="color:${c}">${n}:</strong> ${d}</div>`).join('')}
  </div>
</div>

<div class="rules-page" id="rp-terrain">
  <div class="rule-block"><h3>🏛 Terrain & Movement</h3>
    <p>You may not move through terrain under most circumstances. Walls and other solid objects are impassable and must be moved around or climbed over.</p>
    <p><strong style="color:var(--brass-light)">Walls & Low Terrain:</strong> To climb over a wall or any other terrain over an inch in height simply make a climb check as noted earlier and then make a jump check to get down safely. Lower terrain such as barrels and boxes up to 1" in height may be clambered over without a check — they are simply designated as Difficult Terrain.</p>
    <p><strong style="color:var(--brass-light)">Difficult Terrain:</strong> Movement costs 2" per 1" traveled. Running characters must make a Difficulty 12 Finesse check or go Prone.</p>
    <p><strong style="color:var(--brass-light)">Cover:</strong> If terrain is between you and a Ranged attacker, you gain +2 to Ranged Defence.</p>
  </div>
  <div class="rule-block"><h3>🏠 Buildings</h3>
    <p>Buildings are generally impassable but in certain cases you may move through them although it can be dangerous. If a building has doors modelled on more than one side you may attempt to break into the building.</p>
    <p>To open most doors in Twisted is a Difficulty 15 check using either Strength or Finesse. It is an Action to attempt this. Once inside the building the doors leading out may be opened freely.</p>
    <p>You must have sufficient movement available to clear the entire building in one Activation. You may not end your Activation partway through a building.</p>
  </div>
  <div class="rule-block"><h3>✨ Fascinating Features (Optional)</h3>
    <p>Roll D6 for number of features (1–3), then D20 for each to determine the type. These represent unusual elements of the Twisted world that can affect gameplay — explosive gunpowder, raw Essences, Sewer Slimes, sinkholes, and more. See the 🌿 Features tab for the full list of 20 Fascinating Features.</p>
  </div>
</div>

<div class="rules-page" id="rp-grenades">
  <div class="rule-block"><h3>💣 Grenades & Scatter</h3>
    <p>Grenades can be thrown at a foe or at a point on the table. If a foe is the target, all the usual ranged combat rules apply. If the target is a point on the table, the Difficulty for hitting the desired point is <strong style="color:var(--brass-light)">15</strong>. You may lob a grenade over tall obstructions — if you cannot draw line of sight to the end point, there is an additional −2 on the roll.</p>
    <p>If you miss the desired point or the target dodges, the grenade scatters. Place the Grenade Scatter Template over the target with the arrow pointing in the direction of the throw. Roll a D8 for direction and a D6 for the number of inches it scatters.</p>
  </div>
  <div class="rule-block"><h3>💦 Splash Damage</h3>
    <p>Some weapons cause Splash Damage rather than using a Blast Template. Splash Damage is a secondary effect to the main damage the weapon or Invocation causes.</p>
    <p>The Character at the point where the effect lands takes <strong>full damage</strong> as listed for the weapon. Any other Character within <strong>1"</strong> of that spot must make a <strong>Difficulty 12 Finesse check</strong> or take <strong>half the damage rolled, rounded down</strong>.</p>
  </div>
  <div class="rule-block"><h3>💥 Blast Templates</h3>
    <p>Alchemantic Invocations, Grenades or other weapons that use the Blast or Cone Templates follow these rules:</p>
    <p><strong>Small Blast:</strong> 2" radius circular template. <strong>Large Blast:</strong> 4" radius circular template.</p>
    <p>Any Character whose base is <strong>fully covered</strong> by the template takes full damage with <strong style="color:var(--rust-light)">no chance to avoid the effect</strong>.</p>
    <p>Any Character whose base is <strong>partially covered</strong> must make a Difficulty 15 Finesse check. Pass = no damage and the Character is moved 1" to a clear space outside the template. Fail = full damage. If the 1" move cannot be made due to terrain or other Characters, the Character remains in the blast and takes full damage. Characters with cover between them and the source of the explosion gain +2 on this check and need not move.</p>
  </div>
  <div class="rule-block"><h3>🔺 Cone Templates</h3>
    <p>Cone templates originate from the attacker's base and expand outward. Two sizes exist: 6" and 9" cones. The same Finesse checks as Blast templates apply to Characters caught in the cone.</p>
  </div>
</div>

<div class="rules-page" id="rp-company">
  <div class="rule-block"><h3>🏗 Building Your Company</h3>
    <p>A standard game of Twisted is played with Companies of approximately <strong style="color:var(--brass-light)">200 points</strong>. Select Characters freely up to the agreed points total. Characters with an Engine Eyecon on their card may only be taken once in any Company; Characters without the Eyecon may be taken multiple times.</p>
    <p>Any leftover points after selecting your Characters may be spent on Equipment from Dr Disraeli's Delights — unique items that provide bonuses and special abilities to your Characters.</p>
    <p>When you build your Company each Alchemancer you control should select the Invocations they wish to have available for the skirmish before the start of the game.</p>
  </div>
  <div class="rule-block"><h3>🤝 Guild of Harmony Allies</h3>
    <p>Characters from the Guild of Harmony may serve as allies to other factions. Each Guild Creed has a preferred alliance:</p>
    <p><strong style="color:var(--brass-light)">Anarchists</strong> — May ally with Dickensians and Scions of the Sands (but not if the company includes Horace De Havilland)</p>
    <p><strong style="color:var(--brass-light)">Ethicists</strong> — May ally with Servants of the Engine and Scions of the Sands (but not if the company includes Avatar of Set)</p>
    <p><strong style="color:var(--brass-light)">Pragmatists</strong> — May ally with all Factions</p>
  </div>
  <div class="rule-block"><h3>🎲 Shifting Loyalties (Optional)</h3>
    <p>Guild allies can be unpredictable. At certain trigger events during the game you may need to roll to see if your Guild ally remains loyal. Roll a D20 — on a low result, roll a D6 for the Guild ally's reaction:</p>
    <p>1 = Double Cross (the ally joins the enemy Company!), 2 = Leaves the table, 3 = Skips next Activation, 4–6 = Carries on as normal.</p>
  </div>
</div>

<div class="rules-page" id="rp-canopic">
  <div class="rule-block"><h3>🏺 Canopic Jars (Scions of the Sands)</h3>
    <p>Each living member of Carter's expedition carries a Canopic Jar linked to the pool of ancient spirits held in the Node. At the start of a game, shuffle all unique Canopic Jar cards face down into the <strong style="color:var(--brass-light)">Canopic Deck</strong>. You may not look at this deck during play.</p>

    <p style="margin-top:.7rem"><strong style="color:var(--brass-light)">Accessing a Jar</strong> — At the start of their Activation, a Character with the Canopic Jar ability may attempt to Access the spirit. It is <em>not</em> an Action. Draw the top card from the Canopic Deck and roll D20 + the stat shown on the card. If equal to or greater than the Access Difficulty, the jar is successfully Accessed — all Characteristic changes apply immediately, and the host selects abilities from those listed on the card. <strong>Once drawn, you must attempt to Access the jar</strong> — the spirits do not let their chance to live again pass by lightly. You may only attempt once per turn.</p>

    <p style="margin-top:.7rem"><strong style="color:var(--brass-light)">Choosing Abilities</strong> — Each spirit card lists abilities and a number you may choose (e.g. "Abilities (2)" means pick 2 from those listed). Once chosen, they cannot be changed. If the host already has a listed ability, it is enhanced: +2 to Difficulty for opponents to resist, −2 to Difficulty for the host's own checks, free use if it normally costs an Action, or +2 to any bonus the ability confers.</p>

    <p style="margin-top:.7rem"><strong style="color:var(--brass-light)">Spirit Influence</strong> — While connected, the spirit's personality always affects the host (shown as the Quirk on each card). This is not optional and cannot be ignored.</p>

    <p style="margin-top:.7rem"><strong style="color:var(--rust-light)">Dominance & Duration</strong> — Each Maintenance Phase after Accessing, mark off a Dominance box and make a check: D20 + <em>unmodified</em> stat (no jar bonuses) vs Dominance Difficulty, minus the penalty shown under that box. If the final red box is reached, the spirit automatically Dominates — its Dominance effect replaces the Spirit Influence. To break free when Dominated, make a Dominance check at base difficulty (no turn penalties) as an Action. Success disconnects but leaves the host Stunned until the next Maintenance Phase.</p>

    <p style="margin-top:.7rem"><strong style="color:var(--brass-light)">Disconnecting</strong> — If not Dominated, disconnecting requires no check — simply declare it (not an Action). The card returns to the deck, which is reshuffled. All bonuses and abilities are lost. A new card is drawn the next time the host tries to Access.</p>

    <p style="margin-top:.7rem"><strong style="color:var(--brass-light)">Natural 1 (Being Overcome)</strong> — The spirit surges. The host is Stunned until their following Activation. The card returns to the deck.</p>

    <p style="margin-top:.7rem"><strong style="color:var(--brass-light)">Natural 20 (Subdued)</strong> — The host completely masters the spirit. No risk of Dominance for the duration. If the host later disconnects, they may retain the card and re-access the same spirit with a +4 bonus on the check.</p>
  </div>
</div>

</div><!-- rules-content -->

function toggleFav(name,btn){
  const isFav=!Store.get('fav_'+name,false);
  Store.set('fav_'+name,isFav);
  // Update ALL visible fav buttons for this character
  document.querySelectorAll('.fav-btn').forEach(b=>{
    if(b.onclick&&b.onclick.toString().includes(name.replace(/'/g,"\\'"))||b.getAttribute('onclick')&&b.getAttribute('onclick').includes(name)){
      b.classList.toggle('fav-active',isFav);
      b.title=isFav?'Unfavourite':'Favourite';
    }
  });
  showToast(isFav?`★ ${name} favourited`:`${name} unfavourited`);
  // Refresh favourites panel if visible
  const fp=document.getElementById('fp-favourites');
  if(fp&&fp.classList.contains('active'))renderFavPanel();
}

function renderFavPanel(){
  const favs=Object.values(CHARS).flat().filter(c=>Store.get('fav_'+c.name,false));
  const fp=document.getElementById('fp-favourites');
  if(!fp)return;
  fp.innerHTML=`${favs.length?`<div style="text-align:right;margin-bottom:.75rem"><button onclick="clearFavourites()" style="background:rgba(204,74,74,.08);border:1px solid rgba(204,74,74,.3);color:#cc6a5a;font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.06em;padding:.4rem .9rem;border-radius:5px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(204,74,74,.18)'" onmouseout="this.style.background='rgba(204,74,74,.08)'">\u2715 Clear Favourites</button></div>`:''}<div class="char-grid">${favs.length?favs.map(charCard).join(''):'<div style="grid-column:1/-1;text-align:center;padding:3rem;font-family:\'IM Fell English\',serif;color:var(--parchment-dark)">No favourites yet — tap ★ on any character card</div>'}</div>`;
}
function clearFavourites(){
  Object.values(CHARS).flat().forEach(c=>Store.del('fav_'+c.name));
  document.querySelectorAll('.fav-btn').forEach(b=>{b.classList.remove('fav-active');b.title='Favourite';});
  renderFavPanel();
  showToast('Favourites cleared');
}

function showFaction(k,btn){
  document.querySelectorAll('.faction-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.faction-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('fp-'+k).classList.add('active');
  btn.classList.add('active');
  if(k==='favourites')renderFavPanel();
}

function statClass(v){const n=parseInt(v);if(isNaN(n))return '';return n>=7?'stat-hi':n<=3?'stat-lo':'stat-mid';}

function factionIcon(faction){
  const colors={dickensians:'rgba(180,40,40,.35)',servants:'rgba(40,80,180,.35)',scions:'rgba(180,140,20,.35)',guild:'rgba(100,40,160,.35)'};
  return{color:colors[faction]||'rgba(201,168,76,.2)'};
}

// ── HERALDIC CREST SYSTEM ─────────────────────────────────
// Each character gets a unique SVG crest: faction shield + bespoke sigil + ornamental details
function makeCrest(shield, sigil, palette){
  const {bg1,bg2,rim,glow,accent,sigC}=palette;
  return {
    bg: `linear-gradient(160deg,${bg1},${bg2})`,
    svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" width="120" height="110" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);overflow:visible">
      <defs>
        <radialGradient id="grd_${sigC.replace('#','')}" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="${bg2}" stop-opacity="0"/>
          <stop offset="100%" stop-color="${glow}" stop-opacity="0.55"/>
        </radialGradient>
        <filter id="glow_${sigC.replace('#','')}">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Ambient glow disc -->
      <ellipse cx="60" cy="52" rx="46" ry="42" fill="url(#grd_${sigC.replace('#','')})"/>
      <!-- Shield shape -->
      ${shield(rim,accent)}
      <!-- Sigil -->
      <g filter="url(#glow_${sigC.replace('#','')})" transform="translate(60,48)">
        ${sigil(sigC)}
      </g>
      <!-- Corner ornaments -->
      <g opacity="0.35" fill="${accent}">
        <path d="M14,14 L20,14 L20,20 M100,14 L106,14 L106,20 M14,90 L20,90 L20,96 M100,90 L106,90 L106,96" stroke="${accent}" stroke-width="1.2" fill="none"/>
      </g>
    </svg>`
  };
}

function drawSpirit(){
  if(!window._canDeck)return;
  if(window._canDeck.length===0){window._canDeck=[...SPIRITS];shuffle(window._canDeck);}
  window._drawn=window._canDeck.pop();window._domLevel=0;
  document.getElementById('can-count').textContent=window._canDeck.length+' spirits remaining';
  renderDrawn();
}

  <div class="card"><div class="card-title">🗺 Deployments (D10)</div>
    ${DEPLOYS.map((d,i)=>`<div style="padding:.38rem 0;border-bottom:1px solid rgba(201,168,76,.07);font-size:.79rem"><span style="font-family:'Cinzel',serif;color:var(--brass-light)">${i+1}. </span>${d}</div>`).join('')}

    </div>`).join('')}
  </div>
</div>`;
});
function genMission(){
  const dep=DEPLOYS[Math.floor(Math.random()*10)];
  const obj=OBJECTIVES[Math.floor(Math.random()*20)];
  const nf=Math.floor(Math.random()*3)+1;
  const feats=shuffle([...FEATURES]).slice(0,nf);
  const t1=TAROT[Math.floor(Math.random()*TAROT.length)];
  const t2=TAROT.filter(t=>t!==t1)[Math.floor(Math.random()*(TAROT.length-1))];
  document.getElementById('mission-result').innerHTML=`
    <div class="m-head">Mission Generated</div>
    <div class="m-name">${obj.n}</div>
    <div style="font-size:.83rem;color:var(--parchment-dark);font-style:italic">${obj.d}</div>
    <div class="m-detail-grid">
      <div class="m-detail"><span class="m-dlbl">🗺 Deployment</span><div class="m-dval">${dep.split(' — ')[0]}</div><div style="font-size:.7rem;color:var(--parchment-dark);font-style:italic;margin-top:.2rem">${dep.split(' — ')[1]||''}</div></div>
      <div class="m-detail"><span class="m-dlbl">🎯 Primary VP</span><div class="m-dval" style="color:var(--green);font-family:'Cinzel Decorative',serif;font-size:1.4rem">${obj.vp}</div></div>
      <div class="m-detail"><span class="m-dlbl">🌿 Features (${nf})</span>${feats.map(f=>`<div style="font-size:.72rem;color:var(--parchment-dark);margin-top:.18rem">• ${f}</div>`).join('')}</div>
    </div>
    <div style="margin-top:1rem">
      <div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;letter-spacing:.08em;color:var(--brass);text-transform:uppercase;margin-bottom:.5rem">🃏 Tarot of Taxing Tasks (Secret Objectives)</div>
      <div class="m-obj">Player A: <strong style="color:var(--brass-light)">${t1}</strong></div>
      <div class="m-obj">Player B: <strong style="color:var(--brass-light)">${t2}</strong></div>
    </div>
    <div style="margin-top:.9rem;padding-top:.9rem;border-top:1px solid rgba(201,168,76,.13);font-family:'Josefin Sans',sans-serif;font-size:.75rem;color:var(--parchment-dark)">
      <strong style="color:var(--brass-light)">Always active:</strong> Wound enemy = 1VP · OOA enemy = 2VP
    </div>`;
}

function savePname(s,v){window._pnames[s]=v;Store.set('camp_names',window._pnames);}
function resetCampaign(){if(!confirm('Reset all campaign progress and scores?'))return;window._scores={a:0,b:0};window._done=new Set();Store.set('camp_scores',window._scores);Store.set('camp_done',[]);document.getElementById('sc-a').textContent=0;document.getElementById('sc-b').textContent=0;document.querySelectorAll('.m-cell').forEach(el=>el.classList.remove('done'));showToast('Campaign reset ↺');}
function toggleMission(n){
  const el=document.getElementById('mc-'+n);
  if(window._done.has(n)){window._done.delete(n);el.classList.remove('done');}
  else{window._done.add(n);el.classList.add('done');}
  Store.set('camp_done',[...window._done]);
  if(window._done.size===10){setTimeout(()=>showToast('🏆 Campaign Complete! Well played!',4000),300);}
}
function adj(s,d){window._scores[s]=Math.max(0,(window._scores[s]||0)+d);document.getElementById('sc-'+s).textContent=window._scores[s];Store.set('camp_scores',window._scores);}

function rollD(sides){
  const r=Math.floor(Math.random()*sides)+1;
  const el=document.getElementById('dn');
  el.classList.remove('rolling');void el.offsetWidth;el.classList.add('rolling');
  el.textContent=r;
  const sp=document.getElementById('dspec');
  if(sides===20&&r===20)sp.innerHTML='<div class="spec-result spec-crit">✨ Critical Hit — Natural 20!</div>';
  else if(sides===20&&r===1)sp.innerHTML='<div class="spec-result spec-fumble">💀 Fumble — Natural 1!</div>';
  else sp.innerHTML=`<div style="font-family:'Josefin Sans',sans-serif;font-size:.78rem;color:var(--brass);margin-top:.35rem">D${sides}</div>`;
  // History
  addRollHistory(r,sides);
  if(navigator.vibrate)navigator.vibrate(sides===20?[30,10,20]:20);
  return r;
}

window._rollHistory=[];
function clearRollHistory(){
  window._rollHistory=[];
  const hist=document.getElementById('roll-history');
  if(hist)hist.innerHTML='';
  showToast('Roll history cleared');
}
function addRollHistory(r,sides){
  window._rollHistory.unshift({r,sides,ts:Date.now()});
  if(window._rollHistory.length>20)window._rollHistory.pop();
  const hist=document.getElementById('roll-history');
  if(!hist)return;
  hist.innerHTML=window._rollHistory.slice(0,16).map(h=>{
    const isCrit=h.sides===20&&h.r===20;
    const isFumble=h.sides===20&&h.r===1;
    return`<div class="roll-pip${isCrit?' crit':isFumble?' fumble':''}" title="D${h.sides} rolled ${h.r}">
      <span style="font-size:.62rem;opacity:.6;display:block;line-height:1;margin-bottom:.08rem">D${h.sides}</span>
      <span>${h.r}</span>
    </div>`;
  }).join('');
}

window._oppVals={a:null,b:null};
function rollOpp(side){
  const mod=parseInt(document.getElementById('m'+side).value)||0;
  const raw=Math.floor(Math.random()*20)+1;
  const total=raw+mod;
  window._oppVals[side]={raw,mod,total};
  document.getElementById('o'+side).textContent=total;
  updateOppResult();
}
function rollBoth(){rollOpp('a');rollOpp('b');}
function updateOppResult(){
  const {a,b}=window._oppVals;
  if(!a||!b)return;
  let msg='',col='';
  if(a.total>b.total){msg=`Attacker wins! (${a.total} vs ${b.total})`;col='var(--green)';}
  else if(b.total>a.total){msg=`Defender wins! (${b.total} vs ${a.total})`;col='var(--red)';}
  else{msg=`Tie! (${a.total} each) — Favour holder wins`;col='var(--brass-light)';}
  document.getElementById('opp-res').innerHTML=`<span style="color:${col}">${msg}</span>`;
}

function rollDmg(){
  const dice=document.getElementById('dd').value;
  const mod=parseInt(document.getElementById('dm').value)||0;
  const arm=parseInt(document.getElementById('da').value)||0;
  const crit=document.getElementById('dc').checked;
  const burn=document.getElementById('db').checked;
  const sides=parseInt(dice.replace('D',''));
  const raw=Math.floor(Math.random()*sides)+1;
  const total=raw+mod;
  let effArm=burn?0:crit?Math.floor(arm/2):arm;
  const dmg=Math.max(0,total-effArm);
  document.getElementById('dmg-res').textContent=dmg+' damage';
  let det=`D${sides} rolled ${raw} + ${mod} modifier = ${total}`;
  if(burn)det+=' · Armour ignored (Burning)';
  else if(crit)det+=` · Critical: Armour halved (${arm}→${effArm})`;
  else det+=` − ${arm} Armour`;
  document.getElementById('dmg-det').textContent=det;
}

reg('lore',function(){
  if(document.getElementById('panel-lore').innerHTML.trim())return;
  const lores={
    engine:`<div class="lore-text">
      <p>At the heart of Twisted lies <strong style="color:var(--brass-light)">The Engine</strong> — a vast, unknowable machine of impossible complexity whose purpose no one fully understands. Buried deep beneath Victorian London, it thrums with a power that bleeds into the world above, warping the natural and the mechanical alike.</p>
      <div class="lore-quote">"The Engine does not care for loyalty, for faith, or for righteousness. It simply is. And those who draw close to it are changed forever."</div>
      <p>The Engine's influence manifests as <strong style="color:var(--brass-light)">Elemental Essences</strong> — raw energies of Fire, Earth, Air, and Water that can be harnessed by those with the gift of Alchemancy. Engine Nodes, scattered across the city and beyond, act as focal points where this power concentrates and can be accessed.</p>
      <p>The <strong style="color:var(--brass-light)">Eye of The Engine</strong> deck represents the Engine's capricious attention — sometimes helpful, sometimes catastrophic, never predictable. Tempting Fate means drawing the Engine's gaze deliberately, gambling that its attention will bring fortune rather than disaster.</p>
      <p><strong style="color:var(--brass-light)">Favour of The Engine</strong> is the most coveted resource on the battlefield — the sense that the great machine is momentarily on your side, ready to tip the balance of fate at a critical moment.</p>
    </div>`,
    factions:`<div class="lore-text">
      <p>Three great factions vie for control of The Engine and its secrets, while a fourth watches from the shadows.</p>
      <p><strong style="color:var(--brass-light)">The Dickensians</strong> are a gang of miscreants, criminals, and transformed monsters united under the brutal leadership of Bill Psyches. They lurk in the dark corners of Victorian London — gin-soaked alleys and fog-choked docklands — and see The Engine as a means to power, wealth, and survival. Their Urkin followers are barely more than feral; their named characters are forces of dangerous unpredictability.</p>
      <div class="lore-quote">"We ain't 'ere for yer Engine, Guv'nor. We're 'ere for everything it can buy."</div>
      <p><strong style="color:var(--brass-light)">The Servants of The Engine</strong> are true believers — they see The Engine as something divine, or at least worthy of reverence and protection. Led by the elegant and deadly Nouveau, they are organised, disciplined, and utterly committed. Their Gentlefolk soldiers represent the respectable face of Victorian society, hiding a fanatical devotion beneath brass buttons and polished boots.</p>
      <p><strong style="color:var(--brass-light)">The Scions of the Sands</strong> emerged from a Victorian archaeological expedition gone catastrophically wrong. Carter's team uncovered a temple of Set in ancient Nubt, Egypt — and activated something that had slept for three thousand years. Now bound to ancient spirits through the Canopic Jar system, the expedition team fights alongside awakened guardians and the terrible Avatar of Set itself.</p>
      <p><strong style="color:var(--brass-light)">The Guild of Harmony</strong> is a secret organisation that predates all the factions. Founded to prevent any single group from controlling The Engine, they work through three philosophical Creeds — the methodical Ethicists, the scholarly Pragmatists, and the aggressive Anarchists. They sell their services to the other factions while pursuing their own inscrutable agenda.</p>
    </div>`,
    egypt:`<div class="lore-text">
      <p>In the spring of 1895, archaeologist Howard Carter led an expedition into the Egyptian desert. In the ruins of ancient Nubt, they discovered a temple unlike any other — sealed, intact, and radiating a warmth that had nothing to do with the desert sun.</p>
      <p>Deep within the temple, Carter's team found the chamber of <strong style="color:var(--brass-light)">High Priest Senusret</strong>, who had sealed himself and his most devoted followers inside Canopic Jars — not in death, but in a form of living stasis, connected to an Engine Node of immense power.</p>
      <div class="lore-quote">"We thought we'd found a tomb. Instead we found a sleeping army, and we woke it."<br>— Agatha Marple, personal diary</div>
      <p>The activation of the Node called forth the <strong style="color:var(--brass-light)">Avatar of Set</strong> — a terrifying manifestation of the ancient Egyptian deity, channelled through The Engine's power. Rather than flee, the expedition team found themselves drawn into a bond with the Canopic spirits — ancient souls of warriors, priests, and courtiers who offer their powers in exchange for a connection to the living world.</p>
      <p>The <strong style="color:var(--brass-light)">Canopic Jar System</strong> is unique to the Scions. Each character with the ability carries a jar containing an ancient spirit. When accessed, the spirit overlays its personality and abilities onto the host — but lingering too long risks <strong style="color:var(--rust-light)">Dominance</strong>, where the spirit takes control entirely.</p>
    </div>`,

function drawEye(n){
  if(window._eyeDeck.length===0){window._eyeDeck=[...window._eyeDiscard];window._eyeDiscard=[];shuffle(window._eyeDeck);showToast('Deck reshuffled!');}
  const drawn=[];
  for(let i=0;i<n&&window._eyeDeck.length>0;i++){
    const card=window._eyeDeck.pop();
    window._eyeDiscard.push(card);
    drawn.push(card);
  }
  document.getElementById('eye-count').textContent=window._eyeDeck.length+' cards remaining';
  const typeColour={positive:'rgba(61,184,140,.15)',neutral:'rgba(201,168,76,.1)',negative:'rgba(204,74,74,.12)'};
  const typeBorder={positive:'rgba(61,184,140,.4)',neutral:'rgba(201,168,76,.35)',negative:'rgba(204,74,74,.35)'};
  document.getElementById('eye-drawn').innerHTML=drawn.map((c,i)=>`
    <div style="background:${typeColour[c.type]};border:2px solid ${typeBorder[c.type]};border-radius:10px;padding:1.25rem;margin-bottom:.75rem;animation:revealCard .4s ease ${i*.15}s both">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem">
        <div>
          <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--brass-light)">${c.eyecon} ${c.name}</div>
          <div style="font-family:'Josefin Sans',sans-serif;font-size:.63rem;letter-spacing:.1em;color:var(--brass-dark);text-transform:uppercase;margin-top:.18rem">Play: ${c.timing}</div>
        </div>
        ${n>1?`<div style="font-family:'Josefin Sans',sans-serif;font-size:.6rem;color:var(--brass-dark);background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);padding:.2rem .5rem;border-radius:3px">${i===0?'Option 1':'Option 2'}</div>`:''}
      </div>
      <div style="font-size:.88rem;color:var(--parchment);line-height:1.65">${c.effect}</div>
      ${n>1&&i===0?`<div style="margin-top:.65rem;font-family:'Josefin Sans',sans-serif;font-size:.67rem;color:var(--brass-dark)">↓ Or take the second card:</div>`:''}
    </div>`).join('');
}
function drawTemptFate(){
  // Tempt Fate: draw one card from deck. Red-type cards = lose Favour.
  // Negative cards are the "red Eyecon" — Engine's punishment.
  if(window._eyeDeck.length===0){
    window._eyeDeck=[...window._eyeDiscard];
    window._eyeDiscard=[];
    shuffle(window._eyeDeck);
    showToast('Deck reshuffled!');
  }
  const card=window._eyeDeck.pop();
  if(card) window._eyeDiscard.push(card);
  document.getElementById('eye-count').textContent=window._eyeDeck.length+' cards remaining';

  const isRed=card&&card.type==='negative';
  const bgCol=isRed?'rgba(204,74,74,.18)':'rgba(61,184,140,.12)';
  const borderCol=isRed?'rgba(204,74,74,.65)':'rgba(61,184,140,.45)';
  const outcome=isRed
    ? `<div style="margin-top:.75rem;padding:.6rem .85rem;background:rgba(204,74,74,.15);border:1px solid rgba(204,74,74,.45);border-radius:6px">
        <div style="font-family:'Cinzel',serif;font-size:.88rem;color:var(--rust-light);margin-bottom:.25rem">🔴 Red Eyecon — Fate turns against you</div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--parchment-dark);line-height:1.55">Your action <strong style="color:var(--rust-light)">fails</strong>. If you hold Favour of The Engine, you <strong style="color:var(--rust-light)">lose it immediately</strong>. The card effect also applies.</div>
      </div>`
    : `<div style="margin-top:.75rem;padding:.6rem .85rem;background:rgba(61,184,140,.1);border:1px solid rgba(61,184,140,.35);border-radius:6px">
        <div style="font-family:'Cinzel',serif;font-size:.88rem;color:#5ddb8a;margin-bottom:.25rem">✅ Eyecon shows — Fate smiles</div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:.72rem;color:var(--parchment-dark);line-height:1.55">Your action <strong style="color:#5ddb8a">succeeds automatically</strong>. The card effect also applies (if beneficial, you may choose to ignore it).</div>
      </div>`;

  document.getElementById('eye-drawn').innerHTML=card?`
    <div style="background:${bgCol};border:2px solid ${borderCol};border-radius:10px;padding:1.25rem;animation:revealCard .4s ease both">
      <div style="font-family:'Josefin Sans',sans-serif;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:${isRed?'var(--rust-light)':'#5ddb8a'};margin-bottom:.55rem">🎲 Tempting Fate — Card Drawn</div>
      <div style="display:flex;align-items:center;gap:.65rem;margin-bottom:.65rem">
        <span style="font-size:1.8rem">${card.eyecon}</span>
        <div>
          <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--brass-light)">${card.name}</div>
          <div style="font-family:'Josefin Sans',sans-serif;font-size:.63rem;letter-spacing:.1em;color:var(--brass-dark);text-transform:uppercase;margin-top:.15rem">Play: ${card.timing}</div>
        </div>
      </div>
      <div style="font-size:.88rem;color:var(--parchment);line-height:1.65">${card.effect}</div>
      ${outcome}
    </div>`:'<div style="font-family:\'Josefin Sans\',sans-serif;font-size:.8rem;color:var(--brass-dark);text-align:center;padding:1rem">No cards left — reset the deck.</div>';
}

function getFaction(name){
  for(const[k,v] of Object.entries(CHARS)){if(v.find(c=>c.name===name))return k;}return'unknown';
}
function addToRoster(name){
  const c=Object.values(CHARS).flat().find(x=>x.name===name);
  if(!c)return;
  window._roster.push({name:c.name,role:c.role,pts:c.pts,faction:getFaction(name)});
  Store.set('roster',window._roster);
  renderBuilder();
  showToast(`${c.name} added — ${c.pts}pts`);
}
function removeFromRoster(i){
  const name=window._roster[i].name;
  window._roster.splice(i,1);
  Store.set('roster',window._roster);
  renderBuilder();
  showToast(`${name} removed`);
}
function clearRoster(){if(!confirm('Clear entire roster?'))return;window._roster=[];Store.set('roster',[]);renderBuilder();showToast('Roster cleared');}
function filterBuilder(v){
  const lv=v.toLowerCase();
  document.querySelectorAll('.builder-char').forEach(el=>el.style.display=el.dataset.search.includes(lv)?'':'none');
}

function resetEye(){window._eyeDeck=[...EYE_CARDS];shuffle(window._eyeDeck);window._eyeDiscard=[];document.getElementById('eye-count').textContent=EYE_CARDS.length+' cards remaining';document.getElementById('eye-drawn').innerHTML='';showToast('Eye deck reshuffled 👁');}

function toggleSearch(){

function globalSearch(q){
  const res=document.getElementById('search-results');
  if(q.length<2){res.innerHTML='<p style="font-family:\'Josefin Sans\',sans-serif;font-size:.8rem;color:var(--brass-dark);text-align:center;padding:1.5rem">Type at least 2 characters to search…</p>';return;}
  const lq=q.toLowerCase();
  const hits=[];

  // Search characters
  Object.values(CHARS).flat().forEach(c=>{
    const score=matchScore(lq,[c.name,c.role,c.lore||'',...c.abilities,...(c.schools||[])]);
    if(score>0)hits.push({type:'Character',icon:'🎭',title:c.name,sub:`${c.role} · ${c.pts}pts`,action:`openChar(${JSON.stringify(c.name)});toggleSearch()`,score,preview:c.lore||c.abilities.join(', ')});
  });

  // Search abilities
  ABILITIES.forEach(a=>{
    const score=matchScore(lq,[a.n,a.d,a.t]);
    if(score>0)hits.push({type:'Ability',icon:'⚡',title:a.n,sub:a.t,action:`navTo('abilities');toggleSearch();setTimeout(()=>{const el=document.getElementById('glo-list');const entry=[...el.querySelectorAll('.glo-entry')].find(e=>e.querySelector('.glo-name').textContent==='${a.n.replace(/'/g,"\\'")}');if(entry){entry.scrollIntoView({behavior:'smooth',block:'center'});entry.classList.add('expanded');}},400)`,score,preview:a.d});
  });

  // Search invocations
  Object.entries(INVOC).forEach(([school,invocs])=>{
    invocs.forEach(v=>{
      const score=matchScore(lq,[v.n,v.d,school]);
      if(score>0)hits.push({type:'Invocation',icon:'🔮',title:v.n,sub:`${school.charAt(0).toUpperCase()+school.slice(1)} School · Power ${v.pw}`,action:`navTo('alchemancy');toggleSearch();setTimeout(()=>showSchool('${school}',document.querySelector('.sc-${school}')),300)`,score,preview:v.d});
    });

  // Search rules (by keyword)
  const ruleMap=[
    {keys:['move','speed','climb','jump','run'],page:'movement',label:'Movement Rules'},
    {keys:['ranged','shoot','range','cover','damage','armour'],page:'ranged',label:'Ranged Combat'},
    {keys:['close combat','cc','charge','melee','critical'],page:'closecombat',label:'Close Combat'},
    {keys:['alchemancy','invocation','essence','school','fire','earth','air','water'],page:'alcsystem',label:'Alchemancy System'},
    {keys:['favour','eye','engine','tempt','re-roll'],page:'favour',label:'Favour & Eye of the Engine'},
    {keys:['turn','activation','phase','sequence','maintenance'],page:'turn',label:'Turn Sequence'},
    {keys:['wound','stun','prone','bleed','entangled','pinned','condition'],page:'states',label:'Conditions & States'},
    {keys:['terrain','building','cover','difficult'],page:'terrain',label:'Terrain'},
    {keys:['grenade','blast','template','cone'],page:'grenades',label:'Templates & Grenades'},
    {keys:['company','build','points','guild','ally'],page:'company',label:'Company Building'},
  ];
  ruleMap.forEach(r=>{
    if(r.keys.some(k=>lq.includes(k)||k.includes(lq)))
      hits.push({type:'Rules',icon:'📜',title:r.label,sub:'Rules Reference',action:`navTo('rules');toggleSearch();setTimeout(()=>{const btn=document.querySelector('.rules-nav-item[onclick*="${r.page}"]');if(btn){showRule('${r.page}',btn);}},300)`,score:1,preview:'Click to open this rules section'});
  });

  // Search spirits
  SPIRITS.forEach(s=>{
    const score=matchScore(lq,[s.n,s.title,s.bonus,s.abil,s.quirk]);
    if(score>0)hits.push({type:'Spirit',icon:'🏺',title:s.n,sub:s.title,action:`navTo('canopic');toggleSearch();setTimeout(()=>showSpiritDetail('${s.n}'),400)`,score,preview:s.bonus+' · '+s.abil});

  Object.entries(TERM_DEFS).forEach(([key,d])=>{

    if(score>0)hits.push({type:'Definition',icon:'📖',title:d.title,sub:d.type,action:`showTerm('${key}');`,score:score+0.5,preview:d.body});

  hits.sort((a,b)=>b.score-a.score);

  const typeColors={

    'Invocation':'rgba(100,40,160,.15)','Rules':'rgba(61,184,140,.15)',
    'Spirit':'rgba(180,140,20,.15)','Definition':'rgba(201,168,76,.15)',
  };
  const typeBorders={
    'Character':'rgba(180,40,40,.4)','Ability':'rgba(60,140,200,.4)',
    'Invocation':'rgba(100,40,160,.4)','Rules':'rgba(61,184,140,.4)',
    'Spirit':'rgba(180,140,20,.4)','Definition':'rgba(201,168,76,.4)',
  };

  if(hits.length===0){
    // Smart suggestions on no results
    const suggestions=Object.keys(TERM_DEFS).filter(k=>k.toLowerCase().includes(lq.slice(0,3))||lq.includes(k.toLowerCase().slice(0,3)));

// ── MATCH SCORE (search scoring) ─────────────────────────────────────────
function matchScore(q,fields){
  let score=0;
  const ql=q.toLowerCase();
  fields.forEach((f,i)=>{
    if(!f)return;
    const fl=String(f).toLowerCase();
    if(fl===ql)score+=10;
    else if(fl.startsWith(ql))score+=6;
    else if(fl.includes(ql))score+=3;
    else{
      // word-by-word partial matching
      const words=ql.split(/\s+/);
      words.forEach(w=>{if(w.length>2&&fl.includes(w))score+=1;});
    }
    // Boost title/name fields (index 0)
    if(i===0)score*=1.5;
  });
  return score;
}

  const maxLife=parseInt(String(charData.stats['LIFE']||0).split('/')[0])||1;
  const woundedAt=Math.ceil(maxLife/2);

  const CONDITIONS=['Stunned','Prone','Bleed','Entangled','Pinned','Dominated','On Fire','Poisoned'];
  const statKeys=['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ARM','ALC','LIFE'];
  const activeStats=statKeys.filter(k=>charData.stats[k]!==undefined);
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const nameEsc=name.replace(/'/g,"\\'");

  const state=CombatState.getOrInit(name,maxLife);

  const COND_PENALTIES={
    'Prone':{'CC ATT':-2,'CC DEF':-2},
    'Entangled':{'CC ATT':-2,'CC DEF':-2},
    'Pinned':{},'Dominated':{},'Stunned':{},'Bleed':{},
    'On Fire':{'FIN':-2},
    'Poisoned':{'STR':-2,'FIN':-2},
  };

  function lifeState(lv){
    if(lv<=0)return'ooa';
    if(lv<=woundedAt)return'wounded';
    return'ok';
  }

  function getEffectivePenalties(st,curConds){
    const pen={};
    if(st==='wounded'||st==='ooa'){
      ['SPD','STR','FIN','CC ATT','CC DEF','RNG ATT','RNG DEF','ALC'].forEach(k=>{pen[k]=(pen[k]||0)-2;});
    }
    curConds.forEach(cond=>{
      const cp=COND_PENALTIES[cond]||{};
      Object.entries(cp).forEach(([stat,val])=>{pen[stat]=(pen[stat]||0)+val;});
    });
    return pen;
  }

  function getEffStat(k,pen){
    const raw=charData.stats[k];
    if(raw===undefined)return{html:'',eff:0};
    const baseNum=parseInt(String(raw).split('/')[0])||0;
    const penalty=pen[k];
    if(penalty===undefined)return{html:`<span class="ct-stat-val">${raw}</span>`,eff:baseNum};
    const adj=Math.max(0,baseNum+penalty);
    return{html:`<span class="ct-stat-val debuffed" title="${k}: ${baseNum} (${penalty>0?'+':''}${penalty})">${adj}</span>`,eff:adj};
  }

  function getPenaltyNote(st,curConds){
    const parts=[];
    if(st==='wounded') parts.push('Wounded −2 all');
    if(st==='ooa') parts.push('Out of Action');
    curConds.forEach(cond=>{
      const cp=COND_PENALTIES[cond]||{};

        parts.push(cond+': '+Object.entries(cp).map(([s,v])=>s+' '+v).join(', '));

        <div class="ct-weapon-header"><span class="ct-weapon-name">${w.name}</span>${w.dmg?`<span class="ct-weapon-dmg">${w.dmg}</span>`:''}</div>
        ${w.tags.length?`<div class="ct-weapon-tags">${w.tags.map(t=>`<span class="ct-wtag${dangerTags.includes(t)?' danger':specialTags.includes(t)?' special':''}">${t}</span>`).join('')}</div>`:''}
      </div>`).join(''):`<div style="font-family:'IM Fell English',serif;font-size:.88rem;color:var(--brass-dark);font-style:italic">${charData.weapons||'—'}</div>`}
    </div>

    <div class="ct-section">
      <div class="ct-section-title">⚡ Abilities <span style="font-family:'Josefin Sans',sans-serif;font-size:.62rem;color:var(--brass-dark)">(tap to expand)</span></div>
      ${(charData.abilities||[]).map(aName=>{
        const aDef=ABILITIES?ABILITIES.find(x=>x.n===aName):null;
        return`<div class="ct-ability" onclick="this.classList.toggle('expanded')"><div class="ct-ability-header"><span class="ct-ability-name">${aName}</span>${aDef?`<span class="ct-ability-type">${aDef.t}</span>`:''}</div><div class="ct-ability-desc">${aDef?aDef.d:'See abilities glossary.'}</div></div>`;
      }).join('')}
    </div>

    ${charData.schools?`<div class="ct-section">
      <div class="ct-section-title">🔮 Alchemancy Schools</div>
      <div style="margin-bottom:.65rem">${charData.schools.map(s=>`<button class="ct-school-btn" onclick="ctToggleSchool('${nameEsc}','${s}',this)">⚗ ${s}</button>`).join('')}</div>
      <div id="ct-invocs-${sKey}" style="font-family:'IM Fell English',serif;font-size:.85rem;color:var(--brass-dark);font-style:italic;text-align:center;padding:.5rem">Tap a school to see its invocations</div>
    </div>`:''}

    <div class="ct-section" id="ct-maint-section-${sKey}">
      <div class="ct-section-title">🔧 Maintenance Checklist</div>
      ${maintItems.map(item=>{
        const done=curMaint.includes(item.id);
        return`<div class="ct-maint-item${done?' done':''}" id="ctm-${sKey}-${item.id}" onclick="ctToggleMaint('${nameEsc}','${item.id}')"><div class="ct-maint-check">${done?'✓':''}</div><div class="ct-maint-text">${item.label}</div></div>`;
      }).join('')}
      <button onclick="ctClearMaint('${nameEsc}')" style="background:transparent;border:1px solid rgba(201,168,76,.18);color:var(--brass-dark);font-family:'Josefin Sans',sans-serif;font-size:.62rem;padding:.22rem .6rem;border-radius:4px;cursor:pointer;margin-top:.3rem;transition:all .2s">↺ Reset checklist</button>
    </div>

    <div class="ct-section">
      <div class="ct-section-title">📝 Battle Notes</div>
      <textarea class="ct-notes" placeholder="Objectives, enemy conditions, VP scored, special orders…" oninput="ctSaveNotes('${nameEsc}',this.value)" aria-label="Battle notes">${curNotes}</textarea>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;gap:.5rem;flex-wrap:wrap">
      <button class="ct-reset-btn" onclick="ctReset('${nameEsc}',${maxLife})">↺ Reset All</button>
      <button onclick="openChar('${nameEsc}');closeCombatTracker()" style="background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--brass-light);font-family:'Josefin Sans',sans-serif;font-size:.72rem;padding:.38rem .85rem;border-radius:5px;cursor:pointer;transition:all .2s">👤 Full Character Card</button>
    </div>
    `;
  }

  window._ctUpdaters=window._ctUpdaters||{};
  window._ctUpdaters[name]={updateLifeSection,updateCondsSection,updateActionsSection,updateStatsSection,updateUndoBtn};
  window._ctBuilders=window._ctBuilders||{};
  window._ctBuilders[name]=buildContent;
  document.getElementById('ct-content').innerHTML=buildContent();
  document.getElementById('combat-modal').classList.add('open');
  document.getElementById('combat-modal').addEventListener('keydown',function(e){if(e.key==='Escape')closeCombatTracker();});
}

function ctAdjLife(name,delta,max){
  const s=CombatState.get(name);if(!s)return;
  CombatState.setField(name,'life',Math.max(0,Math.min(max,s.life+delta)));
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateLifeSection();
}
function ctStepLife(name,dir,max){
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const sel=document.getElementById('ct-step-sel-'+sKey);
  ctAdjLife(name,dir*(sel?parseInt(sel.value)||1:1),max);
}
function ctAdjRound(name,delta){
  const s=CombatState.get(name);if(!s)return;
  const next=Math.max(1,s.round+delta);
  CombatState.setField(name,'round',next,false);
  const el=document.getElementById('ctr-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.textContent=next;
}
function ctToggleAction(name,idx){
  const s=CombatState.get(name);if(!s)return;
  CombatState.setField(name,'actions',idx<s.actions?idx:idx+1);
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateActionsSection();
}
function ctToggleCond(name,cond){
  const s=CombatState.get(name);if(!s)return;
  const conds=[...s.conds];const i=conds.indexOf(cond);
  if(i>=0)conds.splice(i,1);else conds.push(cond);
  CombatState.setField(name,'conds',conds);
  if(window._ctUpdaters&&window._ctUpdaters[name])window._ctUpdaters[name].updateCondsSection();
}
function ctToggleCondEl(el){
  const sKey=el.dataset.ctname;const cond=el.dataset.ctcond;
  const name=Object.keys(window._ctBuilders||{}).find(n=>n.replace(/[^a-z0-9]/gi,'_')===sKey)||sKey;
  ctToggleCond(name,cond);
}
function ctRollDie(die,sKey){
  const sides=parseInt(die.slice(1));const roll=Math.floor(Math.random()*sides)+1;
  const resEl=document.getElementById('ct-roll-'+sKey);const detEl=document.getElementById('ct-roll-det-'+sKey);
  if(!resEl) return;
  resEl.className='ct-roll-result'+(die==='D20'&&roll===20?' crit':die==='D20'&&roll===1?' fumble':'');
  resEl.textContent=roll;
  if(detEl){
    if(die==='D20'&&roll===20) detEl.textContent='⭐ CRITICAL HIT — Natural 20!';
    else if(die==='D20'&&roll===1) detEl.textContent='💀 CRITICAL FAILURE — Natural 1';
    else detEl.textContent=die+' roll';
  }
}
function ctOppRoll(sKey){
  const statSel=document.getElementById('ct-opp-stat-'+sKey);
  const enemyInp=document.getElementById('ct-opp-enemy-'+sKey);
  if(!statSel||!enemyInp) return;
  const myStat=parseInt(statSel.value)||0;const enemyStat=parseInt(enemyInp.value)||0;
  const myRoll=Math.floor(Math.random()*20)+1;const enemyRoll=Math.floor(Math.random()*20)+1;
  const myTotal=myStat+myRoll;const enemyTotal=enemyStat+enemyRoll;const myWin=myTotal>enemyTotal;
  const myDieEl=document.getElementById('ct-opp-die-'+sKey);const myTotEl=document.getElementById('ct-opp-tot-'+sKey);
  const enDieEl=document.getElementById('ct-opp-enemy-die-'+sKey);const enTotEl=document.getElementById('ct-opp-enemy-tot-'+sKey);
  if(myDieEl) myDieEl.textContent=myRoll+(myRoll===20?'⭐':myRoll===1?'💀':'');
  if(enDieEl) enDieEl.textContent=enemyRoll+(enemyRoll===20?'⭐':enemyRoll===1?'💀':'');
  const tie=myTotal===enemyTotal;
  if(myTotEl){myTotEl.className='ct-opp-total'+(tie?' ':myWin?' win':' lose');myTotEl.textContent=myTotal+(tie?' TIE→Favour':'');}
  if(enTotEl){enTotEl.className='ct-opp-total'+(tie?' ':myWin?' lose':' win');enTotEl.textContent=enemyTotal+(tie?' TIE→Favour':'');}
}
function ctSaveOppStat(name,sel){
  const opt=sel.options[sel.selectedIndex];
  if(opt)CombatState.setField(name,'oppStat',opt.dataset.stat,false);
  const valEl=document.getElementById('ct-opp-val-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(valEl)valEl.textContent=sel.value;
}
function ctSaveOppEnemy(name,inp){CombatState.setField(name,'oppEnemy',parseInt(inp.value)||0,false);}
function ctToggleMaint(name,itemId){
  const s=CombatState.get(name);if(!s)return;
  const maint=[...s.maint];const idx=maint.indexOf(itemId);
  if(idx>=0)maint.splice(idx,1);else maint.push(itemId);
  CombatState.setField(name,'maint',maint,false);
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const el=document.getElementById('ctm-'+sKey+'-'+itemId);
  if(el){const done=maint.includes(itemId);el.classList.toggle('done',done);const check=el.querySelector('.ct-maint-check');if(check) check.textContent=done?'✓':'';}
}
function ctClearMaint(name){
  CombatState.setField(name,'maint',[],false);
  if(window._ctBuilders&&window._ctBuilders[name])document.getElementById('ct-content').innerHTML=window._ctBuilders[name]();
}
function ctSaveNotes(name,val){CombatState.setField(name,'notes',val,false);}
function ctCustomDmg(name,max){
  const v=prompt('Enter adjustment (e.g. -7 for damage, +3 for healing):');
  if(v===null)return;const n=parseInt(v);if(isNaN(n))return showToast('Invalid number');
  ctAdjLife(name,n,max);
}
function ctUndo(name,max){
  const field=CombatState.undo(name);
  if(!field){showToast('Nothing to undo');return;}
  const u=window._ctUpdaters&&window._ctUpdaters[name];
  if(!u)return;
  if(field==='life')u.updateLifeSection();
  else if(field==='conds')u.updateCondsSection();
  else if(field==='actions')u.updateActionsSection();
  else if(window._ctBuilders&&window._ctBuilders[name])document.getElementById('ct-content').innerHTML=window._ctBuilders[name]();
  showToast('↩ Undone: '+field);
}
function ctReset(name,max){
  if(!confirm('Reset '+name+' — clear life, conditions, actions, notes and maintenance?'))return;
  CombatState.reset(name,max);
  if(window._ctBuilders&&window._ctBuilders[name])document.getElementById('ct-content').innerHTML=window._ctBuilders[name]();
  showToast(name+' reset to full');
}
function ctUpdateOppStat(sKey){
  const sel=document.getElementById('ct-opp-stat-'+sKey);const valEl=document.getElementById('ct-opp-val-'+sKey);
  if(sel&&valEl) valEl.textContent=sel.value;
}
function ctToggleSchool(name,school,btn){
  const invocs=INVOC&&INVOC[school.toLowerCase()];
  const sKey=name.replace(/[^a-z0-9]/gi,'_');
  const container=document.getElementById(`ct-invocs-${sKey}`);if(!container)return;
  const wasActive=btn.classList.contains('ct-school-active');
  btn.parentElement.querySelectorAll('.ct-school-btn').forEach(b=>{b.classList.remove('ct-school-active');b.style.background='rgba(100,40,160,.12)';});
  if(wasActive){container.innerHTML='<div style="font-family:\'IM Fell English\',serif;font-size:.85rem;color:var(--brass-dark);font-style:italic;text-align:center;padding:.5rem">Tap a school to see its invocations</div>';return;}
  btn.classList.add('ct-school-active');btn.style.background='rgba(100,40,160,.35)';
  if(!invocs||!invocs.length){container.innerHTML='<div style="color:var(--brass-dark);font-size:.82rem;padding:.5rem">No invocations found.</div>';return;}
  container.innerHTML=invocs.map(v=>`<div class="ct-invoc" onclick="this.classList.toggle('expanded')"><div style="display:flex;justify-content:space-between"><span class="ct-invoc-name">${v.n}</span><span class="ct-invoc-power">Power ${v.pw}</span></div><div class="ct-invoc-desc">${v.d}</div></div>`).join('');
}

// ── TERMINOLOGY & STAT DEFINITIONS ───────────────────────────────────────
const TERM_DEFS={
  'SPD':     {title:'SPD — Speed',      type:'Characteristic',body:'How many inches the character can move per Move Action. Higher Speed characters can cross the battlefield quickly and are harder to pin down.',example:'SPD 5 = moves up to 5" per Move Action. SPD 7⊕ means wheeled movement with special rules.'},
  'STR':     {title:'STR — Strength',   type:'Characteristic',body:'Raw physical power. Used for Close Combat damage calculation and some special ability checks. Characters with high Strength hit harder in melee.',example:'Strength 6 + CC weapon die = devastating close combat damage.'},
  'FIN':     {title:'FIN — Finesse',    type:'Characteristic',body:'Agility, precision and dexterity. Used for Ranged attacks, dodging, many skill checks, and resisting certain conditions. The most versatile stat.',example:'Finesse 8 makes Feygin nearly impossible to catch or outmanoeuvre.'},
  'CC ATT':  {title:'CC ATT — Close Combat Attack',type:'Characteristic',body:'Your roll when attacking in melee. Add to D20 and compare against opponent\'s CC DEF. The higher this number, the more reliably you hit in close combat.',example:'CC ATT 6 + D20 roll vs opponent\'s CC DEF + D20 roll. Highest total wins.'},
  'CC DEF':  {title:'CC DEF — Close Combat Defence',type:'Characteristic',body:'Your resistance roll when being attacked in melee. Add to D20 roll. High CC DEF makes you hard to hit in close combat.',example:'A character with CC DEF 7 is very hard to hit reliably even by strong attackers.'},
  'RNG ATT': {title:'RNG ATT — Ranged Attack',type:'Characteristic',body:'Accuracy with ranged weapons. Add to D20 vs target\'s RNG DEF. Affected by range bands, cover, and modifiers like Aim and Snap Shot.',example:'RNG ATT 6 + D20. Ranges: Short / Mid / Long / Extreme — each adds penalties.'},
  'RNG DEF': {title:'RNG DEF — Ranged Defence',type:'Characteristic',body:'Your ability to dodge or avoid ranged fire. Add to D20 when being shot at. Taking cover adds further bonuses.',example:'Characters in cover get additional RNG DEF bonuses on top of their base stat.'},
  'ARM':     {title:'ARM — Armour',     type:'Characteristic',body:'Damage reduction. After damage is calculated, subtract your Armour value. Armour cannot reduce damage below 0. Some weapons and abilities bypass or reduce it.',example:'Take 9 damage with ARM 4 = 5 Life lost. Penetrating weapons halve your ARM.'},
  'ALC':     {title:'ALC — Alchemancy', type:'Characteristic',body:'Magical aptitude. Required to cast Invocations. Used as a bonus on Alchemancy rolls. Only Alchemancers have this stat — it determines how powerful their spells are.',example:'ALC 7 makes Nancy one of the most powerful Alchemancers in the game.'},
  'LIFE':    {title:'LIFE — Life Points',type:'Characteristic',body:'Your character\'s health. When Life drops to or below half, they enter Wounded state: all characteristics −2 (except Life and Armour). At 0 Life they are Out of Action and removed.',example:'LIFE 28 with Wounded at 14. When wounded, CC ATT 6 drops to 4, FIN drops 2, etc.'},
  'Favour':         {title:'Favour of The Engine',type:'Game Mechanic',body:'A special resource representing the Engine\'s blessing. The player holding Favour wins all tied rolls. You gain Favour by drawing certain Eye of Engine cards. You lose Favour by failing a re-roll or drawing a red Eyecon while Tempting Fate.',example:'Both players roll 14 total. The player with Favour wins the tie automatically.'},
  'Tempting Fate':  {title:'Tempting Fate',type:'Game Mechanic',body:'When you fail a roll, you may Tempt Fate: draw an Eye of Engine card. If it shows Eyecon symbols, you automatically succeed — but if you draw a red Eyecon, you lose Favour. A risky but powerful last resort.',example:'Failed CC Attack by 2 — draw Eye card. If it has Eyecons, the attack succeeds.'},
  'Activation':     {title:'Activation',type:'Game Mechanic',body:'Each character\'s turn in a round. Players alternate activating characters. Each character gets 2 Actions per Activation. The order is determined by Activation cards sorted in Phase I.',example:'Player A activates Carter (2 Actions: Move + Shoot). Then Player B activates a Guardian.'},
  'Natural 1':      {title:'Natural 1 — Critical Failure',type:'Game Mechanic',body:'Rolling a 1 on the D20 (before any modifiers) always fails, regardless of bonuses. This can\'t be saved by a high characteristic value.',example:'CC ATT 10 + Natural 1 = automatic failure. The modifier doesn\'t matter.'},
  'Natural 20':     {title:'Natural 20 — Critical Success',type:'Game Mechanic',body:'Rolling a 20 on the D20 always succeeds. In combat it\'s a Critical Hit: target\'s Armour is halved, and they must pass a Finesse check (Diff 10+damage) or become Stunned.',example:'Natural 20 on CC Attack: hit confirmed, target ARM halved, Stun check required.'},
  'Out of Action':  {title:'Out of Action (OOA)',type:'Game State',body:'When a character\'s Life reaches 0, they are taken Out of Action and removed from the game. Some abilities trigger when an ally or enemy goes OOA. Scoring 2VP for opponent characters taken OOA is always active.',example:'Enemy model reaches 0 Life = removed from board. You score 2VP automatically.'},
  'Wounded':        {title:'Wounded',type:'Game State',body:'When Life drops to half value or below. All characteristics −2 except Life and Armour. The character still acts but is significantly weakened. Check the red box threshold on your character card.',example:'LIFE 20, Wounded at 10. When wounded: STR 5→3, FIN 4→2, CC ATT 6→4, etc.'},
  'Stunned':        {title:'Stunned',type:'Condition',body:'Character loses their next Action. Applied by Critical Hits (if Finesse check fails), certain weapons with the Stun property, and some abilities.',example:'Natural 20 hit: target takes full damage then rolls Finesse (Diff 10+damage) or is Stunned.'},
  'Prone':          {title:'Prone',type:'Condition',body:'Character is knocked down. −2 CC ATT and CC DEF while prone. Enemy ranged attacks get +1 to hit. Takes an Action to stand up. Applied by Bring \'em Down and similar abilities.',example:'Knocked Prone: spend 1 Action to stand, or stay prone and fight at −2 CC stats.'},
  'Bleed':          {title:'Bleed',type:'Condition',body:'Ongoing damage. At the end of each Maintenance Phase, the character loses D4 Life. Can be cleared with a Difficulty 12 Finesse check during Maintenance. Caused by Bleed weapons and abilities.',example:'Bleed applied: lose D4 Life at Maintenance unless you pass Diff 12 FIN to clear it.'},

function showTerm(key){
  const d=TERM_DEFS[key];
  if(!d)return;
  const existing=document.getElementById('term-tooltip');
  if(existing)existing.remove();
  const el=document.createElement('div');
  el.id='term-tooltip';
  el.className='tooltip-modal';
  el.onclick=e=>{if(e.target===el)el.remove();};
  el.innerHTML=`<div class="tooltip-card">
    <button class="tooltip-close" onclick="document.getElementById('term-tooltip').remove()">✕</button>
    <div class="tooltip-title">${d.title}</div>
    <div class="tooltip-type">${d.type}</div>
    <div class="tooltip-body">${d.body}</div>
    ${d.example?`<div class="tooltip-example">📖 ${d.example}</div>`:''}
  </div>`;
  document.body.appendChild(el);
}

// Make stat pills clickable throughout the app
function makeStatPillsClickable(){
  document.querySelectorAll('.stat-pill').forEach(el=>{
    const txt=el.textContent.trim();
    // Match "SPD Speed" → key "SPD", or "STR Strength" → "STR" etc.
    const key=Object.keys(TERM_DEFS).find(k=>txt.startsWith(k));
    if(key&&!el.dataset.termBound){
      el.dataset.termBound='1';
      el.title='Click for details';
      el.onclick=e=>{e.stopPropagation();showTerm(key);};
    }
  });
}

// ── SERVICE WORKER (PWA offline support — improved #8) ───
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='twisted-v2';
const ASSETS=['/'];
const FONT_CACHE='twisted-fonts-v1';
self.addEventListener('install',e=>e.waitUntil(
  caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting())
));
self.addEventListener('activate',e=>e.waitUntil(
  caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE&&k!==FONT_CACHE).map(k=>caches.delete(k))))
));
self.addEventListener('fetch',e=>{
  const url=new URL(e.request.url);
  if(url.hostname==='fonts.googleapis.com'||url.hostname==='fonts.gstatic.com'){
    e.respondWith(caches.open(FONT_CACHE).then(c=>c.match(e.request).then(r=>{
      if(r)return r;
      return fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}).catch(()=>new Response('',{status:200,headers:{'Content-Type':'text/css'}}));
    })));
    return;
  }
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;
    }).catch(()=>caches.match('/')))
  );
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
